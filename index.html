<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        #game-canvas {
            border: 2px solid #fff;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
        }

        /* 游戏信息面板 */
        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        /* 控制按钮 */
        #controls {
            margin-top: 15px;
            text-align: center;
        }

        button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            backdrop-filter: blur(5px);
        }

        #test-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .test-item {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
                margin: 10px;
            }

            #game-canvas {
                max-width: 90vw;
                max-height: 60vh;
            }

            #test-panel {
                position: relative;
                top: auto;
                right: auto;
                margin: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div>得分: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
        </div>
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="controls">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="reset-btn">重置</button>
            <button id="test-btn">运行测试</button>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试面板</h3>
        <div>FPS: <span id="fps-counter">0</span></div>
        <div>雪花数量: <span id="snowflake-count">0</span></div>
        <div>内存使用: <span id="memory-usage">-</span></div>
        <div id="test-results"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isActive = true;
                this.performanceMode = false;
                this.init();
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✦', '✧', '✩'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // 随机初始位置和属性
                    const size = Math.random() * 0.8 + 0.8;
                    snowflake.style.fontSize = size + 'em';
                    snowflake.style.left = Math.random() * 100 + '%';
                    snowflake.style.top = -10 + 'px';
                    
                    // 动画属性
                    snowflake.animationData = {
                        x: Math.random() * window.innerWidth,
                        y: -10,
                        speedY: Math.random() * 2 + 1,
                        speedX: Math.random() * 1 - 0.5,
                        rotation: 0,
                        rotationSpeed: Math.random() * 2 - 1,
                        opacity: Math.random() * 0.6 + 0.4
                    };
                    
                    snowflake.style.opacity = snowflake.animationData.opacity;
                    this.container.appendChild(snowflake);
                    this.snowflakes.push(snowflake);
                }
            }

            animate() {
                if (!this.isActive) return;

                this.snowflakes.forEach(snowflake => {
                    const data = snowflake.animationData;
                    
                    // 更新位置
                    data.y += data.speedY;
                    data.x += data.speedX;
                    data.rotation += data.rotationSpeed;
                    
                    // 边界检查
                    if (data.y > window.innerHeight + 10) {
                        data.y = -10;
                        data.x = Math.random() * window.innerWidth;
                    }
                    
                    if (data.x > window.innerWidth + 10) {
                        data.x = -10;
                    } else if (data.x < -10) {
                        data.x = window.innerWidth + 10;
                    }
                    
                    // 应用变换
                    snowflake.style.transform = `translate(${data.x}px, ${data.y}px) rotate(${data.rotation}deg)`;
                });
            }

            startAnimation() {
                const animate = () => {
                    this.animate();
                    if (this.isActive) {
                        requestAnimationFrame(animate);
                    }
                };
                animate();
            }

            setPerformanceMode(enabled) {
                this.performanceMode = enabled;
                if (enabled) {
                    this.maxSnowflakes = 25;
                    // 移除多余的雪花
                    while (this.snowflakes.length > this.maxSnowflakes) {
                        const snowflake = this.snowflakes.pop();
                        snowflake.remove();
                    }
                }
            }

            destroy() {
                this.isActive = false;
                this.snowflakes.forEach(snowflake => snowflake.remove());
                this.snowflakes = [];
            }
        }

        // 简化版俄罗斯方块游戏
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.level = 1;
                this.isRunning = false;
                this.isPaused = false;
                this.gameLoop = null;
                
                this.setupEventListeners();
            }

            setupEventListeners() {
                document.getElementById('start-btn').addEventListener('click', () => this.start());
                document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
                document.getElementById('reset-btn').addEventListener('click', () => this.reset());
            }

            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                document.getElementById('start-btn').disabled = true;
                document.getElementById('pause-btn').disabled = false;
                
                this.gameLoop = setInterval(() => {
                    if (!this.isPaused) {
                        this.update();
                        this.render();
                    }
                }, 500);
            }

            togglePause() {
                this.isPaused = !this.isPaused;
                document.getElementById('pause-btn').textContent = this.isPaused ? '继续' : '暂停';
            }

            reset() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
                
                document.getElementById('start-btn').disabled = false;
                document.getElementById('pause-btn').disabled = true;
                document.getElementById('pause-btn').textContent = '暂停';
                
                this.updateUI();
                this.render();
            }

            update() {
                // 简化的游戏逻辑
                this.score += 10;
                this.level = Math.floor(this.score / 1000) + 1;
                this.updateUI();
            }

            render() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x < this.canvas.width; x += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.canvas.height; y += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制示例方块
                this.ctx.fillStyle = '#4CAF50';
                this.ctx.fillRect(120, 540, 60, 60);
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor(snowflakeSystem, tetrisGame) {
                this.snowflakeSystem = snowflakeSystem;
                this.tetrisGame = tetrisGame;
                this.testResults = [];
                this.performanceData = {
                    frameRate: 0,
                    memoryUsage: 0,
                    lastFrameTime: performance.now()
                };
                
                this.startPerformanceMonitoring();
            }

            runIntegrationTests() {
                this.testResults = [];
                this.logResult('开始集成测试...');
                
                // 测试雪花生成
                this.testSnowflakeGeneration();
                
                // 测试动画性能
                this.testAnimationPerformance();
                
                // 测试响应式设计
                this.testResponsiveDesign();
                
                // 测试Z-Index层级
                this.testZIndexLayering();
                
                // 测试兼容性
                this.testCompatibility();
                
                this.logResult('集成测试完成！');
                return this.testResults;
            }

            testSnowflakeGeneration() {
                try {
                    const snowflakeCount = this.snowflakeSystem.snowflakes.length;
                    const container = document.getElementById('snowflake-container');
                    
                    if (snowflakeCount > 0) {
                        this.logResult(`✓ 雪花生成测试通过 (${snowflakeCount}个雪花)`, 'pass');
                    } else {
                        this.logResult('✗ 雪花生成测试失败', 'fail');
                    }
                    
                    if (container && container.children.length > 0) {
                        this.logResult('✓ 雪花DOM元素创建成功', 'pass');
                    } else {
                        this.logResult('✗ 雪花DOM元素创建失败', 'fail');
                    }
                } catch (error) {
                    this.logResult(`✗ 雪花生成测试异常: ${error.message}`, 'fail');
                }
            }

            testAnimationPerformance() {
                try {
                    const fps = this.performanceData.frameRate;
                    
                    if (fps >= 30) {
                        this.logResult(`✓ 动画性能良好 (${fps.toFixed(1)} FPS)`, 'pass');
                    } else if (fps >= 20) {
                        this.logResult(`⚠ 动画性能一般 (${fps.toFixed(1)} FPS)`, 'warning');
                    } else {
                        this.logResult(`✗ 动画性能不佳 (${fps.toFixed(1)} FPS)`, 'fail');
                    }
                } catch (error) {
                    this.logResult(`✗ 性能测试异常: ${error.message}`, 'fail');
                }
            }

            testResponsiveDesign() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    if (container.style.position === 'fixed' && container.style.width === '100%') {
                        this.logResult('✓ 雪花容器响应式设计正确', 'pass');
                    } else {
                        this.logResult('✗ 雪花容器响应式设计有问题', 'fail');
                    }
                    
                    if (gameContainer) {
                        this.logResult('✓ 游戏容器布局正常', 'pass');
                    } else {
                        this.logResult('✗ 游戏容器布局异常', 'fail');
                    }
                } catch (error) {
                    this.logResult(`✗ 响应式测试异常: ${error.message}`, 'fail');
                }
            }

            testZIndexLayering() {
                try {
                    const snowflakeContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowflakeZ = parseInt(getComputedStyle(snowflakeContainer).zIndex) || 0;
                    const gameZ = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    const testZ = parseInt(getComputedStyle(testPanel).zIndex) || 0;
                    
                    if (snowflakeZ < gameZ && gameZ < testZ) {
                        this.logResult(`✓ Z-Index层级正确 (雪花:${snowflakeZ}, 游戏:${gameZ}, 测试:${testZ})`, 'pass');
                    } else {
                        this.logResult(`⚠ Z-Index层级需要检查 (雪花:${snowflakeZ}, 游戏:${gameZ}, 测试:${testZ})`, 'warning');
                    }
                } catch (error) {
                    this.logResult(`✗ Z-Index测试异常: ${error.message}`, 'fail');
                }
            }

            testCompatibility() {
                try {
                    const features = {
                        'CSS3动画': 'animationName' in document.body.style,
                        'Transform3D': 'transform' in document.body.style,
                        'RequestAnimationFrame': typeof requestAnimationFrame !== 'undefined',
                        'Canvas支持': !!document.createElement('canvas').getContext,
                        'ES6支持': typeof Symbol !== 'undefined'
                    };
                    
                    let passCount = 0;
                    let totalCount = Object.keys(features).length;
                    
                    for (const [feature, supported] of Object.entries(features)) {
                        if (supported) {
                            this.logResult(`✓ ${feature}支持`, 'pass');
                            passCount++;
                        } else {
                            this.logResult(`✗ ${feature}不支持`, 'fail');
                        }
                    }
                    
                    const compatibility = (passCount / totalCount) * 100;
                    if (compatibility >= 80) {
                        this.logResult(`✓ 浏览器兼容性良好 (${compatibility.toFixed(0)}%)`, 'pass');
                    } else {
                        this.logResult(`⚠ 浏览器兼容性一般 (${compatibility.toFixed(0)}%)`, 'warning');
                    }
                } catch (error) {
                    this.logResult(`✗ 兼容性测试异常: ${error.message}`, 'fail');
                }
            }

            startPerformanceMonitoring() {
                let frameCount = 0;
                let lastTime = performance.now();
                
                const monitor = () => {
                    const currentTime = performance.now();
                    frameCount++;
                    
                    if (currentTime - lastTime >= 1000) {
                        this.performanceData.frameRate = frameCount;
                        frameCount = 0;
                        lastTime = currentTime;
                        
                        // 更新UI
                        document.getElementById('fps-counter').textContent = this.performanceData.frameRate;
                        document.getElementById('snowflake-count').textContent = this.snowflakeSystem.snowflakes.length;
                        
                        // 内存使用情况（如果支持）
                        if (performance.memory) {
                            const memoryMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1);
                            document.getElementById('memory-usage').textContent = memoryMB + ' MB';
                        }
                    }
                    
                    requestAnimationFrame(monitor);
                };
                
                monitor();
            }

            logResult(message, type = 'info') {
                const result = { message, type, timestamp: new Date().toLocaleTimeString() };
                this.testResults.push(result);
                
                const resultsContainer = document.getElementById('test-results');
                const resultElement = document.createElement('div');
                resultElement.className = `test-item test-${type}`;
                resultElement.textContent = `[${result.timestamp}] ${message}`;
                
                resultsContainer.appendChild(resultElement);
                resultsContainer.scrollTop = resultsContainer.scrollHeight;
                
                // 限制显示的结果数量
                while (resultsContainer.children.length > 20) {
                    resultsContainer.removeChild(resultsContainer.firstChild);
                }
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            validateBrowserSupport() {
                const userAgent = navigator.userAgent;
                const isModernBrowser = (
                    'requestAnimationFrame' in window &&
                    'transform' in document.body.style &&
                    'addEventListener' in window
                );
                
                return {
                    isSupported: isModernBrowser,
                    userAgent: userAgent,
                    features: {
                        animationFrame: 'requestAnimationFrame' in window,
                        css3Transform: 'transform' in document.body.style,
                        eventListeners: 'addEventListener' in window
                    }
                };
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const screenWidth = window.innerWidth;
                
                return {
                    isMobile: isMobile,
                    screenWidth: screenWidth,
                    recommendedSnowflakes: isMobile ? 25 : 50,
                    performanceMode: isMobile || screenWidth < 768
                };
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.metrics = {
                    frameRate: 0,
                    memoryUsage: 0,
                    animationCost: 0
                };
            }

            monitorFrameRate() {
                let frames = 0;
                let lastTime = performance.now();
                
                const measure = () => {
                    frames++;
                    const currentTime = performance.now();
                    
                    if (currentTime - lastTime >= 1000) {
                        this.metrics.frameRate = frames;
                        frames = 0;
                        lastTime = currentTime;
                    }
                    
                    requestAnimationFrame(measure);
                };
                
                measure();
            }

            generatePerformanceReport() {
                return {
                    timestamp: new Date().toISOString(),
                    frameRate: this.metrics.frameRate,
                    memoryUsage: performance.memory ? performance.memory.usedJSHeapSize : 0,
                    recommendations: this.getRecommendations()
                };
            }

            getRecommendations() {
                const recommendations = [];
                
                if (this.metrics.frameRate < 30) {
                    recommendations.push('建议启用性能模式以减少雪花数量');
                }
                
                if (performance.memory && performance.memory.usedJSHeapSize > 50 * 1024 * 1024) {
                    recommendations.push('内存使用较高，建议定期清理DOM元素');
                }
                
                return recommendations;
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            // 创建系统实例
            const snowflakeSystem = new SnowflakeSystem();
            const tetrisGame = new TetrisGame();
            const compatibilityValidator = new CompatibilityValidator();
            const performanceMonitor = new PerformanceMonitor();
            
            // 创建集成测试套件
            const testSuite = new IntegrationTestSuite(snowflakeSystem, tetrisGame);
            
            // 检查移动设备性能
            const mobilePerf = compatibilityValidator.testMobilePerformance();
            if (mobilePerf.performanceMode) {
                snowflakeSystem.setPerformanceMode(true);
                testSuite.logResult('⚠ 检测到移动设备，已启用性能模式', 'warning');
            }
            
            // 验证浏览器支持
            const browserSupport = compatibilityValidator.validateBrowserSupport();
            if (!browserSupport.isSupported) {
                testSuite.logResult('⚠ 浏览器兼容性可能存在问题', 'warning');
            }
            
            // 绑定测试按钮
            document.getElementById('test-btn').addEventListener('click', () => {
                testSuite.runIntegrationTests();
            });
            
            // 启动性能监控
            performanceMonitor.monitorFrameRate();
            
            // 初始渲染游戏
            tetrisGame.render();
            
            // 运行初始测试
            setTimeout(() => {
                testSuite.logResult('系统初始化完成', 'pass');
                testSuite.testSnowflakeGeneration();
                testSuite.testZIndexLayering();
            }, 1000);
            
            // 窗口大小变化时的处理
            window.addEventListener('resize', () => {
                testSuite.logResult('窗口大小已变化，重新检查响应式设计', 'info');
                setTimeout(() => testSuite.testResponsiveDesign(), 100);
            });
        });
    </script>
</body>
</html>
