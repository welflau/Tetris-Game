<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 100vw;
            max-height: 100vh;
            padding: 10px;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .level {
            font-size: 18px;
            color: #ff6b6b;
        }

        .lines {
            font-size: 16px;
            color: #4ecdc4;
        }

        .next-piece {
            width: 80px;
            height: 80px;
            background: #000;
            border: 1px solid #fff;
            border-radius: 5px;
            margin-top: 10px;
        }

        .controls {
            font-size: 12px;
            line-height: 1.4;
        }

        .control-buttons {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            border-radius: 5px;
            color: white;
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ff6b6b;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .game-over p {
            margin-bottom: 20px;
            font-size: 16px;
        }

        .restart-btn {
            background: #4ecdc4;
            border: none;
            border-radius: 5px;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background: #45b7aa;
        }

        .game-status {
            text-align: center;
            font-size: 14px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                padding: 5px;
            }

            .game-info {
                min-width: auto;
                width: 100%;
                max-width: 300px;
                padding: 15px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
            }

            .info-section {
                margin-bottom: 10px;
                flex: 1;
                min-width: 120px;
            }

            .next-piece {
                width: 60px;
                height: 60px;
            }

            .control-buttons {
                display: grid;
                width: 100%;
                margin-top: 10px;
            }

            .controls {
                display: none;
            }

            .score {
                font-size: 20px;
            }

            .level {
                font-size: 16px;
            }

            .lines {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .game-info {
                flex-direction: column;
            }

            .info-section {
                text-align: center;
            }

            .game-over {
                width: 90%;
                padding: 20px;
            }

            .game-over h2 {
                font-size: 24px;
            }
        }

        @media (max-height: 600px) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }

            .game-container {
                gap: 10px;
            }

            .game-info {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="game-info">
            <div class="game-status" id="gameStatus">准备开始</div>
            
            <div class="info-section">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-section">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-section">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            
            <div class="info-section">
                <h3>下一个</h3>
                <canvas class="next-piece" id="nextCanvas" width="80" height="80"></canvas>
            </div>
            
            <div class="info-section controls">
                <h3>操作</h3>
                <div>
                    ← → 移动<br>
                    ↓ 加速下落<br>
                    ↑ 旋转<br>
                    空格 暂停<br>
                    R 重新开始
                </div>
            </div>
            
            <div class="control-buttons">
                <button class="control-btn" data-action="rotate">旋转</button>
                <button class="control-btn" data-action="pause">暂停</button>
                <button class="control-btn" data-action="restart">重启</button>
                <button class="control-btn" data-action="left">←</button>
                <button class="control-btn" data-action="down">↓</button>
                <button class="control-btn" data-action="right">→</button>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOverModal">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>消除行数: <span id="finalLines">0</span></p>
        <button class="restart-btn" onclick="gameManager.restart()">重新开始</button>
    </div>

    <script>
        // UIManager - 管理游戏界面状态和信息显示
        class UIManager {
            constructor() {
                this.scoreElement = document.getElementById('score');
                this.levelElement = document.getElementById('level');
                this.linesElement = document.getElementById('lines');
                this.statusElement = document.getElementById('gameStatus');
                this.gameOverModal = document.getElementById('gameOverModal');
                this.finalScoreElement = document.getElementById('finalScore');
                this.finalLinesElement = document.getElementById('finalLines');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.currentScore = 0;
                this.currentLevel = 1;
                this.currentLines = 0;
                this.gameStatus = 'ready';
            }

            updateScore(score) {
                this.currentScore = score;
                this.scoreElement.textContent = score.toLocaleString();
            }

            updateLevel(level) {
                this.currentLevel = level;
                this.levelElement.textContent = level;
            }

            updateLines(lines) {
                this.currentLines = lines;
                this.linesElement.textContent = lines;
            }

            showNextPiece(piece) {
                this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (!piece) return;
                
                const blockSize = 15;
                const offsetX = (this.nextCanvas.width - piece.shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - piece.shape.length * blockSize) / 2;
                
                this.nextCtx.fillStyle = piece.color || '#fff';
                
                for (let row = 0; row < piece.shape.length; row++) {
                    for (let col = 0; col < piece.shape[row].length; col++) {
                        if (piece.shape[row][col]) {
                            this.nextCtx.fillRect(
                                offsetX + col * blockSize,
                                offsetY + row * blockSize,
                                blockSize - 1,
                                blockSize - 1
                            );
                        }
                    }
                }
            }

            updateGameStatus(status) {
                this.gameStatus = status;
                const statusTexts = {
                    'ready': '准备开始',
                    'playing': '游戏进行中',
                    'paused': '游戏暂停',
                    'gameOver': '游戏结束'
                };
                this.statusElement.textContent = statusTexts[status] || status;
            }

            showGameOver() {
                this.finalScoreElement.textContent = this.currentScore.toLocaleString();
                this.finalLinesElement.textContent = this.currentLines;
                this.gameOverModal.style.display = 'block';
            }

            hideGameOver() {
                this.gameOverModal.style.display = 'none';
            }

            handleResize() {
                // 响应式布局处理在ResponsiveLayout中实现
                responsiveLayout.adjustLayout();
            }
        }

        // ResponsiveLayout - 处理响应式布局和Canvas尺寸调整
        class ResponsiveLayout {
            constructor() {
                this.gameCanvas = document.getElementById('gameCanvas');
                this.gameContainer = document.querySelector('.game-container');
                this.originalCanvasWidth = 300;
                this.originalCanvasHeight = 600;
                
                this.bindResizeEvent();
                this.adjustLayout();
            }

            bindResizeEvent() {
                window.addEventListener('resize', () => {
                    this.adjustLayout();
                });
            }

            calculateOptimalSize() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const isMobile = viewportWidth <= 768;
                
                let canvasWidth, canvasHeight;
                
                if (isMobile) {
                    // 移动端：优先考虑宽度适配
                    const maxWidth = Math.min(viewportWidth - 40, 280);
                    canvasWidth = maxWidth;
                    canvasHeight = maxWidth * 2; // 保持2:1比例
                    
                    // 检查高度是否超出
                    const maxHeight = viewportHeight - 200; // 留出UI空间
                    if (canvasHeight > maxHeight) {
                        canvasHeight = maxHeight;
                        canvasWidth = canvasHeight / 2;
                    }
                } else {
                    // 桌面端：使用原始尺寸或根据视口调整
                    const maxHeight = viewportHeight - 100;
                    const maxWidth = (viewportWidth - 300) * 0.8; // 留出信息面板空间
                    
                    canvasHeight = Math.min(this.originalCanvasHeight, maxHeight);
                    canvasWidth = Math.min(this.originalCanvasWidth, maxWidth, canvasHeight / 2);
                    
                    // 保持比例
                    if (canvasWidth * 2 > canvasHeight) {
                        canvasWidth = canvasHeight / 2;
                    } else {
                        canvasHeight = canvasWidth * 2;
                    }
                }
                
                return {
                    width: Math.floor(canvasWidth),
                    height: Math.floor(canvasHeight)
                };
            }

            adjustLayout() {
                const optimalSize = this.calculateOptimalSize();
                this.updateCanvasSize(optimalSize.width, optimalSize.height);
                
                // 触发游戏重绘
                if (window.gameManager && window.gameManager.renderer) {
                    window.gameManager.renderer.updateCanvasSize(optimalSize.width, optimalSize.height);
                }
            }

            updateCanvasSize(width, height) {
                this.gameCanvas.width = width;
                this.gameCanvas.height = height;
                this.gameCanvas.style.width = width + 'px';
                this.gameCanvas.style.height = height + 'px';
            }
        }

        // GameControls - 处理游戏控制和输入
        class GameControls {
            constructor(gameManager) {
                this.gameManager = gameManager;
                this.keyPressed = {};
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.minSwipeDistance = 30;
                
                this.bindKeyboardEvents();
                this.bindTouchEvents();
                this.bindButtonEvents();
            }

            bindKeyboardEvents() {
                document.addEventListener('keydown', (e) => {
                    if (this.keyPressed[e.code]) return;
                    this.keyPressed[e.code] = true;
                    
                    switch(e.code) {
                        case 'ArrowLeft':
                            e.preventDefault();
                            this.handleGameAction('left');
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            this.handleGameAction('right');
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            this.handleGameAction('down');
                            break;
                        case 'ArrowUp':
                            e.preventDefault();
                            this.handleGameAction('rotate');
                            break;
                        case 'Space':
                            e.preventDefault();
                            this.handleGameAction('pause');
                            break;
                        case 'KeyR':
                            e.preventDefault();
                            this.handleGameAction('restart');
                            break;
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keyPressed[e.code] = false;
                });
            }

            bindTouchEvents() {
                this.gameCanvas = document.getElementById('gameCanvas');
                
                this.gameCanvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.touchStartX = touch.clientX;
                    this.touchStartY = touch.clientY;
                });
                
                this.gameCanvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                });
                
                this.gameCanvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const touch = e.changedTouches[0];
                    const deltaX = touch.clientX - this.touchStartX;
                    const deltaY = touch.clientY - this.touchStartY;
                    
                    const absX = Math.abs(deltaX);
                    const absY = Math.abs(deltaY);
                    
                    if (absX < this.minSwipeDistance && absY < this.minSwipeDistance) {
                        // 点击 - 旋转
                        this.handleGameAction('rotate');
                        return;
                    }
                    
                    if (absX > absY) {
                        // 水平滑动
                        if (deltaX > 0) {
                            this.handleGameAction('right');
                        } else {
                            this.handleGameAction('left');
                        }
                    } else {
                        // 垂直滑动
                        if (deltaY > 0) {
                            this.handleGameAction('down');
                        }
                    }
                });
            }

            bindButtonEvents() {
                const buttons = document.querySelectorAll('.control-btn');
                buttons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        const action = button.getAttribute('data-action');
                        this.handleGameAction(action);
                    });
                });
            }

            handleGameAction(action) {
                if (!this.gameManager) return;
                
                switch(action) {
                    case 'left':
                        this.gameManager.movePiece(-1, 0);
                        break;
                    case 'right':
                        this.gameManager.movePiece(1, 0);
                        break;
                    case 'down':
                        this.gameManager.movePiece(0, 1);
                        break;
                    case 'rotate':
                        this.gameManager.rotatePiece();
                        break;
                    case 'pause':
                        this.gameManager.togglePause();
                        break;
                    case 'restart':
                        this.gameManager.restart();
                        break;
                }
            }
        }

        // 简单的游戏管理器示例（用于演示UI功能）
        class GameManager {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.isPlaying = false;
                this.isPaused = false;
                
                // 示例下一个方块数据
                this.nextPiece = {
                    shape: [
                        [1, 1],
                        [1, 1]
                    ],
                    color: '#ff6b6b'
                };
            }

            start() {
                this.isPlaying = true;
                this.isPaused = false;
                uiManager.updateGameStatus('playing');
                uiManager.hideGameOver();
                uiManager.showNextPiece(this.nextPiece);
            }

            pause() {
                this.isPaused = true;
                uiManager.updateGameStatus('paused');
            }

            resume() {
                this.isPaused = false;
                uiManager.updateGameStatus('playing');
            }

            togglePause() {
                if (!this.isPlaying) {
                    this.start();
                    return;
                }
                
                if (this.isPaused) {
                    this.resume();
                } else {
                    this.pause();
                }
            }

            gameOver() {
                this.isPlaying = false;
                this.isPaused = false;
                uiManager.updateGameStatus('gameOver');
                uiManager.showGameOver();
            }

            restart() {
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                
                uiManager.updateScore(this.score);
                uiManager.updateLevel(this.level);
                uiManager.updateLines(this.lines);
                
                this.start();
            }

            addScore(points) {
                this.score += points;
                uiManager.updateScore(this.score);
                
                // 每1000分升一级
                const newLevel = Math.floor(this.score / 1000) + 1;
                if (newLevel !== this.level) {
                    this.level = newLevel;
                    uiManager.updateLevel(this.level);
                }
            }

            addLines(count) {
                this.lines += count;
                uiManager.updateLines(this.lines);
                
                // 根据消除行数加分
                const lineScores = [0, 100, 300, 500, 800];
                this.addScore(lineScores[count] * this.level);
            }

            // 示例移动方法（实际游戏逻辑需要在游戏引擎中实现）
            movePiece(dx, dy) {
                if (!this.isPlaying || this.isPaused) return;
                console.log(`移动方块: dx=${dx}, dy=${dy}`);
            }

            rotatePiece() {
                if (!this.isPlaying || this.isPaused) return;
                console.log('旋转方块');
            }
        }

        // 初始化所有组件
        const uiManager = new UIManager();
        const responsiveLayout = new ResponsiveLayout();
        const gameManager = new GameManager();
        const gameControls = new GameControls(gameManager);

        // 将gameManager设为全局变量，供其他模块使用
        window.gameManager = gameManager;

        // 初始化UI
        uiManager.updateScore(0);
        uiManager.updateLevel(1);
        uiManager.updateLines(0);
        uiManager.updateGameStatus('ready');
        uiManager.showNextPiece(gameManager.nextPiece);

        // 演示功能（可删除）
        setTimeout(() => {
            gameManager.addScore(150);
            gameManager.addLines(1);
        }, 2000);

        setTimeout(() => {
            gameManager.addScore(850);
            gameManager.addLines(3);
        }, 4000);
    </script>
</body>
</html>
