<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        @keyframes aaaGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            width: 300px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ffff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px #00ffff,
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            color: #ffffff;
            text-align: center;
        }

        .info-panel h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ffff;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 10px #ffd93d;
        }

        .level, .lines {
            font-size: 1.5rem;
            color: #6bcf7f;
            text-shadow: 0 0 10px #6bcf7f;
        }

        .next-piece {
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            color: #ffffff;
        }

        .controls h3 {
            color: #00ffff;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px #00ffff;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #ffd93d;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ff6b6b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 30px #ff6b6b;
            z-index: 1000;
            display: none;
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .block {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* 方块颜色 */
        .block-i { background: linear-gradient(45deg, #00ffff, #0099cc); }
        .block-o { background: linear-gradient(45deg, #ffff00, #cccc00); }
        .block-t { background: linear-gradient(45deg, #ff00ff, #cc00cc); }
        .block-s { background: linear-gradient(45deg, #00ff00, #00cc00); }
        .block-z { background: linear-gradient(45deg, #ff0000, #cc0000); }
        .block-j { background: linear-gradient(45deg, #0000ff, #0000cc); }
        .block-l { background: linear-gradient(45deg, #ff8000, #cc6600); }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            
            .game-board {
                width: 250px;
                height: 500px;
            }
            
            .block {
                width: 25px;
                height: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="info-panel">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-panel">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-panel">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            
            <div class="info-panel">
                <h3>下一个</h3>
                <div class="next-piece" id="nextPiece"></div>
            </div>
            
            <div class="controls">
                <h3>操作说明</h3>
                <div class="control-item">
                    <span>左移</span>
                    <span class="key">←</span>
                </div>
                <div class="control-item">
                    <span>右移</span>
                    <span class="key">→</span>
                </div>
                <div class="control-item">
                    <span>下降</span>
                    <span class="key">↓</span>
                </div>
                <div class="control-item">
                    <span>旋转</span>
                    <span class="key">↑</span>
                </div>
                <div class="control-item">
                    <span>暂停</span>
                    <span class="key">Space</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;
        
        // 游戏状态
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = false;
        let gameLoop = null;
        let dropTime = 1000;
        
        // 方块类型定义
        const PIECES = {
            I: {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: 'block-i'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: 'block-o'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: 'block-t'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: 'block-s'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: 'block-z'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: 'block-j'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: 'block-l'
            }
        };
        
        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    board[y][x] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece() {
            const pieces = Object.keys(PIECES);
            const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
            const piece = PIECES[randomPiece];
            
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }
        
        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let i = 0; i < cols; i++) {
                rotated[i] = [];
                for (let j = 0; j < rows; j++) {
                    rotated[i][j] = piece.shape[rows - 1 - j][i];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }
        
        // 检查碰撞
        function checkCollision(piece, dx = 0, dy = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // 放置方块到游戏板
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        const boardX = piece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }
        
        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                dropTime = Math.max(100, 1000 - (level - 1) * 100);
                updateDisplay();
            }
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        // 渲染游戏
        function render() {
            const gameBoard = document.getElementById('gameBoard');
            
            // 清除现有方块
            const existingBlocks = gameBoard.querySelectorAll('.block');
            existingBlocks.forEach(block => {
                if (!block.classList.contains('game-over')) {
                    block.remove();
                }
            });
            
            // 渲染游戏板
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (board[y][x]) {
                        const block = document.createElement('div');
                        block.className = `block ${board[y][x]}`;
                        block.style.left = x * BLOCK_SIZE + 'px';
                        block.style.top = y * BLOCK_SIZE + 'px';
                        gameBoard.appendChild(block);
                    }
                }
            }
            
            // 渲染当前方块
            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            const block = document.createElement('div');
                            block.className = `block ${currentPiece.color}`;
                            block.style.left = (currentPiece.x + x) * BLOCK_SIZE + 'px';
                            block.style.top = (currentPiece.y + y) * BLOCK_SIZE + 'px';
                            gameBoard.appendChild(block);
                        }
                    }
                }
            }
            
            // 渲染下一个方块
            renderNextPiece();
        }
        
        // 渲染下一个方块
        function renderNextPiece() {
            const nextPieceContainer = document.getElementById('nextPiece');
            nextPieceContainer.innerHTML = '';
            
            if (nextPiece) {
                const container = document.createElement('div');
                container.style.position = 'relative';
                container.style.width = '80px';
                container.style.height = '80px';
                
                for (let y = 0; y < nextPiece.shape.length; y++) {
                    for (let x = 0; x < nextPiece.shape[y].length; x++) {
                        if (nextPiece.shape[y][x]) {
                            const block = document.createElement('div');
                            block.className = `block ${nextPiece.color}`;
                            block.style.width = '20px';
                            block.style.height = '20px';
                            block.style.position = 'absolute';
                            block.style.left = x * 20 + 'px';
                            block.style.top = y * 20 + 'px';
                            container.appendChild(block);
                        }
                    }
                }
                
                nextPieceContainer.appendChild(container);
            }
        }
        
        // 游戏循环
        function gameStep() {
            if (!gameRunning) return;
            
            if (currentPiece) {
                if (!checkCollision(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    placePiece(currentPiece);
                    clearLines();
                    currentPiece = nextPiece;
                    nextPiece = createPiece();
                    
                    if (checkCollision(currentPiece)) {
                        gameOver();
                        return;
                    }
                }
            }
            
            render();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始游戏
        function restartGame() {
            initBoard();
            currentPiece = createPiece();
            nextPiece = createPiece();
            score = 0;
            level = 1;
            lines = 0;
            dropTime = 1000;
            gameRunning = true;
            
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            render();
            
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, dropTime);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || !currentPiece) return;
            
            switch (e.code) {
                case 'ArrowLeft':
                    if (!checkCollision(currentPiece, -1, 0)) {
                        currentPiece.x--;
                        render();
                    }
                    break;
                    
                case 'ArrowRight':
                    if (!checkCollision(currentPiece, 1, 0)) {
                        currentPiece.x++;
                        render();
                    }
                    break;
                    
                case 'ArrowDown':
                    if (!checkCollision(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        render();
                    }
                    break;
                    
                case 'ArrowUp':
                    const rotated = rotatePiece(currentPiece);
                    if (!checkCollision(rotated)) {
                        currentPiece = rotated;
                        render();
                    }
                    break;
                    
                case 'Space':
                    e.preventDefault();
                    if (gameRunning) {
                        gameRunning = false;
                        clearInterval(gameLoop);
                    } else {
                        gameRunning = true;
                        gameLoop = setInterval(gameStep, dropTime);
                    }
                    break;
            }
        });
        
        // 初始化游戏
        function initGame() {
            initBoard();
            currentPiece = createPiece();
            nextPiece = createPiece();
            updateDisplay();
            render();
            
            gameRunning = true;
            gameLoop = setInterval(gameStep, dropTime);
        }
        
        // 页面加载完成后启动游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
