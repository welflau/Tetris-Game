<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 10px #FFD700,
                0 0 20px #FFD700,
                0 0 30px #FF6B35,
                0 0 40px #FF6B35;
            letter-spacing: 0.3em;
            margin-bottom: 30px;
            text-align: center;
            animation: titleGlow 2s ease-in-out infinite alternate;
            position: relative;
        }

        .game-title::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #FF6B35, #F7931E, #FFD700, #FF6B35);
            background-size: 400% 400%;
            border-radius: 10px;
            z-index: -1;
            animation: gradientShift 3s ease infinite;
            opacity: 0.3;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 
                    0 0 10px #FFD700,
                    0 0 20px #FFD700,
                    0 0 30px #FF6B35,
                    0 0 40px #FF6B35;
            }
            to {
                text-shadow: 
                    0 0 20px #FFD700,
                    0 0 30px #FFD700,
                    0 0 40px #FF6B35,
                    0 0 50px #FF6B35;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-board {
            width: 300px;
            height: 600px;
            border: 3px solid #FFD700;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.5),
                inset 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 15px;
            min-width: 150px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .info-panel h3 {
            color: #FFD700;
            margin-bottom: 10px;
            text-align: center;
        }

        .score {
            font-size: 1.5rem;
            text-align: center;
            color: #00FF00;
        }

        .level {
            font-size: 1.2rem;
            text-align: center;
            color: #FF6B35;
        }

        .next-piece {
            width: 80px;
            height: 80px;
            border: 1px solid #666;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
        }

        .controls {
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #FF6B35;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5rem;
            border: 2px solid #FF6B35;
            display: none;
        }

        .restart-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        .restart-btn:hover {
            background: #FFA500;
        }

        .block {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid #333;
        }

        .block-i { background: #00FFFF; }
        .block-o { background: #FFFF00; }
        .block-t { background: #800080; }
        .block-s { background: #00FF00; }
        .block-z { background: #FF0000; }
        .block-j { background: #0000FF; }
        .block-l { background: #FFA500; }
    </style>
</head>
<body>
    <h1 class="game-title">俄罗斯方块</h1>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <div class="game-over" id="gameOver">
                <div>游戏结束!</div>
                <div>得分: <span id="finalScore">0</span></div>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="info-panel">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-panel">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-panel">
                <h3>下一个</h3>
                <div class="next-piece" id="nextPiece"></div>
            </div>
            
            <div class="info-panel">
                <h3>操作说明</h3>
                <div class="controls">
                    ← → 移动<br>
                    ↓ 加速下落<br>
                    ↑ 旋转<br>
                    空格 暂停
                </div>
            </div>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.board = Array(20).fill().map(() => Array(10).fill(0));
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.isPaused = false;
                this.dropTime = 0;
                this.dropInterval = 1000; // 1秒下落一次
                
                this.pieces = {
                    'I': {
                        shape: [[1,1,1,1]],
                        color: 'block-i'
                    },
                    'O': {
                        shape: [[1,1],[1,1]],
                        color: 'block-o'
                    },
                    'T': {
                        shape: [[0,1,0],[1,1,1]],
                        color: 'block-t'
                    },
                    'S': {
                        shape: [[0,1,1],[1,1,0]],
                        color: 'block-s'
                    },
                    'Z': {
                        shape: [[1,1,0],[0,1,1]],
                        color: 'block-z'
                    },
                    'J': {
                        shape: [[1,0,0],[1,1,1]],
                        color: 'block-j'
                    },
                    'L': {
                        shape: [[0,0,1],[1,1,1]],
                        color: 'block-l'
                    }
                };
                
                this.pieceTypes = Object.keys(this.pieces);
                this.gameBoard = document.getElementById('gameBoard');
                
                this.init();
            }
            
            init() {
                this.generateNextPiece();
                this.spawnPiece();
                this.updateDisplay();
                this.setupEventListeners();
                this.startGame();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.isPaused) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case ' ':
                            this.togglePause();
                            e.preventDefault();
                            break;
                    }
                });
            }
            
            generateNextPiece() {
                const randomType = this.pieceTypes[Math.floor(Math.random() * this.pieceTypes.length)];
                this.nextPiece = {
                    type: randomType,
                    shape: this.pieces[randomType].shape,
                    color: this.pieces[randomType].color,
                    x: 0,
                    y: 0
                };
            }
            
            spawnPiece() {
                if (this.nextPiece) {
                    this.currentPiece = {
                        ...this.nextPiece,
                        x: Math.floor((10 - this.nextPiece.shape[0].length) / 2),
                        y: 0
                    };
                    this.generateNextPiece();
                    
                    // 检查游戏是否结束
                    if (this.checkCollision(this.currentPiece, 0, 0)) {
                        this.gameOver();
                        return;
                    }
                }
            }
            
            movePiece(dx, dy) {
                if (this.currentPiece && !this.checkCollision(this.currentPiece, dx, dy)) {
                    this.currentPiece.x += dx;
                    this.currentPiece.y += dy;
                    this.render();
                    return true;
                }
                return false;
            }
            
            rotatePiece() {
                if (!this.currentPiece) return;
                
                const rotated = this.rotateMatrix(this.currentPiece.shape);
                const originalShape = this.currentPiece.shape;
                this.currentPiece.shape = rotated;
                
                if (this.checkCollision(this.currentPiece, 0, 0)) {
                    this.currentPiece.shape = originalShape;
                } else {
                    this.render();
                }
            }
            
            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = matrix[i][j];
                    }
                }
                
                return rotated;
            }
            
            checkCollision(piece, dx, dy) {
                const newX = piece.x + dx;
                const newY = piece.y + dy;
                
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const boardX = newX + x;
                            const boardY = newY + y;
                            
                            if (boardX < 0 || boardX >= 10 || boardY >= 20) {
                                return true;
                            }
                            
                            if (boardY >= 0 && this.board[boardY][boardX]) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }
            
            placePiece() {
                if (!this.currentPiece) return;
                
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const boardX = this.currentPiece.x + x;
                            const boardY = this.currentPiece.y + y;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnPiece();
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.board.length - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(10).fill(0));
                        linesCleared++;
                        y++; // 重新检查这一行
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateDisplay();
                }
            }
            
            drop() {
                if (!this.movePiece(0, 1)) {
                    this.placePiece();
                }
            }
            
            startGame() {
                this.gameRunning = true;
                this.gameLoop();
            }
            
            gameLoop() {
                if (!this.gameRunning) return;
                
                const currentTime = Date.now();
                
                if (!this.isPaused && currentTime - this.dropTime > this.dropInterval) {
                    this.drop();
                    this.dropTime = currentTime;
                }
                
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            render() {
                // 清空游戏板
                this.gameBoard.innerHTML = '<div class="game-over" id="gameOver"><div>游戏结束!</div><div>得分: <span id="finalScore">0</span></div><button class="restart-btn" onclick="restartGame()">重新开始</button></div>';
                
                // 渲染已放置的方块
                for (let y = 0; y < this.board.length; y++) {
                    for (let x = 0; x < this.board[y].length; x++) {
                        if (this.board[y][x]) {
                            const block = document.createElement('div');
                            block.className = `block ${this.board[y][x]}`;
                            block.style.left = `${x * 30}px`;
                            block.style.top = `${y * 30}px`;
                            this.gameBoard.appendChild(block);
                        }
                    }
                }
                
                // 渲染当前方块
                if (this.currentPiece) {
                    for (let y = 0; y < this.currentPiece.shape.length; y++) {
                        for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                            if (this.currentPiece.shape[y][x]) {
                                const block = document.createElement('div');
                                block.className = `block ${this.currentPiece.color}`;
                                block.style.left = `${(this.currentPiece.x + x) * 30}px`;
                                block.style.top = `${(this.currentPiece.y + y) * 30}px`;
                                this.gameBoard.appendChild(block);
                            }
                        }
                    }
                }
            }
            
            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
            }
            
            togglePause() {
                this.isPaused = !this.isPaused;
            }
            
            gameOver() {
                this.gameRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }
            
            restart() {
                this.board = Array(20).fill().map(() => Array(10).fill(0));
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.isPaused = false;
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                document.getElementById('gameOver').style.display = 'none';
                this.init();
            }
        }
        
        let game;
        
        function startGame() {
            game = new TetrisGame();
        }
        
        function restartGame() {
            if (game) {
                game.restart();
            } else {
                startGame();
            }
        }
        
        // 页面加载完成后启动游戏
        window.addEventListener('load', startGame);
    </script>
</body>
</html>
