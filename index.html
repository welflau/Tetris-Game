<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #game-canvas {
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.9);
        }

        /* 游戏信息面板 */
        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        #score {
            font-size: 18px;
            margin-bottom: 5px;
        }

        #level {
            font-size: 16px;
        }

        /* 控制按钮 */
        #controls {
            margin-top: 10px;
            text-align: center;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #45a049;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
            min-width: 200px;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px;
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        /* 性能监控面板 */
        #performance-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            z-index: 100;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #test-panel, #performance-panel {
                font-size: 10px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">得分: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="controls">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="reset-btn">重置</button>
            <button id="toggle-snow-btn">切换雪花</button>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h4>集成测试结果</h4>
        <div id="test-results"></div>
        <button onclick="runAllTests()">运行测试</button>
    </div>

    <!-- 性能监控面板 -->
    <div id="performance-panel">
        <h4>性能监控</h4>
        <div id="performance-stats"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.isActive = true;
                this.maxSnowflakes = 50;
                this.animationId = null;
                this.lastTime = 0;
                this.frameCount = 0;
                this.fps = 0;
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✻', '✼', '❈'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    const size = Math.random() * 0.8 + 0.6;
                    snowflake.style.fontSize = size + 'em';
                    
                    this.resetSnowflake(snowflake);
                    this.container.appendChild(snowflake);
                    this.snowflakes.push({
                        element: snowflake,
                        x: parseFloat(snowflake.style.left),
                        y: parseFloat(snowflake.style.top),
                        speed: Math.random() * 2 + 1,
                        drift: Math.random() * 0.5 - 0.25,
                        rotation: 0,
                        rotationSpeed: Math.random() * 2 - 1
                    });
                }
            }

            resetSnowflake(snowflake) {
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.top = -10 + 'px';
            }

            startAnimation() {
                const animate = (currentTime) => {
                    if (!this.isActive) return;
                    
                    // 计算FPS
                    if (currentTime - this.lastTime >= 1000) {
                        this.fps = this.frameCount;
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }
                    this.frameCount++;
                    
                    this.updateSnowflakes();
                    this.animationId = requestAnimationFrame(animate);
                };
                
                this.animationId = requestAnimationFrame(animate);
            }

            updateSnowflakes() {
                const windowHeight = window.innerHeight;
                const windowWidth = window.innerWidth;
                
                this.snowflakes.forEach(snowflake => {
                    snowflake.y += snowflake.speed;
                    snowflake.x += snowflake.drift;
                    snowflake.rotation += snowflake.rotationSpeed;
                    
                    if (snowflake.y > windowHeight + 10) {
                        snowflake.y = -10;
                        snowflake.x = Math.random() * windowWidth;
                    }
                    
                    if (snowflake.x > windowWidth + 10) {
                        snowflake.x = -10;
                    } else if (snowflake.x < -10) {
                        snowflake.x = windowWidth + 10;
                    }
                    
                    snowflake.element.style.transform = 
                        `translate(${snowflake.x}px, ${snowflake.y}px) rotate(${snowflake.rotation}deg)`;
                });
            }

            toggle() {
                this.isActive = !this.isActive;
                this.container.style.display = this.isActive ? 'block' : 'none';
                
                if (this.isActive) {
                    this.startAnimation();
                } else if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }

            getFPS() {
                return this.fps;
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 简化版俄罗斯方块游戏
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.level = 1;
                this.isRunning = false;
                this.isPaused = false;
                this.gameLoop = null;
            }

            init() {
                this.setupEventListeners();
                this.draw();
            }

            setupEventListeners() {
                document.getElementById('start-btn').addEventListener('click', () => this.start());
                document.getElementById('pause-btn').addEventListener('click', () => this.pause());
                document.getElementById('reset-btn').addEventListener('click', () => this.reset());
            }

            start() {
                if (!this.isRunning) {
                    this.isRunning = true;
                    this.isPaused = false;
                    document.getElementById('start-btn').disabled = true;
                    document.getElementById('pause-btn').disabled = false;
                    this.gameLoop = setInterval(() => this.update(), 500);
                }
            }

            pause() {
                if (this.isRunning) {
                    this.isPaused = !this.isPaused;
                    document.getElementById('pause-btn').textContent = this.isPaused ? '继续' : '暂停';
                    
                    if (this.isPaused) {
                        clearInterval(this.gameLoop);
                    } else {
                        this.gameLoop = setInterval(() => this.update(), 500);
                    }
                }
            }

            reset() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                }
                
                document.getElementById('start-btn').disabled = false;
                document.getElementById('pause-btn').disabled = true;
                document.getElementById('pause-btn').textContent = '暂停';
                
                this.updateUI();
                this.draw();
            }

            update() {
                if (!this.isPaused) {
                    this.score += 10;
                    if (this.score % 1000 === 0) {
                        this.level++;
                    }
                    this.updateUI();
                    this.draw();
                }
            }

            updateUI() {
                document.getElementById('score').textContent = `得分: ${this.score}`;
                document.getElementById('level').textContent = `等级: ${this.level}`;
            }

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x < this.canvas.width; x += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.canvas.height; y += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制示例方块
                if (this.isRunning && !this.isPaused) {
                    this.ctx.fillStyle = '#ff0000';
                    this.ctx.fillRect(120, 150, 60, 30);
                }
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor(snowflakeSystem, tetrisGame) {
                this.snowflakeSystem = snowflakeSystem;
                this.tetrisGame = tetrisGame;
                this.testResults = [];
            }

            runIntegrationTests() {
                this.testResults = [];
                
                this.testSnowflakeGeneration();
                this.testAnimationPerformance();
                this.testResponsiveDesign();
                this.testZIndexLayering();
                this.testGameIntegration();
                
                this.displayResults();
                return this.testResults;
            }

            testSnowflakeGeneration() {
                const test = {
                    name: '雪花生成测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const count = this.snowflakeSystem.getSnowflakeCount();
                    if (count > 0 && count <= 50) {
                        test.message = `成功生成 ${count} 个雪花`;
                    } else {
                        test.status = 'fail';
                        test.message = `雪花数量异常: ${count}`;
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = `生成失败: ${error.message}`;
                }
                
                this.testResults.push(test);
            }

            testAnimationPerformance() {
                const test = {
                    name: '动画性能测试',
                    status: 'pass',
                    message: ''
                };
                
                setTimeout(() => {
                    const fps = this.snowflakeSystem.getFPS();
                    if (fps >= 30) {
                        test.message = `FPS: ${fps} (良好)`;
                    } else if (fps >= 20) {
                        test.status = 'warning';
                        test.message = `FPS: ${fps} (一般)`;
                    } else {
                        test.status = 'fail';
                        test.message = `FPS: ${fps} (过低)`;
                    }
                    this.updateTestResult(test);
                }, 2000);
                
                test.message = '性能测试中...';
                this.testResults.push(test);
            }

            testResponsiveDesign() {
                const test = {
                    name: '响应式设计测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const container = document.getElementById('snowflake-container');
                    const containerRect = container.getBoundingClientRect();
                    
                    if (containerRect.width === window.innerWidth && 
                        containerRect.height === window.innerHeight) {
                        test.message = '容器尺寸正确';
                    } else {
                        test.status = 'fail';
                        test.message = '容器尺寸不匹配窗口';
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = `测试失败: ${error.message}`;
                }
                
                this.testResults.push(test);
            }

            testZIndexLayering() {
                const test = {
                    name: 'Z-Index层级测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    
                    if (gameZIndex > snowZIndex) {
                        test.message = `层级正确 (游戏:${gameZIndex} > 雪花:${snowZIndex})`;
                    } else {
                        test.status = 'fail';
                        test.message = `层级错误 (游戏:${gameZIndex} <= 雪花:${snowZIndex})`;
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = `测试失败: ${error.message}`;
                }
                
                this.testResults.push(test);
            }

            testGameIntegration() {
                const test = {
                    name: '游戏集成测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const canvas = document.getElementById('game-canvas');
                    const ctx = canvas.getContext('2d');
                    
                    if (ctx && canvas.width > 0 && canvas.height > 0) {
                        test.message = '游戏画布正常';
                    } else {
                        test.status = 'fail';
                        test.message = '游戏画布异常';
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = `集成失败: ${error.message}`;
                }
                
                this.testResults.push(test);
            }

            updateTestResult(updatedTest) {
                const index = this.testResults.findIndex(test => test.name === updatedTest.name);
                if (index !== -1) {
                    this.testResults[index] = updatedTest;
                    this.displayResults();
                }
            }

            displayResults() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';
                
                this.testResults.forEach(test => {
                    const div = document.createElement('div');
                    div.className = `test-result test-${test.status}`;
                    div.innerHTML = `<strong>${test.name}:</strong> ${test.message}`;
                    resultsContainer.appendChild(div);
                });
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            validateBrowserSupport() {
                const features = {
                    'CSS动画': 'animationName' in document.body.style,
                    'CSS变换': 'transform' in document.body.style,
                    'requestAnimationFrame': 'requestAnimationFrame' in window,
                    'Canvas': !!document.createElement('canvas').getContext,
                    'ES6支持': typeof Symbol !== 'undefined'
                };
                
                return features;
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const hasTouch = 'ontouchstart' in window;
                
                return {
                    isMobile,
                    hasTouch,
                    screenSize: `${screen.width}x${screen.height}`,
                    devicePixelRatio: window.devicePixelRatio || 1
                };
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor(snowflakeSystem) {
                this.snowflakeSystem = snowflakeSystem;
                this.startTime = performance.now();
                this.frameCount = 0;
                this.memoryBaseline = this.getMemoryUsage();
            }

            monitorFrameRate() {
                return this.snowflakeSystem.getFPS();
            }

            trackMemoryUsage() {
                return this.getMemoryUsage();
            }

            getMemoryUsage() {
                if (performance.memory) {
                    return {
                        used: Math.round(performance.memory.usedJSHeapSize / 1024 / 1024),
                        total: Math.round(performance.memory.totalJSHeapSize / 1024 / 1024),
                        limit: Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024)
                    };
                }
                return null;
            }

            generatePerformanceReport() {
                const fps = this.monitorFrameRate();
                const memory = this.trackMemoryUsage();
                const runtime = Math.round((performance.now() - this.startTime) / 1000);
                
                return {
                    fps,
                    memory,
                    runtime,
                    snowflakeCount: this.snowflakeSystem.getSnowflakeCount()
                };
            }

            displayStats() {
                const report = this.generatePerformanceReport();
                const statsContainer = document.getElementById('performance-stats');
                
                let html = `
                    <div>FPS: ${report.fps}</div>
                    <div>运行时间: ${report.runtime}s</div>
                    <div>雪花数量: ${report.snowflakeCount}</div>
                `;
                
                if (report.memory) {
                    html += `
                        <div>内存使用: ${report.memory.used}MB</div>
                        <div>内存总量: ${report.memory.total}MB</div>
                    `;
                }
                
                statsContainer.innerHTML = html;
            }
        }

        // 全局变量和初始化
        let snowflakeSystem;
        let tetrisGame;
        let integrationTest;
        let compatibilityValidator;
        let performanceMonitor;

        // 初始化所有系统
        function initializeAll() {
            // 初始化雪花系统
            snowflakeSystem = new SnowflakeSystem();
            snowflakeSystem.init();
            
            // 初始化游戏
            tetrisGame = new TetrisGame();
            tetrisGame.init();
            
            // 初始化测试套件
            integrationTest = new IntegrationTestSuite(snowflakeSystem, tetrisGame);
            
            // 初始化兼容性验证器
            compatibilityValidator = new CompatibilityValidator();
            
            // 初始化性能监控器
            performanceMonitor = new PerformanceMonitor(snowflakeSystem);
            
            // 设置雪花切换按钮
            document.getElementById('toggle-snow-btn').addEventListener('click', () => {
                snowflakeSystem.toggle();
            });
            
            // 启动性能监控
            setInterval(() => {
                performanceMonitor.displayStats();
            }, 1000);
            
            // 自动运行初始测试
            setTimeout(() => {
                runAllTests();
            }, 1000);
        }

        // 运行所有测试
        function runAllTests() {
            console.log('开始集成测试...');
            
            // 运行集成测试
            integrationTest.runIntegrationTests();
            
            // 验证浏览器兼容性
            const browserSupport = compatibilityValidator.validateBrowserSupport();
            console.log('浏览器支持:', browserSupport);
            
            // 检测移动设备性能
            const mobilePerf = compatibilityValidator.testMobilePerformance();
            console.log('移动设备信息:', mobilePerf);
            
            // 生成性能报告
            setTimeout(() => {
                const perfReport = performanceMonitor.generatePerformanceReport();
                console.log('性能报告:', perfReport);
            }, 3000);
        }

        // 响应式处理
        function handleResize() {
            // 重新调整雪花容器
            const container = document.getElementById('snowflake-container');
            container.style.width = window.innerWidth + 'px';
            container.style.height = window.innerHeight + 'px';
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initializeAll();
            
            // 监听窗口大小变化
            window.addEventListener('resize', handleResize);
            
            console.log('俄罗斯方块雪花特效版已启动');
            console.log('使用 runAllTests() 运行完整测试套件');
        });

        // 错误处理
        window.addEventListener('error', (event) => {
            console.error('全局错误:', event.error);
            
            // 在测试面板中显示错误
            const testResults = document.getElementById('test-results');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'test-result test-fail';
            errorDiv.innerHTML = `<strong>运行时错误:</strong> ${event.error.message}`;
            testResults.appendChild(errorDiv);
        });
    </script>
</body>
</html>
