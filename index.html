<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .game-info {
            color: #ffffff;
            font-size: 1.2rem;
            text-align: center;
            min-width: 200px;
        }

        .score, .level, .lines {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .next-piece {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        canvas {
            display: block;
            border-radius: 5px;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            border: 3px solid #ffffff;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .game-info {
                order: -1;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="game-info">
            <div class="score">
                <strong>得分</strong><br>
                <span id="score">0</span>
            </div>
            
            <div class="level">
                <strong>等级</strong><br>
                <span id="level">1</span>
            </div>
            
            <div class="lines">
                <strong>行数</strong><br>
                <span id="lines">0</span>
            </div>
            
            <div class="next-piece">
                <strong>下一个</strong><br>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <strong>控制</strong><br>
                ← → 移动<br>
                ↓ 加速下降<br>
                ↑ 旋转<br>
                空格 暂停
            </div>
            
            <button onclick="startGame()">开始游戏</button>
            <button onclick="pauseGame()">暂停</button>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            gameRunning: false,
            gamePaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 方块形状定义
        const PIECES = {
            I: {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };

        // 初始化游戏板
        function initBoard() {
            gameState.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                gameState.board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    gameState.board[y][x] = 0;
                }
            }
        }

        // 创建新方块
        function createPiece() {
            const pieces = Object.keys(PIECES);
            const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
            const piece = PIECES[randomPiece];
            
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 检查方块是否可以放置
        function canPlacePiece(piece, x, y) {
            for (let py = 0; py < piece.shape.length; py++) {
                for (let px = 0; px < piece.shape[py].length; px++) {
                    if (piece.shape[py][px]) {
                        const newX = x + px;
                        const newY = y + py;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && gameState.board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        // 放置方块到游戏板
        function placePiece(piece) {
            for (let py = 0; py < piece.shape.length; py++) {
                for (let px = 0; px < piece.shape[py].length; px++) {
                    if (piece.shape[py][px]) {
                        const x = piece.x + px;
                        const y = piece.y + py;
                        if (y >= 0) {
                            gameState.board[y][x] = piece.color;
                        }
                    }
                }
            }
        }

        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let x = 0; x < cols; x++) {
                rotated[x] = [];
                for (let y = rows - 1; y >= 0; y--) {
                    rotated[x][rows - 1 - y] = piece.shape[y][x];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }

        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                let fullLine = true;
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (!gameState.board[y][x]) {
                        fullLine = false;
                        break;
                    }
                }
                
                if (fullLine) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(100, 1000 - (gameState.level - 1) * 100);
                updateUI();
            }
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (!gameState.currentPiece) return false;
            
            const newX = gameState.currentPiece.x + dx;
            const newY = gameState.currentPiece.y + dy;
            
            if (canPlacePiece(gameState.currentPiece, newX, newY)) {
                gameState.currentPiece.x = newX;
                gameState.currentPiece.y = newY;
                return true;
            }
            return false;
        }

        // 旋转当前方块
        function rotateCurrentPiece() {
            if (!gameState.currentPiece) return;
            
            const rotated = rotatePiece(gameState.currentPiece);
            if (canPlacePiece(rotated, rotated.x, rotated.y)) {
                gameState.currentPiece = rotated;
            }
        }

        // 绘制方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        // 绘制游戏板
        function drawBoard() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        drawBlock(ctx, x, y, gameState.board[y][x]);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawCurrentPiece() {
            if (!gameState.currentPiece) return;
            
            const piece = gameState.currentPiece;
            for (let py = 0; py < piece.shape.length; py++) {
                for (let px = 0; px < piece.shape[py].length; px++) {
                    if (piece.shape[py][px]) {
                        drawBlock(ctx, piece.x + px, piece.y + py, piece.color);
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.fillStyle = '#000000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (!gameState.nextPiece) return;
            
            const piece = gameState.nextPiece;
            const blockSize = 20;
            const offsetX = (nextCanvas.width - piece.shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - piece.shape.length * blockSize) / 2;
            
            for (let py = 0; py < piece.shape.length; py++) {
                for (let px = 0; px < piece.shape[py].length; px++) {
                    if (piece.shape[py][px]) {
                        nextCtx.fillStyle = piece.color;
                        nextCtx.fillRect(
                            offsetX + px * blockSize,
                            offsetY + py * blockSize,
                            blockSize,
                            blockSize
                        );
                        nextCtx.strokeStyle = '#ffffff';
                        nextCtx.lineWidth = 1;
                        nextCtx.strokeRect(
                            offsetX + px * blockSize,
                            offsetY + py * blockSize,
                            blockSize,
                            blockSize
                        );
                    }
                }
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
        }

        // 游戏循环
        function gameLoop(currentTime) {
            if (!gameState.gameRunning || gameState.gamePaused) {
                if (gameState.gameRunning) {
                    requestAnimationFrame(gameLoop);
                }
                return;
            }
            
            if (currentTime - gameState.dropTime > gameState.dropInterval) {
                if (!movePiece(0, 1)) {
                    placePiece(gameState.currentPiece);
                    clearLines();
                    gameState.currentPiece = gameState.nextPiece;
                    gameState.nextPiece = createPiece();
                    
                    if (!canPlacePiece(gameState.currentPiece, gameState.currentPiece.x, gameState.currentPiece.y)) {
                        gameOver();
                        return;
                    }
                }
                gameState.dropTime = currentTime;
            }
            
            drawBoard();
            drawCurrentPiece();
            drawNextPiece();
            
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameState.gameRunning) return;
            
            initBoard();
            gameState.currentPiece = createPiece();
            gameState.nextPiece = createPiece();
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.gameRunning = true;
            gameState.gamePaused = false;
            gameState.dropTime = 0;
            gameState.dropInterval = 1000;
            
            updateUI();
            document.getElementById('gameOver').style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        // 暂停游戏
        function pauseGame() {
            if (!gameState.gameRunning) return;
            gameState.gamePaused = !gameState.gamePaused;
        }

        // 重新开始游戏
        function resetGame() {
            gameState.gameRunning = false;
            gameState.gamePaused = false;
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 游戏结束
        function gameOver() {
            gameState.gameRunning = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            if (!gameState.gameRunning || gameState.gamePaused) return;
            
            switch (event.code) {
                case 'ArrowLeft':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    movePiece(0, 1);
                    break;
                case 'ArrowUp':
                    rotateCurrentPiece();
                    break;
                case 'Space':
                    pauseGame();
                    break;
            }
        });

        // 初始化游戏
        initBoard();
        drawBoard();
        updateUI();
    </script>
</body>
</html>
