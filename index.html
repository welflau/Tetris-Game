<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 15px #ff6b6b,
                    0 0 25px #ff6b6b,
                    0 0 35px #ff6b6b,
                    0 0 45px #ff6b6b,
                    0 0 55px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 15px #00ffff,
                    0 0 25px #00ffff,
                    0 0 35px #00ffff,
                    0 0 45px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .game-info {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            color: #ffffff;
            min-width: 200px;
        }

        .game-info h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
        }

        .game-info p {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .controls button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .controls button:hover {
            transform: scale(1.05);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        canvas {
            border: 2px solid #ffffff;
            border-radius: 5px;
            background: #000000;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="game-info">
            <h3>游戏信息</h3>
            <p>得分: <span id="score">0</span></p>
            <p>等级: <span id="level">1</span></p>
            <p>行数: <span id="lines">0</span></p>
            
            <div class="controls">
                <button id="startBtn">开始游戏</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重置</button>
            </div>
            
            <div style="margin-top: 20px; font-size: 0.9rem;">
                <h4>操作说明:</h4>
                <p>← → : 左右移动</p>
                <p>↓ : 快速下降</p>
                <p>↑ : 旋转方块</p>
                <p>空格 : 暂停/继续</p>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;
        
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            gameRunning: false,
            gamePaused: false,
            dropTime: 0,
            dropInterval: 1000
        };
        
        // 方块类型定义
        const PIECES = {
            I: {
                shape: [[1,1,1,1]],
                color: '#00ffff'
            },
            O: {
                shape: [[1,1],[1,1]],
                color: '#ffff00'
            },
            T: {
                shape: [[0,1,0],[1,1,1]],
                color: '#800080'
            },
            S: {
                shape: [[0,1,1],[1,1,0]],
                color: '#00ff00'
            },
            Z: {
                shape: [[1,1,0],[0,1,1]],
                color: '#ff0000'
            },
            J: {
                shape: [[1,0,0],[1,1,1]],
                color: '#0000ff'
            },
            L: {
                shape: [[0,0,1],[1,1,1]],
                color: '#ffa500'
            }
        };
        
        // 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const linesElement = document.getElementById('lines');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // 初始化游戏板
        function initBoard() {
            gameState.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                gameState.board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    gameState.board[y][x] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                type: randomType,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }
        
        // 检查方块是否可以放置
        function canPlacePiece(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && gameState.board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        // 放置方块到游戏板
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        const boardX = piece.x + x;
                        if (boardY >= 0) {
                            gameState.board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }
        
        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                let isFullLine = true;
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (!gameState.board[y][x]) {
                        isFullLine = false;
                        break;
                    }
                }
                
                if (isFullLine) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查当前行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(100, 1000 - (gameState.level - 1) * 100);
                updateUI();
            }
        }
        
        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let x = 0; x < cols; x++) {
                rotated[x] = [];
                for (let y = rows - 1; y >= 0; y--) {
                    rotated[x][rows - 1 - y] = piece.shape[y][x];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }
        
        // 移动方块
        function movePiece(direction) {
            if (!gameState.currentPiece || !gameState.gameRunning || gameState.gamePaused) return;
            
            let offsetX = 0;
            let offsetY = 0;
            
            switch (direction) {
                case 'left':
                    offsetX = -1;
                    break;
                case 'right':
                    offsetX = 1;
                    break;
                case 'down':
                    offsetY = 1;
                    break;
            }
            
            if (canPlacePiece(gameState.currentPiece, offsetX, offsetY)) {
                gameState.currentPiece.x += offsetX;
                gameState.currentPiece.y += offsetY;
            } else if (direction === 'down') {
                placePiece(gameState.currentPiece);
                clearLines();
                gameState.currentPiece = createPiece();
                
                if (!canPlacePiece(gameState.currentPiece)) {
                    gameOver();
                }
            }
        }
        
        // 旋转当前方块
        function rotateCurrentPiece() {
            if (!gameState.currentPiece || !gameState.gameRunning || gameState.gamePaused) return;
            
            const rotated = rotatePiece(gameState.currentPiece);
            if (canPlacePiece(rotated)) {
                gameState.currentPiece = rotated;
            }
        }
        
        // 绘制方块
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
        
        // 绘制游戏板
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已放置的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        drawBlock(x, y, gameState.board[y][x]);
                    }
                }
            }
            
            // 绘制当前方块
            if (gameState.currentPiece) {
                for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                        if (gameState.currentPiece.shape[y][x]) {
                            const drawX = gameState.currentPiece.x + x;
                            const drawY = gameState.currentPiece.y + y;
                            if (drawY >= 0) {
                                drawBlock(drawX, drawY, gameState.currentPiece.color);
                            }
                        }
                    }
                }
            }
        }
        
        // 更新UI
        function updateUI() {
            scoreElement.textContent = gameState.score;
            levelElement.textContent = gameState.level;
            linesElement.textContent = gameState.lines;
        }
        
        // 游戏结束
        function gameOver() {
            gameState.gameRunning = false;
            alert(`游戏结束！\n得分: ${gameState.score}\n等级: ${gameState.level}\n消除行数: ${gameState.lines}`);
        }
        
        // 开始游戏
        function startGame() {
            initBoard();
            gameState.currentPiece = createPiece();
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.gameRunning = true;
            gameState.gamePaused = false;
            gameState.dropTime = 0;
            gameState.dropInterval = 1000;
            updateUI();
        }
        
        // 暂停/继续游戏
        function togglePause() {
            if (gameState.gameRunning) {
                gameState.gamePaused = !gameState.gamePaused;
            }
        }
        
        // 重置游戏
        function resetGame() {
            gameState.gameRunning = false;
            gameState.gamePaused = false;
            initBoard();
            gameState.currentPiece = null;
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            updateUI();
            drawBoard();
        }
        
        // 游戏循环
        function gameLoop(timestamp) {
            if (gameState.gameRunning && !gameState.gamePaused) {
                if (timestamp - gameState.dropTime > gameState.dropInterval) {
                    movePiece('down');
                    gameState.dropTime = timestamp;
                }
            }
            
            drawBoard();
            requestAnimationFrame(gameLoop);
        }
        
        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowLeft':
                    movePiece('left');
                    break;
                case 'ArrowRight':
                    movePiece('right');
                    break;
                case 'ArrowDown':
                    movePiece('down');
                    break;
                case 'ArrowUp':
                    rotateCurrentPiece();
                    break;
                case ' ':
                    event.preventDefault();
                    togglePause();
                    break;
            }
        });
        
        // 按钮事件处理
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetGame);
        
        // 初始化
        initBoard();
        updateUI();
        drawBoard();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
