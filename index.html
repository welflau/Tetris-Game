<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            width: 300px;
            height: 600px;
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .game-info {
            color: #ffffff;
            min-width: 200px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .info-item h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #00ffff;
        }

        .info-item .value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .control-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .next-piece {
            width: 80px;
            height: 80px;
            border: 2px solid #ffffff;
            background: rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            border-radius: 5px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ff6b6b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            display: none;
        }

        .block {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid #333;
        }

        .block-i { background: #00ffff; }
        .block-o { background: #ffff00; }
        .block-t { background: #800080; }
        .block-s { background: #00ff00; }
        .block-z { background: #ff0000; }
        .block-j { background: #0000ff; }
        .block-l { background: #ffa500; }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .game-container {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            
            .game-board {
                width: 250px;
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <div class="game-over" id="gameOver">
                游戏结束！<br>
                <button class="control-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <h3>得分</h3>
                <div class="value" id="score">0</div>
            </div>
            
            <div class="info-item">
                <h3>等级</h3>
                <div class="value" id="level">1</div>
            </div>
            
            <div class="info-item">
                <h3>行数</h3>
                <div class="value" id="lines">0</div>
            </div>
            
            <div class="info-item">
                <h3>下一个</h3>
                <div class="next-piece" id="nextPiece"></div>
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="startGame()">开始游戏</button>
                <button class="control-btn" onclick="pauseGame()">暂停</button>
                <button class="control-btn" onclick="restartGame()">重新开始</button>
            </div>
            
            <div class="info-item">
                <h3>操作说明</h3>
                <div style="font-size: 0.9rem; line-height: 1.5;">
                    ← → 移动<br>
                    ↓ 加速下降<br>
                    ↑ 旋转<br>
                    空格 暂停
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            isPlaying: false,
            isPaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 游戏板尺寸
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;

        // 方块形状定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: 'block-i'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: 'block-o'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: 'block-t'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: 'block-s'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: 'block-z'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: 'block-j'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: 'block-l'
            }
        };

        // 初始化游戏板
        function initBoard() {
            gameState.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                gameState.board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    gameState.board[y][x] = 0;
                }
            }
        }

        // 创建随机方块
        function createPiece() {
            const pieces = Object.keys(PIECES);
            const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
            return {
                type: randomPiece,
                shape: PIECES[randomPiece].shape,
                color: PIECES[randomPiece].color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(PIECES[randomPiece].shape[0].length / 2),
                y: 0
            };
        }

        // 检查碰撞
        function checkCollision(piece, dx = 0, dy = 0, rotation = null) {
            const shape = rotation || piece.shape;
            const newX = piece.x + dx;
            const newY = piece.y + dy;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;

                        if (boardX < 0 || boardX >= BOARD_WIDTH || 
                            boardY >= BOARD_HEIGHT || 
                            (boardY >= 0 && gameState.board[boardY][boardX])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const shape = piece.shape;
            for (let x = 0; x < shape[0].length; x++) {
                rotated[x] = [];
                for (let y = shape.length - 1; y >= 0; y--) {
                    rotated[x][shape.length - 1 - y] = shape[y][x];
                }
            }
            return rotated;
        }

        // 放置方块到游戏板
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        const boardX = piece.x + x;
                        if (boardY >= 0) {
                            gameState.board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }

        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (gameState.board[y].every(cell => cell !== 0)) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(50, 1000 - (gameState.level - 1) * 50);
                updateDisplay();
            }
        }

        // 渲染游戏
        function render() {
            const gameBoard = document.getElementById('gameBoard');
            
            // 清除现有方块
            const existingBlocks = gameBoard.querySelectorAll('.block');
            existingBlocks.forEach(block => block.remove());

            // 渲染游戏板上的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        const block = document.createElement('div');
                        block.className = `block ${gameState.board[y][x]}`;
                        block.style.left = x * BLOCK_SIZE + 'px';
                        block.style.top = y * BLOCK_SIZE + 'px';
                        gameBoard.appendChild(block);
                    }
                }
            }

            // 渲染当前方块
            if (gameState.currentPiece) {
                for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                        if (gameState.currentPiece.shape[y][x]) {
                            const block = document.createElement('div');
                            block.className = `block ${gameState.currentPiece.color}`;
                            block.style.left = (gameState.currentPiece.x + x) * BLOCK_SIZE + 'px';
                            block.style.top = (gameState.currentPiece.y + y) * BLOCK_SIZE + 'px';
                            gameBoard.appendChild(block);
                        }
                    }
                }
            }
        }

        // 更新显示信息
        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (!gameState.isPlaying || gameState.isPaused) {
                if (gameState.isPlaying) {
                    requestAnimationFrame(gameLoop);
                }
                return;
            }

            if (timestamp - gameState.dropTime > gameState.dropInterval) {
                if (!checkCollision(gameState.currentPiece, 0, 1)) {
                    gameState.currentPiece.y++;
                } else {
                    placePiece(gameState.currentPiece);
                    clearLines();
                    gameState.currentPiece = gameState.nextPiece;
                    gameState.nextPiece = createPiece();
                    
                    if (checkCollision(gameState.currentPiece)) {
                        gameOver();
                        return;
                    }
                }
                gameState.dropTime = timestamp;
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameState.isPlaying) return;
            
            initBoard();
            gameState.currentPiece = createPiece();
            gameState.nextPiece = createPiece();
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.dropTime = 0;
            gameState.dropInterval = 1000;
            
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            requestAnimationFrame(gameLoop);
        }

        // 暂停游戏
        function pauseGame() {
            if (!gameState.isPlaying) return;
            gameState.isPaused = !gameState.isPaused;
        }

        // 重新开始游戏
        function restartGame() {
            gameState.isPlaying = false;
            gameState.isPaused = false;
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 游戏结束
        function gameOver() {
            gameState.isPlaying = false;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 键盘控制
        document.addEventListener('keydown', (event) => {
            if (!gameState.isPlaying || gameState.isPaused) return;

            switch (event.code) {
                case 'ArrowLeft':
                    if (!checkCollision(gameState.currentPiece, -1, 0)) {
                        gameState.currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (!checkCollision(gameState.currentPiece, 1, 0)) {
                        gameState.currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (!checkCollision(gameState.currentPiece, 0, 1)) {
                        gameState.currentPiece.y++;
                        gameState.score += 1;
                        updateDisplay();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotatePiece(gameState.currentPiece);
                    if (!checkCollision(gameState.currentPiece, 0, 0, rotated)) {
                        gameState.currentPiece.shape = rotated;
                    }
                    break;
                case 'Space':
                    event.preventDefault();
                    pauseGame();
                    break;
            }
            render();
        });

        // 初始化
        initBoard();
        updateDisplay();
        render();
    </script>
</body>
</html>
