<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        #game-board {
            width: 300px;
            height: 600px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            margin: 0 auto;
        }

        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #level {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
            min-width: 250px;
            backdrop-filter: blur(5px);
        }

        #test-panel h3 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        /* 性能监控面板 */
        #performance-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
            min-width: 200px;
            backdrop-filter: blur(5px);
        }

        #performance-panel h3 {
            margin-bottom: 10px;
            color: #2196F3;
        }

        .metric {
            margin: 3px 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
                margin: 10px;
            }

            #game-board {
                width: 250px;
                height: 500px;
            }

            #test-panel, #performance-panel {
                position: relative;
                margin: 10px;
                width: calc(100% - 20px);
            }

            body {
                flex-direction: column;
                overflow-y: auto;
            }
        }

        /* 动画优化 */
        @media (prefers-reduced-motion: reduce) {
            .snowflake {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">分数: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <div id="game-board"></div>
        <div id="controls">
            <p>← → 移动 | ↓ 加速 | ↑ 旋转 | 空格 暂停</p>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试结果</h3>
        <div id="test-results"></div>
        <button onclick="runAllTests()" style="margin-top: 10px; padding: 5px 10px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer;">重新测试</button>
    </div>

    <!-- 性能监控面板 -->
    <div id="performance-panel">
        <h3>性能监控</h3>
        <div id="performance-metrics"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isActive = true;
                this.performanceMode = false;
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✦', '✧', '✩'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // 随机初始位置和属性
                    snowflake.style.left = Math.random() * 100 + '%';
                    snowflake.style.top = -10 + 'px';
                    snowflake.style.fontSize = (Math.random() * 0.8 + 0.8) + 'em';
                    snowflake.style.opacity = Math.random() * 0.6 + 0.4;
                    
                    // 动画属性
                    snowflake.dataset.speed = Math.random() * 2 + 1;
                    snowflake.dataset.drift = Math.random() * 2 - 1;
                    snowflake.dataset.rotation = Math.random() * 360;
                    snowflake.dataset.rotationSpeed = Math.random() * 2 - 1;
                    
                    this.container.appendChild(snowflake);
                    this.snowflakes.push(snowflake);
                }
            }

            startAnimation() {
                const animate = () => {
                    if (!this.isActive) return;
                    
                    this.snowflakes.forEach(snowflake => {
                        const currentTop = parseFloat(snowflake.style.top) || 0;
                        const currentLeft = parseFloat(snowflake.style.left) || 0;
                        const speed = parseFloat(snowflake.dataset.speed);
                        const drift = parseFloat(snowflake.dataset.drift);
                        const rotationSpeed = parseFloat(snowflake.dataset.rotationSpeed);
                        
                        // 更新位置
                        let newTop = currentTop + speed;
                        let newLeft = currentLeft + drift * 0.1;
                        
                        // 边界检查
                        if (newTop > window.innerHeight + 10) {
                            newTop = -10;
                            newLeft = Math.random() * 100;
                        }
                        
                        if (newLeft > 100) newLeft = 0;
                        if (newLeft < 0) newLeft = 100;
                        
                        // 更新旋转
                        let currentRotation = parseFloat(snowflake.dataset.rotation) || 0;
                        currentRotation += rotationSpeed;
                        snowflake.dataset.rotation = currentRotation;
                        
                        // 应用变换
                        snowflake.style.top = newTop + 'px';
                        snowflake.style.left = newLeft + '%';
                        snowflake.style.transform = `rotate(${currentRotation}deg)`;
                    });
                    
                    requestAnimationFrame(animate);
                };
                
                animate();
            }

            setPerformanceMode(enabled) {
                this.performanceMode = enabled;
                if (enabled) {
                    this.maxSnowflakes = Math.min(this.maxSnowflakes, 25);
                    // 移除多余的雪花
                    while (this.snowflakes.length > this.maxSnowflakes) {
                        const snowflake = this.snowflakes.pop();
                        snowflake.remove();
                    }
                }
            }

            pause() {
                this.isActive = false;
            }

            resume() {
                this.isActive = true;
                this.startAnimation();
            }

            destroy() {
                this.isActive = false;
                this.snowflakes.forEach(snowflake => snowflake.remove());
                this.snowflakes = [];
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.results = [];
                this.snowflakeSystem = null;
            }

            async runIntegrationTests() {
                this.results = [];
                
                await this.testSnowflakeGeneration();
                await this.testAnimationPerformance();
                await this.testResponsiveDesign();
                await this.testZIndexLayering();
                await this.testGameIntegration();
                
                this.displayResults();
                return this.results;
            }

            async testSnowflakeGeneration() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const initialCount = container.children.length;
                    
                    // 测试雪花创建
                    this.snowflakeSystem = new SnowflakeSystem();
                    this.snowflakeSystem.init();
                    
                    await this.wait(100);
                    
                    const finalCount = container.children.length;
                    
                    if (finalCount > initialCount) {
                        this.addResult('雪花生成测试', 'pass', `成功生成 ${finalCount} 个雪花`);
                    } else {
                        this.addResult('雪花生成测试', 'fail', '雪花生成失败');
                    }
                } catch (error) {
                    this.addResult('雪花生成测试', 'fail', `错误: ${error.message}`);
                }
            }

            async testAnimationPerformance() {
                try {
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    const measureFrames = () => {
                        frameCount++;
                        if (frameCount < 60) {
                            requestAnimationFrame(measureFrames);
                        } else {
                            const endTime = performance.now();
                            const fps = 1000 / ((endTime - startTime) / frameCount);
                            
                            if (fps >= 30) {
                                this.addResult('动画性能测试', 'pass', `FPS: ${fps.toFixed(1)}`);
                            } else if (fps >= 20) {
                                this.addResult('动画性能测试', 'warning', `FPS: ${fps.toFixed(1)} (偏低)`);
                            } else {
                                this.addResult('动画性能测试', 'fail', `FPS: ${fps.toFixed(1)} (过低)`);
                            }
                        }
                    };
                    
                    requestAnimationFrame(measureFrames);
                } catch (error) {
                    this.addResult('动画性能测试', 'fail', `错误: ${error.message}`);
                }
            }

            async testResponsiveDesign() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const originalWidth = window.innerWidth;
                    
                    // 模拟窗口大小变化
                    const rect = container.getBoundingClientRect();
                    
                    if (rect.width === window.innerWidth && rect.height === window.innerHeight) {
                        this.addResult('响应式设计测试', 'pass', '容器尺寸正确适配');
                    } else {
                        this.addResult('响应式设计测试', 'fail', '容器尺寸适配失败');
                    }
                    
                    // 测试移动端适配
                    if (window.innerWidth <= 768) {
                        this.addResult('移动端适配测试', 'pass', '检测到移动端环境');
                    } else {
                        this.addResult('移动端适配测试', 'pass', '桌面端环境正常');
                    }
                } catch (error) {
                    this.addResult('响应式设计测试', 'fail', `错误: ${error.message}`);
                }
            }

            async testZIndexLayering() {
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    
                    if (gameZIndex > snowZIndex) {
                        this.addResult('层级测试', 'pass', `游戏层级(${gameZIndex}) > 雪花层级(${snowZIndex})`);
                    } else {
                        this.addResult('层级测试', 'fail', '层级设置错误');
                    }
                } catch (error) {
                    this.addResult('层级测试', 'fail', `错误: ${error.message}`);
                }
            }

            async testGameIntegration() {
                try {
                    const gameBoard = document.getElementById('game-board');
                    const snowContainer = document.getElementById('snowflake-container');
                    
                    // 测试游戏区域是否可见
                    const gameBoardRect = gameBoard.getBoundingClientRect();
                    const snowContainerRect = snowContainer.getBoundingClientRect();
                    
                    if (gameBoardRect.width > 0 && gameBoardRect.height > 0) {
                        this.addResult('游戏集成测试', 'pass', '游戏界面正常显示');
                    } else {
                        this.addResult('游戏集成测试', 'fail', '游戏界面显示异常');
                    }
                    
                    // 测试雪花是否不干扰游戏交互
                    const snowflakes = snowContainer.querySelectorAll('.snowflake');
                    let interactionBlocked = false;
                    
                    snowflakes.forEach(snowflake => {
                        const style = getComputedStyle(snowflake);
                        if (style.pointerEvents !== 'none') {
                            interactionBlocked = true;
                        }
                    });
                    
                    if (!interactionBlocked) {
                        this.addResult('交互测试', 'pass', '雪花不干扰游戏交互');
                    } else {
                        this.addResult('交互测试', 'fail', '雪花干扰游戏交互');
                    }
                } catch (error) {
                    this.addResult('游戏集成测试', 'fail', `错误: ${error.message}`);
                }
            }

            addResult(testName, status, message) {
                this.results.push({ testName, status, message });
            }

            displayResults() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';
                
                this.results.forEach(result => {
                    const div = document.createElement('div');
                    div.className = `test-result test-${result.status}`;
                    div.innerHTML = `<strong>${result.testName}:</strong> ${result.message}`;
                    resultsContainer.appendChild(div);
                });
            }

            wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            constructor() {
                this.supportResults = {};
            }

            validateBrowserSupport() {
                // 检查CSS动画支持
                this.supportResults.cssAnimations = 'animation' in document.body.style;
                
                // 检查requestAnimationFrame支持
                this.supportResults.requestAnimationFrame = typeof requestAnimationFrame !== 'undefined';
                
                // 检查CSS3变换支持
                this.supportResults.cssTransforms = 'transform' in document.body.style;
                
                // 检查backdrop-filter支持
                this.supportResults.backdropFilter = 'backdropFilter' in document.body.style;
                
                return this.supportResults;
            }

            testMobilePerformance() {
                const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (isMobile) {
                    // 移动端性能优化
                    return {
                        isMobile: true,
                        recommendedSnowflakes: 25,
                        performanceMode: true
                    };
                }
                
                return {
                    isMobile: false,
                    recommendedSnowflakes: 50,
                    performanceMode: false
                };
            }

            checkCSSAnimationSupport() {
                const testElement = document.createElement('div');
                testElement.style.animation = 'test 1s';
                return testElement.style.animation !== '';
            }

            validateResponsiveLayout() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                
                return {
                    viewport: { width: viewportWidth, height: viewportHeight },
                    isMobile: viewportWidth <= 768,
                    isTablet: viewportWidth > 768 && viewportWidth <= 1024,
                    isDesktop: viewportWidth > 1024
                };
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.metrics = {
                    frameRate: 0,
                    memoryUsage: 0,
                    animationCost: 0,
                    snowflakeCount: 0
                };
                this.isMonitoring = false;
            }

            startMonitoring() {
                this.isMonitoring = true;
                this.monitorFrameRate();
                this.trackMemoryUsage();
                this.updateDisplay();
            }

            monitorFrameRate() {
                let lastTime = performance.now();
                let frameCount = 0;
                
                const measureFPS = (currentTime) => {
                    if (!this.isMonitoring) return;
                    
                    frameCount++;
                    
                    if (currentTime - lastTime >= 1000) {
                        this.metrics.frameRate = frameCount;
                        frameCount = 0;
                        lastTime = currentTime;
                    }
                    
                    requestAnimationFrame(measureFPS);
                };
                
                requestAnimationFrame(measureFPS);
            }

            trackMemoryUsage() {
                if (performance.memory) {
                    const updateMemory = () => {
                        if (!this.isMonitoring) return;
                        
                        this.metrics.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                        
                        setTimeout(updateMemory, 1000);
                    };
                    
                    updateMemory();
                }
            }

            measureAnimationCost() {
                const startTime = performance.now();
                
                // 模拟动画计算
                const snowflakes = document.querySelectorAll('.snowflake');
                this.metrics.snowflakeCount = snowflakes.length;
                
                snowflakes.forEach(snowflake => {
                    // 获取计算样式（模拟动画成本）
                    getComputedStyle(snowflake).transform;
                });
                
                this.metrics.animationCost = performance.now() - startTime;
            }

            updateDisplay() {
                const updateMetrics = () => {
                    if (!this.isMonitoring) return;
                    
                    this.measureAnimationCost();
                    
                    const metricsContainer = document.getElementById('performance-metrics');
                    metricsContainer.innerHTML = `
                        <div class="metric">FPS: ${this.metrics.frameRate}</div>
                        <div class="metric">内存: ${this.metrics.memoryUsage} MB</div>
                        <div class="metric">动画成本: ${this.metrics.animationCost.toFixed(2)} ms</div>
                        <div class="metric">雪花数量: ${this.metrics.snowflakeCount}</div>
                    `;
                    
                    setTimeout(updateMetrics, 1000);
                };
                
                updateMetrics();
            }

            generatePerformanceReport() {
                return {
                    timestamp: new Date().toISOString(),
                    metrics: { ...this.metrics },
                    recommendations: this.getRecommendations()
                };
            }

            getRecommendations() {
                const recommendations = [];
                
                if (this.metrics.frameRate < 30) {
                    recommendations.push('建议减少雪花数量以提高帧率');
                }
                
                if (this.metrics.memoryUsage > 100) {
                    recommendations.push('内存使用较高，建议启用性能模式');
                }
                
                if (this.metrics.animationCost > 5) {
                    recommendations.push('动画计算成本较高，建议优化动画逻辑');
                }
                
                return recommendations;
            }

            stopMonitoring() {
                this.isMonitoring = false;
            }
        }

        // 俄罗斯方块游戏集成适配层
        class TetrisGameIntegration {
            constructor() {
                this.snowflakeSystem = null;
                this.gameState = 'menu'; // menu, playing, paused, gameover
                this.performanceMonitor = null;
            }

            initSnowflakeBackground() {
                this.snowflakeSystem = new SnowflakeSystem();
                
                // 根据设备性能调整
                const validator = new CompatibilityValidator();
                const mobilePerf = validator.testMobilePerformance();
                
                if (mobilePerf.performanceMode) {
                    this.snowflakeSystem.setPerformanceMode(true);
                }
                
                this.snowflakeSystem.init();
                
                // 启动性能监控
                this.performanceMonitor = new PerformanceMonitor();
                this.performanceMonitor.startMonitoring();
            }

            adjustForGameUI() {
                // 确保雪花不干扰游戏UI
                const snowContainer = document.getElementById('snowflake-container');
                snowContainer.style.pointerEvents = 'none';
                
                // 调整雪花密度以适应游戏界面
                if (this.snowflakeSystem) {
                    const gameBoard = document.getElementById('game-board');
                    const gameBoardRect = gameBoard.getBoundingClientRect();
                    
                    // 在游戏区域减少雪花密度
                    this.snowflakeSystem.snowflakes.forEach(snowflake => {
                        const snowflakeRect = snowflake.getBoundingClientRect();
                        
                        // 检查是否与游戏区域重叠
                        if (this.isOverlapping(snowflakeRect, gameBoardRect)) {
                            snowflake.style.opacity = '0.3'; // 降低透明度
                        }
                    });
                }
            }

            handleGameStateChanges(newState) {
                this.gameState = newState;
                
                switch (newState) {
                    case 'playing':
                        if (this.snowflakeSystem) {
                            this.snowflakeSystem.resume();
                        }
                        break;
                    case 'paused':
                        if (this.snowflakeSystem) {
                            this.snowflakeSystem.pause();
                        }
                        break;
                    case 'gameover':
                        // 游戏结束时可以增强雪花效果
                        if (this.snowflakeSystem) {
                            this.snowflakeSystem.resume();
                        }
                        break;
                }
            }

            optimizeForGameplay() {
                // 根据游戏性能动态调整雪花效果
                if (this.performanceMonitor && this.snowflakeSystem) {
                    const metrics = this.performanceMonitor.metrics;
                    
                    if (metrics.frameRate < 30) {
                        // 性能不足时减少雪花
                        this.snowflakeSystem.setPerformanceMode(true);
                    } else if (metrics.frameRate > 50) {
                        // 性能充足时可以增加效果
                        this.snowflakeSystem.setPerformanceMode(false);
                    }
                }
            }

            isOverlapping(rect1, rect2) {
                return !(rect1.right < rect2.left || 
                        rect1.left > rect2.right || 
                        rect1.bottom < rect2.top || 
                        rect1.top > rect2.bottom);
            }
        }

        // 全局变量
        let gameIntegration;
        let testSuite;

        // 初始化函数
        function initializeGame() {
            // 初始化游戏集成
            gameIntegration = new TetrisGameIntegration();
            gameIntegration.initSnowflakeBackground();
            gameIntegration.adjustForGameUI();
            
            // 初始化测试套件
            testSuite = new IntegrationTestSuite();
            
            // 运行初始测试
            setTimeout(() => {
                runAllTests();
            }, 1000);
            
            // 定期优化性能
            setInterval(() => {
                if (gameIntegration) {
                    gameIntegration.optimizeForGameplay();
                }
            }, 5000);
        }

        // 运行所有测试
        async function runAllTests() {
            if (testSuite) {
                await testSuite.runIntegrationTests();
            }
        }

        // 简单的俄罗斯方块游戏逻辑（演示用）
        class SimpleTetrisGame {
            constructor() {
                this.board = document.getElementById('game-board');
                this.score = 0;
                this.level = 1;
                this.isPlaying = false;
            }

            start() {
                this.isPlaying = true;
                this.updateDisplay();
                
                if (gameIntegration) {
                    gameIntegration.handleGameStateChanges('playing');
                }
            }

            pause() {
                this.isPlaying = !this.isPlaying;
                
                if (gameIntegration) {
                    gameIntegration.handleGameStateChanges(this.isPlaying ? 'playing' : 'paused');
                }
            }

            updateDisplay() {
                document.getElementById('score').textContent = `分数: ${this.score}`;
                document.getElementById('level').textContent = `等级: ${this.level}`;
            }
        }

        // 初始化游戏
        let tetrisGame;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initializeGame();
            
            tetrisGame = new SimpleTetrisGame();
            tetrisGame.start();
            
            // 键盘事件监听
            document.addEventListener('keydown', (event) => {
                switch (event.code) {
                    case 'Space':
                        event.preventDefault();
                        if (tetrisGame) {
                            tetrisGame.pause();
                        }
                        break;
                    case 'ArrowLeft':
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case 'ArrowUp':
                        event.preventDefault();
                        // 游戏控制逻辑
                        break;
                }
            });
        });

        // 窗口大小变化时重新调整
        window.addEventListener('resize', () => {
            if (gameIntegration) {
                gameIntegration.adjustForGameUI();
            }
        });

        // 页面可见性变化时暂停/恢复
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (gameIntegration && gameIntegration.snowflakeSystem) {
                    gameIntegration.snowflakeSystem.pause();
                }
            } else {
                if (gameIntegration && gameIntegration.snowflakeSystem) {
                    gameIntegration.snowflakeSystem.resume();
                }
            }
        });
    </script>
</body>
