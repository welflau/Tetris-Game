<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏主容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        /* 游戏画布 */
        #game-canvas {
            border: 2px solid #fff;
            border-radius: 8px;
            background: #000;
            display: block;
        }

        /* 游戏信息面板 */
        #game-info {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
        }

        /* 控制按钮 */
        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .control-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            max-width: 300px;
            backdrop-filter: blur(5px);
        }

        #test-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .test-item {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        /* 性能监控面板 */
        #performance-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
                margin: 10px;
            }

            #test-panel,
            #performance-panel {
                position: relative;
                margin: 10px;
                max-width: none;
            }

            body {
                flex-direction: column;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>

    <!-- 游戏主容器 -->
    <div id="game-container">
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="game-info">
            <div>分数: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
            <div>行数: <span id="lines">0</span></div>
        </div>
        <div id="controls">
            <button class="control-btn" onclick="gameController.startGame()">开始游戏</button>
            <button class="control-btn" onclick="gameController.pauseGame()">暂停</button>
            <button class="control-btn" onclick="gameController.resetGame()">重置</button>
            <button class="control-btn" onclick="testSuite.runAllTests()">运行测试</button>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试结果</h3>
        <div id="test-results"></div>
    </div>

    <!-- 性能监控面板 -->
    <div id="performance-panel">
        <h3>性能监控</h3>
        <div id="performance-stats">
            <div>FPS: <span id="fps">0</span></div>
            <div>内存: <span id="memory">0</span> MB</div>
            <div>雪花数量: <span id="snowflake-count">0</span></div>
            <div>动画成本: <span id="animation-cost">0</span>ms</div>
        </div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isActive = true;
                this.animationId = null;
                this.lastTime = 0;
                this.init();
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✦', '✧', '✩'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // 随机初始位置和属性
                    const size = Math.random() * 0.8 + 0.6;
                    snowflake.style.fontSize = size + 'em';
                    snowflake.style.left = Math.random() * 100 + '%';
                    snowflake.style.top = -10 + 'px';
                    
                    // 存储动画属性
                    snowflake.speed = Math.random() * 2 + 1;
                    snowflake.drift = Math.random() * 2 - 1;
                    snowflake.rotation = 0;
                    snowflake.rotationSpeed = Math.random() * 2 - 1;
                    
                    this.container.appendChild(snowflake);
                    this.snowflakes.push(snowflake);
                }
            }

            updateSnowflakes(deltaTime) {
                const containerHeight = window.innerHeight;
                const containerWidth = window.innerWidth;
                
                this.snowflakes.forEach(snowflake => {
                    if (!this.isActive) return;
                    
                    // 更新位置
                    const currentTop = parseFloat(snowflake.style.top) || 0;
                    const currentLeft = parseFloat(snowflake.style.left) || 0;
                    
                    const newTop = currentTop + snowflake.speed * deltaTime * 0.1;
                    const newLeft = currentLeft + snowflake.drift * deltaTime * 0.05;
                    
                    // 更新旋转
                    snowflake.rotation += snowflake.rotationSpeed * deltaTime * 0.1;
                    
                    // 重置超出边界的雪花
                    if (newTop > containerHeight + 20) {
                        snowflake.style.top = -20 + 'px';
                        snowflake.style.left = Math.random() * 100 + '%';
                        snowflake.rotation = 0;
                    } else {
                        snowflake.style.top = newTop + 'px';
                        snowflake.style.left = Math.max(-5, Math.min(105, newLeft)) + '%';
                    }
                    
                    // 应用变换
                    snowflake.style.transform = `rotate(${snowflake.rotation}deg)`;
                });
            }

            startAnimation() {
                const animate = (currentTime) => {
                    if (!this.lastTime) this.lastTime = currentTime;
                    const deltaTime = currentTime - this.lastTime;
                    
                    this.updateSnowflakes(deltaTime);
                    this.lastTime = currentTime;
                    
                    if (this.isActive) {
                        this.animationId = requestAnimationFrame(animate);
                    }
                };
                
                this.animationId = requestAnimationFrame(animate);
            }

            pause() {
                this.isActive = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }

            resume() {
                this.isActive = true;
                this.lastTime = 0;
                this.startAnimation();
            }

            destroy() {
                this.pause();
                this.snowflakes.forEach(snowflake => {
                    if (snowflake.parentNode) {
                        snowflake.parentNode.removeChild(snowflake);
                    }
                });
                this.snowflakes = [];
            }
        }

        // 简化的俄罗斯方块游戏控制器
        class GameController {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameLoop = null;
            }

            startGame() {
                if (this.isRunning && !this.isPaused) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.updateDisplay();
                
                // 简单的游戏循环演示
                this.gameLoop = setInterval(() => {
                    if (!this.isPaused) {
                        this.update();
                        this.render();
                    }
                }, 100);
            }

            pauseGame() {
                this.isPaused = !this.isPaused;
            }

            resetGame() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                }
                
                this.updateDisplay();
                this.render();
            }

            update() {
                // 简单的分数增长演示
                this.score += Math.floor(Math.random() * 10);
                if (this.score > this.level * 1000) {
                    this.level++;
                }
                this.updateDisplay();
            }

            render() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x < this.canvas.width; x += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.canvas.height; y += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制一些随机方块作为演示
                if (this.isRunning && !this.isPaused) {
                    this.ctx.fillStyle = '#ff6b6b';
                    for (let i = 0; i < 5; i++) {
                        const x = Math.floor(Math.random() * 10) * 30;
                        const y = Math.floor(Math.random() * 20) * 30;
                        this.ctx.fillRect(x, y, 30, 30);
                    }
                }
            }

            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.results = [];
                this.testPanel = document.getElementById('test-results');
            }

            runAllTests() {
                this.results = [];
                this.clearResults();
                
                this.testSnowflakeGeneration();
                this.testAnimationPerformance();
                this.testResponsiveDesign();
                this.testZIndexLayering();
                this.testBrowserCompatibility();
                
                this.displayResults();
            }

            testSnowflakeGeneration() {
                const test = {
                    name: '雪花生成测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const snowflakes = document.querySelectorAll('.snowflake');
                    if (snowflakes.length === 0) {
                        test.status = 'fail';
                        test.message = '未找到雪花元素';
                    } else if (snowflakes.length < 30) {
                        test.status = 'warning';
                        test.message = `雪花数量偏少: ${snowflakes.length}`;
                    } else {
                        test.message = `成功生成 ${snowflakes.length} 个雪花`;
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = '雪花生成异常: ' + error.message;
                }
                
                this.results.push(test);
            }

            testAnimationPerformance() {
                const test = {
                    name: '动画性能测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const startTime = performance.now();
                    
                    // 模拟动画帧测试
                    setTimeout(() => {
                        const endTime = performance.now();
                        const duration = endTime - startTime;
                        
                        if (duration > 100) {
                            test.status = 'warning';
                            test.message = `动画响应时间: ${duration.toFixed(2)}ms`;
                        } else {
                            test.message = `动画响应良好: ${duration.toFixed(2)}ms`;
                        }
                    }, 50);
                    
                    test.message = '动画性能检测中...';
                } catch (error) {
                    test.status = 'fail';
                    test.message = '动画性能测试失败: ' + error.message;
                }
                
                this.results.push(test);
            }

            testResponsiveDesign() {
                const test = {
                    name: '响应式设计测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const container = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    if (container.offsetWidth !== window.innerWidth) {
                        test.status = 'warning';
                        test.message = '雪花容器宽度不匹配窗口';
                    } else if (!gameContainer) {
                        test.status = 'fail';
                        test.message = '游戏容器未找到';
                    } else {
                        test.message = '响应式布局正常';
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = '响应式测试异常: ' + error.message;
                }
                
                this.results.push(test);
            }

            testZIndexLayering() {
                const test = {
                    name = 'Z-Index层级测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    
                    if (snowZIndex >= gameZIndex) {
                        test.status = 'fail';
                        test.message = `层级错误: 雪花(${snowZIndex}) >= 游戏(${gameZIndex})`;
                    } else {
                        test.message = `层级正确: 雪花(${snowZIndex}) < 游戏(${gameZIndex})`;
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = 'Z-Index测试异常: ' + error.message;
                }
                
                this.results.push(test);
            }

            testBrowserCompatibility() {
                const test = {
                    name: '浏览器兼容性测试',
                    status: 'pass',
                    message: ''
                };
                
                try {
                    const features = {
                        requestAnimationFrame: typeof requestAnimationFrame !== 'undefined',
                        cssAnimations: CSS.supports('animation', 'test'),
                        transforms: CSS.supports('transform', 'translateZ(0)'),
                        backdropFilter: CSS.supports('backdrop-filter', 'blur(5px)')
                    };
                    
                    const unsupported = Object.entries(features)
                        .filter(([key, supported]) => !supported)
                        .map(([key]) => key);
                    
                    if (unsupported.length > 0) {
                        test.status = 'warning';
                        test.message = `部分特性不支持: ${unsupported.join(', ')}`;
                    } else {
                        test.message = '所有特性均支持';
                    }
                } catch (error) {
                    test.status = 'fail';
                    test.message = '兼容性测试异常: ' + error.message;
                }
                
                this.results.push(test);
            }

            displayResults() {
                this.testPanel.innerHTML = '';
                
                this.results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = `test-item test-${result.status}`;
                    item.innerHTML = `
                        <strong>${result.name}</strong><br>
                        <small>${result.message}</small>
                    `;
                    this.testPanel.appendChild(item);
                });
            }

            clearResults() {
                this.testPanel.innerHTML = '<div>正在运行测试...</div>';
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.memoryUsage = 0;
                this.animationCost = 0;
                
                this.startMonitoring();
            }

            startMonitoring() {
                const monitor = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        this.fps = Math.round(this.frameCount * 1000 / (currentTime - this.lastTime));
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                        
                        this.updateMemoryUsage();
                        this.updateDisplay();
                    }
                    
                    requestAnimationFrame(monitor);
                };
                
                requestAnimationFrame(monitor);
            }

            updateMemoryUsage() {
                if (performance.memory) {
                    this.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                }
            }

            measureAnimationCost() {
                const startTime = performance.now();
                
                // 模拟动画成本测量
                setTimeout(() => {
                    this.animationCost = performance.now() - startTime;
                }, 0);
            }

            updateDisplay() {
                document.getElementById('fps').textContent = this.fps;
                document.getElementById('memory').textContent = this.memoryUsage;
                document.getElementById('snowflake-count').textContent = 
                    document.querySelectorAll('.snowflake').length;
                document.getElementById('animation-cost').textContent = 
                    this.animationCost.toFixed(2);
            }
        }

        // 初始化系统
        let snowflakeSystem;
        let gameController;
        let testSuite;
        let performanceMonitor;

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化各个系统
            snowflakeSystem = new SnowflakeSystem();
            gameController = new GameController();
            testSuite = new IntegrationTestSuite();
            performanceMonitor = new PerformanceMonitor();
            
            // 初始渲染
            gameController.render();
            
            // 键盘控制
            document.addEventListener('keydown', function(event) {
                switch(event.code) {
                    case 'Space':
                        event.preventDefault();
                        gameController.pauseGame();
                        break;
                    case 'KeyR':
                        event.preventDefault();
                        gameController.resetGame();
                        break;
                    case 'KeyT':
                        event.preventDefault();
                        testSuite.runAllTests();
                        break;
                }
            });
            
            // 窗口大小变化处理
            window.addEventListener('resize', function() {
                // 重新调整雪花容器
                if (snowflakeSystem) {
                    snowflakeSystem.container.style.width = window.innerWidth + 'px';
                    snowflakeSystem.container.style.height = window.innerHeight + 'px';
                }
            });
            
            // 页面可见性变化处理
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    snowflakeSystem.pause();
                } else {
                    snowflakeSystem.resume();
                }
            });
            
            console.log('俄罗斯方块雪花特效版已初始化');
            console.log('快捷键: 空格键-暂停, R键-重置, T键-运行测试');
        });

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', function() {
            if (snowflakeSystem) {
                snowflakeSystem.destroy();
            }
            if (gameController && gameController.gameLoop) {
                clearInterval(gameController.gameLoop);
            }
        });
    </script>
</body>
</html>
