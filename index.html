<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.2rem;
        }

        .score, .level, .lines {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .next-piece {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #ff6b6b;
            display: none;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">消除行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4 style="color: #00ffff; text-align: center; margin: 10px 0;">下一个</h4>
                <canvas id="nextPiece" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h4>控制说明</h4>
                <div>← → : 左右移动</div>
                <div>↓ : 快速下降</div>
                <div>↑ : 旋转</div>
                <div>空格 : 暂停/继续</div>
            </div>
            
            <button onclick="startGame()">开始游戏</button>
            <button onclick="pauseGame()">暂停</button>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>
    
    <div id="gameOver" class="game-over">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">再来一局</button>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            gameRunning: false,
            gamePaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;

        // 方块类型和颜色
        const PIECES = {
            I: { shape: [[1,1,1,1]], color: '#00ffff' },
            O: { shape: [[1,1],[1,1]], color: '#ffff00' },
            T: { shape: [[0,1,0],[1,1,1]], color: '#800080' },
            S: { shape: [[0,1,1],[1,1,0]], color: '#00ff00' },
            Z: { shape: [[1,1,0],[0,1,1]], color: '#ff0000' },
            J: { shape: [[1,0,0],[1,1,1]], color: '#0000ff' },
            L: { shape: [[0,0,1],[1,1,1]], color: '#ffa500' }
        };

        // 获取画布上下文
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');

        // 初始化游戏
        function initGame() {
            // 初始化游戏板
            gameState.board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.dropInterval = 1000;
            
            updateDisplay();
            generateNextPiece();
            spawnPiece();
        }

        // 生成随机方块
        function generatePiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                type: randomType,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 生成下一个方块
        function generateNextPiece() {
            gameState.nextPiece = generatePiece();
            drawNextPiece();
        }

        // 生成当前方块
        function spawnPiece() {
            gameState.currentPiece = gameState.nextPiece;
            generateNextPiece();
            
            // 检查游戏是否结束
            if (checkCollision(gameState.currentPiece, 0, 0)) {
                gameOver();
            }
        }

        // 检查碰撞
        function checkCollision(piece, dx, dy) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (newY >= 0 && gameState.board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (!gameState.gameRunning || gameState.gamePaused) return;
            
            if (!checkCollision(gameState.currentPiece, dx, dy)) {
                gameState.currentPiece.x += dx;
                gameState.currentPiece.y += dy;
                draw();
            } else if (dy > 0) {
                // 方块落地
                placePiece();
            }
        }

        // 旋转方块
        function rotatePiece() {
            if (!gameState.gameRunning || gameState.gamePaused) return;
            
            const rotated = {
                ...gameState.currentPiece,
                shape: rotateMatrix(gameState.currentPiece.shape)
            };
            
            if (!checkCollision(rotated, 0, 0)) {
                gameState.currentPiece.shape = rotated.shape;
                draw();
            }
        }

        // 旋转矩阵
        function rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    rotated[x][rows - 1 - y] = matrix[y][x];
                }
            }
            
            return rotated;
        }

        // 放置方块
        function placePiece() {
            for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                    if (gameState.currentPiece.shape[y][x]) {
                        const boardX = gameState.currentPiece.x + x;
                        const boardY = gameState.currentPiece.y + y;
                        
                        if (boardY >= 0) {
                            gameState.board[boardY][boardX] = gameState.currentPiece.color;
                        }
                    }
                }
            }
            
            clearLines();
            spawnPiece();
        }

        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (gameState.board[y].every(cell => cell !== 0)) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(50, 1000 - (gameState.level - 1) * 50);
                updateDisplay();
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制游戏板
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        ctx.fillStyle = gameState.board[y][x];
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
            
            // 绘制当前方块
            if (gameState.currentPiece) {
                ctx.fillStyle = gameState.currentPiece.color;
                for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                        if (gameState.currentPiece.shape[y][x]) {
                            const drawX = (gameState.currentPiece.x + x) * CELL_SIZE;
                            const drawY = (gameState.currentPiece.y + y) * CELL_SIZE;
                            ctx.fillRect(drawX, drawY, CELL_SIZE - 1, CELL_SIZE - 1);
                        }
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.fillStyle = '#000000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (gameState.nextPiece) {
                nextCtx.fillStyle = gameState.nextPiece.color;
                const offsetX = (nextCanvas.width - gameState.nextPiece.shape[0].length * 20) / 2;
                const offsetY = (nextCanvas.height - gameState.nextPiece.shape.length * 20) / 2;
                
                for (let y = 0; y < gameState.nextPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.nextPiece.shape[y].length; x++) {
                        if (gameState.nextPiece.shape[y][x]) {
                            nextCtx.fillRect(
                                offsetX + x * 20,
                                offsetY + y * 20,
                                19, 19
                            );
                        }
                    }
                }
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (!gameState.gameRunning || gameState.gamePaused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            if (timestamp - gameState.dropTime > gameState.dropInterval) {
                movePiece(0, 1);
                gameState.dropTime = timestamp;
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (!gameState.gameRunning) {
                initGame();
                gameState.gameRunning = true;
                gameState.gamePaused = false;
                gameState.dropTime = 0;
                document.getElementById('gameOver').style.display = 'none';
                requestAnimationFrame(gameLoop);
            }
        }

        // 暂停游戏
        function pauseGame() {
            if (gameState.gameRunning) {
                gameState.gamePaused = !gameState.gamePaused;
            }
        }

        // 重新开始游戏
        function resetGame() {
            gameState.gameRunning = false;
            gameState.gamePaused = false;
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 游戏结束
        function gameOver() {
            gameState.gameRunning = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 键盘事件
        document.addEventListener('keydown', (event) => {
            if (!gameState.gameRunning) return;
            
            switch(event.key) {
                case 'ArrowLeft':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    movePiece(0, 1);
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
            event.preventDefault();
        });

        // 初始化显示
        initGame();
        draw();
    </script>
</body>
</html>
