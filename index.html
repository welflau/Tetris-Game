<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        .game-info {
            color: #ffffff;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            min-width: 200px;
        }

        .info-item {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .info-label {
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .control-item {
            margin: 5px 0;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" class="game-board" width="300" height="600"></canvas>
        
        <div class="game-info">
            <div class="info-item">
                <span class="info-label">分数:</span>
                <span id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">等级:</span>
                <span id="level">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">行数:</span>
                <span id="lines">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">下一个:</span>
                <canvas id="nextCanvas" width="80" height="80" style="border: 1px solid #fff; margin-top: 10px;"></canvas>
            </div>
            
            <button onclick="startGame()">开始游戏</button>
            <button onclick="pauseGame()">暂停/继续</button>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>
    
    <div class="controls">
        <div class="control-item"><strong>控制说明:</strong></div>
        <div class="control-item">← → : 左右移动</div>
        <div class="control-item">↓ : 快速下降</div>
        <div class="control-item">↑ : 旋转</div>
        <div class="control-item">空格 : 暂停/继续</div>
    </div>

    <script>
        // 游戏状态
        let game = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            isRunning: false,
            isPaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;

        // 方块类型定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };

        // 初始化游戏板
        function initBoard() {
            game.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                game.board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    game.board[y][x] = 0;
                }
            }
        }

        // 创建新方块
        function createPiece() {
            const pieces = Object.keys(PIECES);
            const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
            const piece = PIECES[randomPiece];
            
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 检查碰撞
        function checkCollision(piece, dx = 0, dy = 0, rotation = null) {
            const shape = rotation || piece.shape;
            const newX = piece.x + dx;
            const newY = piece.y + dy;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;

                        if (boardX < 0 || boardX >= BOARD_WIDTH || 
                            boardY >= BOARD_HEIGHT || 
                            (boardY >= 0 && game.board[boardY][boardX])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const shape = piece.shape;
            const rows = shape.length;
            const cols = shape[0].length;

            for (let x = 0; x < cols; x++) {
                rotated[x] = [];
                for (let y = rows - 1; y >= 0; y--) {
                    rotated[x][rows - 1 - y] = shape[y][x];
                }
            }
            return rotated;
        }

        // 放置方块
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        const boardX = piece.x + x;
                        if (boardY >= 0) {
                            game.board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }

        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                let isComplete = true;
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (!game.board[y][x]) {
                        isComplete = false;
                        break;
                    }
                }
                
                if (isComplete) {
                    game.board.splice(y, 1);
                    game.board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查当前行
                }
            }
            
            if (linesCleared > 0) {
                game.lines += linesCleared;
                game.score += linesCleared * 100 * game.level;
                game.level = Math.floor(game.lines / 10) + 1;
                game.dropInterval = Math.max(100, 1000 - (game.level - 1) * 100);
                updateDisplay();
            }
        }

        // 绘制方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        // 绘制游戏板
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已放置的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (game.board[y][x]) {
                        drawBlock(ctx, x, y, game.board[y][x]);
                    }
                }
            }
            
            // 绘制当前方块
            if (game.currentPiece) {
                for (let y = 0; y < game.currentPiece.shape.length; y++) {
                    for (let x = 0; x < game.currentPiece.shape[y].length; x++) {
                        if (game.currentPiece.shape[y][x]) {
                            drawBlock(ctx, game.currentPiece.x + x, game.currentPiece.y + y, game.currentPiece.color);
                        }
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (game.nextPiece) {
                const blockSize = 20;
                const offsetX = (nextCanvas.width - game.nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - game.nextPiece.shape.length * blockSize) / 2;
                
                for (let y = 0; y < game.nextPiece.shape.length; y++) {
                    for (let x = 0; x < game.nextPiece.shape[y].length; x++) {
                        if (game.nextPiece.shape[y][x]) {
                            nextCtx.fillStyle = game.nextPiece.color;
                            nextCtx.fillRect(
                                offsetX + x * blockSize, 
                                offsetY + y * blockSize, 
                                blockSize, 
                                blockSize
                            );
                            nextCtx.strokeStyle = '#ffffff';
                            nextCtx.lineWidth = 1;
                            nextCtx.strokeRect(
                                offsetX + x * blockSize, 
                                offsetY + y * blockSize, 
                                blockSize, 
                                blockSize
                            );
                        }
                    }
                }
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = game.score;
            document.getElementById('level').textContent = game.level;
            document.getElementById('lines').textContent = game.lines;
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (!game.isRunning || game.isPaused) {
                if (game.isRunning) {
                    requestAnimationFrame(gameLoop);
                }
                return;
            }
            
            if (timestamp - game.dropTime > game.dropInterval) {
                if (game.currentPiece) {
                    if (!checkCollision(game.currentPiece, 0, 1)) {
                        game.currentPiece.y++;
                    } else {
                        placePiece(game.currentPiece);
                        clearLines();
                        game.currentPiece = game.nextPiece;
                        game.nextPiece = createPiece();
                        
                        // 检查游戏结束
                        if (checkCollision(game.currentPiece)) {
                            gameOver();
                            return;
                        }
                    }
                }
                game.dropTime = timestamp;
            }
            
            drawBoard();
            drawNextPiece();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (!game.isRunning) {
                initBoard();
                game.currentPiece = createPiece();
                game.nextPiece = createPiece();
                game.score = 0;
                game.level = 1;
                game.lines = 0;
                game.dropInterval = 1000;
                game.isRunning = true;
                game.isPaused = false;
                updateDisplay();
                requestAnimationFrame(gameLoop);
            }
        }

        // 暂停游戏
        function pauseGame() {
            if (game.isRunning) {
                game.isPaused = !game.isPaused;
            }
        }

        // 重新开始
        function resetGame() {
            game.isRunning = false;
            game.isPaused = false;
            startGame();
        }

        // 游戏结束
        function gameOver() {
            game.isRunning = false;
            alert('游戏结束！得分: ' + game.score);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!game.isRunning || game.isPaused || !game.currentPiece) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (!checkCollision(game.currentPiece, -1, 0)) {
                        game.currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (!checkCollision(game.currentPiece, 1, 0)) {
                        game.currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (!checkCollision(game.currentPiece, 0, 1)) {
                        game.currentPiece.y++;
                        game.score += 1;
                        updateDisplay();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotatePiece(game.currentPiece);
                    if (!checkCollision(game.currentPiece, 0, 0, rotated)) {
                        game.currentPiece.shape = rotated;
                    }
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
            
            if (game.isRunning && !game.isPaused) {
                drawBoard();
                drawNextPiece();
            }
        });

        // 初始化
        initBoard();
        drawBoard();
        updateDisplay();
    </script>
</body>
</html>
