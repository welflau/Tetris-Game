<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        #game-board {
            width: 300px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #4a90e2;
            border-radius: 10px;
            position: relative;
            margin: 0 auto;
        }

        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #level {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        #test-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .test-item {
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
        }

        .test-pass {
            background: rgba(0, 255, 0, 0.2);
            border-left: 3px solid #00ff00;
        }

        .test-fail {
            background: rgba(255, 0, 0, 0.2);
            border-left: 3px solid #ff0000;
        }

        .test-warning {
            background: rgba(255, 255, 0, 0.2);
            border-left: 3px solid #ffff00;
        }

        /* 性能监控 */
        #performance-monitor {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 10px;
            z-index: 100;
            font-size: 11px;
            backdrop-filter: blur(10px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
                margin: 10px;
            }

            #game-board {
                width: 250px;
                height: 500px;
            }

            #test-panel {
                top: 10px;
                right: 10px;
                max-width: 200px;
                font-size: 10px;
            }

            #performance-monitor {
                bottom: 10px;
                right: 10px;
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            #game-board {
                width: 200px;
                height: 400px;
            }

            .snowflake {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">分数: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <div id="game-board"></div>
        <div id="controls">
            <p>方向键: 移动和旋转</p>
            <p>空格键: 快速下落</p>
            <p>P键: 暂停/继续</p>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试面板</h3>
        <button onclick="integrationTestSuite.runIntegrationTests()">运行所有测试</button>
        <div id="test-results"></div>
    </div>

    <!-- 性能监控 -->
    <div id="performance-monitor">
        <div>FPS: <span id="fps-counter">60</span></div>
        <div>雪花数量: <span id="snowflake-count">0</span></div>
        <div>内存使用: <span id="memory-usage">N/A</span></div>
        <div>动画成本: <span id="animation-cost">低</span></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = this.getMaxSnowflakes();
                this.isActive = true;
                this.animationId = null;
                this.lastTime = 0;
                this.frameCount = 0;
                this.fps = 60;
            }

            getMaxSnowflakes() {
                const width = window.innerWidth;
                if (width < 480) return 30;
                if (width < 768) return 50;
                return 80;
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                const symbols = ['❄', '❅', '❆', '✻', '✼', '❈'];
                const types = ['type-1', 'type-2', 'type-3', 'type-4'];
                
                snowflake.className = `snowflake ${types[Math.floor(Math.random() * types.length)]}`;
                snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                
                const size = Math.random() * 0.8 + 0.6;
                snowflake.style.fontSize = `${size}em`;
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.top = '-50px';
                
                const snowflakeData = {
                    element: snowflake,
                    x: Math.random() * window.innerWidth,
                    y: -50,
                    speed: Math.random() * 2 + 1,
                    drift: Math.random() * 2 - 1,
                    rotation: 0,
                    rotationSpeed: Math.random() * 4 - 2,
                    opacity: Math.random() * 0.6 + 0.4,
                    size: size
                };
                
                snowflake.style.opacity = snowflakeData.opacity;
                this.container.appendChild(snowflake);
                this.snowflakes.push(snowflakeData);
            }

            updateSnowflakes(deltaTime) {
                for (let i = this.snowflakes.length - 1; i >= 0; i--) {
                    const flake = this.snowflakes[i];
                    
                    flake.y += flake.speed * deltaTime * 0.1;
                    flake.x += flake.drift * deltaTime * 0.05;
                    flake.rotation += flake.rotationSpeed * deltaTime * 0.1;
                    
                    if (flake.y > window.innerHeight + 50) {
                        this.container.removeChild(flake.element);
                        this.snowflakes.splice(i, 1);
                        continue;
                    }
                    
                    flake.element.style.transform = `translate(${flake.x}px, ${flake.y}px) rotate(${flake.rotation}deg)`;
                }
            }

            animate(currentTime) {
                if (!this.isActive) return;
                
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                this.frameCount++;
                
                // 计算FPS
                if (this.frameCount % 60 === 0) {
                    this.fps = Math.round(1000 / (deltaTime || 16));
                }
                
                // 创建新雪花
                if (this.snowflakes.length < this.maxSnowflakes && Math.random() < 0.3) {
                    this.createSnowflake();
                }
                
                this.updateSnowflakes(deltaTime);
                this.animationId = requestAnimationFrame(this.animate.bind(this));
            }

            start() {
                this.isActive = true;
                this.lastTime = performance.now();
                this.animate(this.lastTime);
            }

            stop() {
                this.isActive = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }

            resize() {
                this.maxSnowflakes = this.getMaxSnowflakes();
            }

            getStats() {
                return {
                    snowflakeCount: this.snowflakes.length,
                    fps: this.fps,
                    isActive: this.isActive
                };
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.results = [];
                this.testContainer = document.getElementById('test-results');
            }

            log(message, type = 'info') {
                const result = { message, type, timestamp: new Date().toLocaleTimeString() };
                this.results.push(result);
                this.updateDisplay();
            }

            updateDisplay() {
                this.testContainer.innerHTML = this.results.map(result => {
                    const className = result.type === 'pass' ? 'test-pass' : 
                                    result.type === 'fail' ? 'test-fail' : 
                                    result.type === 'warning' ? 'test-warning' : '';
                    return `<div class="test-item ${className}">[${result.timestamp}] ${result.message}</div>`;
                }).join('');
                this.testContainer.scrollTop = this.testContainer.scrollHeight;
            }

            async runIntegrationTests() {
                this.results = [];
                this.log('开始集成测试...', 'info');
                
                await this.testSnowflakeGeneration();
                await this.testAnimationPerformance();
                await this.testResponsiveDesign();
                await this.testZIndexLayering();
                
                this.log('集成测试完成', 'info');
            }

            async testSnowflakeGeneration() {
                this.log('测试雪花生成功能...', 'info');
                
                try {
                    const initialCount = snowflakeSystem.snowflakes.length;
                    
                    // 强制创建雪花
                    for (let i = 0; i < 5; i++) {
                        snowflakeSystem.createSnowflake();
                    }
                    
                    const newCount = snowflakeSystem.snowflakes.length;
                    
                    if (newCount > initialCount) {
                        this.log('✓ 雪花生成功能正常', 'pass');
                    } else {
                        this.log('✗ 雪花生成功能异常', 'fail');
                    }
                    
                    // 测试雪花元素是否正确添加到DOM
                    const domSnowflakes = document.querySelectorAll('.snowflake');
                    if (domSnowflakes.length > 0) {
                        this.log('✓ 雪花DOM元素创建正常', 'pass');
                    } else {
                        this.log('✗ 雪花DOM元素创建失败', 'fail');
                    }
                    
                } catch (error) {
                    this.log(`✗ 雪花生成测试异常: ${error.message}`, 'fail');
                }
            }

            async testAnimationPerformance() {
                this.log('测试动画性能...', 'info');
                
                try {
                    const stats = snowflakeSystem.getStats();
                    
                    if (stats.fps >= 30) {
                        this.log(`✓ FPS性能良好: ${stats.fps}`, 'pass');
                    } else if (stats.fps >= 20) {
                        this.log(`⚠ FPS性能一般: ${stats.fps}`, 'warning');
                    } else {
                        this.log(`✗ FPS性能较差: ${stats.fps}`, 'fail');
                    }
                    
                    if (stats.snowflakeCount <= snowflakeSystem.maxSnowflakes) {
                        this.log(`✓ 雪花数量控制正常: ${stats.snowflakeCount}/${snowflakeSystem.maxSnowflakes}`, 'pass');
                    } else {
                        this.log(`✗ 雪花数量超出限制: ${stats.snowflakeCount}/${snowflakeSystem.maxSnowflakes}`, 'fail');
                    }
                    
                } catch (error) {
                    this.log(`✗ 性能测试异常: ${error.message}`, 'fail');
                }
            }

            async testResponsiveDesign() {
                this.log('测试响应式设计...', 'info');
                
                try {
                    const container = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    // 测试容器尺寸
                    if (container.offsetWidth === window.innerWidth && container.offsetHeight === window.innerHeight) {
                        this.log('✓ 雪花容器尺寸正确', 'pass');
                    } else {
                        this.log('✗ 雪花容器尺寸异常', 'fail');
                    }
                    
                    // 测试z-index层级
                    const containerZIndex = parseInt(getComputedStyle(container).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    
                    if (gameZIndex > containerZIndex) {
                        this.log('✓ 层级关系正确', 'pass');
                    } else {
                        this.log('✗ 层级关系异常', 'fail');
                    }
                    
                    // 测试移动端适配
                    if (window.innerWidth < 768) {
                        const maxSnowflakes = snowflakeSystem.getMaxSnowflakes();
                        if (maxSnowflakes <= 50) {
                            this.log('✓ 移动端雪花数量优化正常', 'pass');
                        } else {
                            this.log('⚠ 移动端雪花数量可能过多', 'warning');
                        }
                    }
                    
                } catch (error) {
                    this.log(`✗ 响应式测试异常: ${error.message}`, 'fail');
                }
            }

            async testZIndexLayering() {
                this.log('测试层级关系...', 'info');
                
                try {
                    const elements = {
                        snowflake: document.getElementById('snowflake-container'),
                        game: document.getElementById('game-container'),
                        testPanel: document.getElementById('test-panel'),
                        performance: document.getElementById('performance-monitor')
                    };
                    
                    const zIndexes = {};
                    for (const [name, element] of Object.entries(elements)) {
                        zIndexes[name] = parseInt(getComputedStyle(element).zIndex) || 0;
                    }
                    
                    // 验证层级顺序
                    if (zIndexes.snowflake < zIndexes.game && 
                        zIndexes.game < zIndexes.testPanel && 
                        zIndexes.game < zIndexes.performance) {
                        this.log('✓ 所有元素层级关系正确', 'pass');
                    } else {
                        this.log('✗ 元素层级关系异常', 'fail');
                        this.log(`层级值: 雪花(${zIndexes.snowflake}) < 游戏(${zIndexes.game}) < 面板(${zIndexes.testPanel})`, 'info');
                    }
                    
                } catch (error) {
                    this.log(`✗ 层级测试异常: ${error.message}`, 'fail');
                }
            }
        }

        // 俄罗斯方块游戏集成适配
        class TetrisGameIntegration {
            constructor() {
                this.gameBoard = document.getElementById('game-board');
                this.scoreElement = document.getElementById('score');
                this.levelElement = document.getElementById('level');
                this.score = 0;
                this.level = 1;
                this.isPaused = false;
            }

            initSnowflakeBackground() {
                // 确保雪花特效在游戏后台运行
                snowflakeSystem.start();
            }

            adjustForGameUI() {
                // 根据游戏UI调整雪花特效
                const gameRect = this.gameBoard.getBoundingClientRect();
                // 可以在这里添加逻辑来避免雪花在游戏区域内过于密集
            }

            handleGameStateChanges(state) {
                switch (state) {
                    case 'pause':
                        this.isPaused = true;
                        // 可以选择暂停或继续雪花动画
                        break;
                    case 'resume':
                        this.isPaused = false;
                        break;
                    case 'gameover':
                        // 游戏结束时可以增加雪花密度营造氛围
                        break;
                }
            }

            optimizeForGameplay() {
                // 根据游戏性能需求调整雪花特效
                const stats = snowflakeSystem.getStats();
                if (stats.fps < 30) {
                    snowflakeSystem.maxSnowflakes = Math.max(20, snowflakeSystem.maxSnowflakes * 0.8);
                }
            }

            updateScore(newScore) {
                this.score = newScore;
                this.scoreElement.textContent = `分数: ${this.score}`;
            }

            updateLevel(newLevel) {
                this.level = newLevel;
                this.levelElement.textContent = `等级: ${this.level}`;
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            validateBrowserSupport() {
                const features = {
                    requestAnimationFrame: !!window.requestAnimationFrame,
                    cssAnimations: CSS.supports('animation', 'test'),
                    transform3d: CSS.supports('transform', 'translateZ(0)'),
                    backdropFilter: CSS.supports('backdrop-filter', 'blur(10px)')
                };
                
                return features;
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const hasTouch = 'ontouchstart' in window;
                
                return {
                    isMobile,
                    hasTouch,
                    screenSize: `${window.innerWidth}x${window.innerHeight}`,
                    devicePixelRatio: window.devicePixelRatio || 1
                };
            }

            checkCSSAnimationSupport() {
                return {
                    animations: CSS.supports('animation', 'test'),
                    transforms: CSS.supports('transform', 'rotate(0deg)'),
                    transitions: CSS.supports('transition', 'all 0.3s'),
                    willChange: CSS.supports('will-change', 'transform')
                };
            }

            validateResponsiveLayout() {
                const breakpoints = {
                    mobile: window.innerWidth <= 480,
                    tablet: window.innerWidth <= 768 && window.innerWidth > 480,
                    desktop: window.innerWidth > 768
                };
                
                return breakpoints;
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.fpsCounter = document.getElementById('fps-counter');
                this.snowflakeCount = document.getElementById('snowflake-count');
                this.memoryUsage = document.getElementById('memory-usage');
                this.animationCost = document.getElementById('animation-cost');
                this.lastUpdate = 0;
            }

            monitorFrameRate() {
                const stats = snowflakeSystem.getStats();
                this.fpsCounter.textContent = stats.fps;
                
                // 根据FPS设置动画成本
                if (stats.fps >= 50) {
                    this.animationCost.textContent = '低';
                    this.animationCost.style.color = '#00ff00';
                } else if (stats.fps >= 30) {
                    this.animationCost.textContent = '中';
                    this.animationCost.style.color = '#ffff00';
                } else {
                    this.animationCost.textContent = '高';
                    this.animationCost.style.color = '#ff0000';
                }
            }

            trackMemoryUsage() {
                if (performance.memory) {
                    const used = Math.round(performance.memory.usedJSHeapSize / 1048576);
                    this.memoryUsage.textContent = `${used}MB`;
                } else {
                    this.memoryUsage.textContent = 'N/A';
                }
            }

            measureAnimationCost() {
                const stats = snowflakeSystem.getStats();
                this.snowflakeCount.textContent = stats.snowflakeCount;
            }

            generatePerformanceReport() {
                const stats = snowflakeSystem.getStats();
                const compatibility = compatibilityValidator.validateBrowserSupport();
                const mobile = compatibilityValidator.testMobilePerformance();
                
                return {
                    timestamp: new Date().toISOString(),
                    performance: {
                        fps: stats.fps,
                        snowflakeCount: stats.snowflakeCount,
                        memoryUsage: performance.memory ? Math.round(performance.memory.usedJSHeapSize / 1048576) : 'N/A'
                    },
                    compatibility,
                    mobile,
                    recommendations: this.getRecommendations(stats)
                };
            }

            getRecommendations(stats) {
                const recommendations = [];
                
                if (stats.fps < 30) {
                    recommendations.push('建议减少雪花数量以提高性能');
                }
                
                if (stats.snowflakeCount > 100) {
                    recommendations.push('雪花数量过多，建议优化');
                }
                
                if (window.innerWidth < 768) {
                    recommendations.push('移动设备建议使用简化版特效');
                }
                
                return recommendations;
            }

            startMonitoring() {
                setInterval(() => {
                    this.monitorFrameRate();
                    this.trackMemoryUsage();
                    this.measureAnimationCost();
                }, 1000);
            }
        }

        // 初始化所有系统
        const snowflakeSystem = new SnowflakeSystem();
        const integrationTestSuite = new IntegrationTestSuite();
        const tetrisGameIntegration = new TetrisGameIntegration();
        const compatibilityValidator = new CompatibilityValidator();
        const performanceMonitor = new PerformanceMonitor();

        // 启动应用
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化雪花特效
            tetrisGameIntegration.initSnowflakeBackground();
            
            // 启动性能监控
            performanceMonitor.startMonitoring();
            
            // 窗口大小变化时重新调整
            window.addEventListener('resize', () => {
                snowflakeSystem.resize();
                tetrisGameIntegration.adjustForGameUI();
            });
            
            // 键盘事件处理
            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyP':
                        if (tetrisGameIntegration.isPaused) {
                            tetrisGameIntegration.handleGameStateChanges('resume');
                        } else {
                            tetrisGameIntegration.handleGameStateChanges('pause');
                        }
                        break;
                    case 'KeyT':
                        // T键运行测试
                        integrationTestSuite.runIntegrationTests();
                        break;
                }
            });
            
            // 自动运行初始测试
            setTimeout(() => {
                integrationTestSuite.runIntegrationTests();
            }, 2000);
        });

        // 模拟游戏逻辑（简化版）
        setInterval(() => {
            if (!tetrisGameIntegration.isPaused) {
                // 模拟分数增加
                if (Math.random() < 0.1) {
                    tetrisGameIntegration.updateScore(tetrisGameIntegration.score + 10);
                }
                
                // 模拟等级提升
                if (tetrisGameIntegration.score > 0 && tetrisGameIntegration.score % 100 === 0) {
                    tetrisGameIntegration.updateLevel(Math.floor(tetrisGameIntegration.score / 100) + 1);
                }
                
                // 性能优化
                tetrisGameIntegration.optimizeForGameplay();
            }
        }, 1000);
    </script>
</body>
</html>
