<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏主容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        /* 游戏画布 */
        #tetris-canvas {
            border: 3px solid #fff;
            border-radius: 10px;
            background: #000;
            display: block;
        }

        /* 游戏信息面板 */
        #game-info {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
        }

        /* 控制按钮 */
        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .control-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        #test-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .test-item {
            margin: 5px 0;
            padding: 5px;
            border-radius: 5px;
        }

        .test-pass {
            background: rgba(0, 255, 0, 0.2);
            border-left: 3px solid #00ff00;
        }

        .test-fail {
            background: rgba(255, 0, 0, 0.2);
            border-left: 3px solid #ff0000;
        }

        .test-warning {
            background: rgba(255, 255, 0, 0.2);
            border-left: 3px solid #ffff00;
        }

        /* 性能监控器 */
        #performance-monitor {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            font-size: 11px;
            backdrop-filter: blur(10px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
                margin: 10px;
            }

            #tetris-canvas {
                width: 280px;
                height: 560px;
            }

            #test-panel {
                top: 10px;
                right: 10px;
                max-width: 250px;
                font-size: 11px;
            }

            #performance-monitor {
                bottom: 10px;
                left: 10px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            #tetris-canvas {
                width: 240px;
                height: 480px;
            }

            .control-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>

    <!-- 游戏主容器 -->
    <div id="game-container">
        <canvas id="tetris-canvas" width="320" height="640"></canvas>
        <div id="game-info">
            <div>分数: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
            <div>行数: <span id="lines">0</span></div>
        </div>
        <div id="controls">
            <button class="control-btn" onclick="tetrisGame.start()">开始</button>
            <button class="control-btn" onclick="tetrisGame.pause()">暂停</button>
            <button class="control-btn" onclick="tetrisGame.reset()">重置</button>
            <button class="control-btn" onclick="snowflakeEffect.toggle()">雪花开关</button>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试面板</h3>
        <button class="control-btn" onclick="integrationTestSuite.runAllTests()">运行所有测试</button>
        <div id="test-results"></div>
    </div>

    <!-- 性能监控器 -->
    <div id="performance-monitor">
        <div>FPS: <span id="fps-counter">60</span></div>
        <div>雪花数量: <span id="snowflake-count">0</span></div>
        <div>内存使用: <span id="memory-usage">-</span></div>
        <div>动画成本: <span id="animation-cost">低</span></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeEffect {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.isActive = true;
                this.maxSnowflakes = this.getMaxSnowflakes();
                this.animationId = null;
                this.lastTime = 0;
                this.snowflakeTypes = ['❄', '❅', '❆', '✻', '✼', '❋'];
                this.init();
            }

            getMaxSnowflakes() {
                const width = window.innerWidth;
                if (width < 480) return 30;
                if (width < 768) return 50;
                return 80;
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
                window.addEventListener('resize', () => this.handleResize());
            }

            createSnowflakes() {
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    this.createSnowflake();
                }
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                snowflake.innerHTML = this.snowflakeTypes[Math.floor(Math.random() * this.snowflakeTypes.length)];
                
                const size = Math.random() * 0.8 + 0.6;
                snowflake.style.fontSize = `${size}em`;
                snowflake.style.left = `${Math.random() * 100}%`;
                snowflake.style.top = `-20px`;
                
                const snowflakeData = {
                    element: snowflake,
                    x: Math.random() * window.innerWidth,
                    y: -20,
                    speed: Math.random() * 2 + 1,
                    drift: Math.random() * 2 - 1,
                    rotation: 0,
                    rotationSpeed: Math.random() * 4 - 2
                };
                
                this.snowflakes.push(snowflakeData);
                this.container.appendChild(snowflake);
            }

            updateSnowflakes(deltaTime) {
                this.snowflakes.forEach(snowflake => {
                    snowflake.y += snowflake.speed * deltaTime * 0.1;
                    snowflake.x += snowflake.drift * deltaTime * 0.05;
                    snowflake.rotation += snowflake.rotationSpeed * deltaTime * 0.1;
                    
                    if (snowflake.y > window.innerHeight + 20) {
                        snowflake.y = -20;
                        snowflake.x = Math.random() * window.innerWidth;
                    }
                    
                    if (snowflake.x > window.innerWidth + 20) {
                        snowflake.x = -20;
                    } else if (snowflake.x < -20) {
                        snowflake.x = window.innerWidth + 20;
                    }
                    
                    snowflake.element.style.transform = 
                        `translate(${snowflake.x}px, ${snowflake.y}px) rotate(${snowflake.rotation}deg)`;
                });
            }

            startAnimation() {
                const animate = (currentTime) => {
                    if (!this.isActive) return;
                    
                    const deltaTime = currentTime - this.lastTime;
                    this.lastTime = currentTime;
                    
                    this.updateSnowflakes(deltaTime);
                    
                    this.animationId = requestAnimationFrame(animate);
                };
                
                this.animationId = requestAnimationFrame(animate);
            }

            toggle() {
                this.isActive = !this.isActive;
                if (this.isActive) {
                    this.container.style.display = 'block';
                    this.startAnimation();
                } else {
                    this.container.style.display = 'none';
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                    }
                }
            }

            handleResize() {
                const newMax = this.getMaxSnowflakes();
                if (newMax > this.maxSnowflakes) {
                    for (let i = this.maxSnowflakes; i < newMax; i++) {
                        this.createSnowflake();
                    }
                } else if (newMax < this.maxSnowflakes) {
                    const toRemove = this.snowflakes.splice(newMax);
                    toRemove.forEach(snowflake => {
                        this.container.removeChild(snowflake.element);
                    });
                }
                this.maxSnowflakes = newMax;
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 简化的俄罗斯方块游戏
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('tetris-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.draw();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning || this.isPaused) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                        case 'ArrowRight':
                        case 'ArrowDown':
                        case 'ArrowUp':
                            e.preventDefault();
                            break;
                    }
                });
            }

            start() {
                this.isRunning = true;
                this.isPaused = false;
                this.gameLoop();
            }

            pause() {
                this.isPaused = !this.isPaused;
            }

            reset() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.updateUI();
                this.draw();
            }

            gameLoop() {
                if (!this.isRunning || this.isPaused) {
                    if (this.isRunning) {
                        setTimeout(() => this.gameLoop(), 100);
                    }
                    return;
                }
                
                this.update();
                this.draw();
                
                setTimeout(() => this.gameLoop(), 1000 - (this.level - 1) * 100);
            }

            update() {
                // 简化的游戏逻辑
                if (Math.random() < 0.1) {
                    this.score += 10;
                    this.lines += Math.floor(Math.random() * 2);
                    this.level = Math.floor(this.lines / 10) + 1;
                }
                this.updateUI();
            }

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x < this.canvas.width; x += 32) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.canvas.height; y += 32) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制一些随机方块作为演示
                if (this.isRunning && !this.isPaused) {
                    this.ctx.fillStyle = '#ff0000';
                    for (let i = 0; i < 5; i++) {
                        const x = Math.floor(Math.random() * 10) * 32;
                        const y = Math.floor(Math.random() * 20) * 32;
                        this.ctx.fillRect(x, y, 32, 32);
                    }
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.testResults = [];
                this.resultsContainer = document.getElementById('test-results');
            }

            async runAllTests() {
                this.clearResults();
                this.addResult('开始集成测试...', 'info');
                
                await this.testSnowflakeGeneration();
                await this.testAnimationPerformance();
                await this.testResponsiveDesign();
                await this.testZIndexLayering();
                await this.testGameIntegration();
                
                this.addResult('所有测试完成', 'info');
            }

            async testSnowflakeGeneration() {
                try {
                    const initialCount = snowflakeEffect.getSnowflakeCount();
                    
                    if (initialCount > 0) {
                        this.addResult(`✓ 雪花生成测试通过 (${initialCount}个雪花)`, 'pass');
                    } else {
                        this.addResult('✗ 雪花生成测试失败', 'fail');
                    }
                    
                    // 测试雪花类型多样性
                    const container = document.getElementById('snowflake-container');
                    const snowflakes = container.querySelectorAll('.snowflake');
                    const types = new Set();
                    
                    snowflakes.forEach(flake => {
                        types.add(flake.innerHTML);
                    });
                    
                    if (types.size > 1) {
                        this.addResult(`✓ 雪花类型多样性测试通过 (${types.size}种类型)`, 'pass');
                    } else {
                        this.addResult('⚠ 雪花类型单一', 'warning');
                    }
                    
                } catch (error) {
                    this.addResult(`✗ 雪花生成测试异常: ${error.message}`, 'fail');
                }
            }

            async testAnimationPerformance() {
                try {
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    const testAnimation = () => {
                        frameCount++;
                        if (frameCount < 60) {
                            requestAnimationFrame(testAnimation);
                        } else {
                            const endTime = performance.now();
                            const fps = 1000 / ((endTime - startTime) / frameCount);
                            
                            if (fps > 30) {
                                this.addResult(`✓ 动画性能测试通过 (${fps.toFixed(1)} FPS)`, 'pass');
                            } else {
                                this.addResult(`⚠ 动画性能较低 (${fps.toFixed(1)} FPS)`, 'warning');
                            }
                        }
                    };
                    
                    requestAnimationFrame(testAnimation);
                    
                } catch (error) {
                    this.addResult(`✗ 动画性能测试异常: ${error.message}`, 'fail');
                }
            }

            async testResponsiveDesign() {
                try {
                    const originalWidth = window.innerWidth;
                    
                    // 测试不同屏幕尺寸下的雪花数量调整
                    const mobileMax = snowflakeEffect.getMaxSnowflakes();
                    
                    if (mobileMax > 0 && mobileMax <= 100) {
                        this.addResult(`✓ 响应式设计测试通过 (最大${mobileMax}个雪花)`, 'pass');
                    } else {
                        this.addResult('⚠ 雪花数量可能过多', 'warning');
                    }
                    
                    // 测试CSS媒体查询
                    const gameContainer = document.getElementById('game-container');
                    const computedStyle = window.getComputedStyle(gameContainer);
                    
                    if (computedStyle.padding) {
                        this.addResult('✓ CSS响应式样式加载正常', 'pass');
                    } else {
                        this.addResult('✗ CSS响应式样式异常', 'fail');
                    }
                    
                } catch (error) {
                    this.addResult(`✗ 响应式设计测试异常: ${error.message}`, 'fail');
                }
            }

            async testZIndexLayering() {
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowZIndex = parseInt(window.getComputedStyle(snowContainer).zIndex);
                    const gameZIndex = parseInt(window.getComputedStyle(gameContainer).zIndex);
                    const panelZIndex = parseInt(window.getComputedStyle(testPanel).zIndex);
                    
                    if (snowZIndex < gameZIndex && gameZIndex < panelZIndex) {
                        this.addResult(`✓ Z-Index层级测试通过 (${snowZIndex} < ${gameZIndex} < ${panelZIndex})`, 'pass');
                    } else {
                        this.addResult(`⚠ Z-Index层级可能有问题 (${snowZIndex}, ${gameZIndex}, ${panelZIndex})`, 'warning');
                    }
                    
                } catch (error) {
                    this.addResult(`✗ Z-Index层级测试异常: ${error.message}`, 'fail');
                }
            }

            async testGameIntegration() {
                try {
                    // 测试游戏是否正常初始化
                    if (tetrisGame && tetrisGame.canvas) {
                        this.addResult('✓ 游戏集成测试通过', 'pass');
                    } else {
                        this.addResult('✗ 游戏集成测试失败', 'fail');
                    }
                    
                    // 测试雪花开关功能
                    const originalState = snowflakeEffect.isActive;
                    snowflakeEffect.toggle();
                    
                    if (snowflakeEffect.isActive !== originalState) {
                        snowflakeEffect.toggle(); // 恢复原状态
                        this.addResult('✓ 雪花开关功能测试通过', 'pass');
                    } else {
                        this.addResult('✗ 雪花开关功能测试失败', 'fail');
                    }
                    
                } catch (error) {
                    this.addResult(`✗ 游戏集成测试异常: ${error.message}`, 'fail');
                }
            }

            addResult(message, type) {
                const resultElement = document.createElement('div');
                resultElement.className = `test-item test-${type}`;
                resultElement.textContent = message;
                this.resultsContainer.appendChild(resultElement);
                this.resultsContainer.scrollTop = this.resultsContainer.scrollHeight;
            }

            clearResults() {
                this.resultsContainer.innerHTML = '';
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.fpsCounter = document.getElementById('fps-counter');
                this.snowflakeCounter = document.getElementById('snowflake-count');
                this.memoryUsage = document.getElementById('memory-usage');
                this.animationCost = document.getElementById('animation-cost');
                
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 60;
                
                this.startMonitoring();
            }

            startMonitoring() {
                const monitor = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        this.fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                        
                        this.updateDisplay();
                    }
                    
                    requestAnimationFrame(monitor);
                };
                
                requestAnimationFrame(monitor);
            }

            updateDisplay() {
                this.fpsCounter.textContent = this.fps;
                this.snowflakeCounter.textContent = snowflakeEffect.getSnowflakeCount();
                
                // 内存使用情况（如果支持）
                if (performance.memory) {
                    const used = Math.round(performance.memory.usedJSHeapSize / 1048576);
                    this.memoryUsage.textContent = `${used}MB`;
                } else {
                    this.memoryUsage.textContent = '不支持';
                }
                
                // 动画成本评估
                if (this.fps > 50) {
                    this.animationCost.textContent = '低';
                    this.animationCost.style.color = '#00ff00';
                } else if (this.fps > 30) {
                    this.animationCost.textContent = '中';
                    this.animationCost.style.color = '#ffff00';
                } else {
                    this.animationCost.textContent = '高';
                    this.animationCost.style.color = '#ff0000';
                }
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            constructor() {
                this.checkBrowserSupport();
            }

            checkBrowserSupport() {
                const features = {
                    'CSS动画': this.checkCSSAnimationSupport(),
                    'RequestAnimationFrame': typeof requestAnimationFrame !== 'undefined',
                    'Canvas': this.checkCanvasSupport(),
                    'CSS变换': this.checkCSSTransformSupport(),
                    '性能API': typeof performance !== 'undefined'
                };
                
                console.log('浏览器兼容性检查:', features);
                
                const unsupported = Object.entries(features)
                    .filter(([key, value]) => !value)
                    .map(([key]) => key);
                
                if (unsupported.length > 0) {
                    console.warn('不支持的功能:', unsupported);
                }
            }

            checkCSSAnimationSupport() {
                const element = document.createElement('div');
                return 'animationName' in element.style ||
                       'webkitAnimationName' in element.style ||
                       'mozAnimationName' in element.style;
            }

            checkCanvasSupport() {
                const canvas = document.createElement('canvas');
                return !!(canvas.getContext && canvas.getContext('2d'));
            }

            checkCSSTransformSupport() {
                const element = document.createElement('div');
                return 'transform' in element.style ||
                       'webkitTransform' in element.style ||
                       'mozTransform' in element.style;
            }
        }

        // 初始化所有系统
        let snowflakeEffect, tetrisGame, integrationTestSuite, performanceMonitor, compatibilityValidator;

        document.addEventListener('DOMContentLoaded', () => {
            try {
                snowflakeEffect = new SnowflakeEffect();
                tetrisGame = new TetrisGame();
                integrationTestSuite = new IntegrationTestSuite();
                performanceMonitor = new PerformanceMonitor();
                compatibilityValidator = new CompatibilityValidator();
                
                console.log('所有系统初始化完成');
                
                // 自动运行一次集成测试
                setTimeout(() => {
                    integrationTestSuite.runAllTests();
                }, 2000);
                
            } catch (error) {
                console.error('系统初始化失败:', error);
            }
        });
    </script>
</body>
</html>
