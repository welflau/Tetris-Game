<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.5rem;
            margin-bottom: 15px;
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: aaaGlow 3s ease-in-out infinite alternate, gradientShift 4s ease-in-out infinite;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff,
                    0 0 60px #00ffff;
            }
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b,
                    0 0 70px #ff6b6b;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 测试控制面板样式 */
        .test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            max-width: 300px;
            z-index: 1000;
            border: 1px solid #333;
        }

        .test-controls {
            margin-bottom: 10px;
        }

        .test-controls button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        .test-controls button:hover {
            background: #45a049;
        }

        .test-results {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px;
            border-radius: 3px;
        }

        .test-pass {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }

        .test-fail {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .test-info {
            background: rgba(33, 150, 243, 0.3);
            color: #2196F3;
        }

        /* 响应式测试样式 */
        @media (max-width: 768px) {
            .game-title, .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .test-panel {
                position: relative;
                top: auto;
                right: auto;
                margin: 20px auto;
                max-width: 90%;
            }
        }

        @media (max-width: 480px) {
            .game-title, .aaa-title {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }
            
            body {
                padding: 10px;
            }
        }

        @media (max-width: 320px) {
            .game-title, .aaa-title {
                font-size: 1.5rem;
                letter-spacing: 0.1rem;
            }
        }

        /* 高对比度模式支持 */
        @media (prefers-contrast: high) {
            .game-title {
                color: #ffffff;
                text-shadow: 2px 2px 4px #000000;
            }
            
            .aaa-title {
                color: #ffffff;
                text-shadow: 2px 2px 4px #000000;
            }
        }

        /* 减少动画模式支持 */
        @media (prefers-reduced-motion: reduce) {
            .game-title, .aaa-title {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="game-title" id="gameTitle">俄罗斯方块</h1>
        <h2 class="aaa-title" id="aaaTitle">AAA级游戏</h2>
    </div>

    <!-- 测试控制面板 -->
    <div class="test-panel" id="testPanel">
        <div class="test-controls">
            <button onclick="testFramework.runAllTests()">运行所有测试</button>
            <button onclick="testFramework.runCompatibilityTests()">兼容性测试</button>
            <button onclick="testFramework.runVisualTests()">视觉测试</button>
            <button onclick="testFramework.runPerformanceTests()">性能测试</button>
            <button onclick="testFramework.clearResults()">清除结果</button>
        </div>
        <div class="test-results" id="testResults">
            <div class="test-info">点击按钮开始测试...</div>
        </div>
    </div>

    <script>
        // 测试框架模块
        class TestFramework {
            constructor() {
                this.testCases = [];
                this.results = [];
                this.resultsContainer = document.getElementById('testResults');
            }

            addTestCase(name, testFunction) {
                this.testCases.push({ name, testFunction });
            }

            async runTests() {
                this.clearResults();
                this.addResult('开始运行测试...', 'info');
                
                for (const testCase of this.testCases) {
                    try {
                        const result = await testCase.testFunction();
                        this.addResult(`✓ ${testCase.name}: ${result}`, 'pass');
                    } catch (error) {
                        this.addResult(`✗ ${testCase.name}: ${error.message}`, 'fail');
                    }
                }
                
                this.generateReport();
            }

            addResult(message, type) {
                const resultDiv = document.createElement('div');
                resultDiv.className = `test-result test-${type}`;
                resultDiv.textContent = message;
                this.resultsContainer.appendChild(resultDiv);
                this.resultsContainer.scrollTop = this.resultsContainer.scrollHeight;
            }

            clearResults() {
                this.resultsContainer.innerHTML = '';
                this.results = [];
            }

            generateReport() {
                const passCount = this.resultsContainer.querySelectorAll('.test-pass').length;
                const failCount = this.resultsContainer.querySelectorAll('.test-fail').length;
                const total = passCount + failCount;
                
                this.addResult(`测试完成: ${passCount}/${total} 通过`, total === passCount ? 'pass' : 'fail');
            }

            async runAllTests() {
                this.testCases = [];
                
                // 添加所有测试用例
                this.addCompatibilityTests();
                this.addVisualTests();
                this.addPerformanceTests();
                
                await this.runTests();
            }

            async runCompatibilityTests() {
                this.testCases = [];
                this.addCompatibilityTests();
                await this.runTests();
            }

            async runVisualTests() {
                this.testCases = [];
                this.addVisualTests();
                await this.runTests();
            }

            async runPerformanceTests() {
                this.testCases = [];
                this.addPerformanceTests();
                await this.runTests();
            }

            addCompatibilityTests() {
                // 浏览器兼容性测试
                this.addTestCase('CSS Grid支持检测', () => {
                    return CSS.supports('display', 'grid') ? '支持CSS Grid' : '不支持CSS Grid';
                });

                this.addTestCase('CSS动画支持检测', () => {
                    return CSS.supports('animation', 'none') ? '支持CSS动画' : '不支持CSS动画';
                });

                this.addTestCase('文本阴影支持检测', () => {
                    return CSS.supports('text-shadow', '0 0 10px #000') ? '支持文本阴影' : '不支持文本阴影';
                });

                this.addTestCase('背景渐变支持检测', () => {
                    return CSS.supports('background', 'linear-gradient(45deg, red, blue)') ? '支持背景渐变' : '不支持背景渐变';
                });

                this.addTestCase('Flexbox支持检测', () => {
                    return CSS.supports('display', 'flex') ? '支持Flexbox' : '不支持Flexbox';
                });

                this.addTestCase('媒体查询支持检测', () => {
                    return window.matchMedia ? '支持媒体查询' : '不支持媒体查询';
                });

                this.addTestCase('视口单位支持检测', () => {
                    return CSS.supports('width', '100vh') ? '支持视口单位' : '不支持视口单位';
                });

                this.addTestCase('响应式布局测试', () => {
                    const width = window.innerWidth;
                    if (width <= 320) return '超小屏幕布局';
                    if (width <= 480) return '小屏幕布局';
                    if (width <= 768) return '平板布局';
                    return '桌面布局';
                });
            }

            addVisualTests() {
                // 视觉回归测试
                this.addTestCase('标题元素存在性检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const aaaTitle = document.getElementById('aaaTitle');
                    if (!gameTitle) throw new Error('游戏标题元素不存在');
                    if (!aaaTitle) throw new Error('AAA标题元素不存在');
                    return '标题元素存在';
                });

                this.addTestCase('标题样式计算检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    const fontSize = computedStyle.fontSize;
                    const color = computedStyle.color;
                    return `字体大小: ${fontSize}, 颜色: ${color}`;
                });

                this.addTestCase('动画状态检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    const animationName = computedStyle.animationName;
                    return animationName !== 'none' ? `动画运行: ${animationName}` : '无动画';
                });

                this.addTestCase('文本阴影效果检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    const textShadow = computedStyle.textShadow;
                    return textShadow !== 'none' ? '文本阴影已应用' : '无文本阴影';
                });

                this.addTestCase('布局偏移检测', () => {
                    const titleContainer = document.querySelector('.title-container');
                    const rect = titleContainer.getBoundingClientRect();
                    return `位置: top=${Math.round(rect.top)}, left=${Math.round(rect.left)}`;
                });

                this.addTestCase('字体渲染检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    const fontFamily = computedStyle.fontFamily;
                    return `字体族: ${fontFamily}`;
                });
            }

            addPerformanceTests() {
                // 性能监控测试
                this.addTestCase('渲染时间测量', () => {
                    const startTime = performance.now();
                    const gameTitle = document.getElementById('gameTitle');
                    gameTitle.style.display = 'none';
                    gameTitle.offsetHeight; // 强制重排
                    gameTitle.style.display = 'block';
                    gameTitle.offsetHeight; // 强制重排
                    const endTime = performance.now();
                    return `渲染时间: ${(endTime - startTime).toFixed(2)}ms`;
                });

                this.addTestCase('动画性能检查', () => {
                    return new Promise((resolve) => {
                        const gameTitle = document.getElementById('gameTitle');
                        let frameCount = 0;
                        const startTime = performance.now();
                        
                        function countFrames() {
                            frameCount++;
                            if (performance.now() - startTime < 1000) {
                                requestAnimationFrame(countFrames);
                            } else {
                                resolve(`动画帧率: ${frameCount} FPS`);
                            }
                        }
                        
                        requestAnimationFrame(countFrames);
                    });
                });

                this.addTestCase('内存使用检查', () => {
                    if (performance.memory) {
                        const used = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                        const total = Math.round(performance.memory.totalJSHeapSize / 1024 / 1024);
                        return `内存使用: ${used}MB / ${total}MB`;
                    }
                    return '内存信息不可用';
                });

                this.addTestCase('页面加载影响检查', () => {
                    const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
                    return `页面加载时间: ${loadTime}ms`;
                });

                this.addTestCase('CSS动画流畅度检查', () => {
                    return new Promise((resolve) => {
                        const gameTitle = document.getElementById('gameTitle');
                        const observer = new PerformanceObserver((list) => {
                            const entries = list.getEntries();
                            const longTasks = entries.filter(entry => entry.duration > 50);
                            observer.disconnect();
                            resolve(longTasks.length === 0 ? '动画流畅' : `检测到${longTasks.length}个长任务`);
                        });
                        
                        if ('PerformanceObserver' in window) {
                            observer.observe({ entryTypes: ['longtask'] });
                            setTimeout(() => {
                                observer.disconnect();
                                resolve('性能监控完成');
                            }, 2000);
                        } else {
                            resolve('不支持性能监控API');
                        }
                    });
                });
            }
        }

        // 兼容性测试模块
        class CompatibilityTester {
            static checkBrowserSupport() {
                const features = {
                    'CSS Grid': CSS.supports('display', 'grid'),
                    'CSS Flexbox': CSS.supports('display', 'flex'),
                    'CSS Animations': CSS.supports('animation', 'none'),
                    'CSS Transforms': CSS.supports('transform', 'rotate(45deg)'),
                    'CSS Gradients': CSS.supports('background', 'linear-gradient(red, blue)'),
                    'Media Queries': !!window.matchMedia,
                    'Viewport Units': CSS.supports('width', '100vw')
                };
                
                return features;
            }

            static testResponsiveLayout() {
                const breakpoints = {
                    mobile: window.matchMedia('(max-width: 480px)').matches,
                    tablet: window.matchMedia('(max-width: 768px)').matches,
                    desktop: window.matchMedia('(min-width: 769px)').matches
                };
                
                return breakpoints;
            }

            static validateCSSProperties() {
                const gameTitle = document.getElementById('gameTitle');
                const computedStyle = window.getComputedStyle(gameTitle);
                
                return {
                    fontSize: computedStyle.fontSize,
                    color: computedStyle.color,
                    textShadow: computedStyle.textShadow,
                    animation: computedStyle.animationName,
                    fontFamily: computedStyle.fontFamily
                };
            }
        }

        // 视觉回归测试模块
        class VisualTester {
            static captureScreenshot() {
                // 模拟截图功能（实际项目中需要使用专门的截图工具）
                const titleContainer = document.querySelector('.title-container');
                const rect = titleContainer.getBoundingClientRect();
                
                return {
                    width: rect.width,
                    height: rect.height,
                    top: rect.top,
                    left: rect.left
                };
            }

            static compareVisuals(baseline, current) {
                // 简单的视觉对比（实际项目中需要更复杂的图像对比算法）
                const tolerance = 5;
                
                return {
                    widthDiff: Math.abs(baseline.width - current.width) < tolerance,
                    heightDiff: Math.abs(baseline.height - current.height) < tolerance,
                    positionDiff: Math.abs(baseline.top - current.top) < tolerance
                };
            }

            static detectLayoutShift() {
                return new Promise((resolve) => {
                    if ('LayoutShift' in window) {
                        const observer = new PerformanceObserver((list) => {
                            const entries = list.getEntries();
                            const totalShift = entries.reduce((sum, entry) => sum + entry.value, 0);
                            observer.disconnect();
                            resolve(totalShift);
                        });
                        
                        observer.observe({ entryTypes: ['layout-shift'] });
                        
                        setTimeout(() => {
                            observer.disconnect();
                            resolve(0);
                        }, 3000);
                    } else {
                        resolve('不支持布局偏移检测');
                    }
                });
            }
        }

        // 性能监控模块
        class PerformanceMonitor {
            static measureRenderTime() {
                const startTime = performance.now();
                
                // 触发重排和重绘
                const gameTitle = document.getElementById('gameTitle');
                gameTitle.style.display = 'none';
                gameTitle.offsetHeight;
                gameTitle.style.display = 'block';
                gameTitle.offsetHeight;
                
                const endTime = performance.now();
                return endTime - startTime;
            }

            static checkAnimationPerformance() {
                return new Promise((resolve) => {
                    let frameCount = 0;
                    const startTime = performance.now();
                    
                    function countFrames() {
                        frameCount++;
                        if (performance.now() - startTime < 1000) {
                            requestAnimationFrame(countFrames);
                        } else {
                            resolve(frameCount);
                        }
                    }
                    
                    requestAnimationFrame(countFrames);
                });
            }

            static monitorLoadImpact() {
                const navigation = performance.getEntriesByType('navigation')[0];
                
                return {
                    domContentLoaded: navigation.domContentLoadedEventEnd - navigation.domContentLoadedEventStart,
                    loadComplete: navigation.loadEventEnd - navigation.loadEventStart,
                    totalTime: navigation.loadEventEnd - navigation.fetchStart
                };
            }
        }

        // 初始化测试框架
        const testFramework = new TestFramework();

        // 页面加载完成后运行基础检查
        window.addEventListener('load', () => {
            setTimeout(() => {
                testFramework.addResult('页面加载完成，测试框架已就绪', 'info');
                testFramework.addResult('浏览器: ' + navigator.userAgent.split(' ').slice(-1)[0], 'info');
                testFramework.addResult('屏幕尺寸: ' + window.innerWidth + 'x' + window.innerHeight, 'info');
                testFramework.addResult('设备像素比: ' + window.devicePixelRatio, 'info');
            }, 1000);
        });

        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            testFramework.addResult('窗口大小变化: ' + window.innerWidth + 'x' + window.innerHeight, 'info');
        });

        // 监听设备方向变化
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                testFramework.addResult('设备方向变化: ' + window.orientation + '度', 'info');
            }, 100);
        });
    </script>
</body>
</html>
