<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.5rem;
            margin-bottom: 15px;
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: aaaGlow 3s ease-in-out infinite alternate, gradientShift 4s ease-in-out infinite;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff,
                    0 0 60px #00ffff;
            }
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b,
                    0 0 70px #ff6b6b;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-title, .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
        }

        @media (max-width: 480px) {
            .game-title, .aaa-title {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }
        }

        @media (max-width: 320px) {
            .game-title, .aaa-title {
                font-size: 1.5rem;
                letter-spacing: 0.1rem;
            }
        }

        /* 测试控制面板样式 */
        .test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            z-index: 1000;
        }

        .test-controls {
            margin-bottom: 10px;
        }

        .test-controls button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        .test-controls button:hover {
            background: #45a049;
        }

        .test-results {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
        }

        .test-result {
            margin: 2px 0;
            padding: 2px;
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-info {
            color: #2196F3;
        }

        /* 设备模拟器样式 */
        .device-simulator {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .device-buttons button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 5px 8px;
            margin: 2px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }

        .device-buttons button:hover {
            background: #1976D2;
        }

        .device-buttons button.active {
            background: #FF9800;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="game-title" id="gameTitle">俄罗斯方块</h1>
        <h2 class="aaa-title" id="aaaTitle">AAA级游戏</h2>
    </div>

    <!-- 测试控制面板 -->
    <div class="test-panel" id="testPanel">
        <div class="test-controls">
            <button onclick="testFramework.runAllTests()">运行全部测试</button>
            <button onclick="testFramework.runCompatibilityTests()">兼容性测试</button>
            <button onclick="testFramework.runVisualTests()">视觉测试</button>
            <button onclick="testFramework.runPerformanceTests()">性能测试</button>
            <button onclick="testFramework.clearResults()">清除结果</button>
        </div>
        <div class="test-results" id="testResults">
            <div class="test-info">点击按钮开始测试...</div>
        </div>
    </div>

    <!-- 设备模拟器 -->
    <div class="device-simulator" id="deviceSimulator">
        <div>设备模拟器:</div>
        <div class="device-buttons">
            <button onclick="deviceSimulator.setViewport('desktop')" class="active">桌面</button>
            <button onclick="deviceSimulator.setViewport('tablet')">平板</button>
            <button onclick="deviceSimulator.setViewport('mobile')">手机</button>
            <button onclick="deviceSimulator.setViewport('small')">小屏</button>
        </div>
    </div>

    <script>
        // 测试框架模块
        class TestFramework {
            constructor() {
                this.testCases = [];
                this.results = [];
            }

            addTestCase(name, testFunction) {
                this.testCases.push({ name, testFunction });
            }

            async runTests() {
                this.results = [];
                for (const testCase of this.testCases) {
                    try {
                        const result = await testCase.testFunction();
                        this.results.push({
                            name: testCase.name,
                            status: result ? 'pass' : 'fail',
                            message: result === true ? '通过' : result || '失败'
                        });
                    } catch (error) {
                        this.results.push({
                            name: testCase.name,
                            status: 'fail',
                            message: error.message
                        });
                    }
                }
                this.generateReport();
            }

            generateReport() {
                const resultsContainer = document.getElementById('testResults');
                resultsContainer.innerHTML = '';
                
                this.results.forEach(result => {
                    const div = document.createElement('div');
                    div.className = `test-result test-${result.status}`;
                    div.textContent = `${result.name}: ${result.message}`;
                    resultsContainer.appendChild(div);
                });

                const summary = document.createElement('div');
                summary.className = 'test-result test-info';
                const passCount = this.results.filter(r => r.status === 'pass').length;
                summary.textContent = `测试完成: ${passCount}/${this.results.length} 通过`;
                resultsContainer.insertBefore(summary, resultsContainer.firstChild);
            }

            async runAllTests() {
                this.testCases = [];
                this.setupAllTests();
                await this.runTests();
            }

            async runCompatibilityTests() {
                this.testCases = [];
                this.setupCompatibilityTests();
                await this.runTests();
            }

            async runVisualTests() {
                this.testCases = [];
                this.setupVisualTests();
                await this.runTests();
            }

            async runPerformanceTests() {
                this.testCases = [];
                this.setupPerformanceTests();
                await this.runTests();
            }

            clearResults() {
                document.getElementById('testResults').innerHTML = '<div class="test-info">结果已清除</div>';
            }

            setupAllTests() {
                this.setupCompatibilityTests();
                this.setupVisualTests();
                this.setupPerformanceTests();
            }

            setupCompatibilityTests() {
                this.addTestCase('CSS动画支持', () => {
                    return CSS.supports('animation', 'test 1s');
                });

                this.addTestCase('CSS渐变支持', () => {
                    return CSS.supports('background', 'linear-gradient(45deg, red, blue)');
                });

                this.addTestCase('CSS文字阴影支持', () => {
                    return CSS.supports('text-shadow', '0 0 10px red');
                });

                this.addTestCase('CSS背景裁剪支持', () => {
                    return CSS.supports('-webkit-background-clip', 'text') || CSS.supports('background-clip', 'text');
                });

                this.addTestCase('响应式查询支持', () => {
                    return window.matchMedia('(max-width: 768px)').matches !== undefined;
                });

                this.addTestCase('视口元标签检查', () => {
                    const viewport = document.querySelector('meta[name="viewport"]');
                    return viewport && viewport.content.includes('width=device-width');
                });
            }

            setupVisualTests() {
                this.addTestCase('标题元素存在', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const aaaTitle = document.getElementById('aaaTitle');
                    return gameTitle && aaaTitle;
                });

                this.addTestCase('标题样式应用', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    return computedStyle.fontSize && computedStyle.color && computedStyle.textShadow !== 'none';
                });

                this.addTestCase('动画运行检查', () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const computedStyle = window.getComputedStyle(gameTitle);
                    return computedStyle.animationName !== 'none';
                });

                this.addTestCase('响应式字体大小', async () => {
                    const originalWidth = window.innerWidth;
                    const gameTitle = document.getElementById('gameTitle');
                    
                    // 模拟小屏幕
                    deviceSimulator.setViewport('mobile');
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    const mobileStyle = window.getComputedStyle(gameTitle);
                    const mobileFontSize = parseFloat(mobileStyle.fontSize);
                    
                    // 恢复原始尺寸
                    deviceSimulator.setViewport('desktop');
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    const desktopStyle = window.getComputedStyle(gameTitle);
                    const desktopFontSize = parseFloat(desktopStyle.fontSize);
                    
                    return mobileFontSize < desktopFontSize;
                });

                this.addTestCase('布局居中检查', () => {
                    const titleContainer = document.querySelector('.title-container');
                    const computedStyle = window.getComputedStyle(titleContainer);
                    return computedStyle.textAlign === 'center';
                });
            }

            setupPerformanceTests() {
                this.addTestCase('页面加载性能', () => {
                    const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
                    return loadTime < 3000; // 3秒内加载完成
                });

                this.addTestCase('动画性能检查', async () => {
                    const startTime = performance.now();
                    const gameTitle = document.getElementById('gameTitle');
                    
                    // 触发重绘
                    gameTitle.style.transform = 'scale(1.1)';
                    await new Promise(resolve => requestAnimationFrame(resolve));
                    gameTitle.style.transform = 'scale(1)';
                    
                    const endTime = performance.now();
                    return (endTime - startTime) < 16; // 小于一帧时间
                });

                this.addTestCase('内存使用检查', () => {
                    if (performance.memory) {
                        const memoryUsage = performance.memory.usedJSHeapSize / 1024 / 1024;
                        return memoryUsage < 50; // 小于50MB
                    }
                    return true; // 如果不支持内存API，默认通过
                });

                this.addTestCase('CSS动画流畅度', async () => {
                    const gameTitle = document.getElementById('gameTitle');
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    return new Promise(resolve => {
                        function countFrames() {
                            frameCount++;
                            if (performance.now() - startTime < 1000) {
                                requestAnimationFrame(countFrames);
                            } else {
                                resolve(frameCount > 30); // 至少30fps
                            }
                        }
                        requestAnimationFrame(countFrames);
                    });
                });
            }
        }

        // 设备模拟器模块
        class DeviceSimulator {
            constructor() {
                this.currentDevice = 'desktop';
            }

            setViewport(deviceType) {
                const body = document.body;
                const testPanel = document.getElementById('testPanel');
                
                // 移除之前的设备类
                body.classList.remove('device-desktop', 'device-tablet', 'device-mobile', 'device-small');
                
                // 更新按钮状态
                document.querySelectorAll('.device-buttons button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                
                switch(deviceType) {
                    case 'desktop':
                        body.style.width = '100%';
                        body.style.maxWidth = 'none';
                        break;
                    case 'tablet':
                        body.style.width = '768px';
                        body.style.maxWidth = '768px';
                        body.classList.add('device-tablet');
                        break;
                    case 'mobile':
                        body.style.width = '480px';
                        body.style.maxWidth = '480px';
                        body.classList.add('device-mobile');
                        break;
                    case 'small':
                        body.style.width = '320px';
                        body.style.maxWidth = '320px';
                        body.classList.add('device-small');
                        break;
                }
                
                this.currentDevice = deviceType;
                
                // 触发resize事件以更新样式
                window.dispatchEvent(new Event('resize'));
            }
        }

        // 兼容性检测模块
        class CompatibilityChecker {
            static checkBrowserSupport() {
                const features = {
                    'CSS动画': CSS.supports('animation', 'test 1s'),
                    'CSS渐变': CSS.supports('background', 'linear-gradient(45deg, red, blue)'),
                    'CSS变换': CSS.supports('transform', 'scale(1)'),
                    'CSS滤镜': CSS.supports('filter', 'blur(1px)'),
                    'Flexbox': CSS.supports('display', 'flex'),
                    '网格布局': CSS.supports('display', 'grid')
                };
                
                return features;
            }

            static getBrowserInfo() {
                const ua = navigator.userAgent;
                let browser = 'Unknown';
                
                if (ua.includes('Chrome')) browser = 'Chrome';
                else if (ua.includes('Firefox')) browser = 'Firefox';
                else if (ua.includes('Safari')) browser = 'Safari';
                else if (ua.includes('Edge')) browser = 'Edge';
                else if (ua.includes('Opera')) browser = 'Opera';
                
                return {
                    browser,
                    userAgent: ua,
                    platform: navigator.platform,
                    language: navigator.language
                };
            }
        }

        // 性能监控模块
        class PerformanceMonitor {
            static measureRenderTime() {
                const startTime = performance.now();
                
                return new Promise(resolve => {
                    requestAnimationFrame(() => {
                        const endTime = performance.now();
                        resolve(endTime - startTime);
                    });
                });
            }

            static checkAnimationPerformance() {
                let frameCount = 0;
                const startTime = performance.now();
                
                return new Promise(resolve => {
                    function countFrames() {
                        frameCount++;
                        if (performance.now() - startTime < 1000) {
                            requestAnimationFrame(countFrames);
                        } else {
                            resolve(frameCount);
                        }
                    }
                    requestAnimationFrame(countFrames);
                });
            }

            static getMemoryUsage() {
                if (performance.memory) {
                    return {
                        used: Math.round(performance.memory.usedJSHeapSize / 1024 / 1024),
                        total: Math.round(performance.memory.totalJSHeapSize / 1024 / 1024),
                        limit: Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024)
                    };
                }
                return null;
            }
        }

        // 初始化测试框架和设备模拟器
        const testFramework = new TestFramework();
        const deviceSimulator = new DeviceSimulator();
        const compatibilityChecker = new CompatibilityChecker();
        const performanceMonitor = new PerformanceMonitor();

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 显示浏览器信息
            const browserInfo = CompatibilityChecker.getBrowserInfo();
            console.log('浏览器信息:', browserInfo);
            
            // 显示兼容性检查结果
            const supportInfo = CompatibilityChecker.checkBrowserSupport();
            console.log('功能支持情况:', supportInfo);
            
            // 监控内存使用
            const memoryInfo = PerformanceMonitor.getMemoryUsage();
            if (memoryInfo) {
                console.log('内存使用情况:', memoryInfo);
            }
            
            // 自动运行一次基础测试
            setTimeout(() => {
                testFramework.runCompatibilityTests();
            }, 1000);
        });

        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            // 可以在这里添加响应式测试逻辑
            console.log('窗口大小变化:', window.innerWidth, 'x', window.innerHeight);
        });

        // 监听设备方向变化
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                console.log('设备方向变化:', window.orientation);
            }, 100);
        });
    </script>
</body>
</html>
