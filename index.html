<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            color: #00ffff;
            text-align: center;
            font-size: 1.2rem;
        }

        .score {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .level {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .lines {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .next-piece {
            border: 1px solid #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            color: #ffd93d;
            margin-bottom: 10px;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            text-align: center;
            color: #ffffff;
            background: rgba(255, 0, 0, 0.2);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff0000;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
        }

        .restart-btn {
            font-size: 1.5rem;
            padding: 15px 30px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                order: -1;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="aaa-title">AAA</div>
        <div class="game-title">俄罗斯方块</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">行数: <span id="lines">0</span></div>
            
            <h3>下一个</h3>
            <canvas id="nextPiece" class="next-piece" width="120" height="120"></canvas>
            
            <div class="controls">
                <h4>操作说明</h4>
                <div>← → 移动</div>
                <div>↓ 加速下降</div>
                <div>↑ 旋转</div>
                <div>空格 暂停</div>
            </div>
        </div>
    </div>
    
    <div id="gameOver" class="game-over">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <div>最终得分: <span id="finalScore">0</span></div>
            <button id="restartBtn" class="restart-btn">重新开始</button>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameBoard');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextPiece');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.BLOCK_SIZE = 30;
                
                this.board = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.isPaused = false;
                
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                this.pieces = [
                    { shape: [[1,1,1,1]], color: '#00ffff' }, // I
                    { shape: [[1,1],[1,1]], color: '#ffff00' }, // O
                    { shape: [[0,1,0],[1,1,1]], color: '#800080' }, // T
                    { shape: [[0,1,1],[1,1,0]], color: '#00ff00' }, // S
                    { shape: [[1,1,0],[0,1,1]], color: '#ff0000' }, // Z
                    { shape: [[1,0,0],[1,1,1]], color: '#ff8000' }, // L
                    { shape: [[0,0,1],[1,1,1]], color: '#0000ff' }  // J
                ];
                
                this.initBoard();
                this.bindEvents();
                this.start();
            }
            
            initBoard() {
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    this.board[y] = [];
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        this.board[y][x] = 0;
                    }
                }
            }
            
            createPiece() {
                const pieceIndex = Math.floor(Math.random() * this.pieces.length);
                const piece = JSON.parse(JSON.stringify(this.pieces[pieceIndex]));
                piece.x = Math.floor(this.BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2);
                piece.y = 0;
                return piece;
            }
            
            start() {
                this.currentPiece = this.createPiece();
                this.nextPiece = this.createPiece();
                this.gameRunning = true;
                this.gameLoop();
            }
            
            gameLoop() {
                if (!this.gameRunning || this.isPaused) {
                    if (this.gameRunning) {
                        requestAnimationFrame(() => this.gameLoop());
                    }
                    return;
                }
                
                const now = Date.now();
                if (now - this.dropTime > this.dropInterval) {
                    this.moveDown();
                    this.dropTime = now;
                }
                
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            moveDown() {
                if (this.canMove(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                } else {
                    this.placePiece();
                    this.clearLines();
                    this.currentPiece = this.nextPiece;
                    this.nextPiece = this.createPiece();
                    
                    if (!this.canMove(this.currentPiece, 0, 0)) {
                        this.gameOver();
                    }
                }
            }
            
            canMove(piece, dx, dy, rotation = null) {
                const shape = rotation || piece.shape;
                const newX = piece.x + dx;
                const newY = piece.y + dy;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const boardX = newX + x;
                            const boardY = newY + y;
                            
                            if (boardX < 0 || boardX >= this.BOARD_WIDTH || 
                                boardY >= this.BOARD_HEIGHT || 
                                (boardY >= 0 && this.board[boardY][boardX])) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            placePiece() {
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const boardX = this.currentPiece.x + x;
                            const boardY = this.currentPiece.y + y;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(new Array(this.BOARD_WIDTH).fill(0));
                        linesCleared++;
                        y++; // 重新检查这一行
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateUI();
                }
            }
            
            rotate() {
                const rotated = this.currentPiece.shape[0].map((_, index) =>
                    this.currentPiece.shape.map(row => row[index]).reverse()
                );
                
                if (this.canMove(this.currentPiece, 0, 0, rotated)) {
                    this.currentPiece.shape = rotated;
                }
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333333';
                this.ctx.lineWidth = 1;
                for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.BLOCK_SIZE, 0);
                    this.ctx.lineTo(x * this.BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, y * this.BLOCK_SIZE);
                    this.ctx.stroke();
                }
                
                // 绘制已放置的方块
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x]) {
                            this.drawBlock(x * this.BLOCK_SIZE, y * this.BLOCK_SIZE, this.board[y][x]);
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    for (let y = 0; y < this.currentPiece.shape.length; y++) {
                        for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                            if (this.currentPiece.shape[y][x]) {
                                const drawX = (this.currentPiece.x + x) * this.BLOCK_SIZE;
                                const drawY = (this.currentPiece.y + y) * this.BLOCK_SIZE;
                                this.drawBlock(drawX, drawY, this.currentPiece.color);
                            }
                        }
                    }
                }
                
                // 绘制下一个方块
                this.drawNextPiece();
            }
            
            drawBlock(x, y, color) {
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x + 1, y + 1, this.BLOCK_SIZE - 2, this.BLOCK_SIZE - 2);
                
                // 添加高光效果
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fillRect(x + 1, y + 1, this.BLOCK_SIZE - 2, 5);
                this.ctx.fillRect(x + 1, y + 1, 5, this.BLOCK_SIZE - 2);
            }
            
            drawNextPiece() {
                this.nextCtx.fillStyle = '#000000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (this.nextPiece) {
                    const blockSize = 20;
                    const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                    const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                    
                    for (let y = 0; y < this.nextPiece.shape.length; y++) {
                        for (let x = 0; x < this.nextPiece.shape[y].length; x++) {
                            if (this.nextPiece.shape[y][x]) {
                                const drawX = offsetX + x * blockSize;
                                const drawY = offsetY + y * blockSize;
                                
                                this.nextCtx.fillStyle = this.nextPiece.color;
                                this.nextCtx.fillRect(drawX + 1, drawY + 1, blockSize - 2, blockSize - 2);
                                
                                this.nextCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                                this.nextCtx.fillRect(drawX + 1, drawY + 1, blockSize - 2, 3);
                                this.nextCtx.fillRect(drawX + 1, drawY + 1, 3, blockSize - 2);
                            }
                        }
                    }
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
            
            gameOver() {
                this.gameRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'flex';
            }
            
            restart() {
                this.initBoard();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropInterval = 1000;
                this.isPaused = false;
                this.updateUI();
                document.getElementById('gameOver').style.display = 'none';
                this.start();
            }
            
            togglePause() {
                this.isPaused = !this.isPaused;
            }
            
            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.isPaused) {
                        if (e.code === 'Space') {
                            this.togglePause();
                        }
                        return;
                    }
                    
                    switch (e.code) {
                        case 'ArrowLeft':
                            if (this.canMove(this.currentPiece, -1, 0)) {
                                this.currentPiece.x--;
                            }
                            break;
                        case 'ArrowRight':
                            if (this.canMove(this.currentPiece, 1, 0)) {
                                this.currentPiece.x++;
                            }
                            break;
                        case 'ArrowDown':
                            if (this.canMove(this.currentPiece, 0, 1)) {
                                this.currentPiece.y++;
                                this.score += 1;
                                this.updateUI();
                            }
                            break;
                        case 'ArrowUp':
                            this.rotate();
                            break;
                        case 'Space':
                            this.togglePause();
                            break;
                    }
                    e.preventDefault();
                });
                
                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.restart();
                });
            }
        }
        
        // 启动游戏
        window.addEventListener('load', () => {
            new TetrisGame();
        });
    </script>
</body>
</html>
