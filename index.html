<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 100vw;
            max-height: 100vh;
            padding: 10px;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .level {
            font-size: 18px;
            color: #ff6b6b;
        }

        .lines {
            font-size: 16px;
            color: #4ecdc4;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #ffd700;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .game-status {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div class="game-info">
            <div class="game-status" id="gameStatus">准备开始</div>
            <button class="btn" id="startBtn" onclick="game.start()">开始游戏</button>
            <button class="btn" id="pauseBtn" onclick="game.pause()" style="display:none;">暂停</button>
            
            <div class="info-section">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-section">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-section">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            
            <div class="controls">
                <h4>操作说明</h4>
                <div class="control-item">
                    <span>左移:</span>
                    <span>← 或 A</span>
                </div>
                <div class="control-item">
                    <span>右移:</span>
                    <span>→ 或 D</span>
                </div>
                <div class="control-item">
                    <span>下降:</span>
                    <span>↓ 或 S</span>
                </div>
                <div class="control-item">
                    <span>旋转:</span>
                    <span>↑ 或 W</span>
                </div>
                <div class="control-item">
                    <span>快速下落:</span>
                    <span>空格</span>
                </div>
                <div class="control-item">
                    <span>暂停:</span>
                    <span>P</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 时间管理器
        class TimeManager {
            constructor() {
                this.lastTime = 0;
                this.deltaTime = 0;
                this.gameTime = 0;
            }

            updateTime() {
                const currentTime = performance.now();
                this.deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                this.gameTime += this.deltaTime;
            }

            getDeltaTime() {
                return this.deltaTime;
            }

            getGameTime() {
                return this.gameTime;
            }

            reset() {
                this.lastTime = performance.now();
                this.deltaTime = 0;
                this.gameTime = 0;
            }
        }

        // 动画控制器
        class AnimationController {
            constructor() {
                this.isRunning = false;
                this.isPaused = false;
                this.fps = 60;
                this.frameInterval = 1000 / this.fps;
                this.animationId = null;
                this.callbacks = [];
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.isPaused = false;
                this.loop();
            }

            stop() {
                this.isRunning = false;
                this.isPaused = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            pause() {
                this.isPaused = !this.isPaused;
            }

            resume() {
                this.isPaused = false;
            }

            setFPS(fps) {
                this.fps = fps;
                this.frameInterval = 1000 / fps;
            }

            addCallback(callback) {
                this.callbacks.push(callback);
            }

            removeCallback(callback) {
                const index = this.callbacks.indexOf(callback);
                if (index > -1) {
                    this.callbacks.splice(index, 1);
                }
            }

            loop() {
                if (!this.isRunning) return;

                this.animationId = requestAnimationFrame(() => this.loop());

                if (this.isPaused) return;

                // 执行所有回调
                this.callbacks.forEach(callback => {
                    if (typeof callback === 'function') {
                        callback();
                    }
                });
            }
        }

        // 方块下落系统
        class FallSystem {
            constructor(gameLoop) {
                this.gameLoop = gameLoop;
                this.fallSpeed = 1000; // 毫秒
                this.lastFallTime = 0;
                this.isActive = false;
                this.speedMultiplier = 1;
            }

            startFalling() {
                this.isActive = true;
                this.lastFallTime = performance.now();
            }

            stopFalling() {
                this.isActive = false;
            }

            setFallSpeed(speed) {
                this.fallSpeed = speed;
            }

            setSpeedMultiplier(multiplier) {
                this.speedMultiplier = multiplier;
            }

            update(currentTime) {
                if (!this.isActive) return;

                const actualFallSpeed = this.fallSpeed / this.speedMultiplier;
                if (currentTime - this.lastFallTime >= actualFallSpeed) {
                    this.forceDrop();
                    this.lastFallTime = currentTime;
                }
            }

            forceDrop() {
                if (this.gameLoop && this.gameLoop.currentPiece) {
                    this.gameLoop.movePiece(0, 1);
                }
            }
        }

        // 方块类
        class Piece {
            constructor(shape, color, x = 0, y = 0) {
                this.shape = shape;
                this.color = color;
                this.x = x;
                this.y = y;
            }

            rotate() {
                const rotated = [];
                const size = this.shape.length;
                for (let i = 0; i < size; i++) {
                    rotated[i] = [];
                    for (let j = 0; j < size; j++) {
                        rotated[i][j] = this.shape[size - 1 - j][i];
                    }
                }
                this.shape = rotated;
            }

            clone() {
                return new Piece(
                    this.shape.map(row => [...row]),
                    this.color,
                    this.x,
                    this.y
                );
            }
        }

        // 游戏主循环
        class GameLoop {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.gridWidth = 10;
                this.gridHeight = 20;
                this.cellSize = 30;
                this.grid = [];
                this.currentPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameState = 'ready'; // ready, playing, paused, gameOver
                
                this.timeManager = new TimeManager();
                this.animationController = new AnimationController();
                this.fallSystem = new FallSystem(this);
                
                this.initGrid();
                this.initPieces();
                this.setupEventListeners();
                
                // 绑定游戏循环到动画控制器
                this.animationController.addCallback(() => this.update());
            }

            initGrid() {
                this.grid = [];
                for (let y = 0; y < this.gridHeight; y++) {
                    this.grid[y] = [];
                    for (let x = 0; x < this.gridWidth; x++) {
                        this.grid[y][x] = 0;
                    }
                }
            }

            initPieces() {
                this.pieces = [
                    { shape: [[1,1,1,1]], color: '#00ffff' }, // I
                    { shape: [[1,1],[1,1]], color: '#ffff00' }, // O
                    { shape: [[0,1,0],[1,1,1]], color: '#800080' }, // T
                    { shape: [[0,1,1],[1,1,0]], color: '#00ff00' }, // S
                    { shape: [[1,1,0],[0,1,1]], color: '#ff0000' }, // Z
                    { shape: [[1,0,0],[1,1,1]], color: '#ffa500' }, // L
                    { shape: [[0,0,1],[1,1,1]], color: '#0000ff' }  // J
                ];
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
            }

            handleKeyPress(e) {
                if (this.gameState !== 'playing') return;

                switch(e.key.toLowerCase()) {
                    case 'arrowleft':
                    case 'a':
                        this.movePiece(-1, 0);
                        break;
                    case 'arrowright':
                    case 'd':
                        this.movePiece(1, 0);
                        break;
                    case 'arrowdown':
                    case 's':
                        this.fallSystem.setSpeedMultiplier(5);
                        break;
                    case 'arrowup':
                    case 'w':
                        this.rotatePiece();
                        break;
                    case ' ':
                        this.hardDrop();
                        break;
                    case 'p':
                        this.pause();
                        break;
                }
                e.preventDefault();
            }

            start() {
                this.gameState = 'playing';
                this.initGrid();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.spawnPiece();
                this.timeManager.reset();
                this.fallSystem.startFalling();
                this.animationController.start();
                this.updateUI();
                this.updateGameStatus('游戏进行中');
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';
            }

            pause() {
                if (this.gameState === 'playing') {
                    this.gameState = 'paused';
                    this.animationController.pause();
                    this.updateGameStatus('游戏暂停');
                    document.getElementById('pauseBtn').textContent = '继续';
                } else if (this.gameState === 'paused') {
                    this.gameState = 'playing';
                    this.animationController.resume();
                    this.updateGameStatus('游戏进行中');
                    document.getElementById('pauseBtn').textContent = '暂停';
                }
            }

            gameOver() {
                this.gameState = 'gameOver';
                this.animationController.stop();
                this.fallSystem.stopFalling();
                this.updateGameStatus('游戏结束');
                
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('startBtn').textContent = '重新开始';
                document.getElementById('pauseBtn').style.display = 'none';
            }

            spawnPiece() {
                const pieceData = this.pieces[Math.floor(Math.random() * this.pieces.length)];
                this.currentPiece = new Piece(
                    pieceData.shape.map(row => [...row]),
                    pieceData.color,
                    Math.floor(this.gridWidth / 2) - 1,
                    0
                );

                if (this.isCollision(this.currentPiece)) {
                    this.gameOver();
                }
            }

            movePiece(dx, dy) {
                if (!this.currentPiece) return false;

                const newPiece = this.currentPiece.clone();
                newPiece.x += dx;
                newPiece.y += dy;

                if (!this.isCollision(newPiece)) {
                    this.currentPiece = newPiece;
                    return true;
                } else if (dy > 0) {
                    // 方块无法继续下落，固定到网格
                    this.placePiece();
                    this.clearLines();
                    this.spawnPiece();
                    this.fallSystem.setSpeedMultiplier(1); // 重置下落速度
                }
                return false;
            }

            rotatePiece() {
                if (!this.currentPiece) return;

                const rotatedPiece = this.currentPiece.clone();
                rotatedPiece.rotate();

                if (!this.isCollision(rotatedPiece)) {
                    this.currentPiece = rotatedPiece;
                }
            }

            hardDrop() {
                if (!this.currentPiece) return;

                while (this.movePiece(0, 1)) {
                    // 继续下落直到碰撞
                }
            }

            isCollision(piece) {
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const newX = piece.x + x;
                            const newY = piece.y + y;

                            if (newX < 0 || newX >= this.gridWidth || 
                                newY >= this.gridHeight || 
                                (newY >= 0 && this.grid[newY][newX])) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            placePiece() {
                if (!this.currentPiece) return;

                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const gridX = this.currentPiece.x + x;
                            const gridY = this.currentPiece.y + y;
                            if (gridY >= 0) {
                                this.grid[gridY][gridX] = this.currentPiece.color;
                            }
                        }
                    }
                }
            }

            clearLines() {
                let linesCleared = 0;
                for (let y = this.gridHeight - 1; y >= 0; y--) {
                    if (this.grid[y].every(cell => cell !== 0)) {
                        this.grid.splice(y, 1);
                        this.grid.unshift(new Array(this.gridWidth).fill(0));
                        linesCleared++;
                        y++; // 重新检查同一行
                    }
                }

                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    
                    // 根据等级调整下落速度
                    const newSpeed = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.fallSystem.setFallSpeed(newSpeed);
                    
                    this.updateUI();
                }
            }

            update() {
                if (this.gameState !== 'playing') return;

                this.timeManager.updateTime();
                this.fallSystem.update(this.timeManager.getGameTime());
                this.render();
            }

            render() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制网格
                this.drawGrid();

                // 绘制已放置的方块
                this.drawPlacedPieces();

                // 绘制当前方块
                if (this.currentPiece) {
                    this.drawPiece(this.currentPiece);
                }
            }

            drawGrid() {
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x <= this.gridWidth; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.cellSize, 0);
                    this.ctx.lineTo(x * this.cellSize, this.gridHeight * this.cellSize);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.gridHeight; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.cellSize);
                    this.ctx.lineTo(this.gridWidth * this.cellSize, y * this.cellSize);
                    this.ctx.stroke();
                }
            }

            drawPlacedPieces() {
                for (let y = 0; y < this.gridHeight; y++) {
                    for (let x = 0; x < this.gridWidth; x++) {
                        if (this.grid[y][x]) {
                            this.drawCell(x, y, this.grid[y][x]);
                        }
                    }
                }
            }

            drawPiece(piece) {
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            this.drawCell(piece.x + x, piece.y + y, piece.color);
                        }
                    }
                }
            }

            drawCell(x, y, color) {
                const pixelX = x * this.cellSize;
                const pixelY = y * this.cellSize;
                
                this.ctx.fillStyle = color;
                this.ctx.fillRect(pixelX + 1, pixelY + 1, this.cellSize - 2, this.cellSize - 2);
                
                // 添加高光效果
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fillRect(pixelX + 1, pixelY + 1, this.cellSize - 2, 4);
                this.ctx.fillRect(pixelX + 1, pixelY + 1, 4, this.cellSize - 2);
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            updateGameStatus(status) {
                document.getElementById('gameStatus').textContent = status;
            }
        }

        // 初始化游戏
        let game;
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            game = new GameLoop(canvas);
            
            // 监听键盘事件释放
            document.addEventListener('keyup', (e) => {
                if (e.key.toLowerCase() === 'arrowdown' || e.key.toLowerCase() === 's') {
                    game.fallSystem.setSpeedMultiplier(1);
                }
            });
        });
    </script>
</body>
</html>
