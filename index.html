<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪花生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
        }

        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            animation-name: snowfall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        /* 雪花样式变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9);
        }

        .snowflake.type-5 {
            color: #99ccff;
            text-shadow: 0 0 2px rgba(153, 204, 255, 0.5);
        }

        /* 雪花大小变体 */
        .snowflake.size-small {
            font-size: 0.8em;
        }

        .snowflake.size-medium {
            font-size: 1.2em;
        }

        .snowflake.size-large {
            font-size: 1.6em;
        }

        .snowflake.size-xlarge {
            font-size: 2.0em;
        }

        /* 雪花透明度变体 */
        .snowflake.opacity-light {
            opacity: 0.6;
        }

        .snowflake.opacity-medium {
            opacity: 0.8;
        }

        .snowflake.opacity-heavy {
            opacity: 1.0;
        }

        @keyframes snowfall {
            0% {
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        @keyframes snowfall-left {
            0% {
                transform: translateY(-100px) translateX(0px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) translateX(-50px) rotate(360deg);
            }
        }

        @keyframes snowfall-right {
            0% {
                transform: translateY(-100px) translateX(0px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) translateX(50px) rotate(360deg);
            }
        }

        @keyframes snowfall-zigzag {
            0% {
                transform: translateY(-100px) translateX(0px) rotate(0deg);
            }
            25% {
                transform: translateY(25vh) translateX(20px) rotate(90deg);
            }
            50% {
                transform: translateY(50vh) translateX(-20px) rotate(180deg);
            }
            75% {
                transform: translateY(75vh) translateX(20px) rotate(270deg);
            }
            100% {
                transform: translateY(100vh) translateX(0px) rotate(360deg);
            }
        }

        .snowflake.drift-left {
            animation-name: snowfall-left;
        }

        .snowflake.drift-right {
            animation-name: snowfall-right;
        }

        .snowflake.drift-zigzag {
            animation-name: snowfall-zigzag;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 1000;
            max-width: 300px;
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #fff;
            text-align: center;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .control-group input, .control-group select {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
        }

        .control-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .control-group select {
            cursor: pointer;
        }

        .control-group select option {
            background: #2a5298;
            color: white;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .color-preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .color-sample {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-sample:hover {
            transform: scale(1.1);
        }

        .color-sample.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .snowflake-preview {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .snowflake-sample {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .snowflake-sample:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .snowflake-sample.active {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>❄️ 雪花控制台</h3>
        
        <div class="control-group">
            <label>雪花数量</label>
            <input type="range" id="snowflakeCount" min="10" max="200" value="50">
            <span id="countValue">50</span>
        </div>

        <div class="control-group">
            <label>下落速度</label>
            <input type="range" id="fallSpeed" min="1" max="10" value="5">
            <span id="speedValue">5</span>
        </div>

        <div class="control-group">
            <label>雪花样式</label>
            <div class="snowflake-preview">
                <span class="snowflake-sample active" data-type="❄">❄</span>
                <span class="snowflake-sample" data-type="❅">❅</span>
                <span class="snowflake-sample" data-type="❆">❆</span>
                <span class="snowflake-sample" data-type="*">*</span>
                <span class="snowflake-sample" data-type="•">•</span>
                <span class="snowflake-sample" data-type="◦">◦</span>
                <span class="snowflake-sample" data-type="⋄">⋄</span>
                <span class="snowflake-sample" data-type="✦">✦</span>
            </div>
        </div>

        <div class="control-group">
            <label>颜色方案</label>
            <div class="color-preview">
                <div class="color-sample active" data-color="white" style="background: #ffffff;"></div>
                <div class="color-sample" data-color="blue" style="background: #e6f3ff;"></div>
                <div class="color-sample" data-color="cyan" style="background: #cce7ff;"></div>
                <div class="color-sample" data-color="light-blue" style="background: #b3daff;"></div>
                <div class="color-sample" data-color="sky" style="background: #99ccff;"></div>
                <div class="color-sample" data-color="rainbow" style="background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7);"></div>
            </div>
        </div>

        <div class="control-group">
            <label>飘落模式</label>
            <select id="driftMode">
                <option value="normal">直线下落</option>
                <option value="left">向左飘</option>
                <option value="right">向右飘</option>
                <option value="zigzag">之字形</option>
                <option value="random">随机模式</option>
            </select>
        </div>

        <div class="control-group">
            <label>雪花大小</label>
            <select id="snowflakeSize">
                <option value="small">小雪花</option>
                <option value="medium" selected>中雪花</option>
                <option value="large">大雪花</option>
                <option value="mixed">混合大小</option>
            </select>
        </div>

        <div class="button-group">
            <button onclick="startSnowfall()">开始下雪</button>
            <button onclick="stopSnowfall()">停止下雪</button>
            <button onclick="clearSnowflakes()">清除雪花</button>
        </div>
    </div>

    <script>
        // 雪花视觉素材配置
        const SnowflakeAssets = {
            // 雪花图标库
            icons: {
                classic: ['❄', '❅', '❆'],
                simple: ['*', '•', '◦'],
                decorative: ['⋄', '✦', '✧', '✩', '✪'],
                unicode: ['❄️', '❅️', '❆️', '🌨️'],
                custom: ['⁂', '※', '⁕', '⁜']
            },

            // 颜色方案
            colorSchemes: {
                white: {
                    colors: ['#ffffff', '#f8f9fa', '#e9ecef'],
                    shadow: 'rgba(255, 255, 255, 0.8)'
                },
                blue: {
                    colors: ['#e6f3ff', '#cce7ff', '#b3daff'],
                    shadow: 'rgba(230, 243, 255, 0.6)'
                },
                cyan: {
                    colors: ['#cce7ff', '#b3daff', '#99ccff'],
                    shadow: 'rgba(204, 231, 255, 0.7)'
                },
                'light-blue': {
                    colors: ['#b3daff', '#99ccff', '#80bfff'],
                    shadow: 'rgba(179, 218, 255, 0.9)'
                },
                sky: {
                    colors: ['#99ccff', '#80bfff', '#66b3ff'],
                    shadow: 'rgba(153, 204, 255, 0.5)'
                },
                rainbow: {
                    colors: ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#fd79a8'],
                    shadow: 'rgba(255, 255, 255, 0.3)'
                }
            },

            // 大小配置
            sizes: {
                small: { min: 0.6, max: 1.0 },
                medium: { min: 1.0, max: 1.5 },
                large: { min: 1.5, max: 2.2 },
                mixed: { min: 0.6, max: 2.2 }
            },

            // 透明度配置
            opacity: {
                light: { min: 0.4, max: 0.7 },
                medium: { min: 0.6, max: 0.9 },
                heavy: { min: 0.8, max: 1.0 }
            },

            // 动画配置
            animations: {
                normal: 'snowfall',
                left: 'snowfall-left',
                right: 'snowfall-right',
                zigzag: 'snowfall-zigzag'
            }
        };

        // 全局变量
        let snowflakeInterval;
        let activeSnowflakes = [];
        let currentSettings = {
            count: 50,
            speed: 5,
            icon: '❄',
            colorScheme: 'white',
            driftMode: 'normal',
            size: 'medium'
        };

        // 初始化控件事件
        function initializeControls() {
            // 雪花数量控制
            const countSlider = document.getElementById('snowflakeCount');
            const countValue = document.getElementById('countValue');
            countSlider.addEventListener('input', (e) => {
                currentSettings.count = parseInt(e.target.value);
                countValue.textContent = e.target.value;
            });

            // 速度控制
            const speedSlider = document.getElementById('fallSpeed');
            const speedValue = document.getElementById('speedValue');
            speedSlider.addEventListener('input', (e) => {
                currentSettings.speed = parseInt(e.target.value);
                speedValue.textContent = e.target.value;
            });

            // 雪花样式选择
            document.querySelectorAll('.snowflake-sample').forEach(sample => {
                sample.addEventListener('click', (e) => {
                    document.querySelectorAll('.snowflake-sample').forEach(s => s.classList.remove('active'));
                    e.target.classList.add('active');
                    currentSettings.icon = e.target.dataset.type;
                });
            });

            // 颜色方案选择
            document.querySelectorAll('.color-sample').forEach(sample => {
                sample.addEventListener('click', (e) => {
                    document.querySelectorAll('.color-sample').forEach(s => s.classList.remove('active'));
                    e.target.classList.add('active');
                    currentSettings.colorScheme = e.target.dataset.color;
                });
            });

            // 飘落模式选择
            document.getElementById('driftMode').addEventListener('change', (e) => {
                currentSettings.driftMode = e.target.value;
            });

            // 雪花大小选择
            document.getElementById('snowflakeSize').addEventListener('change', (e) => {
                currentSettings.size = e.target.value;
            });
        }

        // 创建雪花元素
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            
            // 设置雪花图标
            snowflake.textContent = currentSettings.icon;
            
            // 设置颜色
            const colorScheme = SnowflakeAssets.colorSchemes[currentSettings.colorScheme];
            const randomColor = colorScheme.colors[Math.floor(Math.random() * colorScheme.colors.length)];
            snowflake.style.color = randomColor;
            snowflake.style.textShadow = `0 0 ${Math.random() * 8 + 2}px ${colorScheme.shadow}`;
            
            // 设置大小
            const sizeConfig = SnowflakeAssets.sizes[currentSettings.size];
            const size = Math.random() * (sizeConfig.max - sizeConfig.min) + sizeConfig.min;
            snowflake.style.fontSize = `${size}em`;
            
            // 设置透明度
            const opacity = Math.random() * 0.5 + 0.5;
            snowflake.style.opacity = opacity;
            
            // 设置初始位置
            snowflake.style.left = Math.random() * window.innerWidth + 'px';
            snowflake.style.top = '-50px';
            
            // 设置动画
            let animationName = 'snowfall';
            if (currentSettings.driftMode === 'random') {
                const modes = ['normal', 'left', 'right', 'zigzag'];
                const randomMode = modes[Math.floor(Math.random() * modes.length)];
                animationName = SnowflakeAssets.animations[randomMode];
            } else {
                animationName = SnowflakeAssets.animations[currentSettings.driftMode];
            }
            
            snowflake.style.animationName = animationName;
            snowflake.style.animationDuration = (Math.random() * 3 + 2) / (currentSettings.speed / 5) + 's';
            snowflake.style.animationDelay = Math.random() * 2 + 's';
            
            // 添加到页面
            document.body.appendChild(snowflake);
            activeSnowflakes.push(snowflake);
            
            // 动画结束后移除
            snowflake.addEventListener('animationend', () => {
                if (snowflake.parentNode) {
                    snowflake.parentNode.removeChild(snowflake);
                }
                const index = activeSnowflakes.indexOf(snowflake);
                if (index > -1) {
                    activeSnowflakes.splice(index, 1);
                }
            });
        }

        // 开始下雪
        function startSnowfall() {
            if (snowflakeInterval) {
                clearInterval(snowflakeInterval);
            }
            
            const interval = Math.max(100, 2000 / currentSettings.count);
            snowflakeInterval = setInterval(createSnowflake, interval);
        }

        // 停止下雪
        function stopSnowfall() {
            if (snowflakeInterval) {
                clearInterval(snowflakeInterval);
                snowflakeInterval = null;
            }
        }

        // 清除所有雪花
        function clearSnowflakes() {
            stopSnowfall();
            activeSnowflakes.forEach(snowflake => {
                if (snowflake.parentNode) {
                    snowflake.parentNode.removeChild(snowflake);
                }
            });
            activeSnowflakes = [];
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initializeControls();
            // 自动开始下雪
            setTimeout(() => {
                startSnowfall();
            }, 500);
        });

        // 窗口大小改变时重新调整
        window.addEventListener('resize', () => {
            // 重新调整现有雪花的位置范围
            activeSnowflakes.forEach(snowflake => {
                const currentLeft = parseFloat(snowflake.style.left);
                if (currentLeft > window.innerWidth) {
                    snowflake.style.left = window.innerWidth - 50 + 'px';
                }
            });
        });
    </script>
</body>
</html>
