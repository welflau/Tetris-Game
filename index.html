<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪花特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #snowContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(360deg);
                opacity: 0.3;
            }
        }

        @keyframes sway {
            0%, 100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(20px);
            }
        }

        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 1001;
        }

        .control-panel button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .control-panel button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .performance-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1001;
        }

        @media (max-width: 768px) {
            .control-panel {
                top: 10px;
                right: 10px;
                padding: 10px;
            }
            
            .performance-info {
                top: 10px;
                left: 10px;
                padding: 8px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div id="snowContainer"></div>
    
    <div class="control-panel">
        <div>雪花控制</div>
        <button id="startBtn">开始</button>
        <button id="stopBtn">停止</button>
        <button id="resetBtn">重置</button>
        <div style="margin-top: 10px;">
            <label>数量: <input type="range" id="countSlider" min="10" max="200" value="50" style="width: 100px;"></label>
        </div>
    </div>
    
    <div class="performance-info">
        <div>FPS: <span id="fps">0</span></div>
        <div>雪花数量: <span id="snowflakeCount">0</span></div>
        <div>性能状态: <span id="performanceStatus">良好</span></div>
    </div>

    <script>
        class Snowflake {
            constructor(x, y, size, speed) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speed = speed;
                this.element = null;
                this.swayOffset = Math.random() * Math.PI * 2;
                this.swaySpeed = 0.01 + Math.random() * 0.02;
                this.opacity = 0.3 + Math.random() * 0.7;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                
                this.createElement();
            }

            createElement() {
                this.element = document.createElement('div');
                this.element.className = 'snowflake';
                this.element.innerHTML = '❄';
                this.element.style.fontSize = this.size + 'px';
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.opacity = this.opacity;
            }

            update() {
                this.y += this.speed;
                this.x += Math.sin(this.swayOffset) * 0.5;
                this.swayOffset += this.swaySpeed;
                this.rotation += this.rotationSpeed;
                
                if (this.y > window.innerHeight + 50) {
                    this.reset();
                }
                
                if (this.x > window.innerWidth + 50 || this.x < -50) {
                    this.x = Math.random() * window.innerWidth;
                }
            }

            render() {
                if (this.element) {
                    this.element.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${this.rotation}deg)`;
                    this.element.style.opacity = this.opacity;
                }
            }

            reset() {
                this.y = -50;
                this.x = Math.random() * window.innerWidth;
                this.swayOffset = Math.random() * Math.PI * 2;
            }
        }

        class PerformanceManager {
            constructor() {
                this.fps = 0;
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.performanceThreshold = 30;
                this.isLowPerformance = false;
            }

            checkPerformance() {
                this.frameCount++;
                const currentTime = performance.now();
                
                if (currentTime - this.lastTime >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                    
                    this.isLowPerformance = this.fps < this.performanceThreshold;
                    this.updatePerformanceDisplay();
                }
            }

            adjustSnowflakeCount(currentCount) {
                if (this.isLowPerformance && currentCount > 20) {
                    return Math.max(20, currentCount - 10);
                } else if (!this.isLowPerformance && this.fps > 50) {
                    return Math.min(200, currentCount + 5);
                }
                return currentCount;
            }

            throttleAnimation() {
                return this.isLowPerformance ? 2 : 1;
            }

            updatePerformanceDisplay() {
                document.getElementById('fps').textContent = this.fps;
                const status = this.isLowPerformance ? '较低' : (this.fps > 50 ? '优秀' : '良好');
                document.getElementById('performanceStatus').textContent = status;
            }
        }

        class SnowflakeEffect {
            constructor() {
                this.container = document.getElementById('snowContainer');
                this.snowflakes = [];
                this.isRunning = false;
                this.animationId = null;
                this.maxSnowflakes = 50;
                this.frameSkip = 0;
                
                this.performanceManager = new PerformanceManager();
                
                this.init();
                this.bindEvents();
            }

            init() {
                this.createSnowflakes();
                this.updateSnowflakeCount();
            }

            createSnowflakes() {
                const count = Math.min(this.maxSnowflakes, 200);
                
                for (let i = this.snowflakes.length; i < count; i++) {
                    const snowflake = this.createSnowflake();
                    this.snowflakes.push(snowflake);
                    this.container.appendChild(snowflake.element);
                }
                
                // 移除多余的雪花
                while (this.snowflakes.length > count) {
                    const snowflake = this.snowflakes.pop();
                    if (snowflake.element && snowflake.element.parentNode) {
                        snowflake.element.parentNode.removeChild(snowflake.element);
                    }
                }
            }

            createSnowflake() {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * -window.innerHeight;
                const size = 10 + Math.random() * 20;
                const speed = 1 + Math.random() * 3;
                
                return new Snowflake(x, y, size, speed);
            }

            startAnimation() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.animate();
            }

            stopAnimation() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            animate() {
                if (!this.isRunning) return;
                
                this.performanceManager.checkPerformance();
                
                const throttle = this.performanceManager.throttleAnimation();
                this.frameSkip++;
                
                if (this.frameSkip >= throttle) {
                    this.frameSkip = 0;
                    
                    // 性能自适应调整雪花数量
                    const newCount = this.performanceManager.adjustSnowflakeCount(this.maxSnowflakes);
                    if (newCount !== this.maxSnowflakes) {
                        this.maxSnowflakes = newCount;
                        this.createSnowflakes();
                        this.updateSnowflakeCount();
                    }
                    
                    // 更新雪花
                    this.snowflakes.forEach(snowflake => {
                        snowflake.update();
                        snowflake.render();
                    });
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }

            resize() {
                // 响应式处理
                this.snowflakes.forEach(snowflake => {
                    if (snowflake.x > window.innerWidth) {
                        snowflake.x = window.innerWidth - 50;
                    }
                });
                
                // 移动端优化
                if (window.innerWidth < 768) {
                    this.maxSnowflakes = Math.min(this.maxSnowflakes, 30);
                } else {
                    this.maxSnowflakes = Math.min(parseInt(document.getElementById('countSlider').value), 200);
                }
                
                this.createSnowflakes();
                this.updateSnowflakeCount();
            }

            reset() {
                this.stopAnimation();
                this.snowflakes.forEach(snowflake => {
                    if (snowflake.element && snowflake.element.parentNode) {
                        snowflake.element.parentNode.removeChild(snowflake.element);
                    }
                });
                this.snowflakes = [];
                this.init();
            }

            updateSnowflakeCount() {
                document.getElementById('snowflakeCount').textContent = this.snowflakes.length;
            }

            bindEvents() {
                // 控制按钮事件
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.startAnimation();
                });
                
                document.getElementById('stopBtn').addEventListener('click', () => {
                    this.stopAnimation();
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.reset();
                });
                
                // 数量滑块事件
                document.getElementById('countSlider').addEventListener('input', (e) => {
                    this.maxSnowflakes = parseInt(e.target.value);
                    this.createSnowflakes();
                    this.updateSnowflakeCount();
                });
                
                // 窗口大小变化事件
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        this.resize();
                    }, 250);
                });
                
                // 页面可见性变化事件（性能优化）
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        this.stopAnimation();
                    } else if (this.isRunning) {
                        this.startAnimation();
                    }
                });
            }
        }

        // 初始化雪花特效
        document.addEventListener('DOMContentLoaded', () => {
            const snowEffect = new SnowflakeEffect();
            snowEffect.startAnimation();
            
            // 添加一些交互提示
            setTimeout(() => {
                console.log('雪花特效已启动！使用右上角控制面板来调整效果。');
            }, 1000);
        });
    </script>
</body>
</html>
