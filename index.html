<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px;
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .level {
            font-size: 18px;
            color: #ff6b6b;
        }

        .lines {
            font-size: 16px;
            color: #4ecdc4;
        }

        .controls {
            font-size: 14px;
            line-height: 1.6;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ff0000;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            color: white;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div class="game-info">
            <div class="info-section">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            <div class="info-section">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            <div class="info-section">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            <div class="info-section">
                <h3>操作说明</h3>
                <div class="controls">
                    ← → 移动<br>
                    ↓ 快速下降<br>
                    ↑ 旋转<br>
                    空格 暂停
                </div>
            </div>
        </div>
    </div>

    <script>
        // GameCanvas 模块 - 管理Canvas元素的创建、尺寸设置和基础渲染上下文
        class GameCanvas {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.init();
            }

            init() {
                // 设置Canvas尺寸
                this.canvas.width = 300;
                this.canvas.height = 600;
                
                // 设置渲染质量
                this.ctx.imageSmoothingEnabled = false;
            }

            resize(width, height) {
                this.canvas.width = width;
                this.canvas.height = height;
            }

            getContext() {
                return this.ctx;
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // GridSystem 模块 - 实现10x20网格系统，提供坐标转换和网格绘制功能
        class GridSystem {
            constructor(cols = 10, rows = 20, cellSize = 30) {
                this.cols = cols;
                this.rows = rows;
                this.cellSize = cellSize;
            }

            drawGrid(ctx) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;

                // 绘制垂直线
                for (let x = 0; x <= this.cols; x++) {
                    const pixelX = x * this.cellSize;
                    ctx.beginPath();
                    ctx.moveTo(pixelX, 0);
                    ctx.lineTo(pixelX, this.rows * this.cellSize);
                    ctx.stroke();
                }

                // 绘制水平线
                for (let y = 0; y <= this.rows; y++) {
                    const pixelY = y * this.cellSize;
                    ctx.beginPath();
                    ctx.moveTo(0, pixelY);
                    ctx.lineTo(this.cols * this.cellSize, pixelY);
                    ctx.stroke();
                }
            }

            gridToPixel(gridX, gridY) {
                return {
                    x: gridX * this.cellSize,
                    y: gridY * this.cellSize
                };
            }

            pixelToGrid(pixelX, pixelY) {
                return {
                    x: Math.floor(pixelX / this.cellSize),
                    y: Math.floor(pixelY / this.cellSize)
                };
            }

            isValidPosition(x, y) {
                return x >= 0 && x < this.cols && y >= 0 && y < this.rows;
            }
        }

        // GameState 模块 - 管理游戏状态数据，包括网格状态、当前方块位置等
        class GameState {
            constructor(cols = 10, rows = 20) {
                this.cols = cols;
                this.rows = rows;
                this.grid = [];
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.reset();
            }

            reset() {
                // 初始化网格，0表示空，1表示有方块
                this.grid = [];
                for (let y = 0; y < this.rows; y++) {
                    this.grid[y] = [];
                    for (let x = 0; x < this.cols; x++) {
                        this.grid[y][x] = 0;
                    }
                }
                this.score = 0;
                this.level = 1;
                this.lines = 0;
            }

            getGrid() {
                return this.grid;
            }

            setCell(x, y, value) {
                if (this.isValidPosition(x, y)) {
                    this.grid[y][x] = value;
                }
            }

            getCell(x, y) {
                if (this.isValidPosition(x, y)) {
                    return this.grid[y][x];
                }
                return 1; // 边界外视为有方块
            }

            isValidPosition(x, y) {
                return x >= 0 && x < this.cols && y >= 0 && y < this.rows;
            }
        }

        // GameRenderer 模块 - 统一管理所有渲染操作，包括网格、方块和UI元素的绘制
        class GameRenderer {
            constructor(gameCanvas, gridSystem, gameState) {
                this.canvas = gameCanvas;
                this.ctx = gameCanvas.getContext();
                this.gridSystem = gridSystem;
                this.gameState = gameState;
            }

            render() {
                this.canvas.clear();
                this.renderGrid();
                this.renderBlocks();
                this.renderUI();
            }

            renderGrid() {
                this.gridSystem.drawGrid(this.ctx);
            }

            renderBlocks() {
                const grid = this.gameState.getGrid();
                
                for (let y = 0; y < this.gridSystem.rows; y++) {
                    for (let x = 0; x < this.gridSystem.cols; x++) {
                        if (grid[y][x] !== 0) {
                            this.renderBlock(x, y, this.getBlockColor(grid[y][x]));
                        }
                    }
                }
            }

            renderBlock(gridX, gridY, color = '#00ff00') {
                const pixel = this.gridSystem.gridToPixel(gridX, gridY);
                const size = this.gridSystem.cellSize;
                
                // 绘制方块主体
                this.ctx.fillStyle = color;
                this.ctx.fillRect(pixel.x + 1, pixel.y + 1, size - 2, size - 2);
                
                // 绘制方块边框
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(pixel.x + 1, pixel.y + 1, size - 2, size - 2);
            }

            renderUI() {
                // 更新UI显示
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('level').textContent = this.gameState.level;
                document.getElementById('lines').textContent = this.gameState.lines;
            }

            getBlockColor(blockType) {
                const colors = {
                    1: '#ff0000', // 红色
                    2: '#00ff00', // 绿色
                    3: '#0000ff', // 蓝色
                    4: '#ffff00', // 黄色
                    5: '#ff00ff', // 紫色
                    6: '#00ffff', // 青色
                    7: '#ffa500'  // 橙色
                };
                return colors[blockType] || '#ffffff';
            }
        }

        // 游戏主类
        class TetrisGame {
            constructor() {
                this.gameCanvas = new GameCanvas('gameCanvas');
                this.gridSystem = new GridSystem(10, 20, 30);
                this.gameState = new GameState(10, 20);
                this.renderer = new GameRenderer(this.gameCanvas, this.gridSystem, this.gameState);
                
                this.init();
            }

            init() {
                // 添加一些测试方块来验证渲染
                this.gameState.setCell(1, 18, 1);
                this.gameState.setCell(2, 18, 2);
                this.gameState.setCell(3, 18, 3);
                this.gameState.setCell(1, 19, 4);
                this.gameState.setCell(2, 19, 5);
                this.gameState.setCell(3, 19, 6);
                
                this.gameState.score = 1500;
                this.gameState.level = 3;
                this.gameState.lines = 15;
                
                this.startGameLoop();
            }

            startGameLoop() {
                const gameLoop = () => {
                    this.renderer.render();
                    requestAnimationFrame(gameLoop);
                };
                gameLoop();
            }
        }

        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            const game = new TetrisGame();
        });
    </script>
</body>
</html>
