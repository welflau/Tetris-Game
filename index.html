<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px;
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .level {
            font-size: 18px;
            color: #ff6b6b;
        }

        .lines {
            font-size: 16px;
            color: #4ecdc4;
        }

        .controls {
            font-size: 14px;
            line-height: 1.6;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #ff6b6b;
        }

        .test-area {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .test-canvas {
            background: #333;
            border: 1px solid #fff;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="game-info">
            <div class="info-section">
                <h3>分数</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-section">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-section">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            
            <div class="info-section">
                <h3>操作说明</h3>
                <div class="controls">
                    ← → 移动<br>
                    ↓ 快速下降<br>
                    ↑ 旋转<br>
                    空格 暂停
                </div>
            </div>

            <div class="test-area">
                <h3>方块测试</h3>
                <canvas id="testCanvas" class="test-canvas" width="120" height="120"></canvas>
                <button onclick="testBlocks()">测试方块</button>
            </div>
        </div>
    </div>

    <script>
        // Block基类
        class Block {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.shape = [];
            }

            draw(ctx, cellSize) {
                ctx.fillStyle = this.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                
                for (let row = 0; row < this.shape.length; row++) {
                    for (let col = 0; col < this.shape[row].length; col++) {
                        if (this.shape[row][col]) {
                            const drawX = (this.x + col) * cellSize;
                            const drawY = (this.y + row) * cellSize;
                            
                            // 绘制方块主体
                            ctx.fillRect(drawX, drawY, cellSize, cellSize);
                            
                            // 绘制边框
                            ctx.strokeRect(drawX, drawY, cellSize, cellSize);
                            
                            // 添加高光效果
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(drawX, drawY, cellSize, 2);
                            ctx.fillRect(drawX, drawY, 2, cellSize);
                            
                            // 恢复原色
                            ctx.fillStyle = this.color;
                        }
                    }
                }
            }

            getShape() {
                return this.shape;
            }

            getPosition() {
                return { x: this.x, y: this.y };
            }

            setPosition(x, y) {
                this.x = x;
                this.y = y;
            }

            getColor() {
                return this.color;
            }
        }

        // I型方块类
        class IBlock extends Block {
            constructor(x, y) {
                super(x, y, '#00ffff'); // 青色
                this.shape = [
                    [1, 1, 1, 1]
                ];
            }

            getShape() {
                return this.shape;
            }

            draw(ctx, cellSize) {
                // 使用渐变色绘制I型方块
                const gradient = ctx.createLinearGradient(0, 0, cellSize * 4, 0);
                gradient.addColorStop(0, '#00ffff');
                gradient.addColorStop(0.5, '#0099cc');
                gradient.addColorStop(1, '#006699');
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                
                for (let row = 0; row < this.shape.length; row++) {
                    for (let col = 0; col < this.shape[row].length; col++) {
                        if (this.shape[row][col]) {
                            const drawX = (this.x + col) * cellSize;
                            const drawY = (this.y + row) * cellSize;
                            
                            // 绘制渐变方块
                            ctx.fillStyle = gradient;
                            ctx.fillRect(drawX, drawY, cellSize, cellSize);
                            
                            // 绘制边框
                            ctx.strokeRect(drawX, drawY, cellSize, cellSize);
                            
                            // 添加特殊高光效果
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                            ctx.fillRect(drawX, drawY, cellSize, 3);
                            ctx.fillRect(drawX, drawY, 3, cellSize);
                            
                            // 添加内部阴影
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                            ctx.fillRect(drawX + cellSize - 3, drawY, 3, cellSize);
                            ctx.fillRect(drawX, drawY + cellSize - 3, cellSize, 3);
                        }
                    }
                }
            }
        }

        // 方块工厂模块
        class BlockFactory {
            static createBlock(type, x, y) {
                switch (type) {
                    case 'I':
                        return new IBlock(x, y);
                    default:
                        return new IBlock(x, y); // 默认返回I型方块
                }
            }

            static getRandomBlock(x, y) {
                const types = ['I']; // 目前只有I型方块
                const randomType = types[Math.floor(Math.random() * types.length)];
                return this.createBlock(randomType, x, y);
            }
        }

        // 游戏主逻辑
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.cellSize = 30;
                this.rows = 20;
                this.cols = 10;
                
                this.currentBlock = null;
                this.init();
            }

            init() {
                this.spawnNewBlock();
                this.render();
            }

            spawnNewBlock() {
                this.currentBlock = BlockFactory.getRandomBlock(3, 0);
            }

            render() {
                // 清空画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.drawGrid();
                
                // 绘制当前方块
                if (this.currentBlock) {
                    this.currentBlock.draw(this.ctx, this.cellSize);
                }
            }

            drawGrid() {
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                // 绘制垂直线
                for (let col = 0; col <= this.cols; col++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(col * this.cellSize, 0);
                    this.ctx.lineTo(col * this.cellSize, this.canvas.height);
                    this.ctx.stroke();
                }
                
                // 绘制水平线
                for (let row = 0; row <= this.rows; row++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, row * this.cellSize);
                    this.ctx.lineTo(this.canvas.width, row * this.cellSize);
                    this.ctx.stroke();
                }
            }
        }

        // 测试函数
        function testBlocks() {
            const testCanvas = document.getElementById('testCanvas');
            const testCtx = testCanvas.getContext('2d');
            const cellSize = 25;
            
            // 清空测试画布
            testCtx.clearRect(0, 0, testCanvas.width, testCanvas.height);
            
            // 创建并绘制I型方块
            const iBlock = BlockFactory.createBlock('I', 0, 1);
            iBlock.draw(testCtx, cellSize);
            
            // 显示方块信息
            testCtx.fillStyle = '#fff';
            testCtx.font = '12px Arial';
            testCtx.fillText('I型方块测试', 5, 15);
            testCtx.fillText(`颜色: ${iBlock.getColor()}`, 5, 110);
            
            console.log('I型方块测试:');
            console.log('形状矩阵:', iBlock.getShape());
            console.log('位置:', iBlock.getPosition());
            console.log('颜色:', iBlock.getColor());
        }

        // 初始化游戏
        let game;
        window.onload = function() {
            game = new TetrisGame();
            
            // 自动测试方块
            setTimeout(testBlocks, 500);
        };
    </script>
</body>
</html>
