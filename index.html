<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪花生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
        }

        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
        }

        /* 雪花样式变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9);
        }

        .snowflake.type-5 {
            color: #99ccff;
            text-shadow: 0 0 2px rgba(153, 204, 255, 0.5);
        }

        /* 雪花大小变体 */
        .snowflake.size-small {
            font-size: 0.8em;
        }

        .snowflake.size-medium {
            font-size: 1.2em;
        }

        .snowflake.size-large {
            font-size: 1.6em;
        }

        .snowflake.size-xlarge {
            font-size: 2.0em;
        }

        /* 雪花透明度变体 */
        .snowflake.opacity-light {
            opacity: 0.6;
        }

        .snowflake.opacity-medium {
            opacity: 0.8;
        }

        .snowflake.opacity-heavy {
            opacity: 1.0;
        }

        /* 控制面板样式 */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            color: white;
            z-index: 1000;
        }

        .control-panel button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-panel button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .control-panel input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }

        .control-panel label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>雪花控制</h3>
        <button id="startBtn">开始</button>
        <button id="stopBtn">停止</button>
        <button id="pauseBtn">暂停</button>
        <button id="resumeBtn">继续</button>
        
        <label for="snowflakeCount">雪花数量: <span id="countValue">50</span></label>
        <input type="range" id="snowflakeCount" min="10" max="200" value="50">
        
        <label for="fallSpeed">下落速度: <span id="speedValue">1</span></label>
        <input type="range" id="fallSpeed" min="0.5" max="3" step="0.1" value="1">
        
        <label for="windStrength">风力强度: <span id="windValue">0.5</span></label>
        <input type="range" id="windStrength" min="0" max="2" step="0.1" value="0.5">
    </div>

    <script>
        // 雪花物理运动计算模块
        class SnowflakePhysics {
            static calculateFallSpeed(snowflake) {
                const baseSpeed = snowflake.baseSpeed || 1;
                const sizeMultiplier = snowflake.size * 0.5 + 0.5;
                return baseSpeed * sizeMultiplier;
            }

            static calculateSwayMotion(snowflake, time) {
                const swayAmplitude = snowflake.swayAmplitude || 30;
                const swayFrequency = snowflake.swayFrequency || 0.01;
                return Math.sin(time * swayFrequency + snowflake.swayOffset) * swayAmplitude;
            }

            static updatePosition(snowflake, deltaTime) {
                const fallSpeed = this.calculateFallSpeed(snowflake);
                const currentTime = Date.now();
                const swayX = this.calculateSwayMotion(snowflake, currentTime);
                
                snowflake.y += fallSpeed * deltaTime * 0.1;
                snowflake.x = snowflake.baseX + swayX + (snowflake.windOffset || 0);
                
                // 应用风力影响
                if (snowflake.windStrength) {
                    snowflake.windOffset = (snowflake.windOffset || 0) + snowflake.windStrength * deltaTime * 0.01;
                }
            }

            static checkBoundaries(snowflake) {
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                
                // 检查是否超出屏幕边界
                if (snowflake.y > screenHeight + 50) {
                    return 'bottom';
                }
                
                if (snowflake.x < -50 || snowflake.x > screenWidth + 50) {
                    return 'side';
                }
                
                return null;
            }
        }

        // 雪花生命周期管理模块
        class SnowflakeLifecycle {
            constructor() {
                this.snowflakePool = [];
                this.activeSnowflakes = [];
                this.snowflakeSymbols = ['❄', '❅', '❆', '✻', '✼', '❈', '❉', '❊'];
                this.typeClasses = ['type-1', 'type-2', 'type-3', 'type-4', 'type-5'];
                this.sizeClasses = ['size-small', 'size-medium', 'size-large', 'size-xlarge'];
                this.opacityClasses = ['opacity-light', 'opacity-medium', 'opacity-heavy'];
            }

            createSnowflake() {
                let element;
                
                // 从对象池中获取或创建新元素
                if (this.snowflakePool.length > 0) {
                    element = this.snowflakePool.pop();
                } else {
                    element = document.createElement('div');
                    element.className = 'snowflake';
                    document.body.appendChild(element);
                }

                // 随机属性
                const symbol = this.snowflakeSymbols[Math.floor(Math.random() * this.snowflakeSymbols.length)];
                const typeClass = this.typeClasses[Math.floor(Math.random() * this.typeClasses.length)];
                const sizeClass = this.sizeClasses[Math.floor(Math.random() * this.sizeClasses.length)];
                const opacityClass = this.opacityClasses[Math.floor(Math.random() * this.opacityClasses.length)];
                
                element.textContent = symbol;
                element.className = `snowflake ${typeClass} ${sizeClass} ${opacityClass}`;
                
                // 物理属性
                const snowflake = {
                    element: element,
                    x: Math.random() * window.innerWidth,
                    y: -50,
                    baseX: Math.random() * window.innerWidth,
                    baseSpeed: 0.5 + Math.random() * 2,
                    size: 0.5 + Math.random() * 1.5,
                    swayAmplitude: 20 + Math.random() * 40,
                    swayFrequency: 0.005 + Math.random() * 0.01,
                    swayOffset: Math.random() * Math.PI * 2,
                    windOffset: 0,
                    windStrength: 0
                };
                
                this.activeSnowflakes.push(snowflake);
                return snowflake;
            }

            updateSnowflake(snowflake, deltaTime) {
                SnowflakePhysics.updatePosition(snowflake, deltaTime);
                
                // 更新DOM元素位置
                snowflake.element.style.transform = `translate(${snowflake.x}px, ${snowflake.y}px)`;
                
                // 检查边界
                const boundaryCheck = SnowflakePhysics.checkBoundaries(snowflake);
                if (boundaryCheck) {
                    this.recycleSnowflake(snowflake);
                    return false;
                }
                
                return true;
            }

            recycleSnowflake(snowflake) {
                const index = this.activeSnowflakes.indexOf(snowflake);
                if (index > -1) {
                    this.activeSnowflakes.splice(index, 1);
                    snowflake.element.style.display = 'none';
                    this.snowflakePool.push(snowflake.element);
                }
            }

            cleanupSnowflakes() {
                this.activeSnowflakes.forEach(snowflake => {
                    snowflake.element.remove();
                });
                this.snowflakePool.forEach(element => {
                    element.remove();
                });
                this.activeSnowflakes = [];
                this.snowflakePool = [];
            }
        }

        // 雪花核心功能管理模块
        class SnowflakeCore {
            constructor() {
                this.lifecycle = new SnowflakeLifecycle();
                this.isRunning = false;
                this.isPaused = false;
                this.animationId = null;
                this.lastTime = 0;
                this.config = {
                    maxSnowflakes: 50,
                    spawnRate: 0.3,
                    fallSpeedMultiplier: 1,
                    windStrength: 0.5
                };
            }

            init() {
                this.setupEventListeners();
                console.log('雪花动画系统初始化完成');
            }

            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.lastTime = performance.now();
                this.animate();
                console.log('雪花动画开始');
            }

            stop() {
                this.isRunning = false;
                this.isPaused = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.lifecycle.cleanupSnowflakes();
                console.log('雪花动画停止');
            }

            pause() {
                this.isPaused = true;
                console.log('雪花动画暂停');
            }

            resume() {
                if (this.isRunning && this.isPaused) {
                    this.isPaused = false;
                    this.lastTime = performance.now();
                    this.animate();
                    console.log('雪花动画继续');
                }
            }

            updateConfig(newConfig) {
                Object.assign(this.config, newConfig);
                
                // 更新现有雪花的风力强度
                this.lifecycle.activeSnowflakes.forEach(snowflake => {
                    snowflake.windStrength = this.config.windStrength;
                });
                
                console.log('配置已更新:', this.config);
            }

            animate() {
                if (!this.isRunning || this.isPaused) return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                // 生成新雪花
                if (this.lifecycle.activeSnowflakes.length < this.config.maxSnowflakes) {
                    if (Math.random() < this.config.spawnRate) {
                        const newSnowflake = this.lifecycle.createSnowflake();
                        newSnowflake.baseSpeed *= this.config.fallSpeedMultiplier;
                        newSnowflake.windStrength = this.config.windStrength;
                        newSnowflake.element.style.display = 'block';
                    }
                }
                
                // 更新现有雪花
                for (let i = this.lifecycle.activeSnowflakes.length - 1; i >= 0; i--) {
                    const snowflake = this.lifecycle.activeSnowflakes[i];
                    this.lifecycle.updateSnowflake(snowflake, deltaTime);
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }

            setupEventListeners() {
                // 控制按钮事件
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('stopBtn').addEventListener('click', () => this.stop());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
                document.getElementById('resumeBtn').addEventListener('click', () => this.resume());
                
                // 配置控制事件
                const countSlider = document.getElementById('snowflakeCount');
                const countValue = document.getElementById('countValue');
                countSlider.addEventListener('input', (e) => {
                    const value = parseInt(e.target.value);
                    countValue.textContent = value;
                    this.updateConfig({ maxSnowflakes: value });
                });
                
                const speedSlider = document.getElementById('fallSpeed');
                const speedValue = document.getElementById('speedValue');
                speedSlider.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    speedValue.textContent = value;
                    this.updateConfig({ fallSpeedMultiplier: value });
                });
                
                const windSlider = document.getElementById('windStrength');
                const windValue = document.getElementById('windValue');
                windSlider.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    windValue.textContent = value;
                    this.updateConfig({ windStrength: value });
                });
                
                // 窗口大小变化事件
                window.addEventListener('resize', () => {
                    // 重新计算雪花位置边界
                    this.lifecycle.activeSnowflakes.forEach(snowflake => {
                        if (snowflake.x > window.innerWidth) {
                            snowflake.baseX = Math.random() * window.innerWidth;
                            snowflake.x = snowflake.baseX;
                        }
                    });
                });
            }
        }

        // 初始化并启动雪花动画系统
        document.addEventListener('DOMContentLoaded', () => {
            const snowflakeCore = new SnowflakeCore();
            snowflakeCore.init();
            
            // 自动开始动画
            setTimeout(() => {
                snowflakeCore.start();
            }, 500);
            
            // 全局暴露核心实例，便于调试
            window.snowflakeCore = snowflakeCore;
        });
    </script>
</body>
</html>
