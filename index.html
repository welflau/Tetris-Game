<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            100% {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #ffffff;
            font-size: 1.2rem;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            min-width: 200px;
        }

        .info-box h3 {
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .next-piece {
            width: 80px;
            height: 80px;
            border: 2px solid #ffffff;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #ffd93d;
            text-shadow: 0 0 10px #ffd93d;
        }

        .control-item {
            margin: 5px 0;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .game-over h2 {
            font-size: 3rem;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .info-box {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h1 class="game-title">俄罗斯方块</h1>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <div class="info-box">
                <h3>得分</h3>
                <div id="score">0</div>
            </div>
            
            <div class="info-box">
                <h3>等级</h3>
                <div id="level">1</div>
            </div>
            
            <div class="info-box">
                <h3>消除行数</h3>
                <div id="lines">0</div>
            </div>
            
            <div class="info-box">
                <h3>下一个</h3>
                <canvas id="nextPiece" class="next-piece" width="80" height="80"></canvas>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <h3>游戏控制</h3>
        <div class="control-item">← → : 左右移动</div>
        <div class="control-item">↓ : 快速下降</div>
        <div class="control-item">↑ : 旋转</div>
        <div class="control-item">空格 : 暂停/继续</div>
        <button onclick="startGame()">开始游戏</button>
        <button onclick="pauseGame()">暂停</button>
        <button onclick="resetGame()">重新开始</button>
    </div>
    
    <div id="gameOver" class="game-over">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            gameRunning: false,
            gamePaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;

        // 方块类型
        const PIECES = {
            I: {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };

        // 获取画布上下文
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');

        // 初始化游戏
        function initGame() {
            // 初始化游戏板
            gameState.board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.dropInterval = 1000;
            
            // 生成第一个和下一个方块
            gameState.nextPiece = createRandomPiece();
            spawnNewPiece();
            
            updateDisplay();
        }

        // 创建随机方块
        function createRandomPiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                type: randomType,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 生成新方块
        function spawnNewPiece() {
            gameState.currentPiece = gameState.nextPiece;
            gameState.nextPiece = createRandomPiece();
            
            // 检查游戏是否结束
            if (checkCollision(gameState.currentPiece, 0, 0)) {
                gameOver();
            }
        }

        // 检查碰撞
        function checkCollision(piece, dx, dy) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (newY >= 0 && gameState.board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (!gameState.currentPiece || !gameState.gameRunning || gameState.gamePaused) return false;
            
            if (!checkCollision(gameState.currentPiece, dx, dy)) {
                gameState.currentPiece.x += dx;
                gameState.currentPiece.y += dy;
                return true;
            }
            return false;
        }

        // 旋转方块
        function rotatePiece() {
            if (!gameState.currentPiece || !gameState.gameRunning || gameState.gamePaused) return;
            
            const rotated = {
                ...gameState.currentPiece,
                shape: rotateMatrix(gameState.currentPiece.shape)
            };
            
            if (!checkCollision(rotated, 0, 0)) {
                gameState.currentPiece.shape = rotated.shape;
            }
        }

        // 旋转矩阵
        function rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    rotated[x][rows - 1 - y] = matrix[y][x];
                }
            }
            
            return rotated;
        }

        // 固定方块到游戏板
        function lockPiece() {
            for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                    if (gameState.currentPiece.shape[y][x]) {
                        const boardX = gameState.currentPiece.x + x;
                        const boardY = gameState.currentPiece.y + y;
                        
                        if (boardY >= 0) {
                            gameState.board[boardY][boardX] = gameState.currentPiece.color;
                        }
                    }
                }
            }
            
            clearLines();
            spawnNewPiece();
        }

        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (gameState.board[y].every(cell => cell !== 0)) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(100, 1000 - (gameState.level - 1) * 100);
            }
        }

        // 绘制方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        // 绘制游戏板
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已固定的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        drawBlock(ctx, x, y, gameState.board[y][x]);
                    }
                }
            }
            
            // 绘制当前方块
            if (gameState.currentPiece) {
                for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                        if (gameState.currentPiece.shape[y][x]) {
                            drawBlock(ctx, gameState.currentPiece.x + x, gameState.currentPiece.y + y, gameState.currentPiece.color);
                        }
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (gameState.nextPiece) {
                const blockSize = 15;
                const offsetX = (nextCanvas.width - gameState.nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - gameState.nextPiece.shape.length * blockSize) / 2;
                
                for (let y = 0; y < gameState.nextPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.nextPiece.shape[y].length; x++) {
                        if (gameState.nextPiece.shape[y][x]) {
                            nextCtx.fillStyle = gameState.nextPiece.color;
                            nextCtx.fillRect(
                                offsetX + x * blockSize,
                                offsetY + y * blockSize,
                                blockSize,
                                blockSize
                            );
                            nextCtx.strokeStyle = '#ffffff';
                            nextCtx.lineWidth = 1;
                            nextCtx.strokeRect(
                                offsetX + x * blockSize,
                                offsetY + y * blockSize,
                                blockSize,
                                blockSize
                            );
                        }
                    }
                }
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
            
            drawBoard();
            drawNextPiece();
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (!gameState.gameRunning) return;
            
            if (!gameState.gamePaused) {
                if (timestamp - gameState.dropTime > gameState.dropInterval) {
                    if (!movePiece(0, 1)) {
                        lockPiece();
                    }
                    gameState.dropTime = timestamp;
                }
                
                updateDisplay();
            }
            
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (!gameState.gameRunning) {
                initGame();
                gameState.gameRunning = true;
                gameState.gamePaused = false;
                gameState.dropTime = 0;
                document.getElementById('gameOver').style.display = 'none';
                requestAnimationFrame(gameLoop);
            }
        }

        // 暂停游戏
        function pauseGame() {
            if (gameState.gameRunning) {
                gameState.gamePaused = !gameState.gamePaused;
            }
        }

        // 重新开始游戏
        function resetGame() {
            gameState.gameRunning = false;
            gameState.gamePaused = false;
            document.getElementById('gameOver').style.display = 'none';
            setTimeout(() => {
                startGame();
            }, 100);
        }

        // 游戏结束
        function gameOver() {
            gameState.gameRunning = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            if (!gameState.gameRunning) return;
            
            switch (event.key) {
                case 'ArrowLeft':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    movePiece(0, 1);
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
            
            event.preventDefault();
        });

        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
