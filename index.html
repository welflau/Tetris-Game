<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ffff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        #gameCanvas {
            display: block;
            background: #000;
            border: 2px solid #333;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .info-item {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .info-label {
            color: #ff6b6b;
            font-weight: bold;
        }

        .info-value {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .control-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            #gameCanvas {
                width: 300px;
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>

    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="400" height="800"></canvas>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <span class="info-label">分数:</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">等级:</span>
                <span class="info-value" id="level">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">行数:</span>
                <span class="info-value" id="lines">0</span>
            </div>
            
            <div class="controls">
                <button class="control-btn" id="startBtn">开始游戏</button>
                <button class="control-btn" id="pauseBtn">暂停</button>
                <button class="control-btn" id="resetBtn">重新开始</button>
            </div>
            
            <div class="instructions">
                <strong>操作说明:</strong><br>
                ← → 左右移动<br>
                ↓ 快速下降<br>
                ↑ 旋转方块<br>
                空格键 暂停/继续
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            gameRunning: false,
            gamePaused: false,
            dropTime: 0,
            dropInterval: 1000
        };

        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 40;

        // 方块类型定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };

        // 获取canvas和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 初始化游戏板
        function initBoard() {
            gameState.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                gameState.board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    gameState.board[y][x] = 0;
                }
            }
        }

        // 创建新方块
        function createPiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                type: randomType,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 检查方块是否可以放置在指定位置
        function canPlacePiece(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && gameState.board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        // 放置方块到游戏板
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardX = piece.x + x;
                        const boardY = piece.y + y;
                        if (boardY >= 0) {
                            gameState.board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }

        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let x = 0; x < cols; x++) {
                rotated[x] = [];
                for (let y = rows - 1; y >= 0; y--) {
                    rotated[x][rows - 1 - y] = piece.shape[y][x];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }

        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                let isFullLine = true;
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (!gameState.board[y][x]) {
                        isFullLine = false;
                        break;
                    }
                }
                
                if (isFullLine) {
                    gameState.board.splice(y, 1);
                    gameState.board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查当前行
                }
            }
            
            if (linesCleared > 0) {
                gameState.lines += linesCleared;
                gameState.score += linesCleared * 100 * gameState.level;
                gameState.level = Math.floor(gameState.lines / 10) + 1;
                gameState.dropInterval = Math.max(100, 1000 - (gameState.level - 1) * 100);
                updateUI();
            }
        }

        // 绘制方块
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        // 绘制游戏板
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已放置的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (gameState.board[y][x]) {
                        drawBlock(x, y, gameState.board[y][x]);
                    }
                }
            }
            
            // 绘制当前方块
            if (gameState.currentPiece) {
                for (let y = 0; y < gameState.currentPiece.shape.length; y++) {
                    for (let x = 0; x < gameState.currentPiece.shape[y].length; x++) {
                        if (gameState.currentPiece.shape[y][x]) {
                            const drawX = gameState.currentPiece.x + x;
                            const drawY = gameState.currentPiece.y + y;
                            if (drawY >= 0) {
                                drawBlock(drawX, drawY, gameState.currentPiece.color);
                            }
                        }
                    }
                }
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
        }

        // 游戏循环
        function gameLoop(currentTime) {
            if (!gameState.gameRunning || gameState.gamePaused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            if (currentTime - gameState.dropTime > gameState.dropInterval) {
                if (gameState.currentPiece) {
                    if (canPlacePiece(gameState.currentPiece, 0, 1)) {
                        gameState.currentPiece.y++;
                    } else {
                        placePiece(gameState.currentPiece);
                        clearLines();
                        gameState.currentPiece = createPiece();
                        
                        // 检查游戏结束
                        if (!canPlacePiece(gameState.currentPiece)) {
                            gameOver();
                            return;
                        }
                    }
                }
                gameState.dropTime = currentTime;
            }
            
            drawBoard();
            requestAnimationFrame(gameLoop);
        }

        // 游戏结束
        function gameOver() {
            gameState.gameRunning = false;
            alert(`游戏结束！\n最终分数: ${gameState.score}\n消除行数: ${gameState.lines}\n达到等级: ${gameState.level}`);
        }

        // 开始游戏
        function startGame() {
            initBoard();
            gameState.currentPiece = createPiece();
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            gameState.dropInterval = 1000;
            gameState.gameRunning = true;
            gameState.gamePaused = false;
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // 暂停游戏
        function pauseGame() {
            if (gameState.gameRunning) {
                gameState.gamePaused = !gameState.gamePaused;
            }
        }

        // 重置游戏
        function resetGame() {
            gameState.gameRunning = false;
            gameState.gamePaused = false;
            initBoard();
            drawBoard();
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            updateUI();
        }

        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            if (!gameState.gameRunning || gameState.gamePaused) return;
            
            switch (event.key) {
                case 'ArrowLeft':
                    if (canPlacePiece(gameState.currentPiece, -1, 0)) {
                        gameState.currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (canPlacePiece(gameState.currentPiece, 1, 0)) {
                        gameState.currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (canPlacePiece(gameState.currentPiece, 0, 1)) {
                        gameState.currentPiece.y++;
                        gameState.score += 1;
                        updateUI();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotatePiece(gameState.currentPiece);
                    if (canPlacePiece(rotated)) {
                        gameState.currentPiece = rotated;
                    }
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
            event.preventDefault();
        });

        // 按钮事件处理
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // 初始化
        initBoard();
        drawBoard();
        updateUI();
    </script>
</body>
</html>
