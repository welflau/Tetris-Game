<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪花生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        .snowflake.type-5 {
            color: #99ccff;
            text-shadow: 0 0 2px rgba(153, 204, 255, 0.5), 0 0 6px rgba(153, 204, 255, 0.2);
        }

        /* 雪花大小变体 */
        .snowflake.size-small {
            font-size: 0.8em;
        }

        .snowflake.size-medium {
            font-size: 1.2em;
        }

        .snowflake.size-large {
            font-size: 1.6em;
        }

        /* 性能监控面板 */
        #performance-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
            min-width: 200px;
        }

        .performance-metric {
            margin: 2px 0;
        }

        .performance-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-good {
            background-color: #4CAF50;
        }

        .status-warning {
            background-color: #FF9800;
        }

        .status-critical {
            background-color: #F44336;
        }

        /* 控制面板 */
        #control-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }

        .control-group {
            margin: 5px 0;
        }

        .control-group label {
            display: inline-block;
            width: 120px;
            font-size: 12px;
        }

        .control-group input, .control-group select {
            width: 80px;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div id="snowflake-container"></div>
    
    <!-- 性能监控面板 -->
    <div id="performance-panel">
        <div class="performance-metric">
            <span class="performance-status status-good" id="fps-status"></span>
            FPS: <span id="fps-value">60</span>
        </div>
        <div class="performance-metric">
            <span class="performance-status status-good" id="memory-status"></span>
            Memory: <span id="memory-value">0</span>MB
        </div>
        <div class="performance-metric">
            <span class="performance-status status-good" id="snowflakes-status"></span>
            Snowflakes: <span id="snowflakes-count">0</span>
        </div>
        <div class="performance-metric">
            Quality: <span id="quality-level">High</span>
        </div>
        <div class="performance-metric">
            Pool: <span id="pool-status">0/0</span>
        </div>
    </div>

    <!-- 控制面板 -->
    <div id="control-panel">
        <div class="control-group">
            <label>Max Snowflakes:</label>
            <input type="range" id="max-snowflakes" min="10" max="500" value="100">
            <span id="max-snowflakes-value">100</span>
        </div>
        <div class="control-group">
            <label>Quality:</label>
            <select id="quality-select">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high" selected>High</option>
            </select>
        </div>
        <div class="control-group">
            <label>Adaptive Mode:</label>
            <input type="checkbox" id="adaptive-mode" checked>
        </div>
        <div class="control-group">
            <label>GPU Acceleration:</label>
            <input type="checkbox" id="gpu-acceleration" checked>
        </div>
    </div>

    <script>
        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.isMonitoring = false;
                this.fps = 60;
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.memoryUsage = 0;
                this.callbacks = [];
                this.metrics = {
                    fps: 60,
                    memory: 0,
                    renderTime: 0,
                    snowflakeCount: 0
                };
            }

            startMonitoring() {
                this.isMonitoring = true;
                this.monitorLoop();
            }

            stopMonitoring() {
                this.isMonitoring = false;
            }

            monitorLoop() {
                if (!this.isMonitoring) return;

                const now = performance.now();
                this.frameCount++;

                // 计算FPS
                if (now - this.lastTime >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / (now - this.lastTime));
                    this.metrics.fps = this.fps;
                    this.frameCount = 0;
                    this.lastTime = now;

                    // 更新内存使用情况
                    if (performance.memory) {
                        this.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                        this.metrics.memory = this.memoryUsage;
                    }

                    this.updateUI();
                    this.checkThresholds();
                }

                requestAnimationFrame(() => this.monitorLoop());
            }

            updateUI() {
                document.getElementById('fps-value').textContent = this.fps;
                document.getElementById('memory-value').textContent = this.memoryUsage;
                
                // 更新状态指示器
                const fpsStatus = document.getElementById('fps-status');
                fpsStatus.className = 'performance-status ' + 
                    (this.fps >= 50 ? 'status-good' : this.fps >= 30 ? 'status-warning' : 'status-critical');

                const memoryStatus = document.getElementById('memory-status');
                memoryStatus.className = 'performance-status ' + 
                    (this.memoryUsage <= 50 ? 'status-good' : this.memoryUsage <= 100 ? 'status-warning' : 'status-critical');
            }

            checkThresholds() {
                let performanceLevel = 'high';
                if (this.fps < 30 || this.memoryUsage > 100) {
                    performanceLevel = 'low';
                } else if (this.fps < 50 || this.memoryUsage > 50) {
                    performanceLevel = 'medium';
                }

                this.callbacks.forEach(callback => callback(performanceLevel));
            }

            getPerformanceMetrics() {
                return { ...this.metrics };
            }

            onPerformanceThreshold(callback) {
                this.callbacks.push(callback);
            }
        }

        // 自适应质量控制器
        class AdaptiveQualityController {
            constructor() {
                this.currentQuality = 'high';
                this.maxSnowflakes = 100;
                this.adaptiveMode = true;
                this.qualitySettings = {
                    low: { maxSnowflakes: 30, animationQuality: 0.5, updateFrequency: 30 },
                    medium: { maxSnowflakes: 60, animationQuality: 0.7, updateFrequency: 45 },
                    high: { maxSnowflakes: 100, animationQuality: 1.0, updateFrequency: 60 }
                };
            }

            adjustQuality(performanceLevel) {
                if (!this.adaptiveMode) return;

                const newQuality = performanceLevel;
                if (newQuality !== this.currentQuality) {
                    this.currentQuality = newQuality;
                    const settings = this.qualitySettings[newQuality];
                    
                    this.setSnowflakeCount(settings.maxSnowflakes);
                    this.setAnimationQuality(settings.animationQuality);
                    
                    document.getElementById('quality-level').textContent = 
                        newQuality.charAt(0).toUpperCase() + newQuality.slice(1);
                }
            }

            setSnowflakeCount(count) {
                this.maxSnowflakes = count;
                if (window.snowflakeSystem) {
                    window.snowflakeSystem.adjustSnowflakeCount(count);
                }
            }

            setAnimationQuality(level) {
                // 调整动画质量
                const container = document.getElementById('snowflake-container');
                if (level < 0.7) {
                    container.style.filter = 'blur(0.5px)';
                } else {
                    container.style.filter = 'none';
                }
            }

            enableAdaptiveMode() {
                this.adaptiveMode = true;
            }

            disableAdaptiveMode() {
                this.adaptiveMode = false;
            }
        }

        // 渲染优化器
        class RenderOptimizer {
            constructor() {
                this.viewportCulling = true;
                this.gpuAcceleration = true;
                this.batchSize = 10;
                this.viewportBounds = {
                    left: -100,
                    right: window.innerWidth + 100,
                    top: -100,
                    bottom: window.innerHeight + 100
                };
            }

            batchUpdate(snowflakes) {
                // 批量更新雪花位置
                const batches = [];
                for (let i = 0; i < snowflakes.length; i += this.batchSize) {
                    batches.push(snowflakes.slice(i, i + this.batchSize));
                }

                batches.forEach((batch, index) => {
                    setTimeout(() => {
                        batch.forEach(snowflake => {
                            if (this.isInViewport(snowflake)) {
                                this.updateSnowflakeTransform(snowflake);
                            }
                        });
                    }, index * 2);
                });
            }

            isInViewport(snowflake) {
                if (!this.viewportCulling) return true;
                
                const x = snowflake.x;
                const y = snowflake.y;
                
                return x >= this.viewportBounds.left && 
                       x <= this.viewportBounds.right && 
                       y >= this.viewportBounds.top && 
                       y <= this.viewportBounds.bottom;
            }

            updateSnowflakeTransform(snowflake) {
                if (this.gpuAcceleration) {
                    snowflake.element.style.transform = 
                        `translate3d(${snowflake.x}px, ${snowflake.y}px, 0) rotate(${snowflake.rotation}deg)`;
                } else {
                    snowflake.element.style.left = snowflake.x + 'px';
                    snowflake.element.style.top = snowflake.y + 'px';
                    snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;
                }
            }

            enableViewportCulling() {
                this.viewportCulling = true;
            }

            optimizeTransforms() {
                // 优化变换性能
                const snowflakes = document.querySelectorAll('.snowflake');
                snowflakes.forEach(element => {
                    element.style.willChange = 'transform';
                    element.style.transform = element.style.transform || 'translateZ(0)';
                });
            }

            enableGPUAcceleration() {
                this.gpuAcceleration = true;
            }

            disableGPUAcceleration() {
                this.gpuAcceleration = false;
            }
        }

        // 内存管理器
        class MemoryManager {
            constructor(initialSize = 50) {
                this.pool = [];
                this.activeSnowflakes = new Set();
                this.maxPoolSize = initialSize * 2;
                this.initializePool(initialSize);
            }

            initializePool(size) {
                for (let i = 0; i < size; i++) {
                    this.pool.push(this.createSnowflakeObject());
                }
            }

            createSnowflakeObject() {
                const element = document.createElement('div');
                element.className = 'snowflake';
                element.innerHTML = '❄';
                
                return {
                    element: element,
                    x: 0,
                    y: 0,
                    speed: 1,
                    rotation: 0,
                    rotationSpeed: 1,
                    size: 1,
                    opacity: 1,
                    isActive: false
                };
            }

            getSnowflake() {
                let snowflake;
                
                if (this.pool.length > 0) {
                    snowflake = this.pool.pop();
                } else {
                    snowflake = this.createSnowflakeObject();
                }
                
                snowflake.isActive = true;
                this.activeSnowflakes.add(snowflake);
                this.resetSnowflake(snowflake);
                
                return snowflake;
            }

            releaseSnowflake(snowflake) {
                if (!snowflake.isActive) return;
                
                snowflake.isActive = false;
                this.activeSnowflakes.delete(snowflake);
                
                // 从DOM中移除
                if (snowflake.element.parentNode) {
                    snowflake.element.parentNode.removeChild(snowflake.element);
                }
                
                // 返回到对象池
                if (this.pool.length < this.maxPoolSize) {
                    this.pool.push(snowflake);
                }
            }

            resetSnowflake(snowflake) {
                // 随机初始化雪花属性
                snowflake.x = Math.random() * window.innerWidth;
                snowflake.y = -20;
                snowflake.speed = Math.random() * 2 + 1;
                snowflake.rotation = 0;
                snowflake.rotationSpeed = (Math.random() - 0.5) * 4;
                snowflake.size = Math.random() * 0.8 + 0.6;
                snowflake.opacity = Math.random() * 0.6 + 0.4;
                
                // 设置样式
                const types = ['type-1', 'type-2', 'type-3', 'type-4', 'type-5'];
                const sizes = ['size-small', 'size-medium', 'size-large'];
                
                snowflake.element.className = 'snowflake ' + 
                    types[Math.floor(Math.random() * types.length)] + ' ' +
                    sizes[Math.floor(Math.random() * sizes.length)];
                
                snowflake.element.style.opacity = snowflake.opacity;
                snowflake.element.style.fontSize = snowflake.size + 'em';
            }

            cleanupPool() {
                // 清理未使用的对象
                while (this.pool.length > 20) {
                    this.pool.pop();
                }
            }

            getPoolStatus() {
                return {
                    poolSize: this.pool.length,
                    activeCount: this.activeSnowflakes.size,
                    totalAllocated: this.pool.length + this.activeSnowflakes.size
                };
            }
        }

        // 雪花系统主类
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 100;
                this.isRunning = false;
                
                // 初始化各个组件
                this.performanceMonitor = new PerformanceMonitor();
                this.qualityController = new AdaptiveQualityController();
                this.renderOptimizer = new RenderOptimizer();
                this.memoryManager = new MemoryManager();
                
                this.setupEventListeners();
                this.setupPerformanceCallback();
            }

            setupEventListeners() {
                // 控制面板事件
                document.getElementById('max-snowflakes').addEventListener('input', (e) => {
                    this.maxSnowflakes = parseInt(e.target.value);
                    document.getElementById('max-snowflakes-value').textContent = this.maxSnowflakes;
                    this.adjustSnowflakeCount(this.maxSnowflakes);
                });

                document.getElementById('quality-select').addEventListener('change', (e) => {
                    this.qualityController.currentQuality = e.target.value;
                    this.qualityController.adjustQuality(e.target.value);
                });

                document.getElementById('adaptive-mode').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        this.qualityController.enableAdaptiveMode();
                    } else {
                        this.qualityController.disableAdaptiveMode();
                    }
                });

                document.getElementById('gpu-acceleration').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        this.renderOptimizer.enableGPUAcceleration();
                    } else {
                        this.renderOptimizer.disableGPUAcceleration();
                    }
                });

                // 窗口大小变化
                window.addEventListener('resize', () => {
                    this.renderOptimizer.viewportBounds = {
                        left: -100,
                        right: window.innerWidth + 100,
                        top: -100,
                        bottom: window.innerHeight + 100
                    };
                });
            }

            setupPerformanceCallback() {
                this.performanceMonitor.onPerformanceThreshold((level) => {
                    this.qualityController.adjustQuality(level);
                });
            }

            start() {
                this.isRunning = true;
                this.performanceMonitor.startMonitoring();
                this.animate();
                this.spawnSnowflakes();
            }

            stop() {
                this.isRunning = false;
                this.performanceMonitor.stopMonitoring();
            }

            spawnSnowflakes() {
                if (!this.isRunning) return;

                if (this.snowflakes.length < this.maxSnowflakes) {
                    const snowflake = this.memoryManager.getSnowflake();
                    this.container.appendChild(snowflake.element);
                    this.snowflakes.push(snowflake);
                }

                setTimeout(() => this.spawnSnowflakes(), 200);
            }

            animate() {
                if (!this.isRunning) return;

                // 更新雪花位置
                this.snowflakes = this.snowflakes.filter(snowflake => {
                    snowflake.y += snowflake.speed;
                    snowflake.x += Math.sin(snowflake.y * 0.01) * 0.5;
                    snowflake.rotation += snowflake.rotationSpeed;

                    // 检查是否超出屏幕
                    if (snowflake.y > window.innerHeight + 50) {
                        this.memoryManager.releaseSnowflake(snowflake);
                        return false;
                    }

                    return true;
                });

                // 批量更新渲染
                this.renderOptimizer.batchUpdate(this.snowflakes);

                // 更新UI
                this.updateUI();

                requestAnimationFrame(() => this.animate());
            }

            updateUI() {
                document.getElementById('snowflakes-count').textContent = this.snowflakes.length;
                
                const poolStatus = this.memoryManager.getPoolStatus();
                document.getElementById('pool-status').textContent = 
                    `${poolStatus.activeCount}/${poolStatus.totalAllocated}`;

                const snowflakesStatus = document.getElementById('snowflakes-status');
                snowflakesStatus.className = 'performance-status ' + 
                    (this.snowflakes.length <= this.maxSnowflakes * 0.8 ? 'status-good' : 
                     this.snowflakes.length <= this.maxSnowflakes ? 'status-warning' : 'status-critical');
            }

            adjustSnowflakeCount(count) {
                this.maxSnowflakes = count;
                
                // 如果当前雪花数量超过限制，移除多余的
                while (this.snowflakes.length > count) {
                    const snowflake = this.snowflakes.pop();
                    this.memoryManager.releaseSnowflake(snowflake);
                }
            }
        }

        // 初始化系统
        window.addEventListener('DOMContentLoaded', () => {
            window.snowflakeSystem = new SnowflakeSystem();
            window.snowflakeSystem.start();
        });

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (window.snowflakeSystem) {
                window.snowflakeSystem.stop();
            }
        });
    </script>
</body>
</html>
