<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 15px #00ffff,
                    0 0 25px #00ffff,
                    0 0 35px #00ffff,
                    0 0 45px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            width: 300px;
            height: 600px;
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #ffffff;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .score-display h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd93d;
        }

        .next-piece {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .next-piece h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .next-preview {
            width: 80px;
            height: 80px;
            border: 2px solid #ffffff;
            background: rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            border-radius: 5px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-align: center;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .game-over p {
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 20px;
            }
            
            .game-board {
                width: 250px;
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="score-display">
                <h3>得分</h3>
                <div class="score-value" id="score">0</div>
            </div>
            
            <div class="score-display">
                <h3>等级</h3>
                <div class="score-value" id="level">1</div>
            </div>
            
            <div class="score-display">
                <h3>消除行数</h3>
                <div class="score-value" id="lines">0</div>
            </div>
            
            <div class="next-piece">
                <h3>下一个</h3>
                <div class="next-preview" id="nextPreview"></div>
            </div>
            
            <div class="controls">
                <h3>操作说明</h3>
                <div class="control-item">
                    <span>左移:</span>
                    <span>← 或 A</span>
                </div>
                <div class="control-item">
                    <span>右移:</span>
                    <span>→ 或 D</span>
                </div>
                <div class="control-item">
                    <span>下降:</span>
                    <span>↓ 或 S</span>
                </div>
                <div class="control-item">
                    <span>旋转:</span>
                    <span>↑ 或 W</span>
                </div>
                <div class="control-item">
                    <span>暂停:</span>
                    <span>空格</span>
                </div>
            </div>
            
            <div class="game-buttons">
                <button class="btn" onclick="startGame()">开始游戏</button>
                <button class="btn" onclick="pauseGame()">暂停</button>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;
        
        // 游戏状态
        let gameBoard = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameInterval = null;
        
        // 方块类型定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };
        
        // 初始化游戏板
        function initBoard() {
            gameBoard = [];
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                gameBoard[row] = [];
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    gameBoard[row][col] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                type: randomType,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }
        
        // 检查方块是否可以放置
        function canPlacePiece(piece, x, y, shape = piece.shape) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const newX = x + col;
                        const newY = y + row;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && gameBoard[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        // 放置方块到游戏板
        function placePiece(piece) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const x = piece.x + col;
                        const y = piece.y + row;
                        if (y >= 0) {
                            gameBoard[y][x] = piece.color;
                        }
                    }
                }
            }
        }
        
        // 旋转方块
        function rotatePiece(shape) {
            const rows = shape.length;
            const cols = shape[0].length;
            const rotated = [];
            
            for (let col = 0; col < cols; col++) {
                rotated[col] = [];
                for (let row = rows - 1; row >= 0; row--) {
                    rotated[col][rows - 1 - row] = shape[row][col];
                }
            }
            
            return rotated;
        }
        
        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let row = BOARD_HEIGHT - 1; row >= 0; row--) {
                let isComplete = true;
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    if (!gameBoard[row][col]) {
                        isComplete = false;
                        break;
                    }
                }
                
                if (isComplete) {
                    gameBoard.splice(row, 1);
                    gameBoard.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    row++; // 重新检查当前行
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
            }
        }
        
        // 移动方块
        function movePiece(dx, dy) {
            if (!currentPiece) return false;
            
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            
            if (canPlacePiece(currentPiece, newX, newY)) {
                currentPiece.x = newX;
                currentPiece.y = newY;
                return true;
            }
            
            return false;
        }
        
        // 旋转当前方块
        function rotateCurrentPiece() {
            if (!currentPiece) return;
            
            const rotatedShape = rotatePiece(currentPiece.shape);
            if (canPlacePiece(currentPiece, currentPiece.x, currentPiece.y, rotatedShape)) {
                currentPiece.shape = rotatedShape;
            }
        }
        
        // 方块下落
        function dropPiece() {
            if (!movePiece(0, 1)) {
                placePiece(currentPiece);
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                
                if (!canPlacePiece(currentPiece, currentPiece.x, currentPiece.y)) {
                    gameOver();
                }
            }
        }
        
        // 渲染游戏
        function render() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) {
                createCanvas();
                return;
            }
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制游戏板
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    if (gameBoard[row][col]) {
                        ctx.fillStyle = gameBoard[row][col];
                        ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }
            
            // 绘制当前方块
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const x = (currentPiece.x + col) * CELL_SIZE;
                            const y = (currentPiece.y + row) * CELL_SIZE;
                            ctx.fillRect(x, y, CELL_SIZE - 1, CELL_SIZE - 1);
                        }
                    }
                }
            }
        }
        
        // 创建画布
        function createCanvas() {
            const gameBoard = document.getElementById('gameBoard');
            const canvas = document.createElement('canvas');
            canvas.id = 'gameCanvas';
            canvas.width = BOARD_WIDTH * CELL_SIZE;
            canvas.height = BOARD_HEIGHT * CELL_SIZE;
            canvas.style.display = 'block';
            gameBoard.appendChild(canvas);
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 开始游戏
        function startGame() {
            if (gameRunning && !gamePaused) return;
            
            if (!gameRunning) {
                initBoard();
                currentPiece = createPiece();
                nextPiece = createPiece();
                score = 0;
                level = 1;
                lines = 0;
                updateDisplay();
                document.getElementById('gameOver').style.display = 'none';
            }
            
            gameRunning = true;
            gamePaused = false;
            
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            gameInterval = setInterval(() => {
                if (!gamePaused) {
                    dropPiece();
                    render();
                }
            }, Math.max(100, 1000 - (level - 1) * 100));
        }
        
        // 暂停游戏
        function pauseGame() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
        }
        
        // 重新开始游戏
        function restartGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            gameRunning = false;
            gamePaused = false;
            document.getElementById('gameOver').style.display = 'none';
            
            // 清除画布
            const canvas = document.getElementById('gameCanvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            
            startGame();
        }
        
        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            if (!gameRunning || gamePaused) return;
            
            switch (event.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    dropPiece();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    rotateCurrentPiece();
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
            
            render();
            event.preventDefault();
        });
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            createCanvas();
            render();
        });
    </script>
</body>
</html>
