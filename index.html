<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        #game-board {
            width: 300px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #4a90e2;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #level {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
            min-width: 250px;
            max-height: 80vh;
            overflow-y: auto;
        }

        #test-panel h3 {
            margin-bottom: 10px;
            color: #4a90e2;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        #performance-stats {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #game-board {
                width: 250px;
                height: 500px;
            }
            
            #test-panel {
                position: fixed;
                bottom: 20px;
                right: 20px;
                top: auto;
                max-height: 200px;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">分数: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <div id="game-board"></div>
        <div id="controls">
            <div>← → 移动 | ↓ 加速 | ↑ 旋转</div>
            <div>空格键: 暂停/继续</div>
        </div>
    </div>
    
    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试面板</h3>
        <div id="test-results"></div>
        <div id="performance-stats">
            <h4>性能监控</h4>
            <div class="stat-item">
                <span>FPS:</span>
                <span id="fps-counter">0</span>
            </div>
            <div class="stat-item">
                <span>雪花数量:</span>
                <span id="snowflake-count">0</span>
            </div>
            <div class="stat-item">
                <span>内存使用:</span>
                <span id="memory-usage">N/A</span>
            </div>
            <div class="stat-item">
                <span>动画成本:</span>
                <span id="animation-cost">0ms</span>
            </div>
        </div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isRunning = false;
                this.animationId = null;
                this.lastTime = 0;
                this.config = {
                    minSize: 0.5,
                    maxSize: 1.5,
                    minSpeed: 1,
                    maxSpeed: 3,
                    windStrength: 0.5,
                    symbols: ['❄', '❅', '❆', '✻', '✼', '❈']
                };
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                snowflake.textContent = this.config.symbols[Math.floor(Math.random() * this.config.symbols.length)];
                
                const size = this.config.minSize + Math.random() * (this.config.maxSize - this.config.minSize);
                snowflake.style.fontSize = `${size}em`;
                snowflake.style.left = `${Math.random() * 100}%`;
                snowflake.style.top = '-50px';
                
                const snowflakeData = {
                    element: snowflake,
                    x: Math.random() * window.innerWidth,
                    y: -50,
                    speed: this.config.minSpeed + Math.random() * (this.config.maxSpeed - this.config.minSpeed),
                    drift: (Math.random() - 0.5) * this.config.windStrength,
                    rotation: 0,
                    rotationSpeed: (Math.random() - 0.5) * 2
                };
                
                this.container.appendChild(snowflake);
                this.snowflakes.push(snowflakeData);
            }

            updateSnowflakes(deltaTime) {
                for (let i = this.snowflakes.length - 1; i >= 0; i--) {
                    const snowflake = this.snowflakes[i];
                    
                    snowflake.y += snowflake.speed * deltaTime * 0.1;
                    snowflake.x += snowflake.drift * deltaTime * 0.05;
                    snowflake.rotation += snowflake.rotationSpeed * deltaTime * 0.1;
                    
                    snowflake.element.style.transform = `translate(${snowflake.x}px, ${snowflake.y}px) rotate(${snowflake.rotation}deg)`;
                    
                    if (snowflake.y > window.innerHeight + 50 || snowflake.x < -50 || snowflake.x > window.innerWidth + 50) {
                        this.container.removeChild(snowflake.element);
                        this.snowflakes.splice(i, 1);
                    }
                }
            }

            animate(currentTime) {
                if (!this.isRunning) return;
                
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                if (this.snowflakes.length < this.maxSnowflakes && Math.random() < 0.3) {
                    this.createSnowflake();
                }
                
                this.updateSnowflakes(deltaTime);
                
                this.animationId = requestAnimationFrame((time) => this.animate(time));
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.lastTime = performance.now();
                this.animate(this.lastTime);
            }

            stop() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            clear() {
                this.stop();
                this.snowflakes.forEach(snowflake => {
                    if (snowflake.element.parentNode) {
                        this.container.removeChild(snowflake.element);
                    }
                });
                this.snowflakes = [];
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.memoryUsage = 'N/A';
                this.animationCost = 0;
                this.isMonitoring = false;
            }

            start() {
                this.isMonitoring = true;
                this.monitor();
            }

            stop() {
                this.isMonitoring = false;
            }

            monitor() {
                if (!this.isMonitoring) return;

                const currentTime = performance.now();
                this.frameCount++;

                if (currentTime - this.lastTime >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                }

                // 内存使用监控
                if (performance.memory) {
                    const memory = performance.memory;
                    this.memoryUsage = `${Math.round(memory.usedJSHeapSize / 1024 / 1024)}MB`;
                }

                // 动画成本测量
                const animStart = performance.now();
                // 模拟动画计算成本
                const animEnd = performance.now();
                this.animationCost = Math.round((animEnd - animStart) * 100) / 100;

                requestAnimationFrame(() => this.monitor());
            }

            getStats() {
                return {
                    fps: this.fps,
                    memoryUsage: this.memoryUsage,
                    animationCost: this.animationCost
                };
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            constructor() {
                this.results = [];
            }

            validateBrowserSupport() {
                const tests = [
                    {
                        name: 'CSS Transform支持',
                        test: () => 'transform' in document.body.style,
                        critical: true
                    },
                    {
                        name: 'CSS Animation支持',
                        test: () => 'animation' in document.body.style,
                        critical: true
                    },
                    {
                        name: 'RequestAnimationFrame支持',
                        test: () => typeof requestAnimationFrame !== 'undefined',
                        critical: true
                    },
                    {
                        name: 'Performance API支持',
                        test: () => typeof performance !== 'undefined' && typeof performance.now === 'function',
                        critical: false
                    },
                    {
                        name: 'Memory API支持',
                        test: () => performance && performance.memory,
                        critical: false
                    }
                ];

                tests.forEach(test => {
                    const passed = test.test();
                    this.results.push({
                        name: test.name,
                        passed: passed,
                        critical: test.critical,
                        type: 'browser'
                    });
                });
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const isLowEnd = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 2;
                
                this.results.push({
                    name: '移动设备检测',
                    passed: true,
                    info: isMobile ? '移动设备' : '桌面设备',
                    type: 'mobile'
                });

                this.results.push({
                    name: '设备性能评估',
                    passed: !isLowEnd,
                    info: isLowEnd ? '低端设备' : '正常设备',
                    type: 'mobile'
                });
            }

            checkCSSAnimationSupport() {
                const testElement = document.createElement('div');
                testElement.style.cssText = 'animation: test 1s; transform: translateZ(0);';
                
                const hasAnimation = testElement.style.animation !== '';
                const has3D = testElement.style.transform !== '';
                
                this.results.push({
                    name: 'CSS动画支持',
                    passed: hasAnimation,
                    critical: true,
                    type: 'css'
                });

                this.results.push({
                    name: '3D变换支持',
                    passed: has3D,
                    critical: false,
                    type: 'css'
                });
            }

            validateResponsiveLayout() {
                const viewport = {
                    width: window.innerWidth,
                    height: window.innerHeight
                };

                const isMobile = viewport.width < 768;
                const isTablet = viewport.width >= 768 && viewport.width < 1024;
                const isDesktop = viewport.width >= 1024;

                this.results.push({
                    name: '响应式布局检测',
                    passed: true,
                    info: `${viewport.width}x${viewport.height} (${isMobile ? '手机' : isTablet ? '平板' : '桌面'})`,
                    type: 'responsive'
                });
            }

            getResults() {
                return this.results;
            }

            runAllTests() {
                this.results = [];
                this.validateBrowserSupport();
                this.testMobilePerformance();
                this.checkCSSAnimationSupport();
                this.validateResponsiveLayout();
                return this.results;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.snowflakeSystem = null;
                this.performanceMonitor = null;
                this.compatibilityValidator = null;
                this.testResults = [];
            }

            async runIntegrationTests() {
                console.log('开始集成测试...');
                this.testResults = [];

                // 初始化组件
                this.snowflakeSystem = new SnowflakeSystem();
                this.performanceMonitor = new PerformanceMonitor();
                this.compatibilityValidator = new CompatibilityValidator();

                // 运行兼容性测试
                const compatResults = this.compatibilityValidator.runAllTests();
                this.testResults.push(...compatResults);

                // 测试雪花生成
                await this.testSnowflakeGeneration();

                // 测试动画性能
                await this.testAnimationPerformance();

                // 测试响应式设计
                this.testResponsiveDesign();

                // 测试Z-Index层级
                this.testZIndexLayering();

                this.displayResults();
                return this.testResults;
            }

            async testSnowflakeGeneration() {
                try {
                    this.snowflakeSystem.start();
                    
                    // 等待雪花生成
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const snowflakeCount = this.snowflakeSystem.getSnowflakeCount();
                    
                    this.testResults.push({
                        name: '雪花生成测试',
                        passed: snowflakeCount > 0,
                        info: `生成了 ${snowflakeCount} 个雪花`,
                        type: 'generation'
                    });

                    this.testResults.push({
                        name: '雪花数量控制',
                        passed: snowflakeCount <= this.snowflakeSystem.maxSnowflakes,
                        info: `${snowflakeCount}/${this.snowflakeSystem.maxSnowflakes}`,
                        type: 'generation'
                    });

                } catch (error) {
                    this.testResults.push({
                        name: '雪花生成测试',
                        passed: false,
                        info: `错误: ${error.message}`,
                        type: 'generation'
                    });
                }
            }

            async testAnimationPerformance() {
                this.performanceMonitor.start();
                
                // 运行性能测试
                await new Promise(resolve => setTimeout(resolve, 3000));
                
                const stats = this.performanceMonitor.getStats();
                
                this.testResults.push({
                    name: 'FPS性能测试',
                    passed: stats.fps >= 30,
                    info: `${stats.fps} FPS`,
                    type: 'performance'
                });

                this.testResults.push({
                    name: '内存使用测试',
                    passed: true,
                    info: stats.memoryUsage,
                    type: 'performance'
                });
            }

            testResponsiveDesign() {
                const gameContainer = document.getElementById('game-container');
                const testPanel = document.getElementById('test-panel');
                
                const containerVisible = gameContainer && getComputedStyle(gameContainer).display !== 'none';
                const panelVisible = testPanel && getComputedStyle(testPanel).display !== 'none';
                
                this.testResults.push({
                    name: '游戏容器显示',
                    passed: containerVisible,
                    type: 'responsive'
                });

                this.testResults.push({
                    name: '测试面板显示',
                    passed: panelVisible,
                    type: 'responsive'
                });
            }

            testZIndexLayering() {
                const snowflakeContainer = document.getElementById('snowflake-container');
                const gameContainer = document.getElementById('game-container');
                const testPanel = document.getElementById('test-panel');
                
                const snowflakeZ = parseInt(getComputedStyle(snowflakeContainer).zIndex) || 0;
                const gameZ = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                const panelZ = parseInt(getComputedStyle(testPanel).zIndex) || 0;
                
                this.testResults.push({
                    name: 'Z-Index层级测试',
                    passed: snowflakeZ < gameZ && gameZ < panelZ,
                    info: `雪花:${snowflakeZ} < 游戏:${gameZ} < 面板:${panelZ}`,
                    type: 'layering'
                });
            }

            displayResults() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';
                
                this.testResults.forEach(result => {
                    const div = document.createElement('div');
                    div.className = `test-result ${result.passed ? 'test-pass' : 'test-fail'}`;
                    div.innerHTML = `
                        <strong>${result.name}:</strong> 
                        ${result.passed ? '✓' : '✗'} 
                        ${result.info ? `(${result.info})` : ''}
                    `;
                    resultsContainer.appendChild(div);
                });
            }
        }

        // 俄罗斯方块游戏集成适配器
        class TetrisGameIntegration {
            constructor(snowflakeSystem) {
                this.snowflakeSystem = snowflakeSystem;
                this.gameState = 'menu'; // menu, playing, paused, gameover
            }

            initSnowflakeBackground() {
                // 调整雪花参数以适配游戏
                this.snowflakeSystem.maxSnowflakes = 30; // 减少数量以提高性能
                this.snowflakeSystem.config.maxSpeed = 2; // 降低速度避免干扰
                this.snowflakeSystem.start();
            }

            adjustForGameUI() {
                // 确保雪花不会干扰游戏UI
                const gameBoard = document.getElementById('game-board');
                if (gameBoard) {
                    // 可以在这里添加特殊的雪花避让逻辑
                }
            }

            handleGameStateChanges(newState) {
                this.gameState = newState;
                
                switch (newState) {
                    case 'playing':
                        // 游戏进行时减少雪花数量
                        this.snowflakeSystem.maxSnowflakes = 20;
                        break;
                    case 'paused':
                        // 暂停时可以增加雪花数量
                        this.snowflakeSystem.maxSnowflakes = 40;
                        break;
                    case 'gameover':
                        // 游戏结束时恢复正常数量
                        this.snowflakeSystem.maxSnowflakes = 50;
                        break;
                }
            }

            optimizeForGameplay() {
                // 根据设备性能优化雪花效果
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (isMobile) {
                    this.snowflakeSystem.maxSnowflakes = 15;
                    this.snowflakeSystem.config.maxSize = 1.0;
                }
            }
        }

        // 主应用程序
        class App {
            constructor() {
                this.snowflakeSystem = new SnowflakeSystem();
                this.performanceMonitor = new PerformanceMonitor();
                this.testSuite = new IntegrationTestSuite();
                this.gameIntegration = new TetrisGameIntegration(this.snowflakeSystem);
                this.updateInterval = null;
            }

            async init() {
                console.log('初始化应用程序...');
                
                // 初始化雪花背景
                this.gameIntegration.initSnowflakeBackground();
                this.gameIntegration.adjustForGameUI();
                this.gameIntegration.optimizeForGameplay();
                
                // 启动性能监控
                this.performanceMonitor.start();
                
                // 运行集成测试
                await this.testSuite.runIntegrationTests();
                
                // 启动UI更新
                this.startUIUpdates();
                
                // 添加事件监听器
                this.addEventListeners();
                
                console.log('应用程序初始化完成');
            }

            startUIUpdates() {
                this.updateInterval = setInterval(() => {
                    this.updatePerformanceDisplay();
                }, 1000);
            }

            updatePerformanceDisplay() {
                const stats = this.performanceMonitor.getStats();
                const snowflakeCount = this.snowflakeSystem.getSnowflakeCount();
                
                document.getElementById('fps-counter').textContent = stats.fps;
                document.getElementById('snowflake-count').textContent = snowflakeCount;
                document.getElementById('memory-usage').textContent = stats.memoryUsage;
                document.getElementById('animation-cost').textContent = `${stats.animationCost}ms`;
            }

            addEventListeners() {
                // 窗口大小变化时重新运行响应式测试
                window.addEventListener('resize', () => {
                    setTimeout(() => {
                        this.testSuite.testResponsiveDesign();
                        this.testSuite.displayResults();
                    }, 100);
                });

                // 键盘事件（模拟游戏控制）
                document.addEventListener('keydown', (e) => {
                    switch (e.code) {
                        case 'Space':
                            // 模拟暂停/继续
                            const currentState = this.gameIntegration.gameState;
                            const newState = currentState === 'playing' ? 'paused' : 'playing';
                            this.gameIntegration.handleGameStateChanges(newState);
                            break;
                    }
                });
            }

            destroy() {
                if (this.updateInterval) {
                    clearInterval(this.updateInterval);
                }
                this.snowflakeSystem.clear();
                this.performanceMonitor.stop();
            }
        }

        // 启动应用程序
        let app;
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                app = new App();
                await app.init();
            } catch (error) {
                console.error('应用程序启动失败:', error);
            }
        });

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (app) {
                app.destroy();
            }
        });
    </script>
</body>
</html>
