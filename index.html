<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #game-canvas {
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.9);
        }

        #game-info {
            color: white;
            text-align: center;
            margin-top: 10px;
        }

        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
        }

        #test-controls {
            margin-bottom: 10px;
        }

        .test-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        .test-button:hover {
            background: #45a049;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px;
            border-radius: 3px;
        }

        .test-pass {
            background: rgba(76, 175, 80, 0.3);
            border-left: 3px solid #4CAF50;
        }

        .test-fail {
            background: rgba(244, 67, 54, 0.3);
            border-left: 3px solid #f44336;
        }

        .test-warning {
            background: rgba(255, 193, 7, 0.3);
            border-left: 3px solid #FFC107;
        }

        #performance-stats {
            font-size: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }

        /* 响应式设计测试 */
        @media (max-width: 768px) {
            #test-panel {
                position: fixed;
                bottom: 10px;
                right: 10px;
                top: auto;
                max-width: 250px;
                max-height: 200px;
            }
            
            #game-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="game-info">
            <div>俄罗斯方块 - 雪花特效版</div>
            <div>使用方向键控制</div>
        </div>
    </div>

    <!-- 测试面板 -->
    <div id="test-panel">
        <div id="test-controls">
            <button class="test-button" onclick="integrationTestSuite.runIntegrationTests()">运行全部测试</button>
            <button class="test-button" onclick="integrationTestSuite.testSnowflakeGeneration()">雪花生成测试</button>
            <button class="test-button" onclick="integrationTestSuite.testAnimationPerformance()">性能测试</button>
            <button class="test-button" onclick="integrationTestSuite.testResponsiveDesign()">响应式测试</button>
            <button class="test-button" onclick="integrationTestSuite.clearResults()">清除结果</button>
        </div>
        <div id="test-results"></div>
        <div id="performance-stats"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isActive = true;
                this.performanceMode = false;
                
                this.snowflakeTypes = ['❄', '❅', '❆', '✦', '✧', '✩'];
                this.init();
            }

            init() {
                this.createInitialSnowflakes();
                this.startAnimation();
            }

            createInitialSnowflakes() {
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    this.createSnowflake();
                }
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                snowflake.textContent = this.snowflakeTypes[Math.floor(Math.random() * this.snowflakeTypes.length)];
                
                // 随机属性
                const size = Math.random() * 0.8 + 0.6;
                const x = Math.random() * window.innerWidth;
                const y = -50;
                const speed = Math.random() * 2 + 1;
                const drift = Math.random() * 2 - 1;
                const rotation = Math.random() * 360;
                const rotationSpeed = Math.random() * 4 - 2;
                
                snowflake.style.fontSize = `${size}em`;
                snowflake.style.left = `${x}px`;
                snowflake.style.top = `${y}px`;
                snowflake.style.transform = `rotate(${rotation}deg)`;
                
                // 存储动画属性
                snowflake.animationData = {
                    x: x,
                    y: y,
                    speed: speed,
                    drift: drift,
                    rotation: rotation,
                    rotationSpeed: rotationSpeed,
                    size: size
                };
                
                this.container.appendChild(snowflake);
                this.snowflakes.push(snowflake);
                
                return snowflake;
            }

            updateSnowflakes() {
                if (!this.isActive) return;
                
                this.snowflakes.forEach((snowflake, index) => {
                    const data = snowflake.animationData;
                    
                    // 更新位置
                    data.y += data.speed;
                    data.x += data.drift * 0.5;
                    data.rotation += data.rotationSpeed;
                    
                    // 应用变换
                    snowflake.style.transform = `translate(${data.x}px, ${data.y}px) rotate(${data.rotation}deg)`;
                    
                    // 检查是否超出屏幕
                    if (data.y > window.innerHeight + 50 || data.x < -50 || data.x > window.innerWidth + 50) {
                        this.resetSnowflake(snowflake);
                    }
                });
            }

            resetSnowflake(snowflake) {
                const data = snowflake.animationData;
                data.x = Math.random() * window.innerWidth;
                data.y = -50;
                data.rotation = Math.random() * 360;
            }

            startAnimation() {
                const animate = () => {
                    this.updateSnowflakes();
                    requestAnimationFrame(animate);
                };
                animate();
            }

            setPerformanceMode(enabled) {
                this.performanceMode = enabled;
                if (enabled) {
                    this.maxSnowflakes = 25;
                    // 移除多余的雪花
                    while (this.snowflakes.length > this.maxSnowflakes) {
                        const snowflake = this.snowflakes.pop();
                        snowflake.remove();
                    }
                } else {
                    this.maxSnowflakes = 50;
                    // 添加更多雪花
                    while (this.snowflakes.length < this.maxSnowflakes) {
                        this.createSnowflake();
                    }
                }
            }

            pause() {
                this.isActive = false;
            }

            resume() {
                this.isActive = true;
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 俄罗斯方块游戏集成适配器
        class TetrisGameIntegration {
            constructor(snowflakeSystem) {
                this.snowflakeSystem = snowflakeSystem;
                this.gameCanvas = document.getElementById('game-canvas');
                this.gameContainer = document.getElementById('game-container');
                this.isGameActive = false;
                
                this.initSnowflakeBackground();
                this.adjustForGameUI();
            }

            initSnowflakeBackground() {
                // 确保雪花在游戏界面后面
                const container = document.getElementById('snowflake-container');
                container.style.zIndex = '1';
                this.gameContainer.style.zIndex = '10';
            }

            adjustForGameUI() {
                // 调整雪花密度以适应游戏界面
                this.snowflakeSystem.setPerformanceMode(true);
            }

            handleGameStateChanges(gameState) {
                switch (gameState) {
                    case 'playing':
                        this.isGameActive = true;
                        this.snowflakeSystem.setPerformanceMode(true);
                        break;
                    case 'paused':
                        this.snowflakeSystem.pause();
                        break;
                    case 'resumed':
                        this.snowflakeSystem.resume();
                        break;
                    case 'gameover':
                        this.isGameActive = false;
                        this.snowflakeSystem.setPerformanceMode(false);
                        break;
                }
            }

            optimizeForGameplay() {
                // 游戏进行时减少雪花数量
                if (this.isGameActive) {
                    this.snowflakeSystem.setPerformanceMode(true);
                }
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            constructor() {
                this.results = [];
            }

            validateBrowserSupport() {
                const tests = [
                    {
                        name: 'CSS Transform Support',
                        test: () => {
                            const div = document.createElement('div');
                            return 'transform' in div.style;
                        }
                    },
                    {
                        name: 'RequestAnimationFrame Support',
                        test: () => typeof requestAnimationFrame !== 'undefined'
                    },
                    {
                        name: 'CSS3 Animation Support',
                        test: () => {
                            const div = document.createElement('div');
                            return 'animation' in div.style;
                        }
                    },
                    {
                        name: 'Flexbox Support',
                        test: () => {
                            const div = document.createElement('div');
                            return 'flex' in div.style;
                        }
                    }
                ];

                const results = tests.map(test => ({
                    name: test.name,
                    passed: test.test(),
                    type: 'browser'
                }));

                this.results.push(...results);
                return results;
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const screenWidth = window.innerWidth;
                const devicePixelRatio = window.devicePixelRatio || 1;
                
                const results = [
                    {
                        name: 'Mobile Device Detection',
                        passed: true,
                        details: `Mobile: ${isMobile}, Width: ${screenWidth}px, DPR: ${devicePixelRatio}`,
                        type: 'mobile'
                    },
                    {
                        name: 'Screen Size Compatibility',
                        passed: screenWidth >= 320,
                        details: `Minimum width requirement met: ${screenWidth}px >= 320px`,
                        type: 'mobile'
                    }
                ];

                this.results.push(...results);
                return results;
            }

            checkCSSAnimationSupport() {
                const testElement = document.createElement('div');
                testElement.style.animation = 'test 1s';
                
                const results = [
                    {
                        name: 'CSS Animation Property',
                        passed: testElement.style.animation !== '',
                        type: 'css'
                    },
                    {
                        name: 'Transform3D Support',
                        passed: 'transform' in testElement.style && 'perspective' in testElement.style,
                        type: 'css'
                    }
                ];

                this.results.push(...results);
                return results;
            }

            validateResponsiveLayout() {
                const viewport = {
                    width: window.innerWidth,
                    height: window.innerHeight
                };

                const results = [
                    {
                        name: 'Viewport Size',
                        passed: viewport.width > 0 && viewport.height > 0,
                        details: `${viewport.width}x${viewport.height}`,
                        type: 'responsive'
                    },
                    {
                        name: 'Media Query Support',
                        passed: window.matchMedia && window.matchMedia('(max-width: 768px)').matches !== undefined,
                        type: 'responsive'
                    }
                ];

                this.results.push(...results);
                return results;
            }

            getAllResults() {
                return this.results;
            }

            clearResults() {
                this.results = [];
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.memoryUsage = 0;
                this.isMonitoring = false;
            }

            startMonitoring() {
                this.isMonitoring = true;
                this.monitorFrameRate();
                this.trackMemoryUsage();
            }

            stopMonitoring() {
                this.isMonitoring = false;
            }

            monitorFrameRate() {
                const monitor = () => {
                    if (!this.isMonitoring) return;
                    
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        this.fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                        
                        this.updatePerformanceDisplay();
                    }
                    
                    requestAnimationFrame(monitor);
                };
                
                monitor();
            }

            trackMemoryUsage() {
                if (performance.memory) {
                    const updateMemory = () => {
                        if (!this.isMonitoring) return;
                        
                        this.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                        setTimeout(updateMemory, 1000);
                    };
                    
                    updateMemory();
                }
            }

            measureAnimationCost() {
                const startTime = performance.now();
                
                // 模拟动画成本测量
                return new Promise((resolve) => {
                    requestAnimationFrame(() => {
                        const endTime = performance.now();
                        const cost = endTime - startTime;
                        resolve({
                            animationCost: cost,
                            acceptable: cost < 16.67 // 60fps threshold
                        });
                    });
                });
            }

            generatePerformanceReport() {
                return {
                    fps: this.fps,
                    memoryUsage: this.memoryUsage,
                    timestamp: new Date().toLocaleTimeString(),
                    performance: this.fps >= 30 ? 'Good' : this.fps >= 15 ? 'Fair' : 'Poor'
                };
            }

            updatePerformanceDisplay() {
                const statsElement = document.getElementById('performance-stats');
                if (statsElement) {
                    const report = this.generatePerformanceReport();
                    statsElement.innerHTML = `
                        <strong>性能统计:</strong><br>
                        FPS: ${report.fps}<br>
                        内存: ${report.memoryUsage}MB<br>
                        状态: ${report.performance}<br>
                        时间: ${report.timestamp}
                    `;
                }
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.compatibilityValidator = new CompatibilityValidator();
                this.performanceMonitor = new PerformanceMonitor();
                this.testResults = [];
                
                this.performanceMonitor.startMonitoring();
            }

            async runIntegrationTests() {
                this.clearResults();
                this.addResult('开始运行集成测试...', 'info');
                
                try {
                    await this.testSnowflakeGeneration();
                    await this.testAnimationPerformance();
                    await this.testResponsiveDesign();
                    await this.testZIndexLayering();
                    
                    this.addResult('所有测试完成!', 'pass');
                } catch (error) {
                    this.addResult(`测试失败: ${error.message}`, 'fail');
                }
            }

            async testSnowflakeGeneration() {
                this.addResult('测试雪花生成...', 'info');
                
                try {
                    const snowflakeCount = snowflakeSystem.getSnowflakeCount();
                    const containerExists = document.getElementById('snowflake-container') !== null;
                    const snowflakesExist = document.querySelectorAll('.snowflake').length > 0;
                    
                    if (containerExists && snowflakesExist && snowflakeCount > 0) {
                        this.addResult(`✓ 雪花生成成功 (${snowflakeCount}个雪花)`, 'pass');
                    } else {
                        this.addResult('✗ 雪花生成失败', 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 雪花生成测试错误: ${error.message}`, 'fail');
                }
            }

            async testAnimationPerformance() {
                this.addResult('测试动画性能...', 'info');
                
                try {
                    const animationCost = await this.performanceMonitor.measureAnimationCost();
                    const performanceReport = this.performanceMonitor.generatePerformanceReport();
                    
                    if (animationCost.acceptable && performanceReport.fps >= 30) {
                        this.addResult(`✓ 性能测试通过 (FPS: ${performanceReport.fps})`, 'pass');
                    } else if (performanceReport.fps >= 15) {
                        this.addResult(`⚠ 性能一般 (FPS: ${performanceReport.fps})`, 'warning');
                    } else {
                        this.addResult(`✗ 性能不佳 (FPS: ${performanceReport.fps})`, 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 性能测试错误: ${error.message}`, 'fail');
                }
            }

            async testResponsiveDesign() {
                this.addResult('测试响应式设计...', 'info');
                
                try {
                    const responsiveResults = this.compatibilityValidator.validateResponsiveLayout();
                    const mobileResults = this.compatibilityValidator.testMobilePerformance();
                    
                    const allPassed = [...responsiveResults, ...mobileResults].every(result => result.passed);
                    
                    if (allPassed) {
                        this.addResult('✓ 响应式设计测试通过', 'pass');
                    } else {
                        this.addResult('✗ 响应式设计测试失败', 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 响应式测试错误: ${error.message}`, 'fail');
                }
            }

            async testZIndexLayering() {
                this.addResult('测试层级关系...', 'info');
                
                try {
                    const snowflakeContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowflakeZ = parseInt(getComputedStyle(snowflakeContainer).zIndex) || 0;
                    const gameZ = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    const testZ = parseInt(getComputedStyle(testPanel).zIndex) || 0;
                    
                    if (snowflakeZ < gameZ && gameZ < testZ) {
                        this.addResult(`✓ 层级关系正确 (雪花:${snowflakeZ} < 游戏:${gameZ} < 测试:${testZ})`, 'pass');
                    } else {
                        this.addResult(`✗ 层级关系错误 (雪花:${snowflakeZ}, 游戏:${gameZ}, 测试:${testZ})`, 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 层级测试错误: ${error.message}`, 'fail');
                }
            }

            addResult(message, type) {
                const resultsContainer = document.getElementById('test-results');
                const resultElement = document.createElement('div');
                resultElement.className = `test-result test-${type}`;
                resultElement.textContent = message;
                resultsContainer.appendChild(resultElement);
                
                // 自动滚动到底部
                resultsContainer.scrollTop = resultsContainer.scrollHeight;
            }

            clearResults() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';
                this.compatibilityValidator.clearResults();
            }
        }

        // 初始化系统
        let snowflakeSystem;
        let tetrisGameIntegration;
        let integrationTestSuite;

        document.addEventListener('DOMContentLoaded', () => {
            // 初始化雪花系统
            snowflakeSystem = new SnowflakeSystem();
            
            // 初始化游戏集成
            tetrisGameIntegration = new TetrisGameIntegration(snowflakeSystem);
            
            // 初始化测试套件
            integrationTestSuite = new IntegrationTestSuite();
            
            // 模拟简单的俄罗斯方块游戏逻辑
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            
            // 绘制简单的游戏界面
            function drawGame() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制网格
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                
                for (let x = 0; x <= canvas.width; x += 30) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                
                for (let y = 0; y <= canvas.height; y += 30) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                
                // 绘制示例方块
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(90, 570, 30, 30);
                ctx.fillRect(120, 570, 30, 30);
                ctx.fillRect(150, 570, 30, 30);
                ctx.fillRect(120, 540, 30, 30);
            }
            
            drawGame();
            
            // 键盘事件处理
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'p':
                    case 'P':
                        // 暂停/恢复游戏
                        if (snowflakeSystem.isActive) {
                            tetrisGameIntegration.handleGameStateChanges('paused');
                        } else {
                            tetrisGameIntegration.handleGameStateChanges('resumed');
                        }
                        break;
                    case 'r':
                    case 'R':
                        // 运行测试
                        integrationTestSuite.runIntegrationTests();
                        break;
                }
            });
            
            // 窗口大小变化处理
            window.addEventListener('resize', () => {
                // 重新调整雪花系统
                snowflakeSystem.snowflakes.forEach(snowflake => {
                    const data = snowflake.animationData;
                    if (data.x > window.innerWidth) {
                        data.x = Math.random() * window.innerWidth;
                    }
                });
            });
            
            // 自动运行初始测试
            setTimeout(() => {
                integrationTestSuite.addResult('系统初始化完成', 'pass');
                integrationTestSuite.addResult('按 R 键运行完整测试', 'info');
                integrationTestSuite.addResult('按 P 键暂停/恢复雪花', 'info');
            }, 1000);
        });
    </script>
</body>
</html>
