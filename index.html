<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 20px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 15px #ff6b6b,
                    0 0 25px #ff6b6b,
                    0 0 35px #ff6b6b,
                    0 0 45px #ff6b6b,
                    0 0 55px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 15px #00ffff,
                    0 0 25px #00ffff,
                    0 0 35px #00ffff,
                    0 0 45px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            width: 300px;
            height: 600px;
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .game-info {
            color: #ffffff;
            min-width: 200px;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-display h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #ffd93d;
        }

        .score-display .score {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffff;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #ffd93d;
            text-align: center;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .control-key {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            color: #00ffff;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff6b6b;
            display: none;
        }

        .game-over h2 {
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .cell {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filled {
            border: 1px solid #ffffff;
        }

        /* 方块颜色 */
        .color-1 { background-color: #ff6b6b; }
        .color-2 { background-color: #4ecdc4; }
        .color-3 { background-color: #45b7d1; }
        .color-4 { background-color: #96ceb4; }
        .color-5 { background-color: #ffd93d; }
        .color-6 { background-color: #ff9ff3; }
        .color-7 { background-color: #54a0ff; }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="aaa-title">AAA</div>
        <div class="game-title">俄罗斯方块</div>
    </div>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="score-display">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="score-display">
                <h3>等级</h3>
                <div class="score" id="level">1</div>
            </div>
            
            <div class="controls">
                <h3>操作说明</h3>
                <div class="control-item">
                    <span>左移</span>
                    <span class="control-key">←</span>
                </div>
                <div class="control-item">
                    <span>右移</span>
                    <span class="control-key">→</span>
                </div>
                <div class="control-item">
                    <span>下落</span>
                    <span class="control-key">↓</span>
                </div>
                <div class="control-item">
                    <span>旋转</span>
                    <span class="control-key">↑</span>
                </div>
                <div class="control-item">
                    <span>暂停</span>
                    <span class="control-key">Space</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;
        
        // 游戏状态
        let board = [];
        let currentPiece = null;
        let score = 0;
        let level = 1;
        let gameRunning = false;
        let gameLoop = null;
        let dropSpeed = 1000;
        
        // 方块形状定义
        const PIECES = [
            // I 形
            {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: 1
            },
            // O 形
            {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: 2
            },
            // T 形
            {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: 3
            },
            // S 形
            {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: 4
            },
            // Z 形
            {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: 5
            },
            // J 形
            {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: 6
            },
            // L 形
            {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: 7
            }
        ];
        
        // 初始化游戏
        function initGame() {
            // 初始化游戏板
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            
            // 创建游戏板DOM
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '<div class="game-over" id="gameOver"><h2>游戏结束</h2><p>最终得分: <span id="finalScore">0</span></p><button class="restart-btn" onclick="restartGame()">重新开始</button></div>';
            
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.left = col * CELL_SIZE + 'px';
                    cell.style.top = row * CELL_SIZE + 'px';
                    cell.id = `cell-${row}-${col}`;
                    gameBoard.appendChild(cell);
                }
            }
            
            // 重置游戏状态
            score = 0;
            level = 1;
            dropSpeed = 1000;
            updateScore();
            
            // 生成第一个方块
            spawnPiece();
            
            // 开始游戏循环
            gameRunning = true;
            gameLoop = setInterval(gameStep, dropSpeed);
        }
        
        // 生成新方块
        function spawnPiece() {
            const pieceType = PIECES[Math.floor(Math.random() * PIECES.length)];
            currentPiece = {
                shape: pieceType.shape,
                color: pieceType.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(pieceType.shape[0].length / 2),
                y: 0
            };
            
            // 检查游戏是否结束
            if (checkCollision(currentPiece, 0, 0)) {
                gameOver();
            }
        }
        
        // 检查碰撞
        function checkCollision(piece, deltaX, deltaY) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const newX = piece.x + col + deltaX;
                        const newY = piece.y + row + deltaY;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || 
                            newY >= BOARD_HEIGHT || 
                            (newY >= 0 && board[newY][newX])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // 放置方块
        function placePiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const boardY = currentPiece.y + row;
                        const boardX = currentPiece.x + col;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }
        
        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            
            for (let row = BOARD_HEIGHT - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    board.splice(row, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    row++; // 重新检查同一行
                }
            }
            
            if (linesCleared > 0) {
                // 计算得分
                const lineScore = [0, 100, 300, 500, 800];
                score += lineScore[linesCleared] * level;
                
                // 升级
                level = Math.floor(score / 1000) + 1;
                dropSpeed = Math.max(100, 1000 - (level - 1) * 100);
                
                updateScore();
                
                // 重新设置游戏循环速度
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, dropSpeed);
            }
        }
        
        // 旋转方块
        function rotatePiece() {
            const rotated = currentPiece.shape[0].map((_, index) => 
                currentPiece.shape.map(row => row[index]).reverse()
            );
            
            const rotatedPiece = {
                ...currentPiece,
                shape: rotated
            };
            
            if (!checkCollision(rotatedPiece, 0, 0)) {
                currentPiece.shape = rotated;
            }
        }
        
        // 游戏步骤
        function gameStep() {
            if (!gameRunning) return;
            
            if (checkCollision(currentPiece, 0, 1)) {
                placePiece();
                clearLines();
                spawnPiece();
            } else {
                currentPiece.y++;
            }
            
            render();
        }
        
        // 渲染游戏
        function render() {
            // 清除所有单元格
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    const cell = document.getElementById(`cell-${row}-${col}`);
                    cell.className = 'cell';
                    
                    if (board[row][col]) {
                        cell.classList.add('filled', `color-${board[row][col]}`);
                    }
                }
            }
            
            // 渲染当前方块
            if (currentPiece) {
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const boardY = currentPiece.y + row;
                            const boardX = currentPiece.x + col;
                            
                            if (boardY >= 0 && boardY < BOARD_HEIGHT && 
                                boardX >= 0 && boardX < BOARD_WIDTH) {
                                const cell = document.getElementById(`cell-${boardY}-${boardX}`);
                                cell.classList.add('filled', `color-${currentPiece.color}`);
                            }
                        }
                    }
                }
            }
        }
        
        // 更新得分显示
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            initGame();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (event) => {
            if (!gameRunning) return;
            
            switch(event.key) {
                case 'ArrowLeft':
                    if (!checkCollision(currentPiece, -1, 0)) {
                        currentPiece.x--;
                        render();
                    }
                    break;
                case 'ArrowRight':
                    if (!checkCollision(currentPiece, 1, 0)) {
                        currentPiece.x++;
                        render();
                    }
                    break;
                case 'ArrowDown':
                    if (!checkCollision(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        render();
                    }
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    render();
                    break;
                case ' ':
                    event.preventDefault();
                    if (gameRunning) {
                        gameRunning = false;
                        clearInterval(gameLoop);
                    } else {
                        gameRunning = true;
                        gameLoop = setInterval(gameStep, dropSpeed);
                    }
                    break;
            }
        });
        
        // 启动游戏
        window.addEventListener('load', () => {
            initGame();
        });
    </script>
</body>
</html>
