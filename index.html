<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.5rem;
            margin-bottom: 15px;
            animation: titleGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: aaaGlow 3s ease-in-out infinite alternate, gradientShift 4s ease-in-out infinite;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff,
                    0 0 60px #00ffff;
            }
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b,
                    0 0 70px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 1px;
            background: #000;
            border: 3px solid #333;
            margin: 0 auto;
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #111;
            border: 1px solid #222;
        }

        .cell.filled {
            background: #00ffff;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .score {
            color: white;
            font-size: 1.5rem;
            margin-top: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h1 class="game-title">俄罗斯方块</h1>
    </div>
    
    <div class="game-container">
        <div class="game-board" id="gameBoard"></div>
        
        <div class="controls">
            <button class="btn" onclick="startGame()">开始游戏</button>
            <button class="btn" onclick="pauseGame()">暂停</button>
            <button class="btn" onclick="resetGame()">重置</button>
        </div>
        
        <div class="score">
            <div>得分: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            score: 0,
            level: 1,
            isPlaying: false,
            gameLoop: null
        };

        // 初始化游戏板
        function initBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            for (let i = 0; i < 200; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                board.appendChild(cell);
            }
            
            // 初始化游戏状态
            gameState.board = Array(20).fill().map(() => Array(10).fill(0));
            gameState.score = 0;
            gameState.level = 1;
            updateDisplay();
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            
            // 更新游戏板显示
            for (let row = 0; row < 20; row++) {
                for (let col = 0; col < 10; col++) {
                    const cellId = `cell-${row * 10 + col}`;
                    const cell = document.getElementById(cellId);
                    if (gameState.board[row][col]) {
                        cell.classList.add('filled');
                    } else {
                        cell.classList.remove('filled');
                    }
                }
            }
        }

        // 开始游戏
        function startGame() {
            if (!gameState.isPlaying) {
                gameState.isPlaying = true;
                gameLoop();
            }
        }

        // 暂停游戏
        function pauseGame() {
            gameState.isPlaying = false;
            if (gameState.gameLoop) {
                clearTimeout(gameState.gameLoop);
            }
        }

        // 重置游戏
        function resetGame() {
            pauseGame();
            initBoard();
        }

        // 游戏主循环
        function gameLoop() {
            if (gameState.isPlaying) {
                // 这里添加游戏逻辑
                updateDisplay();
                gameState.gameLoop = setTimeout(gameLoop, 1000 - gameState.level * 50);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', function(event) {
            if (!gameState.isPlaying) return;
            
            switch(event.key) {
                case 'ArrowLeft':
                    // 左移
                    break;
                case 'ArrowRight':
                    // 右移
                    break;
                case 'ArrowDown':
                    // 下移
                    break;
                case 'ArrowUp':
                    // 旋转
                    break;
            }
        });

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            initBoard();
        });
    </script>
</body>
</html>
