<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 100vw;
            max-height: 100vh;
            padding: 10px;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }

        #gameCanvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        .game-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .info-section h3 {
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .level {
            font-size: 18px;
            color: #ff6b6b;
        }

        .lines {
            font-size: 16px;
            color: #4ecdc4;
        }

        .fps {
            font-size: 14px;
            color: #ffd700;
        }

        .game-status {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .status-running {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }

        .status-paused {
            background: rgba(255, 255, 0, 0.2);
            color: #ffff00;
        }

        .status-gameover {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            padding: 10px;
        }

        .controls p {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 5px;
        }

        .overlay-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .overlay-button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4ecdc4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .overlay-button:hover {
            background: #45b7aa;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-text" id="overlayText">游戏暂停</div>
                <button class="overlay-button" id="overlayButton" onclick="gameLoop.resume()">继续游戏</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="game-status" id="gameStatus">准备开始</div>
            
            <div class="info-section">
                <h3>得分</h3>
                <div class="score" id="score">0</div>
            </div>
            
            <div class="info-section">
                <h3>等级</h3>
                <div class="level" id="level">1</div>
            </div>
            
            <div class="info-section">
                <h3>消除行数</h3>
                <div class="lines" id="lines">0</div>
            </div>
            
            <div class="info-section">
                <h3>帧率</h3>
                <div class="fps" id="fps">60</div>
            </div>
            
            <div class="info-section">
                <h3>控制说明</h3>
                <div class="controls">
                    <p>← → : 左右移动</p>
                    <p>↓ : 快速下降</p>
                    <p>↑ : 旋转</p>
                    <p>空格 : 暂停/继续</p>
                    <p>R : 重新开始</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态枚举
        const GameStates = {
            READY: 'ready',
            RUNNING: 'running',
            PAUSED: 'paused',
            GAME_OVER: 'gameover'
        };

        // 游戏状态管理器
        class GameState {
            constructor() {
                this.currentState = GameStates.READY;
                this.previousState = null;
                this.stateChangeCallbacks = {};
            }

            setState(newState) {
                if (this.currentState !== newState) {
                    this.previousState = this.currentState;
                    this.currentState = newState;
                    this.updateUI();
                    this.triggerStateChange(newState);
                }
            }

            getState() {
                return this.currentState;
            }

            isRunning() {
                return this.currentState === GameStates.RUNNING;
            }

            isPaused() {
                return this.currentState === GameStates.PAUSED;
            }

            isGameOver() {
                return this.currentState === GameStates.GAME_OVER;
            }

            isReady() {
                return this.currentState === GameStates.READY;
            }

            onStateChange(state, callback) {
                if (!this.stateChangeCallbacks[state]) {
                    this.stateChangeCallbacks[state] = [];
                }
                this.stateChangeCallbacks[state].push(callback);
            }

            triggerStateChange(state) {
                if (this.stateChangeCallbacks[state]) {
                    this.stateChangeCallbacks[state].forEach(callback => callback());
                }
            }

            updateUI() {
                const statusElement = document.getElementById('gameStatus');
                const overlayElement = document.getElementById('gameOverlay');
                const overlayText = document.getElementById('overlayText');
                const overlayButton = document.getElementById('overlayButton');

                // 清除所有状态类
                statusElement.className = 'game-status';

                switch (this.currentState) {
                    case GameStates.READY:
                        statusElement.textContent = '准备开始';
                        statusElement.classList.add('status-running');
                        overlayElement.style.display = 'flex';
                        overlayText.textContent = '按空格开始游戏';
                        overlayButton.textContent = '开始游戏';
                        overlayButton.onclick = () => gameLoop.start();
                        break;
                    case GameStates.RUNNING:
                        statusElement.textContent = '游戏进行中';
                        statusElement.classList.add('status-running');
                        overlayElement.style.display = 'none';
                        break;
                    case GameStates.PAUSED:
                        statusElement.textContent = '游戏暂停';
                        statusElement.classList.add('status-paused');
                        overlayElement.style.display = 'flex';
                        overlayText.textContent = '游戏暂停';
                        overlayButton.textContent = '继续游戏';
                        overlayButton.onclick = () => gameLoop.resume();
                        break;
                    case GameStates.GAME_OVER:
                        statusElement.textContent = '游戏结束';
                        statusElement.classList.add('status-gameover');
                        overlayElement.style.display = 'flex';
                        overlayText.textContent = '游戏结束';
                        overlayButton.textContent = '重新开始';
                        overlayButton.onclick = () => gameLoop.restart();
                        break;
                }
            }
        }

        // 时间管理器
        class TimeManager {
            constructor() {
                this.lastTime = 0;
                this.deltaTime = 0;
                this.gameTime = 0;
                this.fps = 60;
                this.frameCount = 0;
                this.fpsUpdateTime = 0;
                this.targetFPS = 60;
                this.frameInterval = 1000 / this.targetFPS;
            }

            update(currentTime) {
                this.deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                this.gameTime += this.deltaTime;
                
                // 计算FPS
                this.frameCount++;
                this.fpsUpdateTime += this.deltaTime;
                
                if (this.fpsUpdateTime >= 1000) {
                    this.fps = Math.round(this.frameCount * 1000 / this.fpsUpdateTime);
                    this.frameCount = 0;
                    this.fpsUpdateTime = 0;
                    this.updateFPSDisplay();
                }
            }

            getDeltaTime() {
                return this.deltaTime;
            }

            getFPS() {
                return this.fps;
            }

            getGameTime() {
                return this.gameTime;
            }

            reset() {
                this.gameTime = 0;
                this.frameCount = 0;
                this.fpsUpdateTime = 0;
            }

            updateFPSDisplay() {
                const fpsElement = document.getElementById('fps');
                if (fpsElement) {
                    fpsElement.textContent = this.fps;
                }
            }
        }

        // 渲染管理器
        class RenderManager {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.gridWidth = 10;
                this.gridHeight = 20;
                this.cellSize = 30;
                this.gridColor = '#333';
                this.backgroundColor = '#000';
            }

            clearCanvas() {
                this.ctx.fillStyle = this.backgroundColor;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            renderGrid() {
                this.ctx.strokeStyle = this.gridColor;
                this.ctx.lineWidth = 1;

                // 绘制垂直线
                for (let x = 0; x <= this.gridWidth; x++) {
                    const xPos = x * this.cellSize;
                    this.ctx.beginPath();
                    this.ctx.moveTo(xPos, 0);
                    this.ctx.lineTo(xPos, this.canvas.height);
                    this.ctx.stroke();
                }

                // 绘制水平线
                for (let y = 0; y <= this.gridHeight; y++) {
                    const yPos = y * this.cellSize;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, yPos);
                    this.ctx.lineTo(this.canvas.width, yPos);
                    this.ctx.stroke();
                }
            }

            renderBlock(x, y, color = '#fff') {
                const xPos = x * this.cellSize;
                const yPos = y * this.cellSize;
                
                this.ctx.fillStyle = color;
                this.ctx.fillRect(xPos + 1, yPos + 1, this.cellSize - 2, this.cellSize - 2);
                
                // 添加边框效果
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(xPos + 1, yPos + 1, this.cellSize - 2, this.cellSize - 2);
            }

            renderUI() {
                // 在画布上绘制一些基本信息
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '16px Arial';
                this.ctx.textAlign = 'left';
                
                // 可以在这里添加更多UI元素的渲染
            }

            render() {
                this.clearCanvas();
                this.renderGrid();
                
                // 渲染一些示例方块（实际游戏中会被游戏逻辑替换）
                this.renderDemoBlocks();
                
                this.renderUI();
            }

            renderDemoBlocks() {
                // 渲染一些示例方块来展示效果
                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57'];
                
                for (let i = 0; i < 5; i++) {
                    this.renderBlock(i, 18, colors[i]);
                    this.renderBlock(i + 5, 19, colors[i]);
                }
            }
        }

        // 游戏主循环
        class GameLoop {
            constructor(canvas) {
                this.gameState = new GameState();
                this.timeManager = new TimeManager();
                this.renderManager = new RenderManager(canvas);
                this.animationId = null;
                this.isInitialized = false;
                
                // 游戏数据
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                
                this.init();
            }

            init() {
                if (this.isInitialized) return;
                
                this.setupEventListeners();
                this.setupStateCallbacks();
                this.updateGameData();
                
                // 初始渲染
                this.renderManager.render();
                
                this.isInitialized = true;
                console.log('游戏循环初始化完成');
            }

            setupEventListeners() {
                document.addEventListener('keydown', (event) => {
                    this.handleKeyPress(event);
                });

                // 防止页面失焦时游戏继续运行
                window.addEventListener('blur', () => {
                    if (this.gameState.isRunning()) {
                        this.pause();
                    }
                });
            }

            setupStateCallbacks() {
                this.gameState.onStateChange(GameStates.RUNNING, () => {
                    console.log('游戏开始运行');
                });

                this.gameState.onStateChange(GameStates.PAUSED, () => {
                    console.log('游戏暂停');
                });

                this.gameState.onStateChange(GameStates.GAME_OVER, () => {
                    console.log('游戏结束');
                });
            }

            handleKeyPress(event) {
                switch (event.code) {
                    case 'Space':
                        event.preventDefault();
                        if (this.gameState.isReady()) {
                            this.start();
                        } else if (this.gameState.isRunning()) {
                            this.pause();
                        } else if (this.gameState.isPaused()) {
                            this.resume();
                        }
                        break;
                    case 'KeyR':
                        event.preventDefault();
                        this.restart();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case 'ArrowUp':
                        if (this.gameState.isRunning()) {
                            event.preventDefault();
                            this.handleGameInput(event.code);
                        }
                        break;
                }
            }

            handleGameInput(keyCode) {
                // 这里处理游戏输入逻辑
                console.log('游戏输入:', keyCode);
                
                // 示例：模拟得分增加
                if (keyCode === 'ArrowDown') {
                    this.score += 10;
                    this.updateGameData();
                }
            }

            start() {
                if (this.gameState.isReady() || this.gameState.isGameOver()) {
                    this.gameState.setState(GameStates.RUNNING);
                    this.timeManager.reset();
                    this.loop();
                }
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.gameState.setState(GameStates.GAME_OVER);
            }

            pause() {
                if (this.gameState.isRunning()) {
                    this.gameState.setState(GameStates.PAUSED);
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                        this.animationId = null;
                    }
                }
            }

            resume() {
                if (this.gameState.isPaused()) {
                    this.gameState.setState(GameStates.RUNNING);
                    this.loop();
                }
            }

            restart() {
                this.stop();
                this.resetGameData();
                this.gameState.setState(GameStates.READY);
                this.renderManager.render();
            }

            loop(currentTime = 0) {
                if (!this.gameState.isRunning()) {
                    return;
                }

                this.timeManager.update(currentTime);
                this.update(this.timeManager.getDeltaTime());
                this.render();

                this.animationId = requestAnimationFrame((time) => this.loop(time));
            }

            update(deltaTime) {
                // 这里添加游戏逻辑更新
                // 例如：方块下落、碰撞检测、消除行等
                
                // 示例：每秒自动增加一些分数
                if (Math.random() < 0.01) {
                    this.score += 1;
                    this.updateGameData();
                }
                
                // 示例：达到一定分数时游戏结束
                if (this.score >= 1000) {
                    this.stop();
                }
            }

            render() {
                this.renderManager.render();
            }

            updateGameData() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            resetGameData() {
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.updateGameData();
            }

            // 公共接口方法
            getScore() {
                return this.score;
            }

            getLevel() {
                return this.level;
            }

            getLines() {
                return this.lines;
            }

            addScore(points) {
                this.score += points;
                this.updateGameData();
            }

            addLines(count) {
                this.lines += count;
                // 每消除10行升一级
                this.level = Math.floor(this.lines / 10) + 1;
                this.updateGameData();
            }
        }

        // 初始化游戏
        let gameLoop;
        
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            gameLoop = new GameLoop(canvas);
            
            console.log('俄罗斯方块游戏已加载');
            console.log('按空格键开始游戏');
        });

        // 导出全局变量供调试使用
        window.gameLoop = gameLoop;
        window.GameStates = GameStates;
    </script>
</body>
</html>
