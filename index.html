<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪花生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
        }

        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            animation-name: snowfall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes snowfall {
            0% {
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 1000;
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #fff;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .control-group input {
            width: 100%;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .control-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 5px 0 0;
            transition: background 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>雪花控制器</h3>
        <div class="control-group">
            <label>雪花数量:</label>
            <input type="range" id="snowflakeCount" min="10" max="200" value="50">
            <span id="countValue">50</span>
        </div>
        <div class="control-group">
            <label>下落速度:</label>
            <input type="range" id="fallSpeed" min="1" max="10" value="5">
            <span id="speedValue">5</span>
        </div>
        <div class="control-group">
            <label>雪花大小:</label>
            <input type="range" id="snowflakeSize" min="0.5" max="3" step="0.1" value="1">
            <span id="sizeValue">1</span>
        </div>
        <button onclick="snowflakeSystem.start()">开始</button>
        <button onclick="snowflakeSystem.stop()">停止</button>
        <button onclick="snowflakeSystem.reset()">重置</button>
    </div>

    <div class="stats">
        <div>活跃雪花: <span id="activeCount">0</span></div>
        <div>池中雪花: <span id="poolCount">0</span></div>
        <div>总创建数: <span id="totalCreated">0</span></div>
    </div>

    <script>
        // 雪花配置管理器
        class SnowflakeConfig {
            constructor() {
                this.sizeRange = { min: 0.5, max: 2.5 };
                this.speedRange = { min: 2, max: 8 };
                this.opacityRange = { min: 0.3, max: 1 };
                this.colors = ['#ffffff', '#f0f8ff', '#e6f3ff', '#ddeeff'];
                this.shapes = ['❄', '❅', '❆', '✻', '✼', '❈'];
            }

            getRandomSize() {
                const baseSize = parseFloat(document.getElementById('snowflakeSize').value);
                return (Math.random() * (this.sizeRange.max - this.sizeRange.min) + this.sizeRange.min) * baseSize;
            }

            getRandomSpeed() {
                const baseSpeed = parseFloat(document.getElementById('fallSpeed').value);
                return (Math.random() * (this.speedRange.max - this.speedRange.min) + this.speedRange.min) * baseSpeed;
            }

            getRandomOpacity() {
                return Math.random() * (this.opacityRange.max - this.opacityRange.min) + this.opacityRange.min;
            }

            getRandomPosition() {
                return {
                    x: Math.random() * window.innerWidth,
                    y: -50 - Math.random() * 50
                };
            }

            getRandomColor() {
                return this.colors[Math.floor(Math.random() * this.colors.length)];
            }

            getRandomShape() {
                return this.shapes[Math.floor(Math.random() * this.shapes.length)];
            }
        }

        // 雪花对象池
        class SnowflakePool {
            constructor(initialSize = 50) {
                this.pool = [];
                this.activeSnowflakes = new Set();
                this.initPool(initialSize);
            }

            initPool(size) {
                for (let i = 0; i < size; i++) {
                    const element = document.createElement('div');
                    element.className = 'snowflake';
                    element.style.display = 'none';
                    document.body.appendChild(element);
                    this.pool.push({
                        element: element,
                        x: 0,
                        y: 0,
                        speed: 0,
                        size: 0,
                        opacity: 0,
                        rotation: 0,
                        rotationSpeed: 0,
                        active: false
                    });
                }
            }

            getSnowflake() {
                let snowflake = this.pool.find(s => !s.active);
                
                if (!snowflake) {
                    this.expandPool();
                    snowflake = this.pool.find(s => !s.active);
                }

                if (snowflake) {
                    snowflake.active = true;
                    this.activeSnowflakes.add(snowflake);
                    snowflake.element.style.display = 'block';
                }

                return snowflake;
            }

            returnSnowflake(snowflake) {
                if (snowflake && snowflake.active) {
                    snowflake.active = false;
                    snowflake.element.style.display = 'none';
                    this.activeSnowflakes.delete(snowflake);
                }
            }

            expandPool() {
                const expandSize = 20;
                for (let i = 0; i < expandSize; i++) {
                    const element = document.createElement('div');
                    element.className = 'snowflake';
                    element.style.display = 'none';
                    document.body.appendChild(element);
                    this.pool.push({
                        element: element,
                        x: 0,
                        y: 0,
                        speed: 0,
                        size: 0,
                        opacity: 0,
                        rotation: 0,
                        rotationSpeed: 0,
                        active: false
                    });
                }
            }

            getActiveCount() {
                return this.activeSnowflakes.size;
            }

            getPoolSize() {
                return this.pool.length;
            }

            clear() {
                this.activeSnowflakes.forEach(snowflake => {
                    this.returnSnowflake(snowflake);
                });
            }
        }

        // 雪花生成器
        class SnowflakeGenerator {
            constructor() {
                this.config = new SnowflakeConfig();
                this.pool = new SnowflakePool();
                this.totalCreated = 0;
            }

            createSnowflake() {
                const snowflake = this.pool.getSnowflake();
                if (!snowflake) return null;

                this.generateRandomConfig(snowflake);
                this.totalCreated++;
                return snowflake;
            }

            generateRandomConfig(snowflake) {
                const position = this.config.getRandomPosition();
                snowflake.x = position.x;
                snowflake.y = position.y;
                snowflake.speed = this.config.getRandomSpeed();
                snowflake.size = this.config.getRandomSize();
                snowflake.opacity = this.config.getRandomOpacity();
                snowflake.rotation = 0;
                snowflake.rotationSpeed = (Math.random() - 0.5) * 4;

                const element = snowflake.element;
                element.textContent = this.config.getRandomShape();
                element.style.left = snowflake.x + 'px';
                element.style.top = snowflake.y + 'px';
                element.style.fontSize = snowflake.size + 'em';
                element.style.opacity = snowflake.opacity;
                element.style.color = this.config.getRandomColor();
                element.style.transform = `rotate(${snowflake.rotation}deg)`;
            }

            resetSnowflake(snowflake) {
                const position = this.config.getRandomPosition();
                snowflake.x = position.x;
                snowflake.y = position.y;
                snowflake.rotation = 0;
                
                snowflake.element.style.left = snowflake.x + 'px';
                snowflake.element.style.top = snowflake.y + 'px';
                snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;
            }

            removeSnowflake(snowflake) {
                this.pool.returnSnowflake(snowflake);
            }

            updateSnowflake(snowflake, deltaTime) {
                if (!snowflake.active) return false;

                snowflake.y += snowflake.speed * deltaTime * 0.1;
                snowflake.rotation += snowflake.rotationSpeed * deltaTime * 0.1;
                snowflake.x += Math.sin(snowflake.y * 0.01) * 0.5;

                snowflake.element.style.left = snowflake.x + 'px';
                snowflake.element.style.top = snowflake.y + 'px';
                snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;

                if (snowflake.y > window.innerHeight + 50) {
                    this.resetSnowflake(snowflake);
                }

                return true;
            }

            getStats() {
                return {
                    active: this.pool.getActiveCount(),
                    poolSize: this.pool.getPoolSize(),
                    totalCreated: this.totalCreated
                };
            }

            clear() {
                this.pool.clear();
            }
        }

        // 雪花系统主控制器
        class SnowflakeSystem {
            constructor() {
                this.generator = new SnowflakeGenerator();
                this.isRunning = false;
                this.lastTime = 0;
                this.animationId = null;
                this.spawnTimer = 0;
                this.spawnInterval = 100; // 毫秒
                
                this.initControls();
                this.updateStats();
            }

            initControls() {
                const countSlider = document.getElementById('snowflakeCount');
                const speedSlider = document.getElementById('fallSpeed');
                const sizeSlider = document.getElementById('snowflakeSize');

                countSlider.addEventListener('input', (e) => {
                    document.getElementById('countValue').textContent = e.target.value;
                });

                speedSlider.addEventListener('input', (e) => {
                    document.getElementById('speedValue').textContent = e.target.value;
                });

                sizeSlider.addEventListener('input', (e) => {
                    document.getElementById('sizeValue').textContent = e.target.value;
                });
            }

            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.lastTime = performance.now();
                this.animate();
            }

            stop() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            reset() {
                this.stop();
                this.generator.clear();
                this.generator.totalCreated = 0;
                this.updateStats();
            }

            animate(currentTime = performance.now()) {
                if (!this.isRunning) return;

                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;

                // 生成新雪花
                this.spawnTimer += deltaTime;
                const maxSnowflakes = parseInt(document.getElementById('snowflakeCount').value);
                const currentActive = this.generator.getStats().active;
                
                if (this.spawnTimer >= this.spawnInterval && currentActive < maxSnowflakes) {
                    this.generator.createSnowflake();
                    this.spawnTimer = 0;
                }

                // 更新所有活跃雪花
                this.generator.pool.activeSnowflakes.forEach(snowflake => {
                    this.generator.updateSnowflake(snowflake, deltaTime);
                });

                this.updateStats();
                this.animationId = requestAnimationFrame((time) => this.animate(time));
            }

            updateStats() {
                const stats = this.generator.getStats();
                document.getElementById('activeCount').textContent = stats.active;
                document.getElementById('poolCount').textContent = stats.poolSize - stats.active;
                document.getElementById('totalCreated').textContent = stats.totalCreated;
            }
        }

        // 初始化系统
        const snowflakeSystem = new SnowflakeSystem();
        
        // 窗口大小改变时重新调整
        window.addEventListener('resize', () => {
            // 重新调整雪花位置逻辑可以在这里添加
        });

        // 自动启动
        setTimeout(() => {
            snowflakeSystem.start();
        }, 500);
    </script>
</body>
</html>
