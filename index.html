<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #tetris-board {
            width: 300px;
            height: 600px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #game-info {
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }

        #controls {
            color: white;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            border: 1px solid #333;
        }

        #test-panel h3 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px 0;
        }

        .test-passed {
            color: #4CAF50;
        }

        .test-failed {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        #performance-stats {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #tetris-board {
                width: 250px;
                height: 500px;
            }
            
            #test-panel {
                font-size: 10px;
                padding: 10px;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <h2>俄罗斯方块 - 雪花特效版</h2>
            <p>分数: <span id="score">0</span></p>
        </div>
        <div id="tetris-board"></div>
        <div id="controls">
            <p>方向键控制 | 空格键暂停</p>
        </div>
    </div>
    
    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>集成测试结果</h3>
        <div id="test-results"></div>
        <div id="performance-stats">
            <h4>性能监控</h4>
            <div class="stat-item">
                <span>帧率:</span>
                <span id="fps-counter">0 FPS</span>
            </div>
            <div class="stat-item">
                <span>雪花数量:</span>
                <span id="snowflake-count">0</span>
            </div>
            <div class="stat-item">
                <span>内存使用:</span>
                <span id="memory-usage">N/A</span>
            </div>
        </div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.animationId = null;
                this.isRunning = false;
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
                this.isRunning = true;
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✦', '✧', '✩'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // 随机初始位置和属性
                    const size = Math.random() * 0.8 + 0.6;
                    snowflake.style.fontSize = `${size}em`;
                    snowflake.style.left = `${Math.random() * 100}%`;
                    snowflake.style.top = `${-10}px`;
                    
                    // 动画属性
                    snowflake.speed = Math.random() * 2 + 1;
                    snowflake.drift = (Math.random() - 0.5) * 2;
                    snowflake.rotation = 0;
                    snowflake.rotationSpeed = (Math.random() - 0.5) * 4;
                    
                    this.container.appendChild(snowflake);
                    this.snowflakes.push(snowflake);
                }
            }

            updateSnowflakes() {
                this.snowflakes.forEach(snowflake => {
                    const currentTop = parseFloat(snowflake.style.top) || 0;
                    const currentLeft = parseFloat(snowflake.style.left) || 0;
                    
                    // 更新位置
                    const newTop = currentTop + snowflake.speed;
                    const newLeft = currentLeft + snowflake.drift * 0.1;
                    
                    // 更新旋转
                    snowflake.rotation += snowflake.rotationSpeed;
                    
                    snowflake.style.top = `${newTop}px`;
                    snowflake.style.left = `${newLeft}%`;
                    snowflake.style.transform = `rotate(${snowflake.rotation}deg)`;
                    
                    // 重置超出屏幕的雪花
                    if (newTop > window.innerHeight + 10) {
                        snowflake.style.top = '-10px';
                        snowflake.style.left = `${Math.random() * 100}%`;
                        snowflake.rotation = 0;
                    }
                    
                    if (newLeft > 100 || newLeft < -5) {
                        snowflake.style.left = `${Math.random() * 100}%`;
                    }
                });
            }

            startAnimation() {
                const animate = () => {
                    this.updateSnowflakes();
                    this.animationId = requestAnimationFrame(animate);
                };
                animate();
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.isRunning = false;
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.results = [];
                this.testPanel = document.getElementById('test-results');
            }

            runIntegrationTests() {
                this.logTest('开始集成测试...', 'info');
                
                this.testSnowflakeGeneration();
                this.testAnimationPerformance();
                this.testResponsiveDesign();
                this.testZIndexLayering();
                this.testBrowserCompatibility();
                
                this.logTest('集成测试完成', 'info');
                return this.results;
            }

            testSnowflakeGeneration() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const snowflakes = container.querySelectorAll('.snowflake');
                    
                    if (snowflakes.length > 0) {
                        this.logTest(`✓ 雪花生成测试通过 (${snowflakes.length}个雪花)`, 'passed');
                    } else {
                        this.logTest('✗ 雪花生成测试失败', 'failed');
                    }
                } catch (error) {
                    this.logTest(`✗ 雪花生成测试异常: ${error.message}`, 'failed');
                }
            }

            testAnimationPerformance() {
                try {
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    const testAnimation = () => {
                        frameCount++;
                        const elapsed = performance.now() - startTime;
                        
                        if (elapsed >= 1000) {
                            const fps = Math.round(frameCount);
                            if (fps >= 30) {
                                this.logTest(`✓ 动画性能测试通过 (${fps} FPS)`, 'passed');
                            } else if (fps >= 20) {
                                this.logTest(`⚠ 动画性能警告 (${fps} FPS)`, 'warning');
                            } else {
                                this.logTest(`✗ 动画性能不足 (${fps} FPS)`, 'failed');
                            }
                            return;
                        }
                        
                        requestAnimationFrame(testAnimation);
                    };
                    
                    requestAnimationFrame(testAnimation);
                } catch (error) {
                    this.logTest(`✗ 动画性能测试异常: ${error.message}`, 'failed');
                }
            }

            testResponsiveDesign() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    const containerRect = container.getBoundingClientRect();
                    const gameRect = gameContainer.getBoundingClientRect();
                    
                    if (containerRect.width === window.innerWidth && 
                        containerRect.height === window.innerHeight) {
                        this.logTest('✓ 响应式设计测试通过', 'passed');
                    } else {
                        this.logTest('✗ 响应式设计测试失败', 'failed');
                    }
                } catch (error) {
                    this.logTest(`✗ 响应式设计测试异常: ${error.message}`, 'failed');
                }
            }

            testZIndexLayering() {
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    const panelZIndex = parseInt(getComputedStyle(testPanel).zIndex) || 0;
                    
                    if (snowZIndex < gameZIndex && gameZIndex < panelZIndex) {
                        this.logTest('✓ Z-Index层级测试通过', 'passed');
                    } else {
                        this.logTest(`✗ Z-Index层级测试失败 (雪花:${snowZIndex}, 游戏:${gameZIndex}, 面板:${panelZIndex})`, 'failed');
                    }
                } catch (error) {
                    this.logTest(`✗ Z-Index层级测试异常: ${error.message}`, 'failed');
                }
            }

            testBrowserCompatibility() {
                try {
                    const features = {
                        'CSS动画': 'animationName' in document.body.style,
                        'CSS变换': 'transform' in document.body.style,
                        'requestAnimationFrame': typeof requestAnimationFrame !== 'undefined',
                        '性能API': typeof performance !== 'undefined'
                    };
                    
                    const unsupported = Object.entries(features)
                        .filter(([name, supported]) => !supported)
                        .map(([name]) => name);
                    
                    if (unsupported.length === 0) {
                        this.logTest('✓ 浏览器兼容性测试通过', 'passed');
                    } else {
                        this.logTest(`⚠ 部分功能不支持: ${unsupported.join(', ')}`, 'warning');
                    }
                } catch (error) {
                    this.logTest(`✗ 浏览器兼容性测试异常: ${error.message}`, 'failed');
                }
            }

            logTest(message, type) {
                const result = { message, type, timestamp: new Date().toLocaleTimeString() };
                this.results.push(result);
                
                const div = document.createElement('div');
                div.className = `test-result test-${type}`;
                div.textContent = `[${result.timestamp}] ${message}`;
                this.testPanel.appendChild(div);
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.fpsCounter = document.getElementById('fps-counter');
                this.snowflakeCounter = document.getElementById('snowflake-count');
                this.memoryUsage = document.getElementById('memory-usage');
            }

            startMonitoring(snowflakeSystem) {
                const monitor = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        this.fps = Math.round(this.frameCount * 1000 / (currentTime - this.lastTime));
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                        
                        this.updateDisplay(snowflakeSystem);
                    }
                    
                    requestAnimationFrame(monitor);
                };
                
                requestAnimationFrame(monitor);
            }

            updateDisplay(snowflakeSystem) {
                this.fpsCounter.textContent = `${this.fps} FPS`;
                this.snowflakeCounter.textContent = snowflakeSystem.getSnowflakeCount();
                
                if (performance.memory) {
                    const memoryMB = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                    this.memoryUsage.textContent = `${memoryMB} MB`;
                } else {
                    this.memoryUsage.textContent = 'N/A';
                }
            }
        }

        // 俄罗斯方块游戏集成适配器
        class TetrisGameIntegration {
            constructor(snowflakeSystem) {
                this.snowflakeSystem = snowflakeSystem;
                this.gameBoard = document.getElementById('tetris-board');
                this.score = 0;
                this.scoreElement = document.getElementById('score');
            }

            initSnowflakeBackground() {
                // 确保雪花在游戏背景层
                this.snowflakeSystem.init();
            }

            adjustForGameUI() {
                // 调整雪花密度以适应游戏界面
                const gameRect = this.gameBoard.getBoundingClientRect();
                const snowflakes = this.snowflakeSystem.snowflakes;
                
                snowflakes.forEach(snowflake => {
                    const rect = snowflake.getBoundingClientRect();
                    // 如果雪花与游戏区域重叠，降低其不透明度
                    if (rect.left < gameRect.right && rect.right > gameRect.left &&
                        rect.top < gameRect.bottom && rect.bottom > gameRect.top) {
                        snowflake.style.opacity = '0.3';
                    } else {
                        snowflake.style.opacity = '1';
                    }
                });
            }

            handleGameStateChanges() {
                // 模拟游戏状态变化
                setInterval(() => {
                    this.score += Math.floor(Math.random() * 100);
                    this.scoreElement.textContent = this.score;
                    this.adjustForGameUI();
                }, 2000);
            }

            optimizeForGameplay() {
                // 根据游戏性能动态调整雪花数量
                const monitor = new PerformanceMonitor();
                
                setInterval(() => {
                    if (monitor.fps < 30 && this.snowflakeSystem.maxSnowflakes > 20) {
                        // 性能不足时减少雪花
                        this.snowflakeSystem.maxSnowflakes -= 5;
                        console.log('性能优化：减少雪花数量');
                    } else if (monitor.fps > 50 && this.snowflakeSystem.maxSnowflakes < 50) {
                        // 性能充足时增加雪花
                        this.snowflakeSystem.maxSnowflakes += 5;
                        console.log('性能优化：增加雪花数量');
                    }
                }, 5000);
            }
        }

        // 初始化系统
        document.addEventListener('DOMContentLoaded', () => {
            // 创建雪花系统
            const snowflakeSystem = new SnowflakeSystem();
            
            // 创建游戏集成适配器
            const gameIntegration = new TetrisGameIntegration(snowflakeSystem);
            
            // 创建测试套件
            const testSuite = new IntegrationTestSuite();
            
            // 创建性能监控器
            const performanceMonitor = new PerformanceMonitor();
            
            // 初始化雪花背景
            gameIntegration.initSnowflakeBackground();
            
            // 启动游戏状态处理
            gameIntegration.handleGameStateChanges();
            
            // 启动性能优化
            gameIntegration.optimizeForGameplay();
            
            // 启动性能监控
            performanceMonitor.startMonitoring(snowflakeSystem);
            
            // 延迟运行集成测试，确保系统完全初始化
            setTimeout(() => {
                testSuite.runIntegrationTests();
            }, 2000);
            
            // 键盘事件处理（模拟游戏控制）
            document.addEventListener('keydown', (event) => {
                switch(event.code) {
                    case 'Space':
                        // 暂停/恢复雪花动画
                        if (snowflakeSystem.isRunning) {
                            snowflakeSystem.stop();
                            console.log('雪花动画已暂停');
                        } else {
                            snowflakeSystem.startAnimation();
                            snowflakeSystem.isRunning = true;
                            console.log('雪花动画已恢复');
                        }
                        break;
                    case 'ArrowUp':
                    case 'ArrowDown':
                    case 'ArrowLeft':
                    case 'ArrowRight':
                        // 模拟游戏控制
                        console.log(`游戏控制: ${event.code}`);
                        break;
                }
            });
            
            // 窗口大小变化处理
            window.addEventListener('resize', () => {
                gameIntegration.adjustForGameUI();
                console.log('窗口大小已调整，重新适配界面');
            });
            
            console.log('雪花特效俄罗斯方块游戏初始化完成');
        });
    </script>
</body>
</html>
