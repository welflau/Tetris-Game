<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        #game-canvas {
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.9);
            display: block;
        }

        #game-info {
            color: white;
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
        }

        /* 测试控制面板 */
        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            backdrop-filter: blur(5px);
        }

        #test-panel h3 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .test-result {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-result.pass {
            color: #4CAF50;
        }

        .test-result.fail {
            color: #f44336;
        }

        .test-result.warning {
            color: #ff9800;
        }

        #performance-stats {
            margin-top: 10px;
            font-size: 11px;
            color: #ccc;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #test-panel {
                position: fixed;
                bottom: 10px;
                right: 10px;
                top: auto;
                max-width: 250px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .snowflake {
                font-size: 0.8em;
            }
            
            #test-panel {
                max-width: 200px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="game-info">
            <div>得分: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
        </div>
    </div>
    
    <!-- 测试控制面板 -->
    <div id="test-panel">
        <h3>集成测试结果</h3>
        <div id="test-results"></div>
        <div id="performance-stats"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = this.getMaxSnowflakes();
                this.snowflakeTypes = ['❄', '❅', '❆', '✻', '✼', '❉'];
                this.isRunning = false;
                this.animationId = null;
            }

            getMaxSnowflakes() {
                const width = window.innerWidth;
                if (width < 480) return 30;
                if (width < 768) return 50;
                return 80;
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                const type = Math.floor(Math.random() * 4) + 1;
                const symbol = this.snowflakeTypes[Math.floor(Math.random() * this.snowflakeTypes.length)];
                
                snowflake.className = `snowflake type-${type}`;
                snowflake.textContent = symbol;
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.top = '-20px';
                snowflake.style.fontSize = (Math.random() * 0.8 + 0.6) + 'em';
                snowflake.style.opacity = Math.random() * 0.6 + 0.4;
                
                const animationDuration = Math.random() * 8 + 5;
                const horizontalMovement = (Math.random() - 0.5) * 100;
                
                snowflake.style.animation = `snowfall ${animationDuration}s linear infinite, sway ${animationDuration * 0.5}s ease-in-out infinite alternate`;
                
                this.container.appendChild(snowflake);
                this.snowflakes.push({
                    element: snowflake,
                    duration: animationDuration * 1000,
                    startTime: Date.now()
                });

                // 添加动态CSS动画
                if (!document.getElementById('snowflake-animations')) {
                    const style = document.createElement('style');
                    style.id = 'snowflake-animations';
                    style.textContent = `
                        @keyframes snowfall {
                            0% { transform: translateY(-20px) translateX(0px) rotate(0deg); }
                            100% { transform: translateY(100vh) translateX(${horizontalMovement}px) rotate(360deg); }
                        }
                        @keyframes sway {
                            0% { transform: translateX(-10px); }
                            100% { transform: translateX(10px); }
                        }
                    `;
                    document.head.appendChild(style);
                }
            }

            cleanupSnowflakes() {
                const now = Date.now();
                this.snowflakes = this.snowflakes.filter(snowflake => {
                    if (now - snowflake.startTime > snowflake.duration) {
                        if (snowflake.element.parentNode) {
                            snowflake.element.parentNode.removeChild(snowflake.element);
                        }
                        return false;
                    }
                    return true;
                });
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                
                const generateSnowflake = () => {
                    if (!this.isRunning) return;
                    
                    if (this.snowflakes.length < this.maxSnowflakes) {
                        this.createSnowflake();
                    }
                    
                    this.cleanupSnowflakes();
                    
                    setTimeout(generateSnowflake, Math.random() * 500 + 200);
                };
                
                generateSnowflake();
            }

            stop() {
                this.isRunning = false;
                this.snowflakes.forEach(snowflake => {
                    if (snowflake.element.parentNode) {
                        snowflake.element.parentNode.removeChild(snowflake.element);
                    }
                });
                this.snowflakes = [];
            }

            resize() {
                this.maxSnowflakes = this.getMaxSnowflakes();
            }
        }

        // 简化的俄罗斯方块游戏
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.level = 1;
                this.isRunning = false;
            }

            start() {
                this.isRunning = true;
                this.gameLoop();
            }

            gameLoop() {
                if (!this.isRunning) return;
                
                // 清空画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制一些示例方块
                this.ctx.fillStyle = '#ff6b6b';
                this.ctx.fillRect(50, 550, 30, 30);
                this.ctx.fillStyle = '#4ecdc4';
                this.ctx.fillRect(80, 550, 30, 30);
                this.ctx.fillStyle = '#45b7d1';
                this.ctx.fillRect(110, 550, 30, 30);
                
                // 更新分数
                this.score += 10;
                document.getElementById('score').textContent = this.score;
                
                if (this.score > 0 && this.score % 1000 === 0) {
                    this.level++;
                    document.getElementById('level').textContent = this.level;
                }
                
                requestAnimationFrame(() => this.gameLoop());
            }

            stop() {
                this.isRunning = false;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.results = [];
                this.performanceData = {
                    frameRate: 0,
                    memoryUsage: 0,
                    animationCost: 0
                };
                this.startTime = Date.now();
            }

            runIntegrationTests() {
                console.log('开始集成测试...');
                
                this.testSnowflakeGeneration();
                this.testAnimationPerformance();
                this.testResponsiveDesign();
                this.testZIndexLayering();
                this.testBrowserCompatibility();
                
                this.displayResults();
                this.startPerformanceMonitoring();
            }

            testSnowflakeGeneration() {
                try {
                    const container = document.getElementById('snowflake-container');
                    const initialCount = container.children.length;
                    
                    // 等待一些雪花生成
                    setTimeout(() => {
                        const newCount = container.children.length;
                        if (newCount > initialCount) {
                            this.addResult('雪花生成测试', 'pass', `成功生成 ${newCount} 个雪花`);
                        } else {
                            this.addResult('雪花生成测试', 'fail', '雪花生成失败');
                        }
                    }, 2000);
                    
                } catch (error) {
                    this.addResult('雪花生成测试', 'fail', `错误: ${error.message}`);
                }
            }

            testAnimationPerformance() {
                try {
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    const measureFrames = () => {
                        frameCount++;
                        const currentTime = performance.now();
                        
                        if (currentTime - startTime >= 1000) {
                            this.performanceData.frameRate = frameCount;
                            
                            if (frameCount >= 30) {
                                this.addResult('动画性能测试', 'pass', `帧率: ${frameCount} FPS`);
                            } else if (frameCount >= 20) {
                                this.addResult('动画性能测试', 'warning', `帧率: ${frameCount} FPS (偏低)`);
                            } else {
                                this.addResult('动画性能测试', 'fail', `帧率: ${frameCount} FPS (过低)`);
                            }
                        } else {
                            requestAnimationFrame(measureFrames);
                        }
                    };
                    
                    requestAnimationFrame(measureFrames);
                    
                } catch (error) {
                    this.addResult('动画性能测试', 'fail', `错误: ${error.message}`);
                }
            }

            testResponsiveDesign() {
                try {
                    const screenWidth = window.innerWidth;
                    const container = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    
                    // 检查容器是否正确响应屏幕尺寸
                    if (container.offsetWidth === window.innerWidth && 
                        container.offsetHeight === window.innerHeight) {
                        this.addResult('响应式设计测试', 'pass', `屏幕宽度: ${screenWidth}px`);
                    } else {
                        this.addResult('响应式设计测试', 'warning', '容器尺寸可能不匹配');
                    }
                    
                    // 检查移动端适配
                    if (screenWidth < 768) {
                        const testPanel = document.getElementById('test-panel');
                        const computedStyle = window.getComputedStyle(testPanel);
                        if (computedStyle.bottom !== 'auto') {
                            this.addResult('移动端适配测试', 'pass', '测试面板位置已调整');
                        } else {
                            this.addResult('移动端适配测试', 'warning', '移动端布局可能需要优化');
                        }
                    }
                    
                } catch (error) {
                    this.addResult('响应式设计测试', 'fail', `错误: ${error.message}`);
                }
            }

            testZIndexLayering() {
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowZIndex = parseInt(window.getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(window.getComputedStyle(gameContainer).zIndex) || 0;
                    const panelZIndex = parseInt(window.getComputedStyle(testPanel).zIndex) || 0;
                    
                    if (snowZIndex < gameZIndex && gameZIndex < panelZIndex) {
                        this.addResult('层级测试', 'pass', `雪花(${snowZIndex}) < 游戏(${gameZIndex}) < 面板(${panelZIndex})`);
                    } else {
                        this.addResult('层级测试', 'warning', '层级顺序可能不正确');
                    }
                    
                } catch (error) {
                    this.addResult('层级测试', 'fail', `错误: ${error.message}`);
                }
            }

            testBrowserCompatibility() {
                try {
                    const features = {
                        'CSS动画': 'animationName' in document.body.style,
                        'CSS变换': 'transform' in document.body.style,
                        '背景滤镜': 'backdropFilter' in document.body.style,
                        'requestAnimationFrame': typeof requestAnimationFrame !== 'undefined',
                        'Performance API': typeof performance !== 'undefined'
                    };
                    
                    const supportedFeatures = Object.entries(features).filter(([name, supported]) => supported);
                    const unsupportedFeatures = Object.entries(features).filter(([name, supported]) => !supported);
                    
                    if (unsupportedFeatures.length === 0) {
                        this.addResult('浏览器兼容性测试', 'pass', '所有功能都受支持');
                    } else if (unsupportedFeatures.length <= 1) {
                        this.addResult('浏览器兼容性测试', 'warning', `部分功能不支持: ${unsupportedFeatures.map(f => f[0]).join(', ')}`);
                    } else {
                        this.addResult('浏览器兼容性测试', 'fail', `多个功能不支持: ${unsupportedFeatures.map(f => f[0]).join(', ')}`);
                    }
                    
                } catch (error) {
                    this.addResult('浏览器兼容性测试', 'fail', `错误: ${error.message}`);
                }
            }

            addResult(testName, status, message) {
                this.results.push({ testName, status, message, timestamp: Date.now() });
            }

            displayResults() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';
                
                this.results.forEach(result => {
                    const div = document.createElement('div');
                    div.className = `test-result ${result.status}`;
                    div.innerHTML = `<strong>${result.testName}:</strong> ${result.message}`;
                    resultsContainer.appendChild(div);
                });
            }

            startPerformanceMonitoring() {
                const updateStats = () => {
                    const statsContainer = document.getElementById('performance-stats');
                    const runTime = Math.floor((Date.now() - this.startTime) / 1000);
                    const snowflakeCount = document.querySelectorAll('.snowflake').length;
                    
                    // 估算内存使用
                    if (performance.memory) {
                        this.performanceData.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                    }
                    
                    statsContainer.innerHTML = `
                        <div><strong>性能统计:</strong></div>
                        <div>运行时间: ${runTime}s</div>
                        <div>当前雪花数: ${snowflakeCount}</div>
                        <div>帧率: ${this.performanceData.frameRate} FPS</div>
                        ${performance.memory ? `<div>内存使用: ${this.performanceData.memoryUsage} MB</div>` : ''}
                    `;
                    
                    setTimeout(updateStats, 1000);
                };
                
                updateStats();
            }
        }

        // 主集成类
        class TetrisGameIntegration {
            constructor() {
                this.snowflakeSystem = new SnowflakeSystem();
                this.tetrisGame = new TetrisGame();
                this.testSuite = new IntegrationTestSuite();
            }

            init() {
                console.log('初始化俄罗斯方块雪花特效集成...');
                
                // 启动雪花特效
                this.snowflakeSystem.start();
                
                // 启动游戏
                this.tetrisGame.start();
                
                // 运行集成测试
                setTimeout(() => {
                    this.testSuite.runIntegrationTests();
                }, 1000);
                
                // 监听窗口大小变化
                window.addEventListener('resize', () => {
                    this.snowflakeSystem.resize();
                });
                
                // 监听页面可见性变化
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        this.snowflakeSystem.stop();
                        this.tetrisGame.stop();
                    } else {
                        this.snowflakeSystem.start();
                        this.tetrisGame.start();
                    }
                });
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            const integration = new TetrisGameIntegration();
            integration.init();
        });

        // 错误处理
        window.addEventListener('error', (event) => {
            console.error('集成测试中发生错误:', event.error);
            const resultsContainer = document.getElementById('test-results');
            if (resultsContainer) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'test-result fail';
                errorDiv.innerHTML = `<strong>运行时错误:</strong> ${event.error.message}`;
                resultsContainer.appendChild(errorDiv);
            }
        });
    </script>
</body>
</html>
