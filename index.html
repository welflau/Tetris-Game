<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #game-canvas {
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            display: block;
        }

        /* 游戏信息面板 */
        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
        }

        #score, #level, #lines {
            margin: 5px 0;
        }

        /* 控制按钮 */
        #controls {
            text-align: center;
            margin-top: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #test-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .test-item {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .test-pass {
            color: #4CAF50;
        }

        .test-fail {
            color: #f44336;
        }

        .test-warning {
            color: #ff9800;
        }

        /* 性能监控 */
        #performance-monitor {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #test-panel {
                top: 5px;
                right: 5px;
                font-size: 10px;
                padding: 10px;
            }
            
            #performance-monitor {
                bottom: 5px;
                right: 5px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">得分: 0</div>
            <div id="level">等级: 1</div>
            <div id="lines">行数: 0</div>
        </div>
        <canvas id="game-canvas" width="300" height="600"></canvas>
        <div id="controls">
            <button onclick="tetrisGame.start()">开始游戏</button>
            <button onclick="tetrisGame.pause()">暂停</button>
            <button onclick="tetrisGame.reset()">重置</button>
            <button onclick="integrationTest.runAllTests()">运行测试</button>
        </div>
    </div>
    
    <!-- 测试面板 -->
    <div id="test-panel">
        <h4>集成测试面板</h4>
        <div id="test-results"></div>
    </div>
    
    <!-- 性能监控 -->
    <div id="performance-monitor">
        <div>FPS: <span id="fps-counter">0</span></div>
        <div>雪花数量: <span id="snowflake-count">0</span></div>
        <div>内存使用: <span id="memory-usage">0MB</span></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isRunning = false;
                this.animationId = null;
                this.snowflakeTypes = ['❄', '❅', '❆', '✻', '✼', '❈'];
                this.performanceMode = false;
            }

            init() {
                this.createSnowflakes();
                this.start();
            }

            createSnowflakes() {
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    this.createSnowflake();
                }
            }

            createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                snowflake.textContent = this.snowflakeTypes[Math.floor(Math.random() * this.snowflakeTypes.length)];
                
                // 随机属性
                const size = Math.random() * 0.8 + 0.6;
                const x = Math.random() * window.innerWidth;
                const y = -50;
                const speed = Math.random() * 2 + 1;
                const drift = Math.random() * 2 - 1;
                const rotation = Math.random() * 360;
                const rotationSpeed = Math.random() * 4 - 2;
                
                snowflake.style.fontSize = `${size}em`;
                snowflake.style.left = `${x}px`;
                snowflake.style.top = `${y}px`;
                snowflake.style.transform = `rotate(${rotation}deg)`;
                
                // 存储动画属性
                snowflake.animationData = {
                    x: x,
                    y: y,
                    speed: speed,
                    drift: drift,
                    rotation: rotation,
                    rotationSpeed: rotationSpeed,
                    size: size
                };
                
                this.container.appendChild(snowflake);
                this.snowflakes.push(snowflake);
            }

            animate() {
                if (!this.isRunning) return;
                
                this.snowflakes.forEach(snowflake => {
                    const data = snowflake.animationData;
                    
                    // 更新位置
                    data.y += data.speed;
                    data.x += data.drift * 0.5;
                    data.rotation += data.rotationSpeed;
                    
                    // 边界检查
                    if (data.y > window.innerHeight + 50) {
                        data.y = -50;
                        data.x = Math.random() * window.innerWidth;
                    }
                    
                    if (data.x > window.innerWidth + 50) {
                        data.x = -50;
                    } else if (data.x < -50) {
                        data.x = window.innerWidth + 50;
                    }
                    
                    // 应用变换
                    snowflake.style.transform = `translate(${data.x}px, ${data.y}px) rotate(${data.rotation}deg)`;
                });
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }

            start() {
                this.isRunning = true;
                this.animate();
            }

            stop() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }

            setPerformanceMode(enabled) {
                this.performanceMode = enabled;
                if (enabled) {
                    this.maxSnowflakes = Math.min(this.maxSnowflakes, 25);
                    // 移除多余的雪花
                    while (this.snowflakes.length > this.maxSnowflakes) {
                        const snowflake = this.snowflakes.pop();
                        snowflake.remove();
                    }
                }
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 简化版俄罗斯方块游戏
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameLoop = null;
            }

            start() {
                if (this.isRunning && !this.isPaused) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.gameLoop = setInterval(() => {
                    this.update();
                    this.render();
                }, 500);
                
                this.updateUI();
            }

            pause() {
                this.isPaused = !this.isPaused;
                if (this.isPaused) {
                    clearInterval(this.gameLoop);
                } else {
                    this.start();
                }
            }

            reset() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                }
                this.updateUI();
                this.render();
            }

            update() {
                if (this.isPaused) return;
                
                // 简单的游戏逻辑模拟
                this.score += 10;
                if (this.score > 0 && this.score % 1000 === 0) {
                    this.lines += 1;
                    this.level = Math.floor(this.lines / 10) + 1;
                }
                
                this.updateUI();
            }

            render() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x < this.canvas.width; x += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y < this.canvas.height; y += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制一些模拟方块
                if (this.isRunning && !this.isPaused) {
                    this.ctx.fillStyle = '#ff6b6b';
                    this.ctx.fillRect(90, 570, 30, 30);
                    this.ctx.fillRect(120, 570, 30, 30);
                    this.ctx.fillRect(150, 570, 30, 30);
                    this.ctx.fillRect(120, 540, 30, 30);
                }
            }

            updateUI() {
                document.getElementById('score').textContent = `得分: ${this.score}`;
                document.getElementById('level').textContent = `等级: ${this.level}`;
                document.getElementById('lines').textContent = `行数: ${this.lines}`;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.testResults = [];
                this.resultsContainer = document.getElementById('test-results');
            }

            async runAllTests() {
                this.clearResults();
                this.addResult('开始集成测试...', 'info');
                
                await this.testSnowflakeGeneration();
                await this.testAnimationPerformance();
                await this.testResponsiveDesign();
                await this.testZIndexLayering();
                await this.testGameIntegration();
                
                this.addResult('所有测试完成', 'info');
                this.generateSummary();
            }

            async testSnowflakeGeneration() {
                this.addResult('测试雪花生成...', 'info');
                
                try {
                    const initialCount = snowflakeSystem.getSnowflakeCount();
                    if (initialCount > 0) {
                        this.addResult(`✓ 雪花生成正常 (${initialCount}个)`, 'pass');
                    } else {
                        this.addResult('✗ 雪花生成失败', 'fail');
                    }
                    
                    // 测试雪花类型
                    const snowflakes = document.querySelectorAll('.snowflake');
                    const hasTypes = Array.from(snowflakes).some(s => s.className.includes('type-'));
                    if (hasTypes) {
                        this.addResult('✓ 雪花类型设置正常', 'pass');
                    } else {
                        this.addResult('✗ 雪花类型设置异常', 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 雪花生成测试异常: ${error.message}`, 'fail');
                }
            }

            async testAnimationPerformance() {
                this.addResult('测试动画性能...', 'info');
                
                try {
                    const startTime = performance.now();
                    let frameCount = 0;
                    
                    const testAnimation = () => {
                        frameCount++;
                        if (frameCount < 60) {
                            requestAnimationFrame(testAnimation);
                        } else {
                            const endTime = performance.now();
                            const fps = 1000 / ((endTime - startTime) / frameCount);
                            
                            if (fps >= 30) {
                                this.addResult(`✓ 动画性能良好 (${fps.toFixed(1)} FPS)`, 'pass');
                            } else if (fps >= 20) {
                                this.addResult(`⚠ 动画性能一般 (${fps.toFixed(1)} FPS)`, 'warning');
                            } else {
                                this.addResult(`✗ 动画性能较差 (${fps.toFixed(1)} FPS)`, 'fail');
                            }
                        }
                    };
                    
                    requestAnimationFrame(testAnimation);
                } catch (error) {
                    this.addResult(`✗ 性能测试异常: ${error.message}`, 'fail');
                }
            }

            async testResponsiveDesign() {
                this.addResult('测试响应式设计...', 'info');
                
                try {
                    const container = document.getElementById('snowflake-container');
                    const containerRect = container.getBoundingClientRect();
                    
                    if (containerRect.width === window.innerWidth && containerRect.height === window.innerHeight) {
                        this.addResult('✓ 雪花容器尺寸正确', 'pass');
                    } else {
                        this.addResult('✗ 雪花容器尺寸异常', 'fail');
                    }
                    
                    // 测试CSS媒体查询
                    const isMobile = window.innerWidth <= 768;
                    if (isMobile) {
                        this.addResult('✓ 移动端适配检测正常', 'pass');
                    } else {
                        this.addResult('✓ 桌面端显示正常', 'pass');
                    }
                } catch (error) {
                    this.addResult(`✗ 响应式测试异常: ${error.message}`, 'fail');
                }
            }

            async testZIndexLayering() {
                this.addResult('测试层级关系...', 'info');
                
                try {
                    const snowContainer = document.getElementById('snowflake-container');
                    const gameContainer = document.getElementById('game-container');
                    const testPanel = document.getElementById('test-panel');
                    
                    const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                    const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                    const testZIndex = parseInt(getComputedStyle(testPanel).zIndex) || 0;
                    
                    if (snowZIndex < gameZIndex && gameZIndex < testZIndex) {
                        this.addResult('✓ 层级关系正确', 'pass');
                    } else {
                        this.addResult(`⚠ 层级关系需要检查 (雪花:${snowZIndex}, 游戏:${gameZIndex}, 面板:${testZIndex})`, 'warning');
                    }
                } catch (error) {
                    this.addResult(`✗ 层级测试异常: ${error.message}`, 'fail');
                }
            }

            async testGameIntegration() {
                this.addResult('测试游戏集成...', 'info');
                
                try {
                    // 测试游戏是否能正常启动
                    const canvas = document.getElementById('game-canvas');
                    if (canvas && canvas.getContext) {
                        this.addResult('✓ 游戏画布初始化正常', 'pass');
                    } else {
                        this.addResult('✗ 游戏画布初始化失败', 'fail');
                    }
                    
                    // 测试控制按钮
                    const buttons = document.querySelectorAll('#controls button');
                    if (buttons.length >= 3) {
                        this.addResult('✓ 游戏控制按钮正常', 'pass');
                    } else {
                        this.addResult('✗ 游戏控制按钮缺失', 'fail');
                    }
                    
                    // 测试雪花是否影响游戏交互
                    const snowflakes = document.querySelectorAll('.snowflake');
                    const hasPointerEvents = Array.from(snowflakes).some(s => 
                        getComputedStyle(s).pointerEvents !== 'none'
                    );
                    
                    if (!hasPointerEvents) {
                        this.addResult('✓ 雪花不影响游戏交互', 'pass');
                    } else {
                        this.addResult('✗ 雪花可能影响游戏交互', 'fail');
                    }
                } catch (error) {
                    this.addResult(`✗ 游戏集成测试异常: ${error.message}`, 'fail');
                }
            }

            addResult(message, type) {
                const div = document.createElement('div');
                div.className = `test-item test-${type}`;
                div.textContent = message;
                this.resultsContainer.appendChild(div);
                this.resultsContainer.scrollTop = this.resultsContainer.scrollHeight;
            }

            clearResults() {
                this.resultsContainer.innerHTML = '';
            }

            generateSummary() {
                const items = this.resultsContainer.querySelectorAll('.test-item');
                const passCount = this.resultsContainer.querySelectorAll('.test-pass').length;
                const failCount = this.resultsContainer.querySelectorAll('.test-fail').length;
                const warningCount = this.resultsContainer.querySelectorAll('.test-warning').length;
                
                this.addResult(`测试总结: 通过 ${passCount}, 失败 ${failCount}, 警告 ${warningCount}`, 'info');
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            constructor() {
                this.supportInfo = {};
            }

            validateBrowserSupport() {
                const support = {
                    requestAnimationFrame: typeof requestAnimationFrame !== 'undefined',
                    cssAnimations: this.checkCSSAnimationSupport(),
                    canvas: this.checkCanvasSupport(),
                    flexbox: this.checkFlexboxSupport(),
                    transforms: this.checkTransformSupport()
                };
                
                this.supportInfo = support;
                return support;
            }

            checkCSSAnimationSupport() {
                const element = document.createElement('div');
                return 'animationName' in element.style || 'webkitAnimationName' in element.style;
            }

            checkCanvasSupport() {
                const canvas = document.createElement('canvas');
                return !!(canvas.getContext && canvas.getContext('2d'));
            }

            checkFlexboxSupport() {
                const element = document.createElement('div');
                return 'flex' in element.style || 'webkitFlex' in element.style;
            }

            checkTransformSupport() {
                const element = document.createElement('div');
                return 'transform' in element.style || 'webkitTransform' in element.style;
            }

            getSupportReport() {
                return this.supportInfo;
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.memoryUsage = 0;
                this.isMonitoring = false;
            }

            start() {
                this.isMonitoring = true;
                this.monitor();
            }

            stop() {
                this.isMonitoring = false;
            }

            monitor() {
                if (!this.isMonitoring) return;
                
                this.frameCount++;
                const currentTime = performance.now();
                
                if (currentTime - this.lastTime >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                    
                    // 更新显示
                    this.updateDisplay();
                }
                
                requestAnimationFrame(() => this.monitor());
            }

            updateDisplay() {
                document.getElementById('fps-counter').textContent = this.fps;
                document.getElementById('snowflake-count').textContent = snowflakeSystem.getSnowflakeCount();
                
                // 估算内存使用
                if (performance.memory) {
                    this.memoryUsage = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                    document.getElementById('memory-usage').textContent = `${this.memoryUsage}MB`;
                } else {
                    document.getElementById('memory-usage').textContent = 'N/A';
                }
            }

            getPerformanceData() {
                return {
                    fps: this.fps,
                    memoryUsage: this.memoryUsage,
                    snowflakeCount: snowflakeSystem.getSnowflakeCount()
                };
            }
        }

        // 初始化所有系统
        let snowflakeSystem;
        let tetrisGame;
        let integrationTest;
        let compatibilityValidator;
        let performanceMonitor;

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化各个系统
            snowflakeSystem = new SnowflakeSystem();
            tetrisGame = new TetrisGame();
            integrationTest = new IntegrationTestSuite();
            compatibilityValidator = new CompatibilityValidator();
            performanceMonitor = new PerformanceMonitor();
            
            // 启动雪花特效
            snowflakeSystem.init();
            
            // 启动性能监控
            performanceMonitor.start();
            
            // 初始化游戏显示
            tetrisGame.render();
            
            // 验证浏览器兼容性
            const support = compatibilityValidator.validateBrowserSupport();
            console.log('浏览器支持情况:', support);
            
            // 添加键盘控制
            document.addEventListener('keydown', function(e) {
                switch(e.key) {
                    case ' ':
                        e.preventDefault();
                        tetrisGame.pause();
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (!tetrisGame.isRunning) {
                            tetrisGame.start();
                        }
                        break;
                    case 'Escape':
                        e.preventDefault();
                        tetrisGame.reset();
                        break;
                }
            });
            
            // 窗口大小变化时调整雪花系统
            window.addEventListener('resize', function() {
                // 重新调整雪花位置
                setTimeout(() => {
                    snowflakeSystem.snowflakes.forEach(snowflake => {
                        const data = snowflake.animationData;
                        if (data.x > window.innerWidth) {
                            data.x = Math.random() * window.innerWidth;
                        }
                    });
                }, 100);
            });
            
            // 自动运行基础测试
            setTimeout(() => {
                integrationTest.runAllTests();
            }, 2000);
        });
    </script>
</body>
</html>
