<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: #ffffff;
            min-width: 200px;
        }

        .info-item {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .info-label {
            font-weight: bold;
            color: #00ffff;
        }

        canvas {
            border: 2px solid #00ffff;
            border-radius: 5px;
            background: #000000;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: #ffffff;
        }

        .control-item {
            margin: 5px 0;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <span class="info-label">分数:</span>
                <span id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">等级:</span>
                <span id="level">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">行数:</span>
                <span id="lines">0</span>
            </div>
            <div class="info-item">
                <button id="startBtn">开始游戏</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重置</button>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <div class="control-item">← → : 左右移动</div>
        <div class="control-item">↓ : 快速下落</div>
        <div class="control-item">↑ : 旋转</div>
        <div class="control-item">空格 : 暂停/继续</div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreElement = document.getElementById('score');
                this.levelElement = document.getElementById('level');
                this.linesElement = document.getElementById('lines');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.BLOCK_SIZE = 30;
                
                this.board = [];
                this.currentPiece = null;
                this.currentX = 0;
                this.currentY = 0;
                
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                this.gameRunning = false;
                this.gamePaused = false;
                
                this.colors = [
                    '#000000', // 空
                    '#FF0000', // I
                    '#00FF00', // O
                    '#0000FF', // T
                    '#FFFF00', // S
                    '#FF00FF', // Z
                    '#00FFFF', // J
                    '#FFA500'  // L
                ];
                
                this.pieces = [
                    // I
                    [[[1,1,1,1]]],
                    // O
                    [[[2,2],[2,2]]],
                    // T
                    [[[0,3,0],[3,3,3]], [[3,0],[3,3],[3,0]], [[3,3,3],[0,3,0]], [[0,3],[3,3],[0,3]]],
                    // S
                    [[[0,4,4],[4,4,0]], [[4,0],[4,4],[0,4]]],
                    // Z
                    [[[5,5,0],[0,5,5]], [[0,5],[5,5],[5,0]]],
                    // J
                    [[[6,0,0],[6,6,6]], [[6,6],[6,0],[6,0]], [[6,6,6],[0,0,6]], [[0,6],[0,6],[6,6]]],
                    // L
                    [[[0,0,7],[7,7,7]], [[7,0],[7,0],[7,7]], [[7,7,7],[7,0,0]], [[7,7],[0,7],[0,7]]]
                ];
                
                this.initBoard();
                this.bindEvents();
                this.lastTime = 0;
            }
            
            initBoard() {
                this.board = [];
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    this.board[y] = [];
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        this.board[y][x] = 0;
                    }
                }
            }
            
            bindEvents() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    switch(e.code) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case 'Space':
                            e.preventDefault();
                            this.togglePause();
                            break;
                    }
                });
            }
            
            startGame() {
                this.gameRunning = true;
                this.gamePaused = false;
                this.spawnPiece();
                this.gameLoop();
            }
            
            togglePause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                    if (!this.gamePaused) {
                        this.gameLoop();
                    }
                }
            }
            
            resetGame() {
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropInterval = 1000;
                this.initBoard();
                this.updateUI();
                this.draw();
            }
            
            spawnPiece() {
                const pieceType = Math.floor(Math.random() * this.pieces.length);
                this.currentPiece = this.pieces[pieceType][0];
                this.currentX = Math.floor(this.BOARD_WIDTH / 2) - Math.floor(this.currentPiece[0].length / 2);
                this.currentY = 0;
                
                if (this.checkCollision(this.currentPiece, this.currentX, this.currentY)) {
                    this.gameOver();
                }
            }
            
            movePiece(dx, dy) {
                if (!this.checkCollision(this.currentPiece, this.currentX + dx, this.currentY + dy)) {
                    this.currentX += dx;
                    this.currentY += dy;
                    return true;
                }
                return false;
            }
            
            rotatePiece() {
                const rotated = this.rotate(this.currentPiece);
                if (!this.checkCollision(rotated, this.currentX, this.currentY)) {
                    this.currentPiece = rotated;
                }
            }
            
            rotate(piece) {
                const rotated = [];
                for (let i = 0; i < piece[0].length; i++) {
                    rotated[i] = [];
                    for (let j = piece.length - 1; j >= 0; j--) {
                        rotated[i][piece.length - 1 - j] = piece[j][i];
                    }
                }
                return rotated;
            }
            
            checkCollision(piece, x, y) {
                for (let py = 0; py < piece.length; py++) {
                    for (let px = 0; px < piece[py].length; px++) {
                        if (piece[py][px] !== 0) {
                            const nx = x + px;
                            const ny = y + py;
                            
                            if (nx < 0 || nx >= this.BOARD_WIDTH || ny >= this.BOARD_HEIGHT) {
                                return true;
                            }
                            
                            if (ny >= 0 && this.board[ny][nx] !== 0) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            placePiece() {
                for (let py = 0; py < this.currentPiece.length; py++) {
                    for (let px = 0; px < this.currentPiece[py].length; px++) {
                        if (this.currentPiece[py][px] !== 0) {
                            const nx = this.currentX + px;
                            const ny = this.currentY + py;
                            if (ny >= 0) {
                                this.board[ny][nx] = this.currentPiece[py][px];
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnPiece();
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                    let fullLine = true;
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x] === 0) {
                            fullLine = false;
                            break;
                        }
                    }
                    
                    if (fullLine) {
                        this.board.splice(y, 1);
                        this.board.unshift(new Array(this.BOARD_WIDTH).fill(0));
                        linesCleared++;
                        y++; // 重新检查同一行
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateUI();
                }
            }
            
            gameOver() {
                this.gameRunning = false;
                alert('游戏结束！得分: ' + this.score);
            }
            
            updateUI() {
                this.scoreElement.textContent = this.score;
                this.levelElement.textContent = this.level;
                this.linesElement.textContent = this.lines;
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制游戏板
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x] !== 0) {
                            this.ctx.fillStyle = this.colors[this.board[y][x]];
                            this.ctx.fillRect(x * this.BLOCK_SIZE, y * this.BLOCK_SIZE, this.BLOCK_SIZE, this.BLOCK_SIZE);
                            this.ctx.strokeStyle = '#FFFFFF';
                            this.ctx.strokeRect(x * this.BLOCK_SIZE, y * this.BLOCK_SIZE, this.BLOCK_SIZE, this.BLOCK_SIZE);
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    for (let py = 0; py < this.currentPiece.length; py++) {
                        for (let px = 0; px < this.currentPiece[py].length; px++) {
                            if (this.currentPiece[py][px] !== 0) {
                                const x = this.currentX + px;
                                const y = this.currentY + py;
                                if (y >= 0) {
                                    this.ctx.fillStyle = this.colors[this.currentPiece[py][px]];
                                    this.ctx.fillRect(x * this.BLOCK_SIZE, y * this.BLOCK_SIZE, this.BLOCK_SIZE, this.BLOCK_SIZE);
                                    this.ctx.strokeStyle = '#FFFFFF';
                                    this.ctx.strokeRect(x * this.BLOCK_SIZE, y * this.BLOCK_SIZE, this.BLOCK_SIZE, this.BLOCK_SIZE);
                                }
                            }
                        }
                    }
                }
            }
            
            gameLoop(currentTime = 0) {
                if (!this.gameRunning || this.gamePaused) return;
                
                const deltaTime = currentTime - this.lastTime;
                this.dropTime += deltaTime;
                
                if (this.dropTime >= this.dropInterval) {
                    if (!this.movePiece(0, 1)) {
                        this.placePiece();
                    }
                    this.dropTime = 0;
                }
                
                this.draw();
                this.lastTime = currentTime;
                requestAnimationFrame((time) => this.gameLoop(time));
            }
        }
        
        // 初始化游戏
        const game = new TetrisGame();
        game.draw();
    </script>
</body>
</html>
