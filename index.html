<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.3rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        .score, .level, .lines {
            color: #00ffff;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .next-piece {
            margin-top: 20px;
        }

        .next-piece canvas {
            border: 1px solid #ffffff;
            border-radius: 5px;
            display: block;
            margin: 10px auto;
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: 3px solid #ffffff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #00ffff;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.2rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="aaa-title">AAA</div>
        <div class="game-title">俄罗斯方块</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" width="300" height="600" class="game-board"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4 style="color: #00ffff; text-align: center; margin-bottom: 10px;">下一个</h4>
                <canvas id="nextPiece" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h4>控制说明</h4>
                <div>← → : 左右移动</div>
                <div>↓ : 快速下降</div>
                <div>↑ : 旋转方块</div>
                <div>空格 : 暂停/继续</div>
            </div>
        </div>
    </div>
    
    <div id="gameOver" class="game-over">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');
        
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;
        
        let board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = true;
        let isPaused = false;
        let dropTime = 0;
        let dropInterval = 1000;
        
        const PIECES = [
            {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: '#00ffff'
            },
            {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            },
            {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            }
        ];
        
        let currentPiece = null;
        let nextPiece = null;
        
        function getRandomPiece() {
            const piece = PIECES[Math.floor(Math.random() * PIECES.length)];
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }
        
        function drawCell(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (board[y][x]) {
                        drawCell(ctx, x, y, board[y][x]);
                    }
                }
            }
        }
        
        function drawPiece(piece, context = ctx, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        if (context === ctx) {
                            drawCell(context, piece.x + x + offsetX, piece.y + y + offsetY, piece.color);
                        } else {
                            context.fillStyle = piece.color;
                            context.fillRect(
                                (x + offsetX) * 25 + 10, 
                                (y + offsetY) * 25 + 10, 
                                25, 
                                25
                            );
                            context.strokeStyle = '#ffffff';
                            context.lineWidth = 1;
                            context.strokeRect(
                                (x + offsetX) * 25 + 10, 
                                (y + offsetY) * 25 + 10, 
                                25, 
                                25
                            );
                        }
                    }
                }
            }
        }
        
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const offsetX = Math.floor((4 - nextPiece.shape[0].length) / 2);
                const offsetY = Math.floor((4 - nextPiece.shape.length) / 2);
                drawPiece({...nextPiece, x: 0, y: 0}, nextCtx, offsetX, offsetY);
            }
        }
        
        function isValidMove(piece, dx, dy, newShape = null) {
            const shape = newShape || piece.shape;
            const newX = piece.x + dx;
            const newY = piece.y + dy;
            
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;
                        
                        if (boardX < 0 || boardX >= BOARD_WIDTH || 
                            boardY >= BOARD_HEIGHT || 
                            (boardY >= 0 && board[boardY][boardX])) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let x = 0; x < cols; x++) {
                rotated[x] = [];
                for (let y = rows - 1; y >= 0; y--) {
                    rotated[x][rows - 1 - y] = piece.shape[y][x];
                }
            }
            
            return rotated;
        }
        
        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // Check the same line again
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(50, 1000 - (level - 1) * 50);
                updateUI();
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function restartGame() {
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            isPaused = false;
            dropTime = 0;
            dropInterval = 1000;
            
            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            
            document.getElementById('gameOver').style.display = 'none';
            updateUI();
            gameLoop();
        }
        
        function gameLoop() {
            if (!gameRunning || isPaused) return;
            
            const now = Date.now();
            
            if (now - dropTime > dropInterval) {
                if (isValidMove(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    placePiece();
                    clearLines();
                    
                    currentPiece = nextPiece;
                    nextPiece = getRandomPiece();
                    
                    if (!isValidMove(currentPiece, 0, 0)) {
                        gameOver();
                        return;
                    }
                }
                dropTime = now;
            }
            
            drawBoard();
            drawPiece(currentPiece);
            drawNextPiece();
            
            requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (isValidMove(currentPiece, -1, 0)) {
                        currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (isValidMove(currentPiece, 1, 0)) {
                        currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (isValidMove(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateUI();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotatePiece(currentPiece);
                    if (isValidMove(currentPiece, 0, 0, rotated)) {
                        currentPiece.shape = rotated;
                    }
                    break;
                case ' ':
                    isPaused = !isPaused;
                    if (!isPaused) {
                        gameLoop();
                    }
                    break;
            }
            
            if (!isPaused) {
                drawBoard();
                drawPiece(currentPiece);
                drawNextPiece();
            }
        });
        
        // 初始化游戏
        currentPiece = getRandomPiece();
        nextPiece = getRandomPiece();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
