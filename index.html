<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
            color: #00ffff;
        }

        .score, .level, .lines {
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-align: center;
        }

        .next-piece {
            margin-top: 20px;
            text-align: center;
        }

        .next-piece h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
            color: #ffffff;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .controls p {
            margin: 5px 0;
            font-size: 0.9rem;
        }

        canvas {
            display: block;
            border-radius: 5px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .game-over button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h1 class="game-title">俄罗斯方块</h1>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">消除行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4>下一个方块</h4>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h4>操作说明</h4>
                <p>← → : 左右移动</p>
                <p>↓ : 快速下降</p>
                <p>↑ : 旋转方块</p>
                <p>空格 : 暂停/继续</p>
            </div>
        </div>
    </div>
    
    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.BLOCK_SIZE = 30;
                
                this.board = Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
                
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                this.currentPiece = null;
                this.nextPiece = null;
                
                this.paused = false;
                this.gameOver = false;
                
                this.colors = [
                    '#000000', // 空
                    '#FF6B6B', // I
                    '#4ECDC4', // O
                    '#45B7D1', // T
                    '#96CEB4', // S
                    '#FFEAA7', // Z
                    '#DDA0DD', // J
                    '#98D8C8'  // L
                ];
                
                this.pieces = {
                    I: [
                        [1, 1, 1, 1]
                    ],
                    O: [
                        [2, 2],
                        [2, 2]
                    ],
                    T: [
                        [0, 3, 0],
                        [3, 3, 3]
                    ],
                    S: [
                        [0, 4, 4],
                        [4, 4, 0]
                    ],
                    Z: [
                        [5, 5, 0],
                        [0, 5, 5]
                    ],
                    J: [
                        [6, 0, 0],
                        [6, 6, 6]
                    ],
                    L: [
                        [0, 0, 7],
                        [7, 7, 7]
                    ]
                };
                
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.spawnPiece();
                this.spawnNextPiece();
                this.gameLoop();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (this.gameOver) return;
                    
                    switch(e.code) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case 'Space':
                            this.togglePause();
                            e.preventDefault();
                            break;
                    }
                });
            }
            
            spawnPiece() {
                if (this.nextPiece) {
                    this.currentPiece = this.nextPiece;
                } else {
                    const pieceTypes = Object.keys(this.pieces);
                    const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
                    this.currentPiece = {
                        type: randomType,
                        shape: JSON.parse(JSON.stringify(this.pieces[randomType])),
                        x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(this.pieces[randomType][0].length / 2),
                        y: 0
                    };
                }
                
                this.spawnNextPiece();
                
                if (this.checkCollision(this.currentPiece.x, this.currentPiece.y, this.currentPiece.shape)) {
                    this.endGame();
                }
            }
            
            spawnNextPiece() {
                const pieceTypes = Object.keys(this.pieces);
                const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
                this.nextPiece = {
                    type: randomType,
                    shape: JSON.parse(JSON.stringify(this.pieces[randomType])),
                    x: Math.floor(this.BOARD_WIDTH / 2) - Math.floor(this.pieces[randomType][0].length / 2),
                    y: 0
                };
            }
            
            movePiece(dx, dy) {
                if (this.paused) return;
                
                const newX = this.currentPiece.x + dx;
                const newY = this.currentPiece.y + dy;
                
                if (!this.checkCollision(newX, newY, this.currentPiece.shape)) {
                    this.currentPiece.x = newX;
                    this.currentPiece.y = newY;
                } else if (dy > 0) {
                    this.placePiece();
                }
            }
            
            rotatePiece() {
                if (this.paused) return;
                
                const rotated = this.rotate(this.currentPiece.shape);
                
                if (!this.checkCollision(this.currentPiece.x, this.currentPiece.y, rotated)) {
                    this.currentPiece.shape = rotated;
                }
            }
            
            rotate(shape) {
                const rows = shape.length;
                const cols = shape[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = shape[i][j];
                    }
                }
                
                return rotated;
            }
            
            checkCollision(x, y, shape) {
                for (let i = 0; i < shape.length; i++) {
                    for (let j = 0; j < shape[i].length; j++) {
                        if (shape[i][j] !== 0) {
                            const newX = x + j;
                            const newY = y + i;
                            
                            if (newX < 0 || newX >= this.BOARD_WIDTH || 
                                newY >= this.BOARD_HEIGHT || 
                                (newY >= 0 && this.board[newY][newX] !== 0)) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            placePiece() {
                for (let i = 0; i < this.currentPiece.shape.length; i++) {
                    for (let j = 0; j < this.currentPiece.shape[i].length; j++) {
                        if (this.currentPiece.shape[i][j] !== 0) {
                            const x = this.currentPiece.x + j;
                            const y = this.currentPiece.y + i;
                            if (y >= 0) {
                                this.board[y][x] = this.currentPiece.shape[i][j];
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnPiece();
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let i = this.BOARD_HEIGHT - 1; i >= 0; i--) {
                    if (this.board[i].every(cell => cell !== 0)) {
                        this.board.splice(i, 1);
                        this.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                        linesCleared++;
                        i++; // 检查同一行
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateUI();
                }
            }
            
            togglePause() {
                this.paused = !this.paused;
            }
            
            endGame() {
                this.gameOver = true;
                this.showGameOver();
            }
            
            showGameOver() {
                const gameOverDiv = document.createElement('div');
                gameOverDiv.className = 'game-over';
                gameOverDiv.innerHTML = `
                    <h2>游戏结束</h2>
                    <p>最终得分: ${this.score}</p>
                    <p>等级: ${this.level}</p>
                    <p>消除行数: ${this.lines}</p>
                    <button onclick="location.reload()">重新开始</button>
                `;
                document.body.appendChild(gameOverDiv);
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制游戏板
                this.drawBoard();
                
                // 绘制当前方块
                if (this.currentPiece) {
                    this.drawPiece(this.currentPiece, this.ctx);
                }
                
                // 绘制网格
                this.drawGrid();
                
                // 绘制下一个方块
                this.drawNextPiece();
            }
            
            drawBoard() {
                for (let i = 0; i < this.BOARD_HEIGHT; i++) {
                    for (let j = 0; j < this.BOARD_WIDTH; j++) {
                        if (this.board[i][j] !== 0) {
                            this.ctx.fillStyle = this.colors[this.board[i][j]];
                            this.ctx.fillRect(
                                j * this.BLOCK_SIZE,
                                i * this.BLOCK_SIZE,
                                this.BLOCK_SIZE,
                                this.BLOCK_SIZE
                            );
                            
                            this.ctx.strokeStyle = '#ffffff';
                            this.ctx.lineWidth = 1;
                            this.ctx.strokeRect(
                                j * this.BLOCK_SIZE,
                                i * this.BLOCK_SIZE,
                                this.BLOCK_SIZE,
                                this.BLOCK_SIZE
                            );
                        }
                    }
                }
            }
            
            drawPiece(piece, context) {
                for (let i = 0; i < piece.shape.length; i++) {
                    for (let j = 0; j < piece.shape[i].length; j++) {
                        if (piece.shape[i][j] !== 0) {
                            context.fillStyle = this.colors[piece.shape[i][j]];
                            context.fillRect(
                                (piece.x + j) * this.BLOCK_SIZE,
                                (piece.y + i) * this.BLOCK_SIZE,
                                this.BLOCK_SIZE,
                                this.BLOCK_SIZE
                            );
                            
                            context.strokeStyle = '#ffffff';
                            context.lineWidth = 1;
                            context.strokeRect(
                                (piece.x + j) * this.BLOCK_SIZE,
                                (piece.y + i) * this.BLOCK_SIZE,
                                this.BLOCK_SIZE,
                                this.BLOCK_SIZE
                            );
                        }
                    }
                }
            }
            
            drawGrid() {
                this.ctx.strokeStyle = '#333333';
                this.ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.BOARD_WIDTH; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.BLOCK_SIZE, 0);
                    this.ctx.lineTo(i * this.BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let i = 0; i <= this.BOARD_HEIGHT; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, i * this.BLOCK_SIZE);
                    this.ctx.stroke();
                }
            }
            
            drawNextPiece() {
                this.nextCtx.fillStyle = '#000000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (this.nextPiece) {
                    const blockSize = 20;
                    const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                    const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                    
                    for (let i = 0; i < this.nextPiece.shape.length; i++) {
                        for (let j = 0; j < this.nextPiece.shape[i].length; j++) {
                            if (this.nextPiece.shape[i][j] !== 0) {
                                this.nextCtx.fillStyle = this.colors[this.nextPiece.shape[i][j]];
                                this.nextCtx.fillRect(
                                    offsetX + j * blockSize,
                                    offsetY + i * blockSize,
                                    blockSize,
                                    blockSize
                                );
                                
                                this.nextCtx.strokeStyle = '#ffffff';
                                this.nextCtx.lineWidth = 1;
                                this.nextCtx.strokeRect(
                                    offsetX + j * blockSize,
                                    offsetY + i * blockSize,
                                    blockSize,
                                    blockSize
                                );
                            }
                        }
                    }
                }
            }
            
            gameLoop(currentTime = 0) {
                if (this.gameOver) return;
                
                if (!this.paused) {
                    if (currentTime - this.dropTime > this.dropInterval) {
                        this.movePiece(0, 1);
                        this.dropTime = currentTime;
                    }
                }
                
                this.draw();
                requestAnimationFrame((time) => this.gameLoop(time));
            }
        }
        
        // 启动游戏
        window.addEventListener('load', () => {
            new TetrisGame();
        });
    </script>
</body>
</html>
