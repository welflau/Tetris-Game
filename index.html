<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.3rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            color: #00ffff;
            text-align: center;
            font-size: 1.2rem;
        }

        .score, .level, .lines {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .next-piece {
            margin-top: 20px;
        }

        .next-preview {
            width: 80px;
            height: 80px;
            border: 1px solid #ffffff;
            margin: 10px auto;
            background: rgba(255, 255, 255, 0.1);
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            color: #ffd93d;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.2rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">消除行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4>下一个方块</h4>
                <canvas id="nextPiece" class="next-preview" width="80" height="80"></canvas>
            </div>
            
            <div class="controls">
                <h4>操作说明</h4>
                <div>← → 移动</div>
                <div>↓ 加速下落</div>
                <div>↑ 旋转</div>
                <div>空格 暂停/继续</div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;
        
        // 获取画布和上下文
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');
        
        // 游戏状态
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = false;
        let gameLoop = null;
        
        // 方块类型定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: '#00ffff'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            }
        };
        
        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    board[row][col] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece() {
            const pieceTypes = Object.keys(PIECES);
            const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
            const piece = PIECES[randomType];
            
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }
        
        // 检查方块是否可以放置在指定位置
        function canPlacePiece(piece, x, y) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const newX = x + col;
                        const newY = y + row;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        // 将方块放置到游戏板上
        function placePiece(piece) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const x = piece.x + col;
                        const y = piece.y + row;
                        if (y >= 0) {
                            board[y][x] = piece.color;
                        }
                    }
                }
            }
        }
        
        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let col = 0; col < cols; col++) {
                rotated[col] = [];
                for (let row = rows - 1; row >= 0; row--) {
                    rotated[col][rows - 1 - row] = piece.shape[row][col];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }
        
        // 清除完整的行
        function clearLines() {
            let linesCleared = 0;
            
            for (let row = BOARD_HEIGHT - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    board.splice(row, 1);
                    board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    row++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
            }
        }
        
        // 绘制游戏板
        function drawBoard() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已放置的方块
            for (let row = 0; row < BOARD_HEIGHT; row++) {
                for (let col = 0; col < BOARD_WIDTH; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            
            // 绘制当前方块
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const x = (currentPiece.x + col) * BLOCK_SIZE;
                            const y = (currentPiece.y + row) * BLOCK_SIZE;
                            ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        }
                    }
                }
            }
        }
        
        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.fillStyle = '#000000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                nextCtx.fillStyle = nextPiece.color;
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * 20) / 2;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * 20) / 2;
                
                for (let row = 0; row < nextPiece.shape.length; row++) {
                    for (let col = 0; col < nextPiece.shape[row].length; col++) {
                        if (nextPiece.shape[row][col]) {
                            nextCtx.fillRect(
                                offsetX + col * 20,
                                offsetY + row * 20,
                                19, 19
                            );
                        }
                    }
                }
            }
        }
        
        // 更新显示信息
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        // 游戏主循环
        function gameStep() {
            if (!gameRunning) return;
            
            if (canPlacePiece(currentPiece, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                placePiece(currentPiece);
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                
                if (!canPlacePiece(currentPiece, currentPiece.x, currentPiece.y)) {
                    gameOver();
                    return;
                }
            }
            
            drawBoard();
            drawNextPiece();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            alert('游戏结束！得分: ' + score);
        }
        
        // 开始游戏
        function startGame() {
            initBoard();
            currentPiece = createPiece();
            nextPiece = createPiece();
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            
            updateDisplay();
            drawBoard();
            drawNextPiece();
            
            gameLoop = setInterval(gameStep, Math.max(50, 500 - (level - 1) * 50));
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || !currentPiece) return;
            
            switch (e.key) {
                case 'ArrowLeft':
                    if (canPlacePiece(currentPiece, currentPiece.x - 1, currentPiece.y)) {
                        currentPiece.x--;
                        drawBoard();
                    }
                    break;
                    
                case 'ArrowRight':
                    if (canPlacePiece(currentPiece, currentPiece.x + 1, currentPiece.y)) {
                        currentPiece.x++;
                        drawBoard();
                    }
                    break;
                    
                case 'ArrowDown':
                    if (canPlacePiece(currentPiece, currentPiece.x, currentPiece.y + 1)) {
                        currentPiece.y++;
                        drawBoard();
                    }
                    break;
                    
                case 'ArrowUp':
                    const rotated = rotatePiece(currentPiece);
                    if (canPlacePiece(rotated, rotated.x, rotated.y)) {
                        currentPiece = rotated;
                        drawBoard();
                    }
                    break;
                    
                case ' ':
                    if (gameRunning) {
                        gameRunning = false;
                        clearInterval(gameLoop);
                    } else {
                        gameRunning = true;
                        gameLoop = setInterval(gameStep, Math.max(50, 500 - (level - 1) * 50));
                    }
                    e.preventDefault();
                    break;
            }
        });
        
        // 启动游戏
        startGame();
    </script>
</body>
</html>
