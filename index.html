<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.7);
        }

        .game-info {
            color: #ffffff;
            font-size: 1.2rem;
            text-align: center;
            min-width: 200px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .next-piece {
            border: 2px solid #ffffff;
            border-radius: 5px;
            margin: 10px auto;
            background: rgba(0, 0, 0, 0.5);
        }

        .controls {
            text-align: center;
            margin-top: 20px;
            color: #ffffff;
        }

        .control-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-info">
            <div class="info-panel">
                <h3>分数</h3>
                <div id="score">0</div>
            </div>
            <div class="info-panel">
                <h3>等级</h3>
                <div id="level">1</div>
            </div>
            <div class="info-panel">
                <h3>行数</h3>
                <div id="lines">0</div>
            </div>
            <div class="info-panel">
                <h3>下一个</h3>
                <canvas id="nextPiece" class="next-piece" width="80" height="80"></canvas>
            </div>
        </div>
        
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="controls">
            <div>
                <button class="control-btn" onclick="game.moveLeft()">← 左移</button>
                <button class="control-btn" onclick="game.rotate()">↻ 旋转</button>
                <button class="control-btn" onclick="game.moveRight()">右移 →</button>
            </div>
            <div>
                <button class="control-btn" onclick="game.softDrop()">↓ 软降</button>
                <button class="control-btn" onclick="game.hardDrop()">⇓ 硬降</button>
            </div>
            <div>
                <button class="control-btn" onclick="game.togglePause()">⏸ 暂停</button>
                <button class="control-btn" onclick="game.restart()">🔄 重新开始</button>
            </div>
            <div style="margin-top: 20px; font-size: 0.9rem;">
                <p>键盘控制：</p>
                <p>A/D - 左右移动 | S - 软降 | W - 旋转</p>
                <p>空格 - 硬降 | P - 暂停</p>
            </div>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameBoard');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextPiece');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.BOARD_WIDTH = 10;
                this.BOARD_HEIGHT = 20;
                this.CELL_SIZE = 30;
                
                this.board = Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
                
                this.pieces = [
                    { shape: [[1,1,1,1]], color: '#00ffff' }, // I
                    { shape: [[1,1],[1,1]], color: '#ffff00' }, // O
                    { shape: [[0,1,0],[1,1,1]], color: '#800080' }, // T
                    { shape: [[0,1,1],[1,1,0]], color: '#00ff00' }, // S
                    { shape: [[1,1,0],[0,1,1]], color: '#ff0000' }, // Z
                    { shape: [[1,0,0],[1,1,1]], color: '#ff8000' }, // J
                    { shape: [[0,0,1],[1,1,1]], color: '#0000ff' }  // L
                ];
                
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.isPaused = false;
                
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                this.init();
            }
            
            init() {
                this.generateNewPiece();
                this.generateNewPiece();
                this.gameRunning = true;
                this.gameLoop();
                this.setupControls();
            }
            
            generateNewPiece() {
                if (this.nextPiece) {
                    this.currentPiece = this.nextPiece;
                }
                
                const pieceIndex = Math.floor(Math.random() * this.pieces.length);
                this.nextPiece = {
                    ...this.pieces[pieceIndex],
                    x: Math.floor(this.BOARD_WIDTH / 2) - 1,
                    y: 0,
                    shape: this.pieces[pieceIndex].shape.map(row => [...row])
                };
                
                if (!this.currentPiece) {
                    this.currentPiece = this.nextPiece;
                    this.generateNewPiece();
                }
                
                this.drawNextPiece();
            }
            
            drawNextPiece() {
                this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                const cellSize = 15;
                const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * cellSize) / 2;
                const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * cellSize) / 2;
                
                this.nextCtx.fillStyle = this.nextPiece.color;
                
                for (let y = 0; y < this.nextPiece.shape.length; y++) {
                    for (let x = 0; x < this.nextPiece.shape[y].length; x++) {
                        if (this.nextPiece.shape[y][x]) {
                            this.nextCtx.fillRect(
                                offsetX + x * cellSize,
                                offsetY + y * cellSize,
                                cellSize - 1,
                                cellSize - 1
                            );
                        }
                    }
                }
            }
            
            canMove(piece, dx, dy, rotation = null) {
                const shape = rotation || piece.shape;
                const newX = piece.x + dx;
                const newY = piece.y + dy;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const boardX = newX + x;
                            const boardY = newY + y;
                            
                            if (boardX < 0 || boardX >= this.BOARD_WIDTH || 
                                boardY >= this.BOARD_HEIGHT || 
                                (boardY >= 0 && this.board[boardY][boardX])) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            placePiece() {
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const boardY = this.currentPiece.y + y;
                            const boardX = this.currentPiece.x + x;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.generateNewPiece();
                
                if (!this.canMove(this.currentPiece, 0, 0)) {
                    this.gameOver();
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.BOARD_HEIGHT - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(this.BOARD_WIDTH).fill(0));
                        linesCleared++;
                        y++; // 重新检查同一行
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += linesCleared * 100 * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(50, 1000 - (this.level - 1) * 50);
                    this.updateUI();
                }
            }
            
            moveLeft() {
                if (this.canMove(this.currentPiece, -1, 0)) {
                    this.currentPiece.x--;
                }
            }
            
            moveRight() {
                if (this.canMove(this.currentPiece, 1, 0)) {
                    this.currentPiece.x++;
                }
            }
            
            softDrop() {
                if (this.canMove(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    this.score += 1;
                    this.updateUI();
                } else {
                    this.placePiece();
                }
            }
            
            hardDrop() {
                while (this.canMove(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    this.score += 2;
                }
                this.placePiece();
                this.updateUI();
            }
            
            rotate() {
                const rotated = this.currentPiece.shape[0].map((_, i) => 
                    this.currentPiece.shape.map(row => row[i]).reverse()
                );
                
                if (this.canMove(this.currentPiece, 0, 0, rotated)) {
                    this.currentPiece.shape = rotated;
                }
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                for (let x = 0; x <= this.BOARD_WIDTH; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.CELL_SIZE, 0);
                    this.ctx.lineTo(x * this.CELL_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y <= this.BOARD_HEIGHT; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.CELL_SIZE);
                    this.ctx.lineTo(this.canvas.width, y * this.CELL_SIZE);
                    this.ctx.stroke();
                }
                
                // 绘制已放置的方块
                for (let y = 0; y < this.BOARD_HEIGHT; y++) {
                    for (let x = 0; x < this.BOARD_WIDTH; x++) {
                        if (this.board[y][x]) {
                            this.ctx.fillStyle = this.board[y][x];
                            this.ctx.fillRect(
                                x * this.CELL_SIZE + 1,
                                y * this.CELL_SIZE + 1,
                                this.CELL_SIZE - 2,
                                this.CELL_SIZE - 2
                            );
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    this.ctx.fillStyle = this.currentPiece.color;
                    for (let y = 0; y < this.currentPiece.shape.length; y++) {
                        for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                            if (this.currentPiece.shape[y][x]) {
                                this.ctx.fillRect(
                                    (this.currentPiece.x + x) * this.CELL_SIZE + 1,
                                    (this.currentPiece.y + y) * this.CELL_SIZE + 1,
                                    this.CELL_SIZE - 2,
                                    this.CELL_SIZE - 2
                                );
                            }
                        }
                    }
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
            
            gameLoop() {
                if (!this.gameRunning || this.isPaused) {
                    requestAnimationFrame(() => this.gameLoop());
                    return;
                }
                
                const now = Date.now();
                if (now - this.dropTime > this.dropInterval) {
                    this.softDrop();
                    this.dropTime = now;
                }
                
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            togglePause() {
                this.isPaused = !this.isPaused;
            }
            
            restart() {
                this.board = Array(this.BOARD_HEIGHT).fill().map(() => Array(this.BOARD_WIDTH).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.dropInterval = 1000;
                this.gameRunning = true;
                this.isPaused = false;
                this.generateNewPiece();
                this.generateNewPiece();
                this.updateUI();
            }
            
            gameOver() {
                this.gameRunning = false;
                alert(`游戏结束！\n最终分数: ${this.score}\n消除行数: ${this.lines}\n等级: ${this.level}`);
            }
            
            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.isPaused) return;
                    
                    switch(e.key.toLowerCase()) {
                        case 'a':
                        case 'arrowleft':
                            this.moveLeft();
                            break;
                        case 'd':
                        case 'arrowright':
                            this.moveRight();
                            break;
                        case 's':
                        case 'arrowdown':
                            this.softDrop();
                            break;
                        case 'w':
                        case 'arrowup':
                            this.rotate();
                            break;
                        case ' ':
                            e.preventDefault();
                            this.hardDrop();
                            break;
                        case 'p':
                            this.togglePause();
                            break;
                    }
                });
            }
        }
        
        // 启动游戏
        const game = new TetrisGame();
    </script>
</body>
</html>
