<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            0% {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            0% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
                transform: scale(1.02);
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
            color: #00ffff;
        }

        .score, .level, .lines {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .next-piece {
            margin-top: 20px;
        }

        .next-preview {
            width: 80px;
            height: 80px;
            border: 1px solid #ffffff;
            margin: 10px auto;
            background: rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ff6b6b;
            display: none;
        }

        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
                letter-spacing: 0.1rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4>下一个:</h4>
                <canvas id="nextCanvas" class="next-preview" width="80" height="80"></canvas>
            </div>
            
            <div class="controls">
                <h4>控制:</h4>
                <p>← → : 左右移动</p>
                <p>↓ : 快速下降</p>
                <p>↑ : 旋转</p>
                <p>空格 : 暂停/继续</p>
            </div>
        </div>
    </div>
    
    <div id="gameOver" class="game-over">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;
        
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = true;
        let isPaused = false;
        let dropTime = 0;
        let dropInterval = 1000;
        
        // 方块形状定义
        const PIECES = [
            {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: '#00ffff'
            },
            {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            },
            {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            }
        ];
        
        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    board[y][x] = 0;
                }
            }
        }
        
        // 创建新方块
        function createPiece() {
            const pieceType = PIECES[Math.floor(Math.random() * PIECES.length)];
            return {
                shape: pieceType.shape,
                color: pieceType.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(pieceType.shape[0].length / 2),
                y: 0
            };
        }
        
        // 绘制方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
        
        // 绘制游戏板
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已放置的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, board[y][x]);
                    }
                }
            }
            
            // 绘制当前方块
            if (currentPiece) {
                drawPiece(ctx, currentPiece);
            }
        }
        
        // 绘制方块
        function drawPiece(ctx, piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        drawBlock(ctx, piece.x + x, piece.y + y, piece.color);
                    }
                }
            }
        }
        
        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;
                
                for (let y = 0; y < nextPiece.shape.length; y++) {
                    for (let x = 0; x < nextPiece.shape[y].length; x++) {
                        if (nextPiece.shape[y][x]) {
                            nextCtx.fillStyle = nextPiece.color;
                            nextCtx.fillRect(
                                (offsetX + x) * (BLOCK_SIZE * 0.6),
                                (offsetY + y) * (BLOCK_SIZE * 0.6),
                                BLOCK_SIZE * 0.6,
                                BLOCK_SIZE * 0.6
                            );
                            nextCtx.strokeStyle = '#ffffff';
                            nextCtx.strokeRect(
                                (offsetX + x) * (BLOCK_SIZE * 0.6),
                                (offsetY + y) * (BLOCK_SIZE * 0.6),
                                BLOCK_SIZE * 0.6,
                                BLOCK_SIZE * 0.6
                            );
                        }
                    }
                }
            }
        }
        
        // 检查碰撞
        function checkCollision(piece, dx = 0, dy = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // 放置方块
        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }
        
        // 清除完整行
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                let isComplete = true;
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (!board[y][x]) {
                        isComplete = false;
                        break;
                    }
                }
                
                if (isComplete) {
                    board.splice(y, 1);
                    board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查这一行
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(50, 1000 - (level - 1) * 50);
                updateDisplay();
            }
        }
        
        // 旋转方块
        function rotatePiece() {
            const rotated = [];
            const shape = currentPiece.shape;
            
            for (let x = 0; x < shape[0].length; x++) {
                rotated[x] = [];
                for (let y = shape.length - 1; y >= 0; y--) {
                    rotated[x][shape.length - 1 - y] = shape[y][x];
                }
            }
            
            const originalShape = currentPiece.shape;
            currentPiece.shape = rotated;
            
            if (checkCollision(currentPiece)) {
                currentPiece.shape = originalShape;
            }
        }
        
        // 移动方块
        function movePiece(dx, dy) {
            if (!checkCollision(currentPiece, dx, dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                return true;
            }
            return false;
        }
        
        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重新开始游戏
        function restartGame() {
            initBoard();
            score = 0;
            level = 1;
            lines = 0;
            dropInterval = 1000;
            gameRunning = true;
            isPaused = false;
            currentPiece = createPiece();
            nextPiece = createPiece();
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            gameLoop();
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning || isPaused) {
                if (gameRunning) {
                    setTimeout(gameLoop, 100);
                }
                return;
            }
            
            const now = Date.now();
            if (now - dropTime > dropInterval) {
                if (!movePiece(0, 1)) {
                    placePiece();
                    clearLines();
                    currentPiece = nextPiece;
                    nextPiece = createPiece();
                    
                    if (checkCollision(currentPiece)) {
                        gameOver();
                        return;
                    }
                }
                dropTime = now;
            }
            
            drawBoard();
            drawNextPiece();
            
            setTimeout(gameLoop, 16);
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    if (!isPaused) movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (!isPaused) movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (!isPaused) movePiece(0, 1);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (!isPaused) rotatePiece();
                    break;
                case ' ':
                    e.preventDefault();
                    isPaused = !isPaused;
                    if (!isPaused) {
                        dropTime = Date.now();
                        gameLoop();
                    }
                    break;
            }
        });
        
        // 初始化游戏
        function initGame() {
            initBoard();
            currentPiece = createPiece();
            nextPiece = createPiece();
            updateDisplay();
            dropTime = Date.now();
            gameLoop();
        }
        
        // 启动游戏
        initGame();
    </script>
</body>
</html>
