<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 30px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
            color: #00ffff;
        }

        .score, .level, .lines {
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-align: center;
        }

        .next-piece {
            margin-top: 20px;
            text-align: center;
        }

        .next-piece h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ff6b6b;
            display: none;
            z-index: 1000;
        }

        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">消除行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4>下一个方块</h4>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h4>操作说明</h4>
                <div>← → 移动</div>
                <div>↓ 快速下降</div>
                <div>↑ 旋转</div>
                <div>空格 暂停</div>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <div>最终得分: <span id="finalScore">0</span></div>
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 30;
        
        let board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = true;
        let isPaused = false;
        
        const SHAPES = [
            {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: '#00ffff'
            },
            {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#800080'
            },
            {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00ff00'
            },
            {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff0000'
            },
            {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#ffa500'
            },
            {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#0000ff'
            }
        ];
        
        let currentPiece = null;
        let nextPiece = null;
        
        function getRandomPiece() {
            const shapeIndex = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[shapeIndex];
            return {
                shape: shape.shape,
                color: shape.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(shape.shape[0].length / 2),
                y: 0
            };
        }
        
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, board[y][x]);
                    }
                }
            }
            
            if (currentPiece) {
                drawPiece(ctx, currentPiece);
            }
        }
        
        function drawPiece(ctx, piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        drawBlock(ctx, piece.x + x, piece.y + y, piece.color);
                    }
                }
            }
        }
        
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;
                
                for (let y = 0; y < nextPiece.shape.length; y++) {
                    for (let x = 0; x < nextPiece.shape[y].length; x++) {
                        if (nextPiece.shape[y][x]) {
                            nextCtx.fillStyle = nextPiece.color;
                            nextCtx.fillRect(
                                (offsetX + x) * BLOCK_SIZE / 4,
                                (offsetY + y) * BLOCK_SIZE / 4,
                                BLOCK_SIZE / 4,
                                BLOCK_SIZE / 4
                            );
                            nextCtx.strokeStyle = '#ffffff';
                            nextCtx.lineWidth = 1;
                            nextCtx.strokeRect(
                                (offsetX + x) * BLOCK_SIZE / 4,
                                (offsetY + y) * BLOCK_SIZE / 4,
                                BLOCK_SIZE / 4,
                                BLOCK_SIZE / 4
                            );
                        }
                    }
                }
            }
        }
        
        function isValidPosition(piece, newX, newY, newShape = piece.shape) {
            for (let y = 0; y < newShape.length; y++) {
                for (let x = 0; x < newShape[y].length; x++) {
                    if (newShape[y][x]) {
                        const boardX = newX + x;
                        const boardY = newY + y;
                        
                        if (boardX < 0 || boardX >= BOARD_WIDTH || 
                            boardY >= BOARD_HEIGHT || 
                            (boardY >= 0 && board[boardY][boardX])) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        function rotatePiece(piece) {
            const rotated = piece.shape[0].map((_, index) => 
                piece.shape.map(row => row[index]).reverse()
            );
            
            if (isValidPosition(piece, piece.x, piece.y, rotated)) {
                piece.shape = rotated;
            }
        }
        
        function placePiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        if (boardY >= 0) {
                            board[boardY][piece.x + x] = piece.color;
                        }
                    }
                }
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
            }
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            isPaused = false;
            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            document.getElementById('gameOver').style.display = 'none';
            updateDisplay();
            drawNextPiece();
        }
        
        function gameLoop() {
            if (!gameRunning || isPaused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            if (currentPiece) {
                if (isValidPosition(currentPiece, currentPiece.x, currentPiece.y + 1)) {
                    currentPiece.y++;
                } else {
                    placePiece(currentPiece);
                    clearLines();
                    currentPiece = nextPiece;
                    nextPiece = getRandomPiece();
                    drawNextPiece();
                    
                    if (!isValidPosition(currentPiece, currentPiece.x, currentPiece.y)) {
                        gameOver();
                        return;
                    }
                }
            }
            
            drawBoard();
            
            setTimeout(() => {
                requestAnimationFrame(gameLoop);
            }, Math.max(50, 500 - (level - 1) * 50));
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (currentPiece && isValidPosition(currentPiece, currentPiece.x - 1, currentPiece.y)) {
                        currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (currentPiece && isValidPosition(currentPiece, currentPiece.x + 1, currentPiece.y)) {
                        currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (currentPiece && isValidPosition(currentPiece, currentPiece.x, currentPiece.y + 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateDisplay();
                    }
                    break;
                case 'ArrowUp':
                    if (currentPiece) {
                        rotatePiece(currentPiece);
                    }
                    break;
                case ' ':
                    isPaused = !isPaused;
                    break;
            }
            
            if (!isPaused) {
                drawBoard();
            }
        });
        
        // 初始化游戏
        currentPiece = getRandomPiece();
        nextPiece = getRandomPiece();
        updateDisplay();
        drawNextPiece();
        gameLoop();
    </script>
</body>
</html>
