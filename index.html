<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 雪花特效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花容器 - 确保正确的层级关系 */
        #snowflake-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 雪花基础样式 */
        .snowflake {
            position: absolute;
            color: white;
            user-select: none;
            pointer-events: none;
            font-size: 1em;
            will-change: transform;
            font-weight: normal;
            line-height: 1;
            text-rendering: optimizeSpeed;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 雪花颜色变体 */
        .snowflake.type-1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .snowflake.type-2 {
            color: #e6f3ff;
            text-shadow: 0 0 3px rgba(230, 243, 255, 0.6), 0 0 8px rgba(230, 243, 255, 0.3);
        }

        .snowflake.type-3 {
            color: #cce7ff;
            text-shadow: 0 0 4px rgba(204, 231, 255, 0.7), 0 0 12px rgba(204, 231, 255, 0.4);
        }

        .snowflake.type-4 {
            color: #b3daff;
            text-shadow: 0 0 6px rgba(179, 218, 255, 0.9), 0 0 15px rgba(179, 218, 255, 0.5);
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        #game-board {
            width: 300px;
            height: 600px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            margin: 0 auto;
        }

        #game-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #level {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        /* 测试面板 */
        #test-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        #test-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .test-item {
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
        }

        .test-pass {
            background: rgba(0, 255, 0, 0.2);
            border-left: 3px solid #00ff00;
        }

        .test-fail {
            background: rgba(255, 0, 0, 0.2);
            border-left: 3px solid #ff0000;
        }

        .test-warning {
            background: rgba(255, 255, 0, 0.2);
            border-left: 3px solid #ffff00;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #45a049;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                padding: 10px;
            }
            
            #game-board {
                width: 250px;
                height: 500px;
            }
            
            #test-panel {
                position: fixed;
                bottom: 20px;
                right: 20px;
                top: auto;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snowflake-container"></div>
    
    <!-- 游戏容器 -->
    <div id="game-container">
        <div id="game-info">
            <div id="score">分数: 0</div>
            <div id="level">等级: 1</div>
        </div>
        <div id="game-board"></div>
        <div id="controls">
            <p>方向键: 移动和旋转</p>
            <p>空格键: 快速下落</p>
        </div>
    </div>
    
    <!-- 测试面板 -->
    <div id="test-panel">
        <h3>雪花特效集成测试</h3>
        <button onclick="integrationTestSuite.runIntegrationTests()">运行全部测试</button>
        <button onclick="integrationTestSuite.testSnowflakeGeneration()">雪花生成测试</button>
        <button onclick="performanceMonitor.generatePerformanceReport()">性能报告</button>
        <div id="test-results"></div>
    </div>

    <script>
        // 雪花特效系统
        class SnowflakeSystem {
            constructor() {
                this.container = document.getElementById('snowflake-container');
                this.snowflakes = [];
                this.maxSnowflakes = 50;
                this.isRunning = false;
                this.animationId = null;
            }

            init() {
                this.createSnowflakes();
                this.startAnimation();
                this.isRunning = true;
            }

            createSnowflakes() {
                const symbols = ['❄', '❅', '❆', '✻', '✼', '❈', '❉', '❊'];
                
                for (let i = 0; i < this.maxSnowflakes; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.className = `snowflake type-${Math.floor(Math.random() * 4) + 1}`;
                    snowflake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // 随机初始位置和属性
                    snowflake.style.left = Math.random() * 100 + '%';
                    snowflake.style.top = -50 + 'px';
                    snowflake.style.fontSize = (Math.random() * 0.8 + 0.8) + 'em';
                    snowflake.style.opacity = Math.random() * 0.6 + 0.4;
                    
                    // 动画属性
                    snowflake.speed = Math.random() * 2 + 1;
                    snowflake.drift = Math.random() * 2 - 1;
                    snowflake.rotation = 0;
                    snowflake.rotationSpeed = Math.random() * 2 - 1;
                    
                    this.container.appendChild(snowflake);
                    this.snowflakes.push(snowflake);
                }
            }

            startAnimation() {
                const animate = () => {
                    this.updateSnowflakes();
                    this.animationId = requestAnimationFrame(animate);
                };
                animate();
            }

            updateSnowflakes() {
                this.snowflakes.forEach(snowflake => {
                    const currentTop = parseFloat(snowflake.style.top) || 0;
                    const currentLeft = parseFloat(snowflake.style.left) || 0;
                    
                    // 更新位置
                    const newTop = currentTop + snowflake.speed;
                    const newLeft = currentLeft + snowflake.drift * 0.1;
                    
                    // 更新旋转
                    snowflake.rotation += snowflake.rotationSpeed;
                    
                    snowflake.style.top = newTop + 'px';
                    snowflake.style.left = newLeft + '%';
                    snowflake.style.transform = `rotate(${snowflake.rotation}deg)`;
                    
                    // 重置超出屏幕的雪花
                    if (newTop > window.innerHeight + 50) {
                        snowflake.style.top = -50 + 'px';
                        snowflake.style.left = Math.random() * 100 + '%';
                        snowflake.rotation = 0;
                    }
                    
                    if (newLeft > 100 || newLeft < -10) {
                        snowflake.style.left = Math.random() * 100 + '%';
                    }
                });
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.isRunning = false;
            }

            getSnowflakeCount() {
                return this.snowflakes.length;
            }
        }

        // 俄罗斯方块游戏集成适配器
        class TetrisGameIntegration {
            constructor(snowflakeSystem) {
                this.snowflakeSystem = snowflakeSystem;
                this.gameState = 'menu'; // menu, playing, paused, gameover
            }

            initSnowflakeBackground() {
                this.snowflakeSystem.init();
                return true;
            }

            adjustForGameUI() {
                // 确保雪花不会干扰游戏UI
                const gameContainer = document.getElementById('game-container');
                if (gameContainer) {
                    gameContainer.style.position = 'relative';
                    gameContainer.style.zIndex = '10';
                }
                return true;
            }

            handleGameStateChanges(newState) {
                this.gameState = newState;
                
                switch (newState) {
                    case 'playing':
                        // 游戏进行时可能需要减少雪花数量以提高性能
                        break;
                    case 'paused':
                        // 暂停时可以停止雪花动画
                        break;
                    case 'gameover':
                        // 游戏结束时可以增加雪花效果
                        break;
                }
                return true;
            }

            optimizeForGameplay() {
                // 优化雪花效果以确保游戏流畅运行
                const container = document.getElementById('snowflake-container');
                if (container) {
                    container.style.willChange = 'transform';
                    container.style.transform = 'translateZ(0)';
                }
                return true;
            }
        }

        // 兼容性验证器
        class CompatibilityValidator {
            validateBrowserSupport() {
                const results = {
                    css3Animations: this.checkCSS3Support(),
                    requestAnimationFrame: this.checkRAFSupport(),
                    transforms: this.checkTransformSupport(),
                    backdropFilter: this.checkBackdropFilterSupport()
                };
                
                return {
                    passed: Object.values(results).every(r => r),
                    details: results
                };
            }

            checkCSS3Support() {
                const testElement = document.createElement('div');
                testElement.style.animation = 'test 1s';
                return testElement.style.animation !== '';
            }

            checkRAFSupport() {
                return typeof requestAnimationFrame !== 'undefined';
            }

            checkTransformSupport() {
                const testElement = document.createElement('div');
                testElement.style.transform = 'translateZ(0)';
                return testElement.style.transform !== '';
            }

            checkBackdropFilterSupport() {
                const testElement = document.createElement('div');
                testElement.style.backdropFilter = 'blur(10px)';
                return testElement.style.backdropFilter !== '';
            }

            testMobilePerformance() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const hasTouch = 'ontouchstart' in window;
                const screenSize = window.innerWidth < 768;
                
                return {
                    isMobile: isMobile,
                    hasTouch: hasTouch,
                    isSmallScreen: screenSize,
                    recommendation: isMobile ? 'reduce-snowflakes' : 'full-effect'
                };
            }

            validateResponsiveLayout() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                
                return {
                    width: viewportWidth,
                    height: viewportHeight,
                    aspectRatio: viewportWidth / viewportHeight,
                    isPortrait: viewportHeight > viewportWidth,
                    isLandscape: viewportWidth > viewportHeight
                };
            }
        }

        // 性能监控器
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.memoryUsage = 0;
                this.isMonitoring = false;
            }

            startMonitoring() {
                this.isMonitoring = true;
                this.monitorFrameRate();
            }

            monitorFrameRate() {
                if (!this.isMonitoring) return;
                
                const currentTime = performance.now();
                this.frameCount++;
                
                if (currentTime - this.lastTime >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                }
                
                requestAnimationFrame(() => this.monitorFrameRate());
            }

            trackMemoryUsage() {
                if (performance.memory) {
                    return {
                        used: Math.round(performance.memory.usedJSHeapSize / 1048576),
                        total: Math.round(performance.memory.totalJSHeapSize / 1048576),
                        limit: Math.round(performance.memory.jsHeapSizeLimit / 1048576)
                    };
                }
                return null;
            }

            measureAnimationCost() {
                const startTime = performance.now();
                
                // 模拟动画成本测量
                setTimeout(() => {
                    const endTime = performance.now();
                    return endTime - startTime;
                }, 16); // 一帧的时间
            }

            generatePerformanceReport() {
                const memory = this.trackMemoryUsage();
                const report = {
                    fps: this.fps,
                    memory: memory,
                    timestamp: new Date().toLocaleTimeString(),
                    recommendations: this.getPerformanceRecommendations()
                };
                
                this.displayPerformanceReport(report);
                return report;
            }

            getPerformanceRecommendations() {
                const recommendations = [];
                
                if (this.fps < 30) {
                    recommendations.push('FPS过低，建议减少雪花数量');
                }
                
                const memory = this.trackMemoryUsage();
                if (memory && memory.used > 100) {
                    recommendations.push('内存使用过高，建议优化动画');
                }
                
                return recommendations;
            }

            displayPerformanceReport(report) {
                const resultsDiv = document.getElementById('test-results');
                const reportHtml = `
                    <div class="test-item ${report.fps > 30 ? 'test-pass' : 'test-warning'}">
                        <strong>性能报告 (${report.timestamp})</strong><br>
                        FPS: ${report.fps}<br>
                        ${report.memory ? `内存: ${report.memory.used}MB / ${report.memory.total}MB` : '内存信息不可用'}<br>
                        ${report.recommendations.length > 0 ? '建议: ' + report.recommendations.join(', ') : '性能良好'}
                    </div>
                `;
                resultsDiv.innerHTML = reportHtml + resultsDiv.innerHTML;
            }
        }

        // 集成测试套件
        class IntegrationTestSuite {
            constructor() {
                this.snowflakeSystem = new SnowflakeSystem();
                this.tetrisIntegration = new TetrisGameIntegration(this.snowflakeSystem);
                this.compatibilityValidator = new CompatibilityValidator();
                this.performanceMonitor = new PerformanceMonitor();
                this.testResults = [];
            }

            runIntegrationTests() {
                this.clearResults();
                this.addResult('开始集成测试...', 'info');
                
                // 运行所有测试
                this.testSnowflakeGeneration();
                this.testAnimationPerformance();
                this.testResponsiveDesign();
                this.testZIndexLayering();
                this.testBrowserCompatibility();
                
                this.addResult('所有测试完成', 'pass');
            }

            testSnowflakeGeneration() {
                try {
                    const success = this.tetrisIntegration.initSnowflakeBackground();
                    const count = this.snowflakeSystem.getSnowflakeCount();
                    
                    if (success && count > 0) {
                        this.addResult(`雪花生成测试通过 - 生成了 ${count} 个雪花`, 'pass');
                    } else {
                        this.addResult('雪花生成测试失败', 'fail');
                    }
                } catch (error) {
                    this.addResult(`雪花生成测试异常: ${error.message}`, 'fail');
                }
            }

            testAnimationPerformance() {
                this.performanceMonitor.startMonitoring();
                
                setTimeout(() => {
                    const fps = this.performanceMonitor.fps;
                    if (fps >= 30) {
                        this.addResult(`动画性能测试通过 - FPS: ${fps}`, 'pass');
                    } else if (fps >= 20) {
                        this.addResult(`动画性能测试警告 - FPS: ${fps}`, 'warning');
                    } else {
                        this.addResult(`动画性能测试失败 - FPS: ${fps}`, 'fail');
                    }
                }, 2000);
            }

            testResponsiveDesign() {
                const layout = this.compatibilityValidator.validateResponsiveLayout();
                const mobile = this.compatibilityValidator.testMobilePerformance();
                
                if (layout.width > 0 && layout.height > 0) {
                    this.addResult(`响应式设计测试通过 - ${layout.width}x${layout.height}`, 'pass');
                } else {
                    this.addResult('响应式设计测试失败', 'fail');
                }
                
                if (mobile.isMobile) {
                    this.addResult(`移动设备检测: ${mobile.recommendation}`, 'info');
                }
            }

            testZIndexLayering() {
                const snowContainer = document.getElementById('snowflake-container');
                const gameContainer = document.getElementById('game-container');
                
                const snowZIndex = parseInt(getComputedStyle(snowContainer).zIndex) || 0;
                const gameZIndex = parseInt(getComputedStyle(gameContainer).zIndex) || 0;
                
                if (gameZIndex > snowZIndex) {
                    this.addResult(`层级测试通过 - 游戏层级(${gameZIndex}) > 雪花层级(${snowZIndex})`, 'pass');
                } else {
                    this.addResult(`层级测试失败 - 层级关系错误`, 'fail');
                }
            }

            testBrowserCompatibility() {
                const compatibility = this.compatibilityValidator.validateBrowserSupport();
                
                if (compatibility.passed) {
                    this.addResult('浏览器兼容性测试通过', 'pass');
                } else {
                    const failed = Object.entries(compatibility.details)
                        .filter(([key, value]) => !value)
                        .map(([key]) => key);
                    this.addResult(`浏览器兼容性测试失败: ${failed.join(', ')}`, 'fail');
                }
            }

            addResult(message, type) {
                const resultsDiv = document.getElementById('test-results');
                const resultClass = type === 'pass' ? 'test-pass' : 
                                  type === 'fail' ? 'test-fail' : 
                                  type === 'warning' ? 'test-warning' : '';
                
                const resultHtml = `
                    <div class="test-item ${resultClass}">
                        ${message}
                    </div>
                `;
                
                resultsDiv.innerHTML = resultHtml + resultsDiv.innerHTML;
                this.testResults.push({ message, type, timestamp: Date.now() });
            }

            clearResults() {
                document.getElementById('test-results').innerHTML = '';
                this.testResults = [];
            }
        }

        // 初始化系统
        const integrationTestSuite = new IntegrationTestSuite();
        const performanceMonitor = integrationTestSuite.performanceMonitor;
        
        // 页面加载完成后自动初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化雪花特效
            integrationTestSuite.tetrisIntegration.initSnowflakeBackground();
            integrationTestSuite.tetrisIntegration.adjustForGameUI();
            integrationTestSuite.tetrisIntegration.optimizeForGameplay();
            
            // 自动运行基础测试
            setTimeout(() => {
                integrationTestSuite.addResult('系统初始化完成', 'pass');
                integrationTestSuite.testSnowflakeGeneration();
                integrationTestSuite.testZIndexLayering();
            }, 1000);
        });
        
        // 响应式处理
        window.addEventListener('resize', () => {
            integrationTestSuite.addResult('窗口大小改变，重新验证响应式设计', 'info');
            integrationTestSuite.testResponsiveDesign();
        });
        
        // 简单的俄罗斯方块游戏模拟（用于测试集成）
        class SimpleTetrisGame {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.isPlaying = false;
            }
            
            start() {
                this.isPlaying = true;
                integrationTestSuite.tetrisIntegration.handleGameStateChanges('playing');
                this.updateDisplay();
            }
            
            pause() {
                this.isPlaying = false;
                integrationTestSuite.tetrisIntegration.handleGameStateChanges('paused');
            }
            
            gameOver() {
                this.isPlaying = false;
                integrationTestSuite.tetrisIntegration.handleGameStateChanges('gameover');
            }
            
            updateDisplay() {
                document.getElementById('score').textContent = `分数: ${this.score}`;
                document.getElementById('level').textContent = `等级: ${this.level}`;
            }
        }
        
        const tetrisGame = new SimpleTetrisGame();
        
        // 键盘事件处理
        document.addEventListener('keydown', (event) => {
            switch(event.code) {
                case 'Space':
                    if (!tetrisGame.isPlaying) {
                        tetrisGame.start();
                        integrationTestSuite.addResult('游戏开始', 'info');
                    }
                    break;
                case 'KeyP':
                    if (tetrisGame.isPlaying) {
                        tetrisGame.pause();
                        integrationTestSuite.addResult('游戏暂停', 'info');
                    }
                    break;
            }
        });
    </script>
</body>
</html>
