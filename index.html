<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .aaa-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #ff6b6b,
                0 0 20px #ff6b6b,
                0 0 30px #ff6b6b,
                0 0 40px #ff6b6b,
                0 0 50px #ff6b6b;
            letter-spacing: 0.5rem;
            animation: aaaGlow 3s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4, #45b7d1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: aaaGlow 3s ease-in-out infinite alternate, rainbowMove 4s ease-in-out infinite;
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 0.2rem;
            animation: gameGlow 2s ease-in-out infinite alternate;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }

        @keyframes aaaGlow {
            from {
                text-shadow: 
                    0 0 10px #ff6b6b,
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 20px #ff6b6b,
                    0 0 30px #ff6b6b,
                    0 0 40px #ff6b6b,
                    0 0 50px #ff6b6b,
                    0 0 60px #ff6b6b;
                transform: scale(1.05);
            }
        }

        @keyframes rainbowMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gameGlow {
            from {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff;
            }
            to {
                text-shadow: 
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #00ffff,
                    0 0 50px #00ffff;
            }
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-board {
            border: 3px solid #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 10px;
            padding: 20px;
            color: #ffffff;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .info-panel h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-align: center;
            color: #00ffff;
        }

        .score, .level, .lines {
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-align: center;
        }

        .next-piece {
            margin-top: 20px;
            text-align: center;
        }

        .next-piece h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .controls h4 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #ffffff;
            border: 3px solid #ffffff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #ffffff;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .aaa-title {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .game-title {
                font-size: 2.5rem;
            }
            
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            
            .info-panel {
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="aaa-title">AAA</h1>
        <h2 class="game-title">俄罗斯方块</h2>
    </div>
    
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h3>游戏信息</h3>
            <div class="score">分数: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
            <div class="lines">消除行数: <span id="lines">0</span></div>
            
            <div class="next-piece">
                <h4>下一个方块</h4>
                <canvas id="nextPiece" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h4>操作说明</h4>
                <div>← → 移动</div>
                <div>↓ 快速下落</div>
                <div>↑ 旋转</div>
                <div>空格 暂停</div>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <div>最终分数: <span id="finalScore">0</span></div>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');
        
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;
        
        let board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = true;
        let isPaused = false;
        let dropTime = 0;
        let dropInterval = 1000;
        
        const colors = [
            '#000000', // 0 - 空
            '#ff6b6b', // 1 - 红
            '#4ecdc4', // 2 - 青
            '#45b7d1', // 3 - 蓝
            '#96ceb4', // 4 - 绿
            '#ffd93d', // 5 - 黄
            '#ff9ff3', // 6 - 粉
            '#a8e6cf'  // 7 - 浅绿
        ];
        
        const pieces = [
            // I
            {
                shape: [
                    [1, 1, 1, 1]
                ],
                color: 1
            },
            // O
            {
                shape: [
                    [2, 2],
                    [2, 2]
                ],
                color: 2
            },
            // T
            {
                shape: [
                    [0, 3, 0],
                    [3, 3, 3]
                ],
                color: 3
            },
            // S
            {
                shape: [
                    [0, 4, 4],
                    [4, 4, 0]
                ],
                color: 4
            },
            // Z
            {
                shape: [
                    [5, 5, 0],
                    [0, 5, 5]
                ],
                color: 5
            },
            // J
            {
                shape: [
                    [6, 0, 0],
                    [6, 6, 6]
                ],
                color: 6
            },
            // L
            {
                shape: [
                    [0, 0, 7],
                    [7, 7, 7]
                ],
                color: 7
            }
        ];
        
        let currentPiece = {
            shape: [],
            x: 0,
            y: 0,
            color: 0
        };
        
        let nextPiece = null;
        
        function getRandomPiece() {
            const piece = pieces[Math.floor(Math.random() * pieces.length)];
            return {
                shape: piece.shape.map(row => [...row]),
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0,
                color: piece.color
            };
        }
        
        function drawCell(ctx, x, y, color, size = CELL_SIZE) {
            ctx.fillStyle = colors[color];
            ctx.fillRect(x * size, y * size, size, size);
            
            if (color !== 0) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.strokeRect(x * size, y * size, size, size);
            }
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    drawCell(ctx, x, y, board[y][x]);
                }
            }
        }
        
        function drawPiece(piece, context = ctx, cellSize = CELL_SIZE, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x] !== 0) {
                        const drawX = piece.x + x + offsetX;
                        const drawY = piece.y + y + offsetY;
                        
                        if (context === ctx) {
                            drawCell(context, drawX, drawY, piece.color, cellSize);
                        } else {
                            context.fillStyle = colors[piece.color];
                            context.fillRect(drawX * cellSize, drawY * cellSize, cellSize, cellSize);
                            context.strokeStyle = '#ffffff';
                            context.lineWidth = 1;
                            context.strokeRect(drawX * cellSize, drawY * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }
        }
        
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const tempPiece = {
                    ...nextPiece,
                    x: 1,
                    y: 1
                };
                drawPiece(tempPiece, nextCtx, 20);
            }
        }
        
        function isValidPosition(piece, dx = 0, dy = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x] !== 0) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return false;
                        }
                        
                        if (newY >= 0 && board[newY][newX] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x] !== 0) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 检查同一行，因为上面的行下移了
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(50, 1000 - (level - 1) * 50);
                
                updateUI();
            }
        }
        
        function rotatePiece() {
            const rotated = currentPiece.shape[0].map((_, index) =>
                currentPiece.shape.map(row => row[index]).reverse()
            );
            
            const rotatedPiece = {
                ...currentPiece,
                shape: rotated
            };
            
            if (isValidPosition(rotatedPiece)) {
                currentPiece.shape = rotated;
            }
        }
        
        function spawnNewPiece() {
            currentPiece = nextPiece || getRandomPiece();
            nextPiece = getRandomPiece();
            
            if (!isValidPosition(currentPiece)) {
                gameOver();
            }
            
            drawNextPiece();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function restartGame() {
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            isPaused = false;
            dropTime = 0;
            dropInterval = 1000;
            
            document.getElementById('gameOver').style.display = 'none';
            
            spawnNewPiece();
            updateUI();
            gameLoop();
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function gameLoop(timestamp = 0) {
            if (!gameRunning) return;
            
            if (!isPaused) {
                if (timestamp - dropTime > dropInterval) {
                    if (isValidPosition(currentPiece, 0, 1)) {
                        currentPiece.y++;
                    } else {
                        placePiece();
                        clearLines();
                        spawnNewPiece();
                    }
                    dropTime = timestamp;
                }
                
                drawBoard();
                drawPiece(currentPiece);
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || isPaused) {
                if (e.code === 'Space') {
                    isPaused = !isPaused;
                }
                return;
            }
            
            switch (e.code) {
                case 'ArrowLeft':
                    if (isValidPosition(currentPiece, -1, 0)) {
                        currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (isValidPosition(currentPiece, 1, 0)) {
                        currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (isValidPosition(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateUI();
                    }
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case 'Space':
                    isPaused = !isPaused;
                    break;
            }
        });
        
        // 初始化游戏
        spawnNewPiece();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
